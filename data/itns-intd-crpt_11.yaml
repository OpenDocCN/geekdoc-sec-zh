- en: Key derivation, protecting passwords, slow hashes, Merkle trees
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 密钥派生、保护密码、慢速哈希、默克尔树
- en: 原文：[https://intensecrypto.org/public/lec_08_hash_functions_part2.html](https://intensecrypto.org/public/lec_08_hash_functions_part2.html)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://intensecrypto.org/public/lec_08_hash_functions_part2.html](https://intensecrypto.org/public/lec_08_hash_functions_part2.html)
- en: '*See any bugs/typos/confusing explanations? [Open a GitHub issue](https://github.com/boazbk/crypto/issues/new).
    You can also [comment below](#commentform)*'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '*发现任何错误/打字错误/令人困惑的解释？[在GitHub上打开一个issue](https://github.com/boazbk/crypto/issues/new)。您也可以[在下面评论](#commentform)*'
- en: '**★ See also the [**PDF version of this chapter**](https://files.boazbarak.org/crypto/lec_08_hash_functions_part2.pdf)
    (better formatting/references) ★'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '**★ 另请参阅本章的[**PDF版本**](https://files.boazbarak.org/crypto/lec_08_hash_functions_part2.pdf)（更好的格式/参考文献）★'
- en: Last lecture we saw the notion of cryptographic hash functions which are functions
    that behave like a random function, even in settings (unlike that of standard
    PRFs) where the adversary has access to the key that allows them to evaluate the
    hash function. Hash functions have found a variety of uses in cryptography, and
    in this lecture we survey some of their other applications. In some of these cases,
    we only need the relatively mild and well-defined property of *collision resistance*
    while in others we only know how to analyze security under the stronger (and not
    precisely well defined) *random oracle heuristic*.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一节课中，我们看到了密码哈希函数的概念，这些函数的行为类似于随机函数，即使在攻击者可以访问允许他们评估哈希函数的密钥的设置中也是如此（与标准PRF不同）。哈希函数在密码学中找到了各种用途，在本节课中，我们将探讨它们的一些其他应用。在这些情况下，我们只需要相对温和且定义明确的
    *抗碰撞性* 属性，而在其他情况下，我们只知道如何分析在更强（且不精确定义）的 *随机预言机启发式方法* 下的安全性。
- en: Keys from passwords
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从密码中提取密钥
- en: We have seen great cryptographic tools, including PRFs, MACs, and CCA secure
    encryptions, that Alice and Bob can use when they share a cryptographic key of
    128 bits or so. But unfortunately, many of the current users of cryptography are
    *humans* which, generally speaking, have extremely faulty memory capacity for
    storing large numbers. There are \(62^8 \approx 2^{48}\) ways to select a password
    of 8 upper and lower case letters + numbers, but some letter/numbers combinations
    end up being chosen much more frequently than others. Due to several large scale
    hacks, very large databases of passwords have been made public, and one [estimate](https://blogs.dropbox.com/tech/2012/04/zxcvbn-realistic-password-strength-estimation/)
    is that 91 percent of the passwords chosen by users are contained in a list of
    about \(1,000 \approx 2^{10}\) strings.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经看到了一些伟大的密码学工具，包括PRFs、MACs和CCA安全的加密，Alice和Bob可以在他们共享大约128位加密密钥时使用。但不幸的是，许多当前使用密码学的人是
    *人类*，一般来说，他们存储大数字的记忆能力极其有限。有 \(62^8 \approx 2^{48}\) 种选择8个大小写字母和数字的密码的方法，但某些字母/数字组合的选择频率远高于其他组合。由于几次大规模黑客攻击，非常大的密码数据库已经公开，其中一项
    [估计](https://blogs.dropbox.com/tech/2012/04/zxcvbn-realistic-password-strength-estimation/)
    是，用户选择的91%的密码包含在大约 \(1,000 \approx 2^{10}\) 个字符串的列表中。
- en: 'If we choose a password at random from some set \(D\) then the *entropy* of
    the password is simply \(\log_2 |D|\). However, estimating the entropy of real
    life passwords is rather difficult. For example, suppose that I use the winning
    Massachussets Mega-Lottery numbers as my password. A priori, my password consists
    of \(5\) numbers between \(1\) till \(75\) and so its entropy is \(\log_2 (75^5)
    \approx 31\). However, if an attacker *knew* that I did this, the entropy might
    be something like \(\log(520) \approx 9\) (since there were only 520 such numbers
    selected in the last 10 years). Moreover, if they knew exactly what draw I based
    my password on, then they would know it exactly and hence the entropy (from their
    point of view) would be zero. This is worthwhile to emphasize:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们从某个集合 \(D\) 中随机选择一个密码，那么该密码的熵就是 \(\log_2 |D|\)。然而，估计现实生活中的密码熵相当困难。例如，假设我使用赢得马萨诸塞州百万彩票的号码作为我的密码。从先验知识来看，我的密码由
    \(5\) 个介于 \(1\) 到 \(75\) 之间的数字组成，因此其熵大约是 \(\log_2 (75^5) \approx 31\)。然而，如果攻击者
    *知道* 我这样做，熵可能类似于 \(\log(520) \approx 9\)（因为过去十年中只选择了大约 \(520\) 个这样的数字）。此外，如果他们确切知道我基于哪个抽奖来设置密码，那么他们就会确切知道，因此（从他们的角度来看）熵将是零。这一点值得强调：
- en: '*The entropy of a secret is always measured with respect to the attacker’s
    point of view.*'
  id: totrans-8
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*秘密的熵总是相对于攻击者的观点来衡量的。*'
- en: The exact security of passwords is of course a matter of intense practical interest,
    but we will simply model the password as being chosen at random from some set
    \(D\subseteq\{0,1\}^n\) (which is sometimes called the “dictionary”). The set
    \(D\) is known to the attacker, but she has no information on the particular choice
    of the password.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 密码的确切安全性当然是一个具有高度实际意义的问题，但我们将简单地假设密码是从某个集合 \(D\subseteq\{0,1\}^n\)（有时称为“字典”）中随机选择的（）。集合
    \(D\) 是攻击者所知的，但她对密码的特定选择没有任何信息。
- en: Much of the challenge for using passwords securely relies on the distinction
    between *offline* and *online* attacks. If each guess for a password requires
    interacting *online* with a server, as is the case when typing a PIN number in
    the ATM, then even a weak password (such as a 4 digit PIN that at best provides
    \(13\) bits of entropy) can yield meaningful security guarantees, as typically
    an alarm would be raised after five or so failed attempts.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 使用密码安全地面临的许多挑战都依赖于*离线*和*在线*攻击之间的区别。如果每个密码猜测都需要与服务器进行在线交互，就像在ATM中输入PIN号码那样，那么即使是弱密码（例如最多提供13位熵的4位PIN），也可以提供有意义的保证，因为通常在五次或五次以上的失败尝试后，会触发警报。
- en: However, if the adversary has the ability to check *offline* whether a password
    is correct then the number of guesses they can try can be as high as the number
    of computing cycles at their disposal, which can easily run into the billions
    and so break passwords of \(30\) or more bits of entropy. (This is an issue we’ll
    return to after we learn about *public key cryptography* when we’ll talk about
    *password authenticated key exchange*.)
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，如果对手有检查密码是否正确的能力，那么他们可以尝试的猜测次数可以高达他们可用的计算周期数，这可以轻易达到数十亿，从而破解熵为30位或更多的密码。（这是我们学习完*公钥密码学*后，在讨论*密码认证密钥交换*时将再次讨论的问题。）
- en: Consider a password manager application. In such an application, a user typically
    chooses a *master password* \(p_{master}\) which she can then use to access all
    her other passwords \(p_1,\ldots,p_t\). To enable her to do so without requiring
    online access to a server, the master password \(p_{master}\) is used to *encrypt*
    the other passwords. However to do that, we need to derive a key \(k_{master}\)
    from the password.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑一个密码管理器应用程序。在这样的应用程序中，用户通常会选择一个*主密码* \(p_{master}\)，然后可以使用它来访问她所有的其他密码 \(p_1,\ldots,p_t\)。为了使她能够在不要求在线访问服务器的情况下做到这一点，主密码
    \(p_{master}\) 被用来*加密*其他密码。然而，为了做到这一点，我们需要从密码中导出一个密钥 \(k_{master}\)。
- en: A natural approach is to simply let the key be the password. For example, if
    the password \(p\) is a string of at most 16 bytes, then we can simply treat it
    as a \(128\) bit key and use it for encryption. Stop and think why this would
    *not* be a good idea. In particular think of an example of a secure encryption
    \((E,D)\) and a distribution \(P\) over \(\{0,1\}^n\) of entropy at least \(n/2\)
    such that if the key \(k\) is chosen at random from \(P\) then the encryption
    will be completely insecure.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 一种自然的方法是简单地让密钥就是密码。例如，如果密码 \(p\) 是最多16字节的字符串，那么我们可以简单地将其视为一个128位密钥并用于加密。停下来想想为什么这*不会*是一个好主意。特别是考虑一个安全的加密
    \((E,D)\) 和一个在 \(\{0,1\}^n\) 上的分布 \(P\)，其熵至少为 \(n/2\)，如果密钥 \(k\) 是从 \(P\) 中随机选择的，那么加密将是完全不安全的。
- en: A classical approach is to simply use a cryptographic hash function \(H:\{0,1\}^*\rightarrow\{0,1\}^n\),
    and let \(k_{master} = H(p_{master})\). If we think of \(H\) as a random oracle
    and \(p_{master}\) as chosen randomly from \(D\), then as long as an attacker
    makes \(\ll |D|\) queries to the oracle, they are unlikely to make the query \(p_{master}\)
    and hence the value \(k_{master}\) will be completely random from their point
    of view.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 一种经典的方法是简单地使用一个加密散列函数 \(H:\{0,1\}^*\rightarrow\{0,1\}^n\)，并让 \(k_{master} =
    H(p_{master})\)。如果我们把 \(H\) 视为一个随机预言机，而 \(p_{master}\) 是从 \(D\) 中随机选择的，那么只要攻击者向预言机提出
    \(\ll |D|\) 次查询，他们就不太可能提出 \(p_{master}\) 的查询，因此从他们的角度来看，\(k_{master}\) 的值将是完全随机的。
- en: However, since \(|D|\) is not too large, it might not be so hard to perform
    such \(|D|\) queries. For this reason, people typically use a *deliberately slow
    hash* function as a *key derivation function*. The rationale is that the honest
    user only needs to evaluate \(H\) once, and so could afford for it to take a while,
    while the adversary would need to evaluate it \(|D|\) times. For example, if \(|D|\)
    is about \(100,000\) and the honest user is willing to spend 1 cent of computation
    resources every time they need to derive \(k_{master}\) from \(p_{master}\), then
    we could set \(H(\cdot)\) so that it costs 1 cent to evaluate it and hence on
    average it will cost the adversary \(1,000\) dollars to recover it.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，由于 \(|D|\) 不太大，执行这样的 \(|D|\) 查询可能并不那么困难。因此，人们通常使用一个故意“慢”的哈希函数作为密钥派生函数。其理由是，诚实用户只需要评估
    \(H\) 一次，因此可以承受它花费一些时间，而对手则需要评估它 \(|D|\) 次。例如，如果 \(|D|\) 大约是 \(100,000\)，并且诚实用户愿意每次从
    \(p_{master}\) 导出 \(k_{master}\) 时花费 1 美分的计算资源，那么我们可以设置 \(H(\cdot)\) 使得评估它需要 1
    美分，因此平均来说，对手恢复它将花费 1,000 美元。
- en: There are several approaches for trying to make \(H\) deliberately “slow” or
    “costly” to evaluate but the most popular and simplest one is to simply let \(H\)
    be obtained by iterating many times a basic hash function such as SHA-256\. That
    is, \(H(x)=h(h(h(\cdots h(x))))\) where \(h\) is some standard (“fast”) cryptographic
    hash function and the number of iterations is tailored to be the largest one that
    the honest users can tolerate.^([1](#fn:1))
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 有几种方法试图使 \(H\) 故意变得“慢”或“昂贵”以进行评估，但最流行和最简单的一种方法是将 \(H\) 通过迭代多次基本哈希函数（如 SHA-256）来获得。也就是说，\(H(x)=h(h(h(\cdots
    h(x))))\)，其中 \(h\) 是某种标准（“快速”）的加密哈希函数，迭代次数被调整到诚实用户可以容忍的最大值。[^([1](#fn:1))]
- en: In fact, typically we will set \(k_{master} = H(p_{master}\| r)\) where \(r\)
    is a long random but *public* string known as a “salt” (see [Figure 8.1](#saltfig)).
    Including such a “salt” can be important to foiling an adversary’s attempts to
    amortize the computation costs, see the exercises.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，我们通常会设置 \(k_{master} = H(p_{master}\| r)\)，其中 \(r\) 是一个长随机但**公开**的字符串，称为“盐”（见[图
    8.1](#saltfig)）。包括这样的“盐”对于挫败对手试图分摊计算成本的努力可能很重要，请参见练习。
- en: '![](../Images/95e1f981820487f1a692f63d5c672237.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/95e1f981820487f1a692f63d5c672237.png)'
- en: '8.1: To obtain a key from a password we will typically use a “slow” hash function
    to map the password and a unique-to-user public “salt” value to a cryptographic
    key. Even with such a procedure, the resulting key cannot be considered as secure
    and unpredictable as a key that was chosen truly at random, especially if we are
    in a setting where an adversary can launch an *offline* attack to guess all possibilities.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 8.1：要从密码中获取密钥，我们通常会使用一个“慢”的哈希函数将密码和用户唯一的公共“盐”值映射到一个加密密钥。即使有这样的程序，生成的密钥也不能被认为像真正随机选择的密钥那样安全且不可预测，尤其是在我们处于一个对手可以发起**离线**攻击以猜测所有可能性的环境中。
- en: Even when we don’t use one password to encrypt others, it is generally considered
    the best practice to *never* store a password in the clear but always in this
    “slow hashed and salted” form, so if the passwords file falls to the hands of
    an adversary it will be expensive to recover them.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 即使当我们不使用一个密码来加密其他密码时，通常也认为将密码以明文形式存储而不是以这种“慢速哈希和加盐”的形式存储是最佳实践，因此如果密码文件落入对手手中，恢复它们将非常昂贵。
- en: Merkle trees and verifying storage.
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Merkle 树和验证存储。
- en: Suppose that you outsource to the cloud storing your huge data file \(x\in\{0,1\}^N\).
    You now need the \(i^{th}\) bit of that file and ask the cloud for \(x_i\). How
    can you tell that you actually received the correct bit?
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你将你的大量数据文件 \(x\in\{0,1\}^N\) 外包到云端存储。现在你需要获取该文件的 \(i^{th}\) 位，并向云端请求 \(x_i\)。你如何确定你实际上收到了正确的位？
- en: 'Ralph Merkle came up in 1979 with a clever solution, which is known as “Merkle
    hash trees”. The idea is the following (see [Theorem 8.1](#merkletreefig)): suppose
    we have a collision-resistant hash function \(h:\{0,1\}^{2n}\rightarrow\{0,1\}^n\),
    and think of the string \(x\) as composed of \(t\) blocks of size \(n\). We then
    hash every pair of consecutive blocks to transform \(x\) into a string \(x_1\)
    of \(t/2\) blocks, and continue in this way for \(\log t\) steps until we get
    a single block \(y\in\{0,1\}^n\). (Assume here \(t\) is a power of two for simplicity,
    though it doesn’t make much difference.)'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: Ralph Merkle在1979年提出了一种巧妙的解决方案，这被称为“Merkle哈希树”。其想法如下（参见[定理8.1](#merkletreefig)）：假设我们有一个抗碰撞哈希函数
    \(h:\{0,1\}^{2n}\rightarrow\{0,1\}^n\)，并将字符串 \(x\) 视为由 \(t\) 个大小为 \(n\) 的块组成。然后我们哈希每对连续的块，将
    \(x\) 转换为 \(t/2\) 个块的字符串 \(x_1\)，并以这种方式继续进行 \(\log t\) 步，直到我们得到一个单独的块 \(y\in\{0,1\}^n\)。（这里为了简单起见，假设
    \(t\) 是2的幂，尽管这并没有太大的影响。）
- en: '![](../Images/afcfc5ecbb6d91fd80a2f803d3dad48d.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/afcfc5ecbb6d91fd80a2f803d3dad48d.png)'
- en: '8.1: In the Merkle Tree construction we map a long string \(x\) into a block
    \(y\in\{0,1\}^n\) that is a “digest” of the long string \(x\). As in a collision
    resistant hash we can imagine that this map is “one to one” in the sense that
    it won’t be possible to find \(x''\neq x\) with the same digest. Moreover, we
    can efficiently certify that a certain bit of \(x\) is equal to some value without
    sending out all of \(x\) but rather the \(\log t\) blocks that are on the path
    between \(i\) to the root together with their “siblings” used in the hash function,
    for a total of at most \(2\log t\) blocks.'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 8.1：在Merkle树构建中，我们将长字符串 \(x\) 映射到块 \(y\in\{0,1\}^n\)，它是长字符串 \(x\) 的“摘要”。与抗碰撞哈希一样，我们可以想象这个映射在“一对一”的意义上，即不可能找到具有相同摘要的
    \(x'\neq x\)。此外，我们可以高效地证明 \(x\) 的某个比特等于某个值，而不需要发送所有 \(x\)，而是发送在 \(i\) 到根之间的路径上的
    \(\log t\) 个块及其在哈希函数中使用的“兄弟”块，总共最多 \(2\log t\) 个块。
- en: 'Alice, who sends \(x\) to the cloud Bob, will keep the short block \(y\). Whenever
    Alice queries the value \(i\) she will ask for a *certificate* that \(x_i\) is
    indeed the right value. This certificate will consists of the block that contains
    \(i\), as well as all of the \(2\log t\) blocks that were used in the hash from
    this block to the root. The security of this scheme follows from the following
    simple theorem:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: Alice，将 \(x\) 发送到云端Bob的人，将保留短块 \(y\)。每当Alice查询值 \(i\) 时，她将要求一个 *证书* 来证明 \(x_i\)
    确实是正确的值。这个证书将包括包含 \(i\) 的块，以及从该块到根的所有 \(2\log t\) 个块，这些块用于从该块到根的哈希。该方案的安全性源于以下简单的定理：
- en: Suppose that \(\pi\) is a valid certificate that \(x_i=b\), then either this
    statement is true, or one can efficiently extract from \(\pi\) and \(x\) two inputs
    \(z\neq z'\) in \(\{0,1\}^{2n}\) such that \(h(z)=h(z')\).
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 假设 \(\pi\) 是一个有效的证书，证明 \(x_i=b\)，那么这个陈述要么是真的，要么可以从 \(\pi\) 和 \(x\) 中高效地提取两个不同的输入
    \(z\neq z'\) 在 \(\{0,1\}^{2n}\) 中，使得 \(h(z)=h(z')\)。
- en: The certificate \(\pi\) consists of a sequence of \(\log t\) pairs of size-\(n\)
    blocks that are obtained by following the path on the tree from the \(i^{th}\)
    coordinate of \(x\) to the final root \(y\). The last pair of blocks is the a
    preimage of \(y\) under \(h\), while each pair on this list is a preimage of one
    of the blocks in the next pair. If \(x_i \neq b\), then the first pair of blocks
    cannot be identical to the pair of blocks of \(x\) that contains the \(i^{th}\)
    coordinate. However, since we know the final root \(y\) is identical, if we compare
    the corresponding path in \(x\) to \(\pi\), we will see that at some point there
    must be an input \(z\) in the path from \(x\) and a distinct input \(z'\) in \(\pi\)
    that hash to the same output.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 证书 \(\pi\) 由一系列 \(\log t\) 个大小为 \(n\) 的块对组成，这些块是通过在树中从 \(x\) 的第 \(i\) 个坐标到最终根
    \(y\) 的路径上跟踪得到的。最后一个块对是 \(h\) 下 \(y\) 的前像，而列表中的每一对都是下一对中某个块的预像。如果 \(x_i \neq b\)，则第一个块对不能与包含
    \(x\) 中第 \(i\) 个坐标的块对的 \(x\) 相同。然而，由于我们知道最终根 \(y\) 是相同的，如果我们比较 \(x\) 和 \(\pi\)
    中的对应路径，我们将看到在某个点，路径中必须有一个输入 \(z\)，在 \(\pi\) 中有一个不同的输入 \(z'\)，它们哈希到相同的输出。
- en: Proofs of Retrievability
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 可检索性证明
- en: The above provides a way to ensure Alice that the value retrieved from a cloud
    storage is correct, but how can Alice be sure that the cloud server still stores
    the values that she *did not* ask about?
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 上述方法为Alice提供了一种确保从云存储检索到的值是正确的方法，但Alice如何确保云服务器仍然存储了她 *没有* 询问的值？
- en: A priori, you might think that she obviously can’t. If Bob is lazy, or short
    on storage, he could decide to store only some small fraction of \(x\) that he
    thinks Alice is more likely to query for. As long as Bob wasn’t unlucky and Alice
    doesn’t ask these queries, then it seems Bob could get away with this. In a *proof
    of retrievability*, first proposed by Juels and Kalisky in 2007, Alice would be
    able to get convinced that Bob does in fact store her data.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 从先验的角度来看，你可能认为她显然做不到。如果鲍勃懒惰，或者存储空间不足，他可能会决定只存储 \(x\) 的一小部分，他认为爱丽丝更有可能查询的部分。只要鲍勃运气不错，爱丽丝不提出这些查询，那么这似乎鲍勃可以逃脱惩罚。在2007年由朱尔斯和卡利斯基首次提出的*可检索性证明*中，爱丽丝将能够确信鲍勃确实存储了她的数据。
- en: First, note that Alice can guarantee that Bob stores at least 99 percent of
    her data, by periodically asking him to provide answers (with proofs!) of the
    value of \(x\) at 100 or so random locations. The idea is that if Bob dropped
    more than 1 percent of the bits, then he’d be very likely to be caught “red handed”
    and get a question from Alice about a location he did not retain.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，请注意，爱丽丝可以通过定期要求鲍勃提供 \(x\) 在大约100个随机位置的值（以及证明！）的答案来保证鲍勃至少存储了她99%的数据。这个想法是，如果鲍勃丢失了超过1%的位，那么他很可能被当场抓住，并从爱丽丝那里得到一个关于他没有保留的位置的问题。
- en: Now, if we used some redundancy to store \(x\) such as the RAID format, where
    it is composed of some small number \(c\) parts and we can recover any bit of
    the original data as long as at most one of the parts were lost, then we might
    hope that even if 1% of \(x\) *was* in fact lost by Bob, we could still recover
    the whole string. This is not a fool-proof guarantee since it could possibly be
    that the data lost by Bob was not confined to a single part. To handle this case
    one needs to consider generalizations of RAID known as “local reconstruction codes”
    or “locally decodable codes”. The paper by [Dodis, Vadhan and Wichs](http://www.people.seas.harvard.edu/~salil/research/PoR-tcc09.pdf)
    is a good source for this; see also [these slides by Seny Kamara](http://research.microsoft.com/en-us/um/people/senyk/slides/pos-cai.pdf)
    for a more recent overview of the theory and implementations.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，如果我们使用一些冗余来存储 \(x\)，例如RAID格式，其中它由一些小的部分 \(c\) 组成，并且只要最多有一个部分丢失，我们就可以恢复原始数据的任何位，那么我们可能会希望即使1%的
    \(x\) 确实丢失了，我们仍然可以恢复整个字符串。这不是一个万无一失的保证，因为可能的情况是鲍勃丢失的数据并没有局限于单个部分。为了处理这种情况，需要考虑RAID的推广，称为“局部重建码”或“局部可解码码”。[Dodis,
    Vadhan和Wichs](http://www.people.seas.harvard.edu/~salil/research/PoR-tcc09.pdf)的论文是这方面的良好来源；还可以参考[Seny
    Kamara的这些幻灯片](http://research.microsoft.com/en-us/um/people/senyk/slides/pos-cai.pdf)，以了解理论和实现的最新概述。
- en: Entropy extraction
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 熵提取
- en: As we’ve seen time and again, *randomness* is crucial to cryptography. But how
    *do* we get these random bits we need? If we only have a small number \(n\) of
    random bits (e.g., \(n=128\) or so) then we can expand them to as large a number
    as we want using a pseudorandom generator, but where do we get those initial \(n\)
    bits from?
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们一次又一次看到的，*随机性*对于密码学至关重要。但我们如何获得我们需要的这些随机位呢？如果我们只有少量 \(n\) 个随机位（例如，\(n=128\)
    或如此），那么我们可以使用伪随机生成器将它们扩展到我们想要的任何数量，但我们从哪里获得最初的 \(n\) 位呢？
- en: The approach used in practice is known as “harvesting entropy”. The idea is
    that we make great many measurements \(x_1,\ldots,x_m\) of events that are considered
    “unpredictable” to some extent, including mouse movements, hard-disk and network
    latency, sources of noise etc… and accumulate them in an entropy “pool” which
    would simply be some memory array. When we estimate that we have accumulated more
    than \(128\) bits of randomness, then we hash this array into a \(128\) bit string
    which we’ll use as a seed for a pseudorandom generator (see [Figure 8.3](#entropyextfig)).^([2](#fn:2))
    Because entropy needs to be measured *from the point of view of the attacker*,
    this “entropy estimation” routine is a bit of a “black art” and there isn’t a
    very principled way to perform it. In practice people try to be very conservative
    (e.g., assume that there is only one bit of entropy for 64 bits of measurements
    or so) and hope for the best, which often works but sometimes also [spectacularly
    fails](https://factorable.net/paper.html), especially in embedded systems that
    do not have access to many of these sources.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 实际中使用的这种方法被称为“熵收集”。其想法是，我们对一些被认为是“不可预测”的事件进行大量测量 \(x_1,\ldots,x_m\)，包括鼠标移动、硬盘和网络延迟、噪声源等，并将它们积累在一个熵“池”中，这个池子简单地是一个内存数组。当我们估计我们已经积累了超过
    \(128\) 比特的随机性时，我们将这个数组哈希成一个 \(128\) 比特的字符串，将其用作伪随机生成器的种子（参见[图 8.3](#entropyextfig)）。^([2](#fn:2))
    因为熵需要从攻击者的视角来测量，所以这个“熵估计”程序有点像是一种“黑魔法”，并没有一个非常原则性的方法来执行它。在实践中，人们试图非常保守（例如，假设 64
    比特测量值中只有 1 比特的熵）并寄希望于最好的结果，这通常有效，但有时也会[ spectacularly fails](https://factorable.net/paper.html)，尤其是在无法访问许多这些来源的嵌入式系统中。
- en: '![](../Images/0db27f0ae2a3ecce3a2457295b58b0ef.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0db27f0ae2a3ecce3a2457295b58b0ef.png)'
- en: '8.3: To obtain pseudorandom bits for cryptographic applications we hash down
    measurements which contain some *entropy* in them to a shorter string that is
    hopefully truly uniformly random or at least statistically close to it, and then
    expand this to get as many pseudorandom bits as we need using a pseudorandom generator.'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 8.3：为了获取用于密码学应用的伪随机位，我们需要将包含某些*熵*的测量值哈希成一个更短的字符串，希望这个字符串是真正均匀随机的，或者至少在统计上接近均匀随机，然后使用伪随机生成器将其扩展，以获得我们需要的尽可能多的伪随机位。
- en: How do hash functions figure into this? The idea is that if an input \(x\) has
    \(n\) bits of entropy then \(h(x)\) would still have the same bits of entropy,
    as long as its output is larger than \(n\). In practice people use the notion
    of “entropy” in a rather loose sense, but we will try to be more precise below.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 哈希函数在这个过程中是如何起作用的呢？其想法是，如果一个输入 \(x\) 有 \(n\) 比特的熵，那么 \(h(x)\) 仍然会有相同的比特熵，只要其输出大于
    \(n\)。在实践中，人们以一种相当宽松的方式来使用“熵”的概念，但下面我们将尝试更加精确地描述。
- en: The *entropy* of a distribution \(D\) is meant to capture the amount of “uncertainty”
    you have over the distribution. The canonical example is when \(D\) is the uniform
    distribution over \(\{0,1\}^n\), in which case it has \(n\) bits of entropy. If
    you learn a single bit of \(D\) then you reduce the entropy by one bit. For example,
    if you learn that the \(17^{th}\) bit is equal to \(0\), then the new conditional
    distribution \(D'\) is the uniform distribution over all strings in \(x\in\{0,1\}^n\)
    such that \(x_{17}=0\) and has \(n-1\) bits of entropy. Entropy is invariant under
    permutations of the sample space, and only depends on the vector of probabilities,
    and thus for every set \(S\) all notions of entropy will give \(\log_2 |S|\) bits
    of entropy for the uniform distribution over \(S\). A distribution that is uniform
    over some set \(S\) is known as a *flat* distribution.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 分布 \(D\) 的*熵*旨在捕捉你对分布的“不确定性”程度。典型的例子是当 \(D\) 是 \(\{0,1\}^n\) 上的均匀分布时，在这种情况下，它有
    \(n\) 比特的熵。如果你学习 \(D\) 的一个比特，那么你将减少一个比特的熵。例如，如果你了解到第 \(17\) 比特等于 \(0\)，那么新的条件分布
    \(D'\) 是 \(x \in \{0,1\}^n\) 中所有字符串的均匀分布，使得 \(x_{17}=0\)，并且有 \(n-1\) 比特的熵。熵在样本空间的排列下是不变的，并且只依赖于概率向量，因此对于每个集合
    \(S\)，所有熵的概念都会给出 \(S\) 上均匀分布的 \(\log_2 |S|\) 比特熵。在某个集合 \(S\) 上均匀分布的分布被称为*平坦*分布。
- en: Where different notions of entropy begin to differ is when the distributions
    are not flat. The *Shannon entropy* follows the principle that “original uncertainty
    = knowledge learned + new uncertainty”. That is, it obeys the *chain rule* which
    is that if a random variable \((X,Y)\) has \(n\) bits of entropy, and \(X\) has
    \(k\) bits of entropy, then after learning \(X\) on average \(Y\) will have \(n-k\)
    bits of entropy. That is,
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 当分布不是平坦的时，不同的熵概念开始有所不同。*香农熵* 遵循的原则是“原始不确定性 = 学习到的知识 + 新的不确定性”。也就是说，它遵循*链式法则*，即如果随机变量
    \((X,Y)\) 有 \(n\) 比特的熵，且 \(X\) 有 \(k\) 比特的熵，那么在平均情况下，学习 \(X\) 后 \(Y\) 将有 \(n-k\)
    比特的熵。也就是说，
- en: \(H_{Shannon}(X)+H_{Shannon}(Y|X) = H_{Shannon}(X,Y)\)
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: \(H_{Shannon}(X)+H_{Shannon}(Y|X) = H_{Shannon}(X,Y)\)
- en: Where the entropy of a conditional distribution \(Y|X\) is simply \(\E_{x\leftarrow
    X} H_{Shannon}(Y|X=x)\) where \(Y|X=x\) is the distribution on \(Y\) obtained
    by conditioning on the event that \(X=x\).
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 条件分布 \(Y|X\) 的熵简单地是 \(\E_{x\leftarrow X} H_{Shannon}(Y|X=x)\)，其中 \(Y|X=x\) 是在
    \(X=x\) 事件上对 \(Y\) 进行条件化得到的分布。
- en: If \((p_1,\ldots,p_m)\) is a vector of probabilities summing up to \(1\) and
    let us assume they are rounded so that for every \(i\), \(p_i = k_i/2^n\) for
    some integer \(k_i\). We can then split the set \(\{0,1\}^n\) into \(m\) disjoint
    sets \(S_1,\ldots,S_m\) where \(|S_i|=k_i\), and consider the probability distribution
    \((X,Y)\) where \(Y\) is uniform over \(\{0,1\}^n\), and \(X\) is equal to \(i\)
    whenever \(Y\in S_i\). Therefore, by the principles above we know that \(H_{Shannon}(X,Y)=n\)
    (since \(X\) is completely determined by \(Y\) and hence \((X,Y)\) is uniform
    over a set of \(2^n\) elements), and \(H(Y|X)= \E \log k_i\). Thus the chain rule
    tells us that \(H_{Shannon}(X) = H(X,Y) - H(Y|X) = n - \sum_{i=1}^m p_i \log(k_i)
    = n - \sum_{i=1}^m p_i \log(2^n p_i)\) since \(p_i = k_i/2^n\). Since \(\log(2^n
    p_i) = n + \log(p_i)\) we see that this means that
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 如果 \((p_1,\ldots,p_m)\) 是一个概率向量，其和为 \(1\)，并且假设它们被四舍五入，使得对于每个 \(i\)，\(p_i = k_i/2^n\)，其中
    \(k_i\) 是某个整数。那么我们可以将集合 \(\{0,1\}^n\) 分割成 \(m\) 个不相交的集合 \(S_1,\ldots,S_m\)，其中
    \(|S_i|=k_i\)，并考虑概率分布 \((X,Y)\)，其中 \(Y\) 在 \(\{0,1\}^n\) 上均匀分布，而 \(X\) 在 \(Y \in
    S_i\) 时等于 \(i\)。因此，根据上述原则，我们知道 \(H_{Shannon}(X,Y)=n\)（因为 \(X\) 完全由 \(Y\) 决定，因此
    \((X,Y)\) 在 \(2^n\) 个元素集合上均匀分布），并且 \(H(Y|X)= \E \log k_i\)。因此，链式法则告诉我们 \(H_{Shannon}(X)
    = H(X,Y) - H(Y|X) = n - \sum_{i=1}^m p_i \log(k_i) = n - \sum_{i=1}^m p_i \log(2^n
    p_i)\)，因为 \(p_i = k_i/2^n\)。由于 \(\log(2^n p_i) = n + \log(p_i)\)，我们看出这意味着
- en: \[ H_{Shannon}(X) = n - \sum_i p_i \cdot n - \sum_i p_i \log(p_i) = - \sum_i
    p_i \log (p_i) \]using the fact that \(\sum_i p_i = 1\).
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: \[ H_{Shannon}(X) = n - \sum_i p_i \cdot n - \sum_i p_i \log(p_i) = - \sum_i
    p_i \log (p_i) \] 使用 \(\sum_i p_i = 1\) 的事实。
- en: 'The Shannon entropy has many attractive properties, but it turns out that for
    cryptographic applications, the notion of *min entropy* is more appropriate. For
    a distribution \(X\) the *min-entropy* is simply defined as \(H_{\infty}(X)= \min_x
    \log(1/\Pr[X=x])\).^([3](#fn:3)) Note that if \(X\) is flat then \(H_{\infty}(X)=H_{Shannon}(X)\)
    and that \(H_{\infty}(X) \leq H_{Shannon}(X)\) for all \(X\). We can now formally
    define the notion of an extractor:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 香农熵具有许多吸引人的特性，但结果表明，对于加密应用，*最小熵* 的概念更为合适。对于一个分布 \(X\)，*最小熵* 定义为 \(H_{\infty}(X)=
    \min_x \log(1/\Pr[X=x])\).^([3](#fn:3)) 注意，如果 \(X\) 是平坦的，那么 \(H_{\infty}(X)=H_{Shannon}(X)\)，并且对于所有
    \(X\)，\(H_{\infty}(X) \leq H_{Shannon}(X)\)。我们现在可以正式定义提取器的概念：
- en: A function \(h:\{0,1\}^{\ell+n}\rightarrow\{0,1\}^n\) is a *randomness extractor*
    (“extractor” for short) if for every distribution \(X\) over \(\{0,1\}^\ell\)
    with min entropy at least \(2n\), if we pick \(s\) to be a random “salt”, the
    distribution \(h_s(X)\) is computationally indistinguishable from the uniform
    distribution.^([4](#fn:4))
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 函数 \(h:\{0,1\}^{\ell+n}\rightarrow\{0,1\}^n\) 是一个 *随机提取器*（简称“提取器”），如果对于 \(\{0,1\}^\ell\)
    上的每个具有至少 \(2n\) 比特最小熵的分布 \(X\)，如果我们选择 \(s\) 作为随机的“盐”，那么分布 \(h_s(X)\) 在计算上与均匀分布不可区分.^([4](#fn:4))
- en: The idea is that we apply the hash function to our measurements in \(\{0,1\}^\ell\)
    then if those measurements had at least \(k\) bits of entropy (with some extra
    “security margin”) then the output \(h_s(X)\) will be as good as random. Since
    the “salt” value \(s\) is not secret, it can be chosen once at random and hardwired
    into the description of the function. (Indeed in practice people often do not
    explicitly use such a “salt”, but the hash function description contain some parameters
    IV that play a similar role.)
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 策略是，我们将散列函数应用于 \(\{0,1\}^\ell\) 中的测量，如果这些测量至少有 \(k\) 位熵（和一些额外的“安全边际”），那么输出 \(h_s(X)\)
    将与随机的一样好。由于“盐”值 \(s\) 不是秘密的，它可以随机选择一次并硬编码到函数的描述中。（实际上，在实践中人们通常不明确使用这样的“盐”，但散列函数描述包含一些参数
    IV，起着类似的作用。）
- en: Suppose that \(h:\{0,1\}^{\ell+n}\rightarrow\{0,1\}^n\) is chosen at random,
    and \(\ell < n^{100}\). Then with high probability \(h\) is an extractor.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 假设 \(h:\{0,1\}^{\ell+n}\rightarrow\{0,1\}^n\) 是随机选择的，并且 \(\ell < n^{100}\)。那么，以高概率
    \(h\) 是一个提取器。
- en: 'Let \(h\) be chosen as above, and let \(X\) be some distribution over \(\{0,1\}^\ell\)
    with \(\max_x \{ \Pr[X=x]\} \leq 2^{-2n}\). Now, for every \(s\in\{0,1\}^n\) let
    \(h_s\) be the function that maps \(x\in\{0,1\}^\ell\) to \(h(s\|x)\), and let
    \(Y_s = h_s(X)\). We want to prove that \(Y_s\) is pseudorandom. We will use the
    following claim:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 让 \(h\) 如上所述选择，并让 \(X\) 是 \(\{0,1\}^\ell\) 上的某个分布，使得 \(\max_x \{ \Pr[X=x]\}
    \leq 2^{-2n}\)。现在，对于 \(\{0,1\}^n\) 中的每个 \(s\)，让 \(h_s\) 是将 \(x\in\{0,1\}^\ell\)
    映射到 \(h(s\|x)\) 的函数，并让 \(Y_s = h_s(X)\)。我们想要证明 \(Y_s\) 是伪随机的。我们将使用以下断言：
- en: '**Claim:** Let \(Col(Y_s)\) be the probability that two independent samples
    from \(Y_s\) are identical. Then with probability at least \(0.99\), \(Col(Y_s)
    < 2^{-n} + 100\cdot 2^{-2n}\).'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '**断言：** 让 \(Col(Y_s)\) 是从 \(Y_s\) 中抽取的两个独立样本相同的概率。那么，至少以 \(0.99\) 的概率，\(Col(Y_s)
    < 2^{-n} + 100\cdot 2^{-2n}\)。'
- en: '**Proof of claim:** \(\E_s Col(Y_s) =\sum_s 2^{-n} \sum_{x,x''} \Pr[X=x]\Pr[X=x'']\sum_{y\in\{0,1\}^n}\Pr[h(s,x)=y]\Pr[h(s,x'')=y]\).
    Let’s separate this to the contribution when \(x=x''\) and when they differ. The
    contribution from the first term is \(\sum_s 2^{-n}\sum_x \Pr[X=x]^2\) which is
    simply \(Col(X)=\sum\Pr[X=x]^2 \leq 2^{-{2n}}\) since \(\Pr[X=x]\leq 2^{-2n}\).
    In the second term, the events that \(h(s,x)=y\) and \(h(s,x'')=y\) are independent,
    and hence the contribution here is at most \(\sum_{x,x''}\Pr[X=x]\Pr[X=x'']2^{-n}\).
    The claim follows from Markov.'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '**断言的证明：** \(\E_s Col(Y_s) =\sum_s 2^{-n} \sum_{x,x''} \Pr[X=x]\Pr[X=x'']\sum_{y\in\{0,1\}^n}\Pr[h(s,x)=y]\Pr[h(s,x'')=y]\)。让我们将这个分开到当
    \(x=x''\) 和它们不同时的贡献。第一项的贡献是 \(\sum_s 2^{-n}\sum_x \Pr[X=x]^2\)，这仅仅是 \(Col(X)=\sum\Pr[X=x]^2
    \leq 2^{-{2n}}\)，因为 \(\Pr[X=x]\leq 2^{-2n}\)。在第二项中，事件 \(h(s,x)=y\) 和 \(h(s,x'')=y\)
    是独立的，因此这里的贡献最多是 \(\sum_{x,x''}\Pr[X=x]\Pr[X=x'']2^{-n}\)。这个断言来自马尔可夫。'
- en: Now suppose that \(T\) is some efficiently computable function from \(\{0,1\}^n\)
    to \(\{0,1\}\), then by Cauchy-Schwarz \(|\E[T(U_n)] - \E[T(Y_s)]| = |\sum_{y\in\{0,1\}^n}
    T(y)[2^{-n}-\Pr[Y_s=y]]| \leq \sqrt{\sum_y T(y)^2 \cdot \sum_y (2^{-n}-\Pr[Y_s=y])^2
    }\) but opening up \(\sum_y (2^{-n}-\Pr[Y_S=y ])^2\) we get \(2^{-n} - 2\cdot
    2^{-n}\sum_y \Pr[Y_s=y] + \sum_y\Pr[Y_s=y]^2\) or \(Col(Y_s)-2^{-n}\) which is
    at most the negligible quantity \(100\cdot 2^{-2n}\).
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 现在假设 \(T\) 是从 \(\{0,1\}^n\) 到 \(\{0,1\}\) 的某个可高效计算的功能，那么根据柯西-施瓦茨不等式 \(|\E[T(U_n)]
    - \E[T(Y_s)]| = |\sum_{y\in\{0,1\}^n} T(y)[2^{-n}-\Pr[Y_s=y]]| \leq \sqrt{\sum_y
    T(y)^2 \cdot \sum_y (2^{-n}-\Pr[Y_s=y])^2 }\)，但展开 \(\sum_y (2^{-n}-\Pr[Y_S=y ])^2\)
    我们得到 \(2^{-n} - 2\cdot 2^{-n}\sum_y \Pr[Y_s=y] + \sum_y\Pr[Y_s=y]^2\) 或者 \(Col(Y_s)-2^{-n}\)，这最多是可忽略的数量
    \(100\cdot 2^{-2n}\)。
- en: 'This proof actually proves a much stronger statement. First, note that we did
    not at all use the fact that \(T\) is efficiently computable and hence the distribution
    \(h_s(X)\) will not be merely pseudorandom but actually *statistically indistinguishable*
    from truly random distribution. Second, we didn’t use the fact that \(h\) is completely
    random but rather what we needed was merely *pairwise independence*: that for
    every \(x\neq x''\) and \(y\), \(\Pr_s[ h_s(x)=h_s(x'')=y] = 2^{-2n}\). There
    are efficient constructions of functions \(h(\cdot)\) with this property, though
    in practice people still often use cryptographic hash function for this purpose.'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 这个证明实际上证明了更强烈的陈述。首先，注意我们根本没有使用 \(T\) 是可高效计算的事实，因此分布 \(h_s(X)\) 不仅仅是伪随机的，而是实际上与真正的随机分布**统计上不可区分**。其次，我们没有使用
    \(h\) 是完全随机的事实，而是我们需要的仅仅是**成对独立性**：对于每个 \(x\neq x'\) 和 \(y\)，\(\Pr_s[ h_s(x)=h_s(x')=y]
    = 2^{-2n}\)。存在具有这种属性的函数 \(h(\cdot)\) 的有效构造，尽管在实践中人们仍然经常使用加密散列函数来完成这个目的。
- en: Forward and backward secrecy
  id: totrans-55
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 前向和后向机密性
- en: A cryptographic tool such as encryption is clearly insecure if the adversary
    learns the private key, and similarly the output of a pseudorandom generator is
    insecure if the adversary learns the seed. So, it might seem as if it’s “game
    over” once this happens. However, there is still some hope. For example, if the
    adversary learns it at time \(t\) but didn’t know it before then, then one could
    hope that she does not learn the information that was exchanged up to time \(t-1\).
    This property is known as “forward secrecy”. It had recently gained interest as
    means to protect against powerful “attackers” such as the NSA that may record
    the communication transcripts in the hope of deciphering them in some future after
    it had learned the secret key. In the context of pseudorandom generators, one
    could hope for both forward and backward secrecy. Forward secrecy means that the
    state of the generator is updated at every point in time in a way that learning
    the state at time \(t\) does not help in recovering past state, and “backward
    secrecy” means that we can recover from the adversary knowing our internal state
    by updating the generator with fresh entropy. See [this paper of me and Halevi](https://eprint.iacr.org/2005/029)
    for some discussions of this issue, as well as [this later work by Dodis et al](https://eprint.iacr.org/2013/338).
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 如果对手知道了私钥，那么加密这样的加密工具显然是不安全的，同样，如果对手知道了伪随机生成器的种子，那么生成器的输出也是不安全的。所以，一旦发生这种情况，可能看起来就像是“游戏结束”。然而，仍然有一些希望。例如，如果对手在时间
    \(t\) 时得知，但在那之前并不知道，那么可以希望她没有学习到在时间 \(t-1\) 之前交换的信息。这种属性被称为“前向机密性”。最近，它作为保护强大“攻击者”如NSA的手段而受到关注，这些攻击者可能会记录通信记录，希望在得知密钥之后的一些未来时刻解密它们。在伪随机生成器的背景下，可以希望既有前向机密性也有后向机密性。前向机密性意味着生成器的状态在每一个时间点都会更新，这样学习到时间
    \(t\) 的状态并不能帮助恢复过去的状态，“后向机密性”意味着我们可以通过用新的熵更新生成器来从对手知道我们的内部状态中恢复过来。参见我写的[这篇论文](https://eprint.iacr.org/2005/029)中关于这个问题的讨论，以及Dodis等人后来的[这项工作](https://eprint.iacr.org/2013/338)。
- en: Since CPU speeds can vary quite radically and attackers might even use special-purpose
    hardware to evaluate iterated hash functions quickly, Abadi, Burrows, Manasse,
    and Wobber suggested in 2003 to use *memory bound* functions as an alternative
    approach, where these are functions \(H(\cdot)\) designed so that evaluating them
    will consume at least \(T\) bits of memory for some large \(T\). See also the
    followup paper of Dwork, Goldberg and Naor. This approach has also been used in
    some practical key derivation functions such as `scrypt` and [`Argon2`](https://password-hashing.net/argon2-specs.pdf).
  id: totrans-57
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 由于CPU速度可能变化很大，攻击者甚至可能使用专用硬件快速评估迭代哈希函数，Abadi、Burrows、Manasse和Wobber在2003年建议使用*内存限制*函数作为替代方法，这些函数
    \(H(\cdot)\) 被设计成评估它们至少需要消耗一些大数 \(T\) 的内存。参见Dwork、Goldberg和Naor的后续论文。这种方法也被用于一些实际的关键派生函数，如`scrypt`和[《Argon2》](https://password-hashing.net/argon2-specs.pdf)。
- en: '[↩](#fnref:1 "return to article")'
  id: totrans-58
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '[↩](#fnref:1 "返回文章")'
- en: The reason that people use entropy “pools” rather than simply adding the entropy
    to the generator’s state as it comes along is that the latter alternative might
    be insecure. Suppose that initial state of the generator was known to the adversary
    and now the entropy is “trickling in” one bit at a time while we continuously
    use the generator to produce outputs that can be observed by the adversary. Every
    time a new bit of entropy is added, the adversary now has uncertainty between
    two potential states of the generator, but once an output is produced this eliminates
    this uncertainty. In contrast, if we wait until we accumulate, say, 128 bits of
    entropy, then now the adversary will have \(2^{128}\) possible state options to
    consider, and it could be computationally infeasible to cull them using further
    observation.
  id: totrans-59
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 人们之所以使用“熵池”而不是简单地将熵加到生成器的状态中，是因为后者可能是不安全的。假设生成器的初始状态被对手所知，现在熵正“一点一点地”流入，而我们持续使用生成器产生对手可以观察到的输出。每次添加新的熵位时，对手现在会在生成器的两个潜在状态之间有不确定性，但一旦产生输出，这种不确定性就会消除。相比之下，如果我们等到积累了，比如说，128位熵，那么现在对手将会有
    \(2^{128}\) 种可能的状态选项需要考虑，而使用进一步的观察来筛选它们可能是计算上不可行的。
- en: '[↩](#fnref:2 "return to article")'
  id: totrans-60
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '[↩](#fnref:2 "返回文章")'
- en: The notation \(H_{\infty}(\cdot)\) for min entropy comes from the fact that
    one can define a [*family*](https://goo.gl/HvVgu1) of entropy like functions,
    containing a function for every non-negative number \(p\) based on the \(p\)-norm
    of the probability distribution. That is, the Rényi entropy of order \(p\) is
    defined as \(H_p(X)=(1-p)^{-1}-\log(\sum_x \Pr[X=x]^p)\). The min entropy can
    be thought of as the limit of \(H_p\) when \(p\) tends to infinity while the Shannon
    entropy is the limit as \(p\) tends to \(1\). The entropy \(H_2(\cdot)\) is related
    to the *collision probability* of \(X\) and is often used as well. The min entropy
    is the smallest among all the entropies and hence it is the most *conservative*
    (and so appropriate for usage in cryptography). For *flat sources*, which are
    uniform over a certain subset, all entropies coincide.
  id: totrans-61
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对于最小熵的符号 \(H_{\infty}(\cdot)\)，源于可以定义一个类似熵的函数族，包含基于概率分布的 \(p\)-范数的每个非负数 \(p\)
    的函数。也就是说，\(p\) 阶的 Rényi 熵定义为 \(H_p(X)=(1-p)^{-1}-\log(\sum_x \Pr[X=x]^p)\)。最小熵可以看作是当
    \(p\) 趋向于无穷大时 \(H_p\) 的极限，而 Shannon 熵是当 \(p\) 趋向于 \(1\) 时的极限。熵 \(H_2(\cdot)\)
    与 \(X\) 的 *碰撞概率* 相关，也经常被使用。最小熵是所有熵中最小的，因此它是最 *保守的*（因此适合用于密码学）。对于 *平坦源*，即在整个某个子集上均匀分布的源，所有熵都相同。
- en: '[↩](#fnref:3 "return to article")'
  id: totrans-62
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '[↩](#fnref:3 "返回文章")'
- en: The pseudorandomness literature studies the notion of extractors much more generally
    and consider all possible variations for parameters such as the entropy requirement,
    the salt (more commonly known as seed) size, the distance from uniformity, and
    more. The type of notion we consider here is known in that literature as a “strong
    seeded extractor”. See [Vadhan’s monograph](https://goo.gl/XHQjTB) for an in-depth
    treatment of this topic.
  id: totrans-63
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 假随机性文献更广泛地研究了提取器的概念，并考虑了所有可能的参数变化，如熵需求、盐（更常见的是种子）大小、与均匀性的距离等。我们在这里考虑的概念在该文献中被称为“强种子提取器”。参见
    [Vadhan 的专著](https://goo.gl/XHQjTB) 以深入了解此主题。
- en: '[↩](#fnref:4 "return to article")'
  id: totrans-64
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '[↩](#fnref:4 "返回文章")'
