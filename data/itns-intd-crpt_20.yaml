- en: 'Multiparty secure computation II: Construction using Fully Homomorphic Encryption'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 多方安全计算II：使用全同态加密的构造
- en: 原文：[https://intensecrypto.org/public/lec_18_SFE_part2.html](https://intensecrypto.org/public/lec_18_SFE_part2.html)
