- en: These are lecture notes for lecture notes for an introductory but fast-paced
    undergraduate/beginning graduate course on cryptography. I am using these notes
    for [Harvard CS 127](https://cs127.boazbarak.org).
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是关于密码学入门但节奏快速的本科生/研究生课程的讲义。我正在使用这些讲义为[哈佛 CS 127](https://cs127.boazbarak.org)授课。
- en: You can also download [all lecture notes in a single PDF file](https://files.boazbarak.org/crypto/lnotes_book.pdf).
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 您也可以下载[所有讲义的单个PDF文件](https://files.boazbarak.org/crypto/lnotes_book.pdf)。
- en: If you have any comments, suggestions, typo fixes, etc.. I would be very grateful
    if you post them as an [issue](https://github.com/boazbk/crypto/issues) or [pull
    request](https://github.com/boazbk/crypto/pulls) in the [GitHub repository](https://github.com/boazbk/crypto)
    where I am maintaining the source files for these notes.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您有任何评论、建议、错别字修正等，如果您能在[GitHub仓库](https://github.com/boazbk/crypto)中发布[问题](https://github.com/boazbk/crypto/issues)或[拉取请求](https://github.com/boazbk/crypto/pulls)，我将不胜感激，我在那里维护这些讲义的源文件。
