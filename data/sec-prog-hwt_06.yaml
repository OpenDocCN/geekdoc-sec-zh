- en: Programs often use memory buffers to capture input and process data. In some
    cases (particularly in C or C++ programs) it may be possible to perform an operation,
    but either read from or write to a memory location that is outside of the intended
    boundary of the buffer. In many cases this can lead to an extremely serious security
    vulnerability. This is such a common problem that it has a CWE identifier, [CWE-119](http://cwe.mitre.org/data/definitions/119.html).
    Exceeding buffer bounds is a problem with a program’s internal implementation,
    but it’s such a common and serious problem that I’ve placed this information in
    its own chapter.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 程序通常使用内存缓冲区来捕获输入和处理数据。在某些情况下（尤其是在 C 或 C++ 程序中），可能可以进行操作，但要么从，要么写入一个超出缓冲区预期边界的内存位置。在许多情况下，这可能导致极其严重的安全漏洞。这是一个如此普遍的问题，以至于它有一个
    CWE 标识符，[CWE-119](http://cwe.mitre.org/data/definitions/119.html)。超出缓冲区边界是程序内部实现的问题，但它是一个如此普遍且严重的问题，所以我将此信息放在了自己的章节中。
- en: There are many variations of a failure to restrict operations to buffer bounds.
    A subcategory of exceeding buffer bounds is a *buffer overflow*. The term buffer
    overflow has a number of varying definitions. For our purposes, a buffer overflow
    occurs if a program attempts to write more data in a buffer than it can hold or
    write into a memory area outside the boundaries of the buffer. A particularly
    common situation is writing character data beyond the end of a buffer (through
    copying or generation). A buffer overflow can occur when reading input from the
    user into a buffer, but it can also occur during other kinds of processing in
    a program. Buffer overflows are also called *buffer overruns*. This subcategory
    is such a common problem that it has its own CWE identifier, [CWE-120](http://cwe.mitre.org/data/definitions/120.html).
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 缺乏对缓冲区边界操作的限制有许多变体。超出缓冲区边界的一个子类别是*缓冲区溢出*。缓冲区溢出这个术语有几个不同的定义。就我们的目的而言，如果程序试图在缓冲区中写入比其能容纳更多的数据，或者写入缓冲区边界之外的内存区域，则发生缓冲区溢出。一个特别常见的情况是在缓冲区末尾之外写入字符数据（通过复制或生成）。当从用户读取输入到缓冲区时，可能会发生缓冲区溢出，但它也可能在程序的其他处理中发生。缓冲区溢出也被称为*缓冲区越界*。这个子类别是一个如此普遍的问题，以至于它有自己的
    CWE 标识符，[CWE-120](http://cwe.mitre.org/data/definitions/120.html)。
- en: Buffer overflows are an extremely common and dangerous security flaw, and in
    many cases a buffer overlow can lead immediately to an attacker having complete
    control over the vulnerable program. To give you an idea of how important this
    subject is, at the CERT, 9 of 13 advisories in 1998 and at least half of the 1999
    advisories involved buffer overflows. An informal 1999 survey on Bugtraq found
    that approximately 2/3 of the respondents felt that buffer overflows were the
    leading cause of system security vulnerability (the remaining respondents identified
    “mis-configuration” as the leading cause) [Cowan 1999]. This is an old, well-known
    problem, yet it continues to resurface [McGraw 2000].
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 缓冲区溢出是一种极其常见且危险的安全漏洞，在许多情况下，缓冲区溢出会导致攻击者立即完全控制受漏洞程序。为了给您一个这个主题重要性的概念，在CERT中，1998年的13条警告中有9条涉及缓冲区溢出，1999年的警告中至少有一半涉及缓冲区溢出。1999年在Bugtraq上进行的一项非正式调查发现，大约2/3的受访者认为缓冲区溢出是系统安全漏洞的主要原因（其余受访者将“配置错误”视为主要原因）[Cowan
    1999]。这是一个老生常谈的问题，但仍然不断出现[McGraw 2000]。
- en: Attacks that exploit a buffer overflow vulnerability are often named depending
    on where the buffer is, e.g., a “stack smashing” attack attacks a buffer on the
    stack, while a “heap smashing” attack attacks a buffer on the heap (memory that
    is allocated by operators such as malloc and new). More details can be found from
    Aleph1 [1996], Mudge [1995], LSD [2001], or the Nathan P. Smith’s *Stack Smashing
    Security Vulnerabilities* website at [http://destroy.net/machines/security/](http://destroy.net/machines/security/).
    A discussion of the problem and some ways to counter them is given by Crispin
    Cowan et al, 2000, at [http://immunix.org/StackGuard/discex00.pdf](http://immunix.org/StackGuard/discex00.pdf).
    A discussion of the problem and some ways to counter them in Linux is given by
    Pierre-Alain Fayolle and Vincent Glaume at [http://www.enseirb.fr/~glaume/indexen.html](http://www.enseirb.fr/~glaume/indexen.html).
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 利用缓冲区溢出漏洞的攻击通常根据缓冲区的位置命名，例如，“栈溢出”攻击攻击栈上的缓冲区，而“堆溢出”攻击攻击堆上的缓冲区（由malloc和new等操作员分配的内存）。更多详情可参考Aleph1
    [1996]、Mudge [1995]、LSD [2001]，或Nathan P. Smith的*栈溢出安全漏洞*网站[http://destroy.net/machines/security/](http://destroy.net/machines/security/)。Crispin
    Cowan等人于2000年对问题及其一些应对方法进行了讨论，可在[http://immunix.org/StackGuard/discex00.pdf](http://immunix.org/StackGuard/discex00.pdf)找到。Pierre-Alain
    Fayolle和Vincent Glaume在[http://www.enseirb.fr/~glaume/indexen.html](http://www.enseirb.fr/~glaume/indexen.html)对Linux中的问题及其一些应对方法进行了讨论。
- en: Allowing attackers to read data beyond a buffer boundary can also result in
    vulnerabilities, and this weakness has its own identifier ([CWE-125](http://cwe.mitre.org/data/definitions/125.html)).
    For example, the [Heartbleed](http://www.dwheeler.com/essays/heartbleed.html)
    vulnerability was this kind of weakness. The Heartbleed vulnerability in OpenSSL
    allowed attackers to extract critically-important data such as private keys, and
    then use them (e.g., so they could impersonate trusted sites).
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 允许攻击者读取超出缓冲区边界的数据也可能导致漏洞，这种弱点有自己的标识符（[CWE-125](http://cwe.mitre.org/data/definitions/125.html)）。例如，[Heartbleed](http://www.dwheeler.com/essays/heartbleed.html)
    漏洞就是这种弱点。OpenSSL中的Heartbleed漏洞允许攻击者提取关键数据，如私钥，然后使用它们（例如，以便他们可以冒充受信任的站点）。
- en: '**Figure 6-1\. A physical buffer overflow: The Montparnasse derailment of 1895**'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '**图6-1. 物理缓冲区溢出：1895年蒙帕纳斯铁路出轨事件**'
- en: '![](../Images/ce0530ce73c9a6f366736ca33f810910.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![缓冲区溢出示意图](../Images/ce0530ce73c9a6f366736ca33f810910.png)'
- en: Most high-level programming languages are essentially immune to exceeding buffer
    boundaries, either because they automatically resize arrays (this applies to most
    languages such as Perl), or because they normally detect and prevent buffer overflows
    (e.g., Ada95). However, the C language provides no protection against such problems,
    and C++ can be easily used in ways to cause this problem too. Assembly language
    and Forth also provide no protection, and some languages that normally include
    such protection (e.g., C#, Ada, and Pascal) can have this protection disabled
    (for performance reasons). Even if most of your program is written in another
    language, many library routines are written in C or C++, as well as “glue” code
    to call them, so other languages often don’t provide as complete a protection
    from buffer overflows as you'd like.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数高级编程语言本质上对超出缓冲区边界是免疫的，要么是因为它们会自动调整数组大小（这适用于大多数语言，如Perl），要么是因为它们通常能够检测并防止缓冲区溢出（例如，Ada95）。然而，C语言没有提供针对此类问题的保护，而C++也容易被用于引发此类问题。汇编语言和Forth也没有提供保护，而且一些通常包含此类保护的编程语言（例如，C#、Ada和Pascal）可能已经禁用了这种保护（出于性能考虑）。即使你的大部分程序是用其他语言编写的，许多库例程是用C或C++编写的，以及调用它们的“粘合”代码，因此其他语言通常不会提供你期望的那么完整的缓冲区溢出保护。
- en: 6.1\. Dangers in C/C++
  id: totrans-26
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 6.1. C/C++中的危险
- en: 原文：[https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/dangers-c.html](https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/dangers-c.html)
  id: totrans-27
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/dangers-c.html](https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/dangers-c.html)
- en: C users must avoid using dangerous functions that do not check bounds unless
    they've ensured that the bounds will never get exceeded. Functions to avoid in
    most cases (or ensure protection) include the functions strcpy(3), strcat(3),
    sprintf(3) (with cousin vsprintf(3)), and gets(3). These should be replaced with
    functions such as strncpy(3), strncat(3), snprintf(3), and fgets(3) respectively,
    but see the discussion below. The function strlen(3) should be avoided unless
    you can ensure that there will be a terminating NIL character to find. The scanf()
    family (scanf(3), fscanf(3), sscanf(3), vscanf(3), vsscanf(3), and vfscanf(3))
    is often dangerous to use; do not use it to send data to a string without controlling
    the maximum length (the format %s is a particularly common problem). Other dangerous
    functions that may permit buffer overruns (depending on their use) include realpath(3),
    getopt(3), getpass(3), streadd(3), strecpy(3), and strtrns(3). You must be careful
    with getwd(3); the buffer sent to getwd(3) must be at least PATH_MAX bytes long.
    The select(2) helper macros FD_SET(), FD_CLR(), and FD_ISSET() do not check that
    the index fd is within bounds; make sure that fd >= 0 and fd <= FD_SETSIZE (this
    particular one has been exploited in pppd).
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: C语言用户必须避免使用未检查边界的危险函数，除非他们已经确保边界永远不会被超过。在大多数情况下应避免的函数（或确保保护）包括strcpy(3)、strcat(3)、sprintf(3)（与vsprintf(3)的堂兄弟）、gets(3)。这些应该分别用strncpy(3)、strncat(3)、snprintf(3)和fgets(3)替换，但请参见下面的讨论。如果可以确保存在一个终止的NIL字符，则应避免使用strlen(3)。scanf()家族（scanf(3)、fscanf(3)、sscanf(3)、vscanf(3)、vsscanf(3)和vfscanf(3)通常很危险；不要在没有控制最大长度的情况下将其用于向字符串发送数据（格式%s尤其是一个常见问题）。其他可能允许缓冲区溢出的危险函数（取决于其使用方式）包括realpath(3)、getopt(3)、getpass(3)、streadd(3)、strecpy(3)和strtrns(3)。在使用getwd(3)时必须小心；发送给getwd(3)的缓冲区必须至少PATH_MAX字节长。select(2)辅助宏FD_SET()、FD_CLR()和FD_ISSET()不会检查索引fd是否在边界内；请确保fd
    >= 0且fd <= FD_SETSIZE（这个特定的宏在pppd中被利用过）。
- en: Unfortunately, snprintf()’s variants have additional problems. Officially, snprintf()
    is not a standard C function in the ISO 1990 (ANSI 1989) standard, though sprintf()
    is, so some very old systems do not include snprintf(). Even worse, some systems’
    snprintf() do not actually protect against buffer overflows; they just call sprintf
    directly. Old versions of Linux’s libc4 depended on a “libbsd” that did this horrible
    thing, and I’m told that some old HP systems did the same. Linux’s current version
    of snprintf is known to work correctly, that is, it does actually respect the
    boundary requested. The return value of snprintf() varies as well; the Single
    Unix Specification (SUS) version 2 and the C99 standard differ on what is returned
    by snprintf(). Finally, it appears that at least some versions of snprintf don’t
    guarantee that its string will end in NIL; if the string is too long, it won’t
    include NIL at all. Note that the glib library (the basis of GTK, and not the
    same as the GNU C library glibc) has a g_snprintf(), which has a consistent return
    semantic, always NIL-terminates, and most importantly always respects the buffer
    length.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 不幸的是，snprintf()的变体还有其他问题。官方上，snprintf()不是ISO 1990（ANSI 1989）标准中的标准C函数，尽管sprintf()是，因此一些非常旧的系统不包括snprintf()。更糟糕的是，一些系统的snprintf()实际上并不保护缓冲区溢出；它们只是直接调用sprintf。Linux的旧版libc4依赖于一个“libbsd”，它做了这样可怕的事情，我被告知一些旧的HP系统也做了同样的事情。Linux当前版本的snprintf是已知可以正确工作的，也就是说，它确实尊重请求的边界。snprintf()的返回值也有所不同；Single
    Unix Specification (SUS)版本2和C99标准在snprintf()返回的内容上有所不同。最后，似乎至少某些版本的snprintf()不能保证其字符串以NIL结尾；如果字符串太长，它根本不会包含NIL。请注意，glib库（GTK的基础，与GNU
    C库glibc不同）有一个g_snprintf()，它有一个一致的返回语义，总是以NIL结尾，最重要的是总是尊重缓冲区长度。
- en: Of course, the problem is more than just calling string functions poorly. Here
    are a few additional examples of types of buffer overflow problems, graciously
    suggested by Timo Sirainen, involving manipulation of numbers to cause buffer
    overflows.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，问题不仅仅是调用字符串函数不当。以下是一些额外的缓冲区溢出问题类型的例子，由Timo Sirainen慷慨提供，涉及操纵数字以导致缓冲区溢出。
- en: First, there’s the problem of signedness. If you read data that affects the
    buffer size, such as the "number of characters to be read," be sure to check if
    the number is less than zero or one. Otherwise, the negative number may be cast
    to an unsigned number, and the resulting large positive number may then permit
    a buffer overflow problem. Note that sometimes an attacker can provide a large
    positive number and have the same thing happen; in some cases, the large value
    will be interpreted as a negative number (slipping by the check for large numbers
    if there’s no check for a less-than-one value), and then be interpreted later
    into a large positive value.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，存在符号位的问题。如果你读取影响缓冲区大小的数据，例如“要读取的字符数”，务必检查该数字是否小于零或一。否则，负数可能会被转换为无符号数，从而导致产生一个很大的正数，这可能会允许缓冲区溢出问题。请注意，有时攻击者可以提供一个很大的正数，并导致相同的事情发生；在某些情况下，大值会被解释为负数（如果没有检查小于一的价值，就会通过大数检查），然后在稍后解释为一个大正数。
- en: '|  [PRE0]  |'
  id: totrans-32
  prefs: []
  type: TYPE_TB
  zh: '|  [PRE0]  |'
