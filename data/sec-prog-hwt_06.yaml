  prefs: []
  type: TYPE_NORMAL
  zh: 这是Timo Sirainen识别出的第二个例子，涉及整数大小截断。有时整数的不同大小可以被利用来导致缓冲区溢出。基本上，确保你不截断用于计算缓冲区大小的任何整数结果。以下是Timo为64位架构提供的示例：
