- en: 6.2\. Library Solutions in C/C++
  id: totrans-37
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 6.2\. C/C++中的库解决方案
- en: 原文：[https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/library-c.html](https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/library-c.html)
  id: totrans-38
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/library-c.html](https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/library-c.html)
- en: One partial solution in C/C++ is to use library functions that do not have buffer
    overflow problems. The first subsection describes the “standard C library” solution,
    which can work but has its disadvantages. The next subsection describes the general
    security issues of both fixed length and dynamically reallocated approaches to
    buffers. The following subsections describe various alternative libraries, such
    as strlcpy and libmib. Note that these don’t solve all problems; you still have
    to code extremely carefully in C/C++ to avoid all buffer overflow situations.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: C/C++ 中的一种部分解决方案是使用没有缓冲区溢出问题的库函数。下一小节描述了“标准 C 库”解决方案，它可以工作但有其缺点。下一小节描述了固定长度和动态重新分配缓冲区方法的一般安全问题。以下小节描述了各种替代库，例如
    `strlcpy` 和 `libmib`。请注意，这些库并不能解决所有问题；您仍然需要在 C/C++ 中非常小心地编写代码，以避免所有缓冲区溢出情况。
- en: 6.2.1\. Standard C Library Solution
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 6.2.1\. 标准C库解决方案
- en: 'The “standard” solution to prevent buffer overflow in C (which is also used
    in some C++ programs) is to use the standard C library calls that defend against
    these problems. This approach depends heavily on the standard library functions
    strncpy(3) and strncat(3). If you choose this approach, beware: these calls have
    somewhat surprising semantics and are hard to use correctly. The function strncpy(3)
    does not NIL-terminate the destination string if the source string length is at
    least equal to the destination''s, so be sure to set the last character of the
    destination string to NIL after calling strncpy(3). If you’re going to reuse the
    same buffer many times, an efficient approach is to tell strncpy() that the buffer
    is one character shorter than it actually is and set the last character to NIL
    once before use. Both strncpy(3) and strncat(3) require that you pass the amount
    of space left available, a computation that is easy to get wrong (and getting
    it wrong could permit a buffer overflow attack). Neither provide a simple mechanism
    to determine if an overflow has occurred. Finally, strncpy(3) has a significant
    performance penalty compared to the strcpy(3) it supposedly replaces, because
    *strncpy(3) NIL-fills the remainder of the destination*. I’ve gotten emails expressing
    surprise over this last point, but this is clearly stated in Kernighan and Ritchie
    second edition [Kernighan 1988, page 249], and this behavior is clearly documented
    in the man pages for Linux, FreeBSD, and Solaris. This means that just changing
    from strcpy to strncpy can cause a severe reduction in performance, for no good
    reason in most cases.'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 在 C 中防止缓冲区溢出的“标准”解决方案是使用标准 C 库调用，这些调用可以防御这些问题。这种方法在很大程度上依赖于标准库函数 `strncpy(3)`
    和 `strncat(3)`。如果您选择这种方法，请注意：这些调用具有一些令人惊讶的语义，并且很难正确使用。函数 `strncpy(3)` 如果源字符串长度至少等于目标字符串，则不会在目标字符串末尾添加
    NULL 终止符，因此请确保在调用 `strncpy(3)` 后将目标字符串的最后一个字符设置为 NULL。如果您打算多次重用相同的缓冲区，一种有效的方法是在使用前告诉
    `strncpy()` 缓冲区实际上比实际短一个字符，并在使用前将最后一个字符设置为 NULL。`strncpy(3)` 和 `strncat(3)` 都要求您传递剩余可用的空间量，这是一个容易出错（并且出错可能导致缓冲区溢出攻击）的计算。它们都不提供简单的机制来确定是否发生了溢出。最后，与它所取代的
    `strcpy(3)` 相比，`strncpy(3)` 具有显著的性能惩罚，因为它会在目标字符串的剩余部分填充 NULL。我收到过一些关于这个最后点的电子邮件表示惊讶，但这一点在
    Kernighan 和 Ritchie 第二版 [Kernighan 1988，第 249 页] 中有明确说明，并且这种行为在 Linux、FreeBSD
    和 Solaris 的 man 页面中有明确的文档。这意味着仅仅从 `strcpy` 更改为 `strncpy` 就可能导致性能严重下降，在大多数情况下没有合理的理由。
- en: Warning!! The function strncpy(s1, s2, n) can also be used as a way of copying
    only part of s2, where n is less than strlen(s2). When used this way, strncpy()
    basically provides no protection against buffer overflow by itself - you have
    to take separate actions to ensure that n is smaller than the buffer of s1. Also,
    when used this way, strncpy() does not usually add a trailing NIL after copying
    n characters. This makes it harder to determine if a program using strncpy() is
    secure.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 警告！！函数 `strncpy(s1, s2, n)` 也可以用作仅复制 s2 部分内容的方法，其中 n 小于 `strlen(s2)`。以这种方式使用时，`strncpy()`
    本身基本上不提供防止缓冲区溢出的保护 - 您必须采取单独的措施来确保 n 小于 s1 的缓冲区。此外，以这种方式使用时，`strncpy()` 通常不会在复制
    n 个字符后添加尾随的 NULL。这使得确定使用 `strncpy()` 的程序是否安全变得更加困难。
- en: 'You can also use sprintf() while preventing buffer overflows, but you need
    to be careful when doing so; it’s so easy to misapply that it’s hard to recommend.
    The sprintf control string can contain various conversion specifiers (e.g., "%s"),
    and the control specifiers can have optional field width (e.g., "%10s") and precision
    (e.g., "%.10s") specifications. These look quite similar (the only difference
    is a period) but they are very different. The field width only specifies a *minimum*
    length and is completely worthless for preventing buffer overflows. In contrast,
    the precision specification specifies the maximum length that that particular
    string may have in its output when used as a string conversion specifier - and
    thus it can be used to protect against buffer overflows. Note that the precision
    specification only specifies the total maximum length when dealing with a string;
    it has a different meaning for other conversion operations. If the size is given
    as a precision of "*", then you can pass the maximum size as a parameter (e.g.,
    the result of a sizeof() operation). This is most easily shown by an example -
    here’s the wrong and right way to use sprintf() to protect against buffer overflows:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 你也可以在防止缓冲区溢出的同时使用sprintf()，但这样做时需要非常小心；它很容易被误用，因此很难推荐。sprintf控制字符串可以包含各种转换说明符（例如，"%s"），并且控制说明符可以有可选的字段宽度（例如，"%10s"）和精度（例如，"%.10s"）说明。它们看起来相当相似（唯一的区别是一个点），但它们非常不同。字段宽度仅指定一个*最小*长度，对于防止缓冲区溢出来说完全无用。相比之下，精度说明指定了当用作字符串转换说明符时，该特定字符串在其输出中可能具有的最大长度——因此它可以用来防止缓冲区溢出。请注意，精度说明仅指定处理字符串时的总最大长度；对于其他转换操作，它有不同的含义。如果大小以"*"精度给出，则可以将最大大小作为参数传递（例如，sizeof()操作的结果）。这可以通过一个例子最简单地展示——以下是如何错误和正确地使用sprintf()来防止缓冲区溢出的示例：
- en: '|  [PRE3]  |'
  id: totrans-44
  prefs: []
  type: TYPE_TB
  zh: '|  [PRE3]  |'
- en: In theory, sprintf() should be very helpful because you can use it to specify
    complex formats. Sadly, it’s easy to get things wrong with sprintf(). If the format
    is complex, you need to make sure that the destination is large enough for the
    largest possible size of the *entire* format, but the precision field only controls
    the size of one parameter. The "largest possible" value is often hard to determine
    when a complicated output is being created. If a program doesn’t allocate quite
    enough space for the longest possible combination, a buffer overflow vulnerability
    may open up. Also, sprintf() appends a NUL to the destination after the entire
    operation is complete - this extra character is easy to forget and creates an
    opportunity for off-by-one errors. So, while this works, it can be painful to
    use in some circumstances.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 理论上，sprintf()应该非常有帮助，因为你可以用它来指定复杂的格式。遗憾的是，使用sprintf()很容易出错。如果格式复杂，你需要确保目标足够大，可以容纳整个格式的最大可能大小，但精度字段仅控制一个参数的大小。在创建复杂输出时，“最大可能”的值往往很难确定。如果一个程序没有为最长可能的组合分配足够的空间，可能会打开缓冲区溢出漏洞。此外，sprintf()在操作完成后会在目标后追加一个NUL字符——这个额外的字符很容易忘记，并创造了发生偏移量错误的机会。因此，虽然这可以工作，但在某些情况下使用起来可能会很痛苦。
- en: Also, a quick note about the code above - note that the sizeof() operation used
    the size of an array. If the code were changed so that “buf” was a pointer to
    some allocated memory, then all “sizeof()” operations would have to be changed
    (or sizeof would just measure the size of a pointer, which isn’t enough space
    for most values).
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，关于上面代码的简要说明——请注意，sizeof()操作使用了数组的大小。如果代码被修改，使得“buf”是指向某些已分配内存的指针，那么所有“sizeof()”操作都必须更改（或者sizeof将只测量指针的大小，这对于大多数值来说空间不足）。
- en: The scanf() family is sadly a little murky as well. An obvious question is whether
    or not the maximum width value can be used in %s to prevent these attacks. There
    are multiple official specifications for scanf(); some clearly state that the
    width parameter is the absolutely largest number of characters, while others aren’t
    as clear. The biggest problem is implementations; modern implementations that
    I know of do support maximum widths, but I cannot say with certainty that all
    libraries properly implement maximum widths. The safest approach is to do things
    yourself in such cases. However, few will fault you if you simply use scanf and
    include the widths in the format strings (but don’t forget to count \0, or you’ll
    get the wrong length). If you do use scanf, it’s best to include a test in your
    installation scripts to ensure that the library properly limits length.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: scanf()系列函数也有些令人困惑。一个明显的问题是，是否可以在%s中使用最大宽度值来防止这些攻击。对于scanf()有多个官方规范；一些明确指出宽度参数是绝对最大的字符数，而另一些则不是很明确。最大的问题是实现；我所知道的现代实现都支持最大宽度，但我不能肯定所有库都正确实现了最大宽度。在这种情况下，最安全的做法是自己处理。然而，如果你只是使用scanf并在格式字符串中包含宽度，很少有人会责怪你（但别忘了计算\0，否则你会得到错误长度）。如果你确实使用scanf，最好在安装脚本中包含一个测试，以确保库正确地限制了长度。
- en: 6.2.2\. Static and Dynamically Allocated Buffers
  id: totrans-48
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 6.2.2\. 静态和动态分配的缓冲区
- en: Functions such as strncpy are useful for dealing with statically allocated buffers.
    This is a programming approach where a buffer is allocated for the “longest useful
    size” and then it stays a fixed size from then on. The alternative is to dynamically
    reallocate buffer sizes as you need them. It turns out that both approaches have
    security implications.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 像strncpy这样的函数对于处理静态分配的缓冲区很有用。这是一种编程方法，其中为“最长有用大小”分配一个缓冲区，然后它保持固定大小。另一种选择是按需动态重新分配缓冲区大小。结果发现，这两种方法都有安全影响。
- en: 'There is a general security problem when using fixed-length buffers: the fact
    that the buffer is a fixed length may be exploitable. This is a problem with strncpy(3)
    and strncat(3), snprintf(3), strlcpy(3), strlcat(3), and other such functions.
    The basic idea is that the attacker sets up a really long string so that, when
    the string is truncated, the final result will be what the attacker wanted (instead
    of what the developer intended). Perhaps the string is catenated from several
    smaller pieces; the attacker might make the first piece as long as the entire
    buffer, so all later attempts to concatenate strings do nothing. Here are some
    specific examples:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 使用固定长度缓冲区时存在一个一般的安全问题：缓冲区固定长度的事实可能被利用。这是 strncpy(3)、strncat(3)、snprintf(3)、strlcpy(3)、strlcat(3)和其他类似函数的问题。基本思想是攻击者设置一个非常长的字符串，使得当字符串被截断时，最终结果将是攻击者想要的（而不是开发者想要的）。也许这个字符串是由几个较小的部分连接而成的；攻击者可能会使第一部分与整个缓冲区一样长，这样所有后续尝试连接字符串都不会起作用。以下是一些具体的例子：
- en: Imagine code that calls gethostbyname(3) and, if successful, immediately copies
    hostent->h_name to a fixed-size buffer using strncpy or snprintf. Using strncpy
    or snprintf protects against an overflow of an excessively long fully-qualified
    domain name (FQDN), so you might think you’re done. However, this could result
    in chopping off the end of the FQDN. This may be very undesirable, depending on
    what happens next.
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 想象一下这样的代码：调用 gethostbyname(3) 函数，如果成功，立即使用 strncpy 或 snprintf 将 hostent->h_name
    复制到一个固定大小的缓冲区中。使用 strncpy 或 snprintf 可以防止过长的完全限定域名（FQDN）导致的溢出，因此你可能认为这样就完成了。然而，这可能会导致截断
    FQDN 的末尾。这可能会非常不理想，具体取决于接下来会发生什么。
- en: Imagine code that uses strncpy, strncat, snprintf, etc., to copy the full path
    of a filesystem object to some buffer. Further imagine that the original value
    was provided by an untrusted user, and that the copying is part of a process to
    pass a resulting computation to a function. Sounds safe, right? Now imagine that
    an attacker pads a path with a large number of '/’s at the beginning. This could
    result in future operations being performed on the file “/”. If the program appends
    values in the belief that the result will be safe, the program may be exploitable.
    Or, the attacker could devise a long filename near the buffer length, so that
    attempts to append to the filename would silently fail to occur (or only partially
    occur in ways that may be exploitable).
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 想象一下使用 strncpy、strncat、snprintf 等函数将文件系统对象的完整路径复制到某个缓冲区的代码。进一步想象原始值是由不可信的用户提供的，并且复制是传递最终计算结果到函数的过程的一部分。听起来很安全，对吧？现在想象一下攻击者在一个路径的开头添加了大量斜杠
    '/’。这可能导致未来的操作在文件“/”上执行。如果程序在相信结果将是安全的情况下追加值，程序可能存在可利用性。或者，攻击者可以设计一个接近缓冲区长度的长文件名，这样尝试追加到文件名就会静默失败（或者只部分发生，这可能存在可利用性）。
- en: When using statically-allocated buffers, you really need to consider the length
    of the source and destination arguments. Sanity checking the input and the resulting
    intermediate computation might deal with this, too.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用静态分配的缓冲区时，你确实需要考虑源和目标参数的长度。对输入和中间计算进行合理性检查也可能解决这个问题。
- en: Another alternative is to dynamically reallocate all strings instead of using
    fixed-size buffers. This general approach is recommended by the GNU programming
    guidelines, since it permits programs to handle arbitrarily-sized inputs (until
    they run out of memory). Of course, the major problem with dynamically allocated
    strings is that you may run out of memory. The memory may even be exhausted at
    some other point in the program than the portion where you’re worried about buffer
    overflows; any memory allocation can fail. Also, since dynamic reallocation may
    cause memory to be inefficiently allocated, it is entirely possible to run out
    of memory even though technically there is enough virtual memory available to
    the program to continue. In addition, before running out of memory the program
    will probably use a great deal of virtual memory; this can easily result in “thrashing”,
    a situation in which the computer spends all its time just shuttling information
    between the disk and memory (instead of doing useful work). This can have the
    effect of a denial of service attack. Some rational limits on input size can help
    here. In general, the program must be designed to fail safely when memory is exhausted
    if you use dynamically allocated strings.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种替代方案是动态重新分配所有字符串，而不是使用固定大小的缓冲区。GNU 编程指南推荐这种通用方法，因为它允许程序处理任意大小的输入（直到它们耗尽内存）。当然，动态分配字符串的主要问题是可能会耗尽内存。内存可能在其他程序部分耗尽，而不是你担心缓冲区溢出的部分；任何内存分配都可能失败。此外，由于动态重新分配可能会导致内存分配效率低下，即使技术上程序有足够的虚拟内存可用以继续运行，也可能耗尽内存。此外，在耗尽内存之前，程序可能会使用大量的虚拟内存；这很容易导致“颠簸”，即计算机花费所有时间在磁盘和内存之间传输信息（而不是进行有用的工作）。这可能会产生拒绝服务攻击的效果。一些合理的输入大小限制可以在这里有所帮助。一般来说，如果你使用动态分配的字符串，程序必须设计为在内存耗尽时安全失败。
- en: 6.2.3\. strlcpy and strlcat
  id: totrans-55
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 6.2.3\. strlcpy 和 strlcat
- en: An alternative, being employed by OpenBSD, is the strlcpy(3) and strlcat(3)
    functions by Miller and de Raadt [Miller 1999]. This is a minimalist, statically-sized
    buffer approach that provides C string copying and concatenation with a different
    (and less error-prone) interface. Source and documentation of these functions
    are available under a newer BSD-style open source license at [ftp://ftp.openbsd.org/pub/OpenBSD/src/lib/libc/string/strlcpy.3](ftp://ftp.openbsd.org/pub/OpenBSD/src/lib/libc/string/strlcpy.3).
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 一种替代方案，由 OpenBSD 采用，是 Miller 和 de Raadt 的 strlcpy(3) 和 strlcat(3) 函数 [Miller
    1999]。这是一个最小化、静态大小的缓冲区方法，它提供了与不同（且更不易出错）接口的 C 字符串复制和连接。这些函数的源代码和文档可以在新的 BSD 风格开源许可证下获得，网址为
    [ftp://ftp.openbsd.org/pub/OpenBSD/src/lib/libc/string/strlcpy.3](ftp://ftp.openbsd.org/pub/OpenBSD/src/lib/libc/string/strlcpy.3)。
- en: 'First, here are their prototypes:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，这里是他们的一些原型：
- en: '|  [PRE4]  |'
  id: totrans-58
  prefs: []
  type: TYPE_TB
  zh: '|  [PRE4]  |'
- en: Both strlcpy and strlcat take the full size of the destination buffer as a parameter
    (not the maximum number of characters to be copied) and guarantee to NIL-terminate
    the result (as long as size is larger than 0). Remember that you should include
    a byte for NIL in the size.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: strlcpy 和 strlcat 都接受目标缓冲区的完整大小作为参数（而不是要复制的最大字符数），并保证结果以 NIL 结尾（只要大小大于 0）。请记住，你应该在大小中包含一个用于
    NIL 的字节。
- en: The strlcpy function copies up to size-1 characters from the NUL-terminated
    string src to dst, NIL-terminating the result. The strlcat function appends the
    NIL-terminated string src to the end of dst. It will append at most size - strlen(dst)
    - 1 bytes, NIL-terminating the result.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: strlcpy 函数从以 NUL 结尾的字符串 src 复制最多 size-1 个字符到 dst，并使结果以 NIL 结尾。strlcat 函数将 NUL
    结尾的字符串 src 追加到 dst 的末尾。它将追加最多 size - strlen(dst) - 1 个字节，并使结果以 NIL 结尾。
- en: One minor disadvantage of strlcpy(3) and strlcat(3) is that they are not, by
    default, installed in most Unix-like systems. In OpenBSD, they are part of <string.h>.
    This is not that difficult a problem; since they are small functions, you can
    even include them in your own program’s source (at least as an option), and create
    a small separate package to load them. You can even use autoconf to handle this
    case automatically. If more programs use these functions, it won’t be long before
    these are standard parts of Linux distributions and other Unix-like systems. Also,
    these functions have been recently added to the “glib” library (I submitted the
    patch to do this), so using recent versions of glib makes them available. In glib
    these functions are named g_strlcpy and g_strlcat (not strlcpy or strlcat) to
    be consistent with the glib library naming conventions.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: strlcpy(3) 和 strlcat(3) 的小缺点之一是它们默认情况下并未安装在大多数类 Unix 系统中。在 OpenBSD 中，它们是 <string.h>
    的一部分。这并不是一个特别困难的问题；由于它们是小型函数，你甚至可以将它们包含在你自己的程序源代码中（至少作为一个选项），并创建一个单独的小型包来加载它们。你甚至可以使用
    autoconf 自动处理这种情况。如果更多程序使用这些函数，那么它们很快就会成为 Linux 发行版和其他类 Unix 系统的标准部分。此外，这些函数最近已被添加到“glib”库中（我提交了补丁以实现这一点），因此使用
    glib 的最新版本可以使它们可用。在 glib 中，这些函数被命名为 g_strlcpy 和 g_strlcat（而不是 strlcpy 或 strlcat），以符合
    glib 库的命名约定。
- en: 'Also, strlcat(3) has slightly varying semantics when the provided size is 0
    or if there are no NIL characters in the destination string dst (inside the given
    number of characters). In OpenBSD, if the size is 0, then the destination string’s
    length is considered 0. Also, if size is nonzero, but there are no NIL characters
    in the destination string (in the size number of characters), then the length
    of the destination is considered equal to the size. These rules make handling
    strings without embedded NILs consistent. Unfortunately, at least Solaris doesn’t
    (at this time) obey these rules, because they weren’t specified in the original
    documentation. I’ve talked to Todd Miller, and he and I agree that the OpenBSD
    semantics are the correct ones (and that Solaris is incorrect). The reasoning
    is simple: under no condition should strlcat or strlcpy ever examine characters
    in the destination outside of the range of size; such access might cause core
    dumps (from accessing out-of-range memory) and even hardware interactions (through
    memory-mapped I/O). Thus, given:'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，当提供的 size 为 0 或目标字符串 dst（在给定的字符数内）中没有 NIL 字符时，strlcat(3) 的语义略有不同。在 OpenBSD
    中，如果大小为 0，则目标字符串的长度被认为是 0。此外，如果大小不为零，但目标字符串中没有 NIL 字符（在大小个字符内），则认为目标长度等于大小。这些规则使得处理没有嵌入
    NIL 的字符串是一致的。不幸的是，至少在当前，Solaris 不遵守这些规则，因为它们在原始文档中没有指定。我与 Todd Miller 聊过，我们一致认为
    OpenBSD 的语义是正确的（而 Solaris 是错误的）。推理很简单：在任何情况下，strlcat 或 strlcpy 都不应检查大小范围之外的目标中的字符；这种访问可能会引起核心转储（从访问超出范围的内存）甚至硬件交互（通过内存映射
    I/O）。因此，给定：
- en: '|  [PRE5]  |'
  id: totrans-63
  prefs: []
  type: TYPE_TB
  zh: '|  [PRE5]  |'
- en: The correct answer is 3 (0+3=3), but Solaris will claim the answer is 4 because
    it incorrectly looks at characters beyond the "size" length in the destination.
    For now, I suggest avoiding cases where the size is 0 or the destination has no
    NIL characters. Future versions of glib will hide this difference and always use
    the OpenBSD semantics.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 正确答案是 3（0+3=3），但 Solaris 会声称答案是 4，因为它错误地查看目标中的“大小”长度之外的字符。目前，我建议避免大小为 0 或目标没有
    NIL 字符的情况。glib 的未来版本将隐藏这种差异，并始终使用 OpenBSD 的语义。
- en: 6.2.4\. asprintf and vasprintf
  id: totrans-65
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 6.2.4\. asprintf 和 vasprintf
- en: 'When using C (not C++), and a dynamic memory allocation approach can be used,
    the asprintf and vasprintf functions are an especially useful way to solve the
    problem of safely avoiding buffer overflow. The asprintf() and vasprintf() functions
    are analogs of sprintf(3) and vsprintf(3), except that they automatically allocate
    a new C string and return a pointer to that string. They have the following form:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用 C（不是 C++）并且可以使用动态内存分配方法时，asprintf 和 vasprintf 函数是解决安全避免缓冲区溢出问题的特别有用的方法。asprintf()
    和 vasprintf() 函数是 sprintf(3) 和 vsprintf(3) 的类似物，不同之处在于它们会自动分配一个新的 C 字符串，并返回该字符串的指针。它们具有以下形式：
- en: '|  [PRE6]  |'
  id: totrans-67
  prefs: []
  type: TYPE_TB
  zh: '|  [PRE6]  |'
- en: Since these functions allocate memory, you must pass the pointer to free(3)
    to deallocate. These functions return the number of bytes "printed" (and -1 if
    there is an error).
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 由于这些函数分配内存，你必须传递指针给 free(3) 以进行释放。这些函数返回“打印”的字节数（如果有错误则返回 -1）。
- en: 'These functions are relatively simple to use, and in particular they don''t
    terminate results in middle (a problem with any fixed-length buffer solution).
    Here is an example:'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 这些函数相对简单易用，特别是它们不会在中间截断结果（这是任何固定长度缓冲区解决方案的问题）。以下是一个示例：
- en: '|  [PRE7]  |'
  id: totrans-70
  prefs: []
  type: TYPE_TB
  zh: '|  [PRE7]  |'
- en: The asprintf() and vasprintf() functions are widely used to get things done
    in C without buffer overflows. One problem with them is that they are not actually
    standard (they are not in C11). That said, they are widely implemented; they are
    in the GNU C library and in the *BSDs (including Apple's). They are also relatively
    trivial to recreate on other systems, e.g., it's possible to re-implement this
    on Windows with less than 20 lines of code. There is some variation in error handling;
    FreeBSD sets strp to NULL on an error, while others don't; users should not depend
    on either behavior. Another problem is that their wide use can easily lead to
    memory leaks; as with any C function that allocates memory, you must manually
    deallocate the allocated memory.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: asprintf() 和 vasprintf() 函数在 C 语言中广泛用于完成任务，而不会出现缓冲区溢出问题。它们的问题在于实际上并不是标准函数（它们不在
    C11 标准中）。尽管如此，它们被广泛实现；它们存在于 GNU C 库中，以及 *BSDs（包括苹果的）中。在其他系统上重新创建它们相对简单，例如，在 Windows
    上用不到 20 行代码就可以重新实现。在错误处理方面存在一些差异；FreeBSD 在出错时将 strp 设置为 NULL，而其他系统则不会；用户不应依赖于任何一种行为。另一个问题是，它们的广泛使用很容易导致内存泄漏；就像任何分配内存的
    C 函数一样，你必须手动释放分配的内存。
- en: 6.2.5\. libmib
  id: totrans-72
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 6.2.5\. libmib
- en: One toolset for C that dynamically reallocates strings automatically is the
    “libmib allocated string functions” by Forrest J. Cavalier III, available at [http://www.mibsoftware.com/libmib/astring](http://www.mibsoftware.com/libmib/astring).
    There are two variations of libmib; “libmib-open” appears to be clearly open source
    under its own X11-like license that permits modification and redistribution, but
    redistributions must choose a different name, however, the developer states that
    it “may not be fully tested.” To continuously get libmib-mature, you must pay
    for a subscription. The documentation is not open source, but it is freely available.
    If you are considering the use of this library, you should also look at Messier
    and Viega’s Safestr library (discussed next).
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 一个用于 C 的工具集是 Forrest J. Cavalier III 的“libmib 分配字符串函数”，可在 [http://www.mibsoftware.com/libmib/astring](http://www.mibsoftware.com/libmib/astring)
    找到。libmib 有两种变体；“libmib-open”似乎在其自带的类似 X11 许可证下是明确的开源，允许修改和重新分发，但重新分发时必须选择不同的名称。然而，开发者表示“可能并未完全测试”。要持续获得成熟的
    libmib，你必须支付订阅费。文档不是开源的，但它可以免费获取。如果你正在考虑使用这个库，你也应该看看 Messier 和 Viega 的 Safestr
    库（下文将讨论）。
- en: 6.2.6\. Safestr library (Messier and Viega)
  id: totrans-74
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 6.2.6\. Safestr 库（Messier 和 Viega）
- en: 'The Safe C String (Safestr) library by Messier and Viega is available from
    [http://www.zork.org/safestr](http://www.zork.org/safestr). Safestr provides a
    set of string functions for C that automatically reallocates strings as necessary.
    Safestr strings easily convert to regular C "char *" strings, using the same trick
    used by most malloc() implementations: safestr stores important information at
    addresses "before" the pointer passed around - so it’s easier to use safestr in
    existing programs. Safestr supports setting strings to be read-only, and supports
    “trusted” value of strings that can be used to help detect problems. Safestr is
    released under a open source BSD-style license. Note that safestr requires XXL,
    a library that adds support for exception handling and asset management in C.'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: Messier 和 Viega 开发的 Safe C String (Safestr) 库可在 [http://www.zork.org/safestr](http://www.zork.org/safestr)
    获取。Safestr 为 C 提供了一组字符串函数，这些函数会根据需要自动重新分配字符串。Safestr 字符串可以轻松转换为常规的 C "char *"
    字符串，使用的是大多数 malloc() 实现所用的相同技巧：safestr 在传递的指针“之前”存储重要信息——因此，在现有程序中使用 safestr 更容易。Safestr
    支持将字符串设置为只读，并支持“可信”的字符串值，这有助于检测问题。Safestr 在开源 BSD 风格许可下发布。请注意，safestr 需要 XXL 库，这是一个添加
    C 中异常处理和资产管理支持的库。
- en: 6.2.7\. C++ std::string class
  id: totrans-76
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 6.2.7\. C++ std::string 类
- en: C++ developers can use the std::string class, which is built into the language.
    This is a dynamic approach, as the storage grows as necessary. However, it’s important
    to note that if that class’s data is turned into a “char *” (e.g., by using data()
    or c_str()), the possibilities of buffer overflow resurface, so you need to be
    careful when when using such methods. Note that c_str() always returns a NIL-terminated
    string, but data() may or may not (it’s implementation dependent, and most implementations
    do not include the NIL terminator). Avoid using data(), and if you must use it,
    don’t be dependent on its format.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: C++ 开发者可以使用内置在语言中的 std::string 类。这是一种动态方法，因为存储空间会根据需要增长。然而，需要注意的是，如果将该类的数据转换为“char
    *”（例如，通过使用 data() 或 c_str()），缓冲区溢出的可能性就会再次出现，因此在使用这些方法时需要小心。请注意，c_str() 总是返回一个以
    NULL 结尾的字符串，但 data() 可能是也可能不是（这取决于实现，大多数实现不包括 NULL 终止符）。避免使用 data()，如果必须使用它，不要依赖于其格式。
- en: Many C++ developers use other string libraries as well, such as those that come
    with other large libraries or even home-grown string libraries. With those libraries,
    be especially careful - many alternative C++ string classes include routines to
    automatically convert the class to a “char *” type. As a result, they can silently
    introduce buffer overflow vulnerabilities.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 许多 C++ 开发者也使用其他字符串库，例如那些包含在其他大型库中的库，甚至是一些自制的字符串库。使用这些库时，请特别小心——许多替代的 C++ 字符串类包括将类自动转换为“char
    *”类型的例程。因此，它们可能会无声地引入缓冲区溢出漏洞。
- en: 6.2.8\. Libsafe
  id: totrans-79
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 6.2.8\. Libsafe
- en: Arash Baratloo, Timothy Tsai, and Navjot Singh (of Lucent Technologies) have
    developed Libsafe, a wrapper of several library functions known to be vulnerable
    to stack smashing attacks. This wrapper (which they call a kind of “middleware”)
    is a simple dynamically loaded library that contains modified versions of C library
    functions such as strcpy(3). These modified versions implement the original functionality,
    but in a manner that ensures that any buffer overflows are contained within the
    current stack frame. Their initial performance analysis suggests that this library’s
    overhead is very small. Libsafe papers and source code are available at [http://www.research.avayalabs.com/project/libsafe](http://www.research.avayalabs.com/project/libsafe).
    The Libsafe source code is available under the completely open source LGPL license.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: Arash Baratloo、Timothy Tsai 和 Navjot Singh（来自 Lucent Technologies）开发了 Libsafe，这是一个已知容易受到堆栈破坏攻击的几个库函数的包装器。这个包装器（他们称之为一种“中间件”）是一个简单的动态加载库，其中包含修改后的
    C 库函数版本，如 strcpy(3)。这些修改后的版本实现了原始功能，但以一种确保任何缓冲区溢出都包含在当前堆栈帧内的方式。他们的初步性能分析表明，这个库的开销非常小。Libsafe
    论文和源代码可在 [http://www.research.avayalabs.com/project/libsafe](http://www.research.avayalabs.com/project/libsafe)
    获取。Libsafe 源代码在完全开源的 LGPL 许可证下提供。
- en: 'Libsafe’s approach appears somewhat useful. Libsafe should certainly be considered
    for inclusion by Linux distributors, and its approach is worth considering by
    others as well. For example, I know that the Mandrake distribution of Linux (version
    7.1) includes it. However, as a software developer, Libsafe is a useful mechanism
    to support defense-in-depth but it does not really prevent buffer overflows. Here
    are several reasons why you shouldn’t depend just on Libsafe during code development:'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: Libsafe的方法似乎有些有用。Linux发行商当然应该考虑将其包含在内，其他人也应该考虑其方法。例如，我知道Linux的Mandrake发行版（版本7.1）包括它。然而，作为一个软件开发者，Libsafe是一个支持深度防御的有用机制，但它并不能真正防止缓冲区溢出。以下是一些你不应该在代码开发期间仅仅依赖Libsafe的原因：
- en: Libsafe only protects a small set of known functions with obvious buffer overflow
    issues. At the time of this writing, this list is significantly shorter than the
    list of functions in this book known to have this problem. It also won’t protect
    against code you write yourself (e.g., in a while loop) that causes buffer overflows.
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Libsafe仅保护一组已知具有明显缓冲区溢出问题的函数。在撰写本文时，这个列表比已知存在此问题的本书中函数列表要短得多。它也不会保护你编写的代码（例如，在while循环中）导致的缓冲区溢出。
- en: Even if libsafe is installed in a distribution, the way it is installed impacts
    its use. The documentation recommends setting LD_PRELOAD to cause libsafe’s protections
    to be enabled, but the problem is that users can unset this environment variable...
    causing the protection to be disabled for programs they execute!
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 即使libsafe被安装在一个发行版中，其安装方式也会影响其使用。文档建议设置LD_PRELOAD以启用libsafe的保护，但问题是用户可以取消设置此环境变量...从而导致他们执行的程序的保护被禁用！
- en: Libsafe only protects against buffer overflows of the stack onto the return
    address; you can still overrun the heap or other variables in that procedure’s
    frame.
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Libsafe仅保护堆栈到返回地址的缓冲区溢出；你仍然可以超过该过程框架中的堆或其他变量。
- en: Unless you can be assured that all deployed platforms will use libsafe (or something
    like it), you’ll have to protect your program as though it wasn’t there.
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 除非你能确保所有部署的平台都将使用libsafe（或类似的东西），否则你必须像它不存在一样保护你的程序。
- en: LibSafe seems to assume that saved frame pointers are at the beginning of each
    stack frame. This isn’t always true. Compilers (such as gcc) can optimize away
    things, and in particular the option "-fomit-frame-pointer" removes the information
    that libsafe seems to need. Thus, libsafe may fail to work for some programs.
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: LibSafe似乎假设保存的帧指针位于每个堆栈帧的开头。这并不总是正确的。编译器（如gcc）可以优化某些内容，特别是选项“-fomit-frame-pointer”会移除libsafe似乎需要的信息。因此，libsafe可能无法为某些程序工作。
- en: 'The libsafe developers themselves acknowledge that software developers shouldn’t
    just depend on libsafe. In their words:'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: libsafe的开发者自己承认，软件开发者不应仅仅依赖libsafe。用他们的话说：
- en: It is generally accepted that the best solution to buffer overflow attacks is
    to fix the defective programs. However, fixing defective programs requires knowing
    that a particular program is defective. The true benefit of using libsafe and
    other alternative security measures is protection against future attacks on programs
    that are not yet known to be vulnerable.
  id: totrans-88
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 人们普遍认为，解决缓冲区溢出攻击的最佳方案是修复有缺陷的程序。然而，修复有缺陷的程序需要知道某个特定程序是有缺陷的。使用libsafe和其他替代安全措施的真实好处是保护尚未被发现有漏洞的程序免受未来攻击。
- en: 6.2.9\. Other Libraries
  id: totrans-89
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 6.2.9. 其他库
- en: The glib (not glibc) library is a widely-available open source library that
    provides a number of useful functions for C programmers. GTK+ and GNOME both use
    glib, for example. As I noted earlier, in glib version 1.3.2, g_strlcpy() and
    g_strlcat() have been added through a patch which I submitted. This should make
    it easier to portably use those functions once these later versions of glib become
    widely available. At this time I do not have an analysis showing definitively
    that the glib library functions protect against buffer overflows. However, many
    of the glib functions automatically allocate memory, and those functions automatically
    *fail with no reasonable way to intercept the failure* (e.g., to try something
    else instead). As a result, in many cases most glib functions cannot be used in
    most secure programs. The GNOME guidelines recommend using functions such as g_strdup_printf(),
    which is fine as long as it’s okay if your program immediately crashes if an out-of-memory
    condition occurs. However, if you can’t accept this, then using such routines
    isn’t appropriate.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: glib（不是glibc）库是一个广泛可用的开源库，为C程序员提供了一系列有用的函数。例如，GTK+和GNOME都使用glib。正如我之前提到的，在glib版本1.3.2中，通过我提交的补丁添加了g_strlcpy()和g_strlcat()。这将使得在glib的这些后续版本广泛可用后，便携式使用这些函数变得更加容易。目前，我没有分析表明glib库函数可以防止缓冲区溢出。然而，许多glib函数会自动分配内存，并且这些函数在失败时没有合理的拦截方式（例如，尝试其他操作）。因此，在许多情况下，大多数glib函数不能在大多数安全程序中使用。GNOME指南建议使用g_strdup_printf()等函数，只要程序在发生内存不足条件时立即崩溃是可以接受的。然而，如果你不能接受这一点，那么使用此类例程是不合适的。
- en: 6.3\. Compilation Solutions in C/C++
  id: totrans-91
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 6.3\. C/C++中的编译解决方案
- en: 原文：[https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/compilation-c.html](https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/compilation-c.html)
  id: totrans-92
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/compilation-c.html](https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/compilation-c.html)
- en: A completely different approach is to use compilation methods that perform bounds-checking
    (see [Sitaker 1999] for a list). In my opinion, such tools are very useful in
    having multiple layers of defense, but it’s not wise to use this technique as
    your sole defense. Many such tools only provide a partial defense. More-complete
    defenses tend to be slower (and generally people choose to use C/C++ because performance
    is important for their application). Also, for open source programs you cannot
    be certain what tools will be used to compile the program; using the default “normal”
    compiler for a given system might suddenly open security flaws.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 完全不同的方法是使用执行边界检查的编译方法（参见[Sitaker 1999]以获取列表）。在我看来，这类工具在多层防御中非常有用，但将此技术作为唯一的防御手段并不明智。许多此类工具仅提供部分防御。更全面的防御往往速度较慢（并且通常人们选择使用C/C++，因为性能对于他们的应用程序来说很重要）。此外，对于开源程序，你无法确定将使用哪些工具来编译程序；使用给定系统的默认“正常”编译器可能会突然打开安全漏洞。
- en: Historically a very important tool is “StackGuard”, a modification of the standard
    GNU C compiler gcc. StackGuard works by inserting a “guard” value (called a “canary”)
    in front of the return address; if a buffer overflow overwrites the return address,
    the canary’s value (hopefully) changes and the system detects this before using
    it. This is quite valuable, but note that this does not protect against buffer
    overflows overwriting other values (which they may still be able to use to attack
    a system). There is work to extend StackGuard to be able to add canaries to other
    data items, called “PointGuard”. PointGuard will automatically protect certain
    values (e.g., function pointers and longjump buffers). However, protecting other
    variable types using PointGuard requires specific programmer intervention (the
    programmer has to identify which data values must be protected with canaries).
    This can be valuable, but it’s easy to accidentally omit protection for a data
    value you didn’t think needed protection - but needs it anyway. More information
    on StackGuard, PointGuard, and other alternatives is in Cowan [1999]. StackGuard
    inspired the development of many other run-time mechanisms to detect and counter
    attacks.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 历史上，“StackGuard”是一个非常重要的工具，它是标准GNU C编译器gcc的修改版。StackGuard通过在返回地址前插入一个“保护值”（称为“金丝雀”）来工作；如果缓冲区溢出覆盖了返回地址，金丝雀的值（希望）会改变，系统会在使用它之前检测到这一点。这非常有价值，但请注意，这并不能防止缓冲区溢出覆盖其他值（它们可能仍然能够用来攻击系统）。有工作正在扩展StackGuard，使其能够向其他数据项添加金丝雀，称为“PointGuard”。PointGuard将自动保护某些值（例如，函数指针和longjump缓冲区）。然而，使用PointGuard保护其他变量类型需要特定的程序员干预（程序员必须标识哪些数据值必须用金丝雀进行保护）。这可能很有价值，但很容易不小心遗漏保护那些你认为不需要保护的数据值——但实际上它们需要保护。关于StackGuard、PointGuard和其他替代方案的信息，请参阅Cowan
    [1999]。StackGuard启发了许多其他运行时机制的开发，以检测和对抗攻击。
- en: '[IBM has developed a stack protection system called ProPolice based on the
    ideas of StackGuard](http://www.trl.ibm.com/projects/security/ssp). IBM doesn’t
    include the ProPolice name in its current website - it’s just called a "GCC extension
    for protecting applications from stack-smashing attacks". However, it’s hard to
    talk about something without using a name, so I’ll continue to use the name ProPolice.
    Like StackGuard, ProPolice is a GCC (Gnu Compiler Collection) extension for protecting
    applications from stack-smashing attacks. Applications written in C are protected
    by automatically inserting protection code into an application at compilation
    time. ProPolice is slightly different than StackGuard, however, by adding three
    features: (1) reordering local variables to place buffers after pointers (to avoid
    the corruption of pointers that could be used to further corrupt arbitrary memory
    locations), (2) copying pointers in function arguments to an area preceding local
    variable buffers (to prevent the corruption of pointers that could be used to
    further corrupt arbitrary memory locations), and (3) omitting instrumentation
    code from some functions (it basically assumes that only character arrays are
    dangerous; while this isn’t strictly true, it’s mostly true, and as a result ProPolice
    has better performance while retaining most of its protective capabilities).'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: '[IBM已经开发了一个基于StackGuard思想的堆栈保护系统，称为ProPolice](http://www.trl.ibm.com/projects/security/ssp)。IBM在其当前网站上不包括ProPolice的名称——它只是被称为“用于保护应用程序免受堆栈破坏攻击的GCC扩展”。然而，不使用名称很难谈论某事，所以我将继续使用ProPolice这个名字。与StackGuard一样，ProPolice是GCC（Gnu编译器集合）的一个扩展，用于保护应用程序免受堆栈破坏攻击。用C编写的应用程序在编译时自动插入保护代码以获得保护。然而，ProPolice与StackGuard略有不同，它增加了三个功能：（1）重新排序局部变量，将缓冲区放在指针之后（以避免进一步破坏任意内存位置的指针），（2）将函数参数中的指针复制到局部变量缓冲区之前的一个区域（以防止进一步破坏任意内存位置的指针），（3）省略某些函数的仪器代码（它基本上假设只有字符数组是危险的；虽然这并不完全正确，但大多数情况下是正确的，因此ProPolice在保持大部分保护能力的同时，性能更好]。'
- en: Red Hat engineers in 2005 re-implemented buffer overflow countermeasures in
    GCC based on lessons learned from ProPolice. They implemented the GCC flags -fstack-protector
    flag (which only protects some vulnerable functions), and the -fstack-protector-all
    flag (which protects all functions). In 2012, Google engineers added the -fstack-protector-strong
    flag that tries to strike a better balance (it protects more functions than -fstack-protector,
    but not all of them as -fstack-protector-all does). Many Linux distributions use
    one of these flags, as a default or for at least some packages, to harden application
    programs.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 2005年，红帽工程师基于从ProPolice学到的经验，在GCC中重新实现了缓冲区溢出防护措施。他们实现了GCC标志-fstack-protector（仅保护一些易受攻击的函数），以及-fstack-protector-all（保护所有函数）。2012年，谷歌工程师添加了-fstack-protector-strong标志，试图达到更好的平衡（它比-fstack-protector保护更多函数，但不像-fstack-protector-all那样保护所有函数）。许多Linux发行版将这些标志之一作为默认设置，或者至少为某些软件包使用，以加固应用程序程序。
- en: On Windows, Microsoft’s compilers include the /GS option to include StackGuard-like
    protection against buffer overflows. However, it’s worth noting that at least
    on [Microsoft Windows 2003 Server these protection mechanisms can be defeated.](http://www.nextgenss.com/papers/defeating-w2k3-stack-protection.pdf
    )
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 在Windows上，微软的编译器包括/GS选项，以包含类似于StackGuard的保护措施来防止缓冲区溢出。然而，值得注意的是，至少在[Microsoft
    Windows 2003 Server上，这些保护机制可以被克服。](http://www.nextgenss.com/papers/defeating-w2k3-stack-protection.pdf)
- en: 'An especially strong hardening approach is "Address Sanitizer" (ASan, also
    referred to as ASAN and AddressSanitizer). ASan is available in LLVM and gcc compilers
    as the "-fsanitize=address" flag. ASan counters buffer overflow (global/stack/heap),
    use-after-free, and double-free based attacks. It can also detect use-after-return
    and memory leaks. It can also counters some other C/C++ memory issues, but due
    to its design it cannot detect read-before-write. Its has a measured overhead
    of 73% average CPU overhead (often 2x), with 2x-4x memory overhead; this is low
    compared to previous approaches, but it is still significant. Still, this is sometimes
    acceptable overhead for deployment, and it is typically quite acceptable for testing
    including fuzz testing. The development processes for Chromium and Firefox, for
    example, use ASan. Details of how ASan works is available at [http://code.google.com/p/address-sanitizer/](http://code.google.com/p/address-sanitizer/),
    particularly in the paper "AddressSanitizer: A Fast Address Sanity Checker" by
    Konstantin Serebryany, Derek Bruening, Alexander Potapenko, and Dmitry Vyukov
    (Google), USENIX ATC 2012 Fundamentally ASan uses "shadow bytes" to record memory
    addressability. ASan tracks addressability of memory, where addressability means
    if a read or write is permitted. All memory allocations (global, stack, and heap)
    are aligned to (at least) 8 bytes, and every 8 bytes of memory''s addressability
    is represented by a "shadow byte". In the shadow byte, a 0 means all 8 bytes addressable,
    1..7 means only next N are addressable, and negative (high bit) means no bytes
    are addressable. All allocations are surrounded by inaccessible "red zones" (with
    a default size of 128 bytes). Every allocation/deallocation in stack and heap
    manipulates the shadow bytes, and every read/write first checks the shadow bytes
    to see if access is allowed. This countermeasure is very strong, though it can
    be fooled if a calculated address is in a different valid region. That said, ASan
    is a remarkably strong defense for applications written in C or C++, in cases
    where these overheads are acceptable.'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: '一种特别强大的加固方法是"地址检查器"（ASan，也称为ASAN和AddressSanitizer）。ASan作为LLVM和gcc编译器的"-fsanitize=address"标志可用。ASan可以对抗缓冲区溢出（全局/栈/堆）、使用后释放和双重释放的攻击。它还可以检测使用后返回和内存泄漏。它还可以对抗一些其他C/C++内存问题，但由于其设计，它无法检测读在写之前。它的平均CPU开销为73%（通常是2倍），内存开销为2倍至4倍；与以前的方法相比，这已经很低了，但仍然很重要。尽管如此，对于部署来说，这有时是可以接受的开销，对于测试，包括模糊测试，通常也是完全可以接受的。例如，Chromium和Firefox的开发流程就使用了ASan。关于ASan如何工作的详细信息可在[http://code.google.com/p/address-sanitizer/](http://code.google.com/p/address-sanitizer/)找到，特别是在Konstantin
    Serebryany、Derek Bruening、Alexander Potapenko和Dmitry Vyukov（谷歌）撰写的论文"AddressSanitizer:
    A Fast Address Sanity Checker"中。从根本上说，ASan使用"影子字节"来记录内存地址性。ASan跟踪内存的地址性，其中地址性意味着是否允许读取或写入。所有内存分配（全局、栈和堆）都对齐到（至少）8字节，每8字节内存的地址性由一个"影子字节"表示。在影子字节中，0表示所有8字节可寻址，1..7表示只有下一个N个字节可寻址，而负数（高位）表示没有字节可寻址。所有分配都被不可访问的"红色区域"（默认大小为128字节）包围。栈和堆中的每个分配/释放都会操作影子字节，每个读取/写入首先检查影子字节以查看是否允许访问。这种对策非常强大，尽管如果计算出的地址在另一个有效区域中，它可能会被欺骗。话虽如此，ASan是针对用C或C++编写的应用程序的非常强大的防御措施，在这些开销可以接受的情况下。'
- en: A "non-executable segment" approach was developed by Ingo Molnar, termed [Exec
    Shield](http://lwn.net/Articles/31032/). Molnar’s exec shield limits the region
    that executable code can exist, and then moves executable code below that region.
    If the code is moved to an area where a zero byte must occur, then it’s harder
    to exploit because many ASCII-based attacks cannot insert a zero byte. This isn’t
    foolproof, but it does prevent certain attacks. However, many programs invoke
    libraries that in aggregate are so large that their addresses can have a non-zero
    in them, making them much more vulnerable.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: '"不可执行段"方法是由Ingo Molnar开发的，称为[Exec Shield](http://lwn.net/Articles/31032/)。Molnar的执行盾限制可执行代码存在的区域，并将可执行代码移至该区域下方。如果代码被移至必须出现零字节的区域，那么它就难以被利用，因为许多基于ASCII的攻击无法插入零字节。这并不是万无一失的，但它确实可以防止某些攻击。然而，许多程序调用的库在总体上非常大，它们的地址可能包含非零值，这使得它们更加脆弱。'
- en: A different approach is to limit transfer of control; this doesn’t prevent all
    buffer overflow attacks (e.g., those that attack data) but it can make other attacks
    harder [Kiriansky 2002]
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 一种不同的方法是限制控制权的转移；这并不能阻止所有缓冲区溢出攻击（例如，那些攻击数据的攻击），但它可以使其他攻击更难[Kiriansky 2002]
- en: In short, it’s better to work first on developing a correct program that defends
    itself against buffer overflows. Then, after you’ve done this, by all means use
    techniques and tools like StackGuard as an additional safety net. If you’ve worked
    hard to eliminate buffer overflows in the code itself, then StackGuard (and tools
    like it) are are likely to be more effective because there will be fewer “chinks
    in the armor” that StackGuard will be called on to protect.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，最好是首先开发一个能够防御缓冲区溢出的正确程序。然后，在你完成这项工作之后，无论如何都要使用像StackGuard这样的技术和工具作为额外的安全网。如果你已经在代码本身中努力消除了缓冲区溢出，那么StackGuard（以及类似工具）可能会更加有效，因为将会有更少的“盔甲上的缝隙”需要StackGuard来保护。
- en: 6.4\. Other Languages
  id: totrans-102
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 6.4. 其他语言
- en: 原文：[https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/other-languages.html](https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/other-languages.html)
  id: totrans-103
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/other-languages.html](https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/other-languages.html)'
- en: The problem of buffer overflows is an excellent argument for using other programming
    languages such as Perl, Python, Java, and Ada95. After all, nearly all other programming
    languages used today (other than assembly language) protect against buffer overflows.
    Using those other languages does not eliminate all problems, of course; in particular
    see the discussion in [Section 8.3](handle-metacharacters.html) regarding the
    NIL character. There is also the problem of ensuring that those other languages'
    infrastructure (e.g., run-time library) is available and secured. Still, you should
    certainly consider using other programming languages when developing secure programs
    to protect against buffer overflows.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 缓冲区溢出的问题是一个很好的理由去使用其他编程语言，例如Perl、Python、Java和Ada95。毕竟，今天使用的几乎所有其他编程语言（除了汇编语言）都能防止缓冲区溢出。当然，使用那些其他语言并不能消除所有问题；特别是请参阅[第8.3节](handle-metacharacters.html)中关于NIL字符的讨论。还有确保那些其他语言的底层设施（例如，运行时库）可用且安全的问题。尽管如此，当开发安全程序以防止缓冲区溢出时，你当然应该考虑使用其他编程语言。
