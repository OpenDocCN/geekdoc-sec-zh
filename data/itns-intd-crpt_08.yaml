- en: Pseudorandom functions from pseudorandom generators and CPA security
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 从伪随机生成器到伪随机函数
- en: 原文：[https://intensecrypto.org/public/lec_05_prf-from-prg.html](https://intensecrypto.org/public/lec_05_prf-from-prg.html)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://intensecrypto.org/public/lec_05_prf-from-prg.html](https://intensecrypto.org/public/lec_05_prf-from-prg.html)
- en: '*See any bugs/typos/confusing explanations? [Open a GitHub issue](https://github.com/boazbk/crypto/issues/new).
    You can also [comment below](#commentform)*'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
