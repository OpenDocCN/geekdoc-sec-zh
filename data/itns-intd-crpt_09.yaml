- en: Chosen Ciphertext Security
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 选择密文安全性
- en: 原文：[https://intensecrypto.org/public/lec_06_CCA.html](https://intensecrypto.org/public/lec_06_CCA.html)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://intensecrypto.org/public/lec_06_CCA.html](https://intensecrypto.org/public/lec_06_CCA.html)
- en: '*See any bugs/typos/confusing explanations? [Open a GitHub issue](https://github.com/boazbk/crypto/issues/new).
    You can also [comment below](#commentform)*'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '**如有任何错误/打字错误/令人困惑的解释？[在GitHub上打开一个issue](https://github.com/boazbk/crypto/issues/new)。您也可以[在下面评论](#commentform)*'
- en: '**★ See also the [**PDF version of this chapter**](https://files.boazbarak.org/crypto/lec_06_CCA.pdf)
    (better formatting/references) ★'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
