- en: To compute this map we may need to extend the register by some additional \(polylog(N)\)
    many qubits, but we can ignore them as they will always be equal to zero except
    in intermediate computations.
  id: totrans-104
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为了计算这个映射，我们可能需要通过一些额外的 \(polylog(N)\) 个量子位来扩展寄存器，但我们可以忽略它们，因为除了中间计算之外，它们总是等于零。
