- en: 'Multiparty secure computation I: Definition and Honest-But-Curious to Malicious
    complier'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 多方安全计算I：定义和从诚实但好奇到恶意编译器的转换
