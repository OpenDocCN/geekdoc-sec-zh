- en: Computational Security
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 计算安全
- en: 原文：[https://intensecrypto.org/public/lec_02_computational-security.html](https://intensecrypto.org/public/lec_02_computational-security.html)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://intensecrypto.org/public/lec_02_computational-security.html](https://intensecrypto.org/public/lec_02_computational-security.html)
- en: '*See any bugs/typos/confusing explanations? [Open a GitHub issue](https://github.com/boazbk/crypto/issues/new).
    You can also [comment below](#commentform)*'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '*发现任何错误/打字错误/令人困惑的解释？[在GitHub上打开一个issue](https://github.com/boazbk/crypto/issues/new)。您也可以[在下面评论](#commentform)*'
- en: '**★ See also the [**PDF version of this chapter**](https://files.boazbarak.org/crypto/lec_02_computational-security.pdf)
    (better formatting/references) ★'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '**★ 另请参阅本章的[PDF版本](https://files.boazbarak.org/crypto/lec_02_computational-security.pdf)（更好的格式/参考文献）★'
- en: '**Additional reading:** Sections 2.2 and 2.3 in Boneh-Shoup book. Chapter 3
    up to and including Section 3.3 in Katz-Lindell book.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '**附加阅读：** 骨诺-休普书籍中的第2.2节和第2.3节。卡茨-林德尔书籍中的第3章，包括第3.3节。'
- en: 'Recall our cast of characters- Alice and Bob want to communicate securely over
    a channel that is monitored by the nosy Eve. In the last lecture, we have seen
    the definition of *perfect secrecy* that guarantees that Eve cannot learn *anything*
    about their communication beyond what she already knew. However, this security
    came at a price. For every bit of communication, Alice and Bob have to exchange
    in advance a bit of a secret key. In fact, the proof of this result gives rise
    to the following simple Python program that can break every encryption scheme
    that uses, say, a \(128\) bit key, with a \(129\) bit message:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 回顾我们的人物设定——爱丽丝和鲍勃想要在由爱管闲事的伊芙监视的通道上安全地通信。在上一次讲座中，我们看到了*完美保密*的定义，该定义保证了伊芙无法了解他们通信的任何内容，除了她已经知道的内容。然而，这种安全性是有代价的。对于每一比特的通信，爱丽丝和鲍勃必须事先交换一些密钥。实际上，这个结果的证明产生了一个简单的Python程序，可以破解使用128比特密钥、129比特消息的任何加密方案：
- en: '[PRE0]'
  id: totrans-6
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: The program `Distinguish` will break any \(128\)-bit key and \(129\)-bit message
    encryption `Encrypt`, in the sense that there exist a pair of messages \(m_0,m_1\)
    such that `Distinguish`\((\)`Encrypt`\((k,m_b),m_0,m_1)=m_b\) with probability
    at least \(0.75\) over \(k \leftarrow_R \{0,1\}^n\) and \(b \leftarrow_R \{0,1\}\).
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 程序`Distinguish`将破解任何128比特密钥和129比特消息的加密`Encrypt`，其意义在于存在一对消息\(m_0,m_1\)，使得`Distinguish`\((\)`Encrypt`\((k,m_b),m_0,m_1)=m_b\)，在\(k
    \leftarrow_R \{0,1\}^n\)和\(b \leftarrow_R \{0,1\}\)的概率至少为\(0.75\)。
- en: Now, generating, distributing, and protecting huge keys causes immense logistical
    problems, which is why almost all encryption schemes used in practice do in fact
    utilize short keys (e.g., \(128\) bits long) with messages that can be much longer
    (sometimes even terabytes or more of data).
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，生成、分发和保护大量密钥会导致巨大的后勤问题，这也是为什么几乎所有实际使用的加密方案实际上都利用了短密钥（例如，128比特长）和可以非常长的消息（有时甚至达到数太字节或更多数据）。
- en: So, why can’t we use the above Python program to break all encryptions in the
    Internet and win infamy and fortune? We can in fact, but we’ll have to wait a
    *really* long time, since the loop in `Distinguish` will run \(2^{128}\) times,
    which will take much more than the lifetime of the universe to complete, even
    if we used all the computers on the planet.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，我们为什么不能使用上面的Python程序来破解互联网上的所有加密，并赢得恶名和财富？实际上我们可以，但我们得等一个非常长的时间，因为`Distinguish`中的循环将运行\(2^{128}\)次，即使我们使用地球上所有的计算机，也需要比宇宙的寿命还要长的时间才能完成。
- en: 'However, the fact that *this* particular program is not a feasible attack,
    does not mean there does not exist a different attack. But this still suggests
    a tantalizing possibility: if we consider a relaxed version of perfect secrecy
    that restricts Eve to performing computations that can be done in this universe
    (e.g., less than \(2^{256}\) steps should be safe not just for human but for all
    potential alien civilizations) then can we bypass the impossibility result and
    allow the key to be much shorter than the message?'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，这个特定程序不是一个可行的攻击，并不意味着不存在不同的攻击。但这仍然暗示了一个诱人的可能性：如果我们考虑一个放宽的完美保密版本，限制伊芙只能执行在这个宇宙中可以完成的计算（例如，少于\(2^{256}\)步应该是安全的，不仅对人类，对所有潜在的外星文明也是如此），那么我们能否绕过不可能的结果，并允许密钥比消息短得多？
- en: This in fact does seem to be the case, but as we’ve seen, defining security
    is a subtle task, and will take some care. As before, the way we avoid (at least
    some of) the pitfalls of so many cryptosystems in history is that we insist on
    very precisely *defining* what it means for a scheme to be secure.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上这似乎是正确的，但我们已经看到，定义安全性是一个微妙的工作，需要小心处理。正如之前所做的那样，我们避免（至少是避免一些）历史上许多密码系统的陷阱，是因为我们坚持非常精确地
    *定义* 一个方案如何才能是安全的。
- en: 'Let us defer the discussion how one defines a function being computable in
    “less than \(T\) operations” and just say that there is a way to formally do so.
    We will want to say that a scheme has “\(256\) bits of security” if it is not
    possible to break it using less than \(2^{256}\) operations, and more generally
    that it has \(t\) bits of security if it can’t be broken using less than \(2^t\)
    operations. Given the perfect secrecy definition we saw last time, a natural attempt
    for defining computational secrecy would be the following:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们暂时推迟讨论如何定义在“少于 \(T\) 次操作”内可计算的功能的讨论，只是说有一种正式的方法可以这样做。我们希望说，如果一个方案在不超过 \(2^{256}\)
    次操作的情况下无法被破解，那么它就有“\(256\) 位的安全性”；更普遍地说，如果它不能在不超过 \(2^t\) 次操作的情况下被破解，那么它就有 \(t\)
    位的安全性。根据我们上次看到的完美保密定义，定义计算保密性的一个自然尝试如下：
- en: An encryption scheme \((E,D)\) has *\(t\) bits of computational secrecy* if
    for every two distinct plaintexts \(\{m_0,m_1\} \subseteq {\{0,1\}}^\ell\) and
    every strategy of Eve using at most \(2^t\) computational steps, if we choose
    at random \(b\in{\{0,1\}}\) and a random key \(k\in{\{0,1\}}^n\), then the probability
    that Eve guesses \(m_b\) after seeing \(E_k(m_b)\) is at most \(1/2\).
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 一个加密方案 \((E,D)\) 如果对于任意两个不同的明文 \(\{m_0,m_1\} \subseteq {\{0,1\}}^\ell\) 和 Eve
    使用最多 \(2^t\) 计算步骤的任何策略，如果我们随机选择 \(b\in{\{0,1\}}\) 和一个随机密钥 \(k\in{\{0,1\}}^n\)，那么
    Eve 在看到 \(E_k(m_b)\) 后猜测 \(m_b\) 的概率最多为 \(1/2\)，则它具有 *\(t\) 位的计算安全性*。
- en: '**Note:** It is important to keep track of what is known and unknown to the
    adversary Eve. The adversary knows the set \(\{ m_0,m_1 \}\) of potential messages,
    and the ciphertext \(y=E_k(m_b)\). The only things she doesn’t know are whether
    \(b=0\) or \(b=1\), and the value of the secret key \(k\). In particular, because
    \(m_0\) and \(m_1\) are known to Eve, it does not matter whether we define Eve’s
    goal in this “security game” as outputting \(m_b\) or as outputting \(b\).'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意：** 跟踪对手 Eve 所知和未知的内容是很重要的。对手 Eve 知道潜在消息的集合 \(\{ m_0,m_1 \}\) 和密文 \(y=E_k(m_b)\)。她唯一不知道的是
    \(b=0\) 或 \(b=1\)，以及秘密密钥 \(k\) 的值。特别是，由于 \(m_0\) 和 \(m_1\) 对 Eve 是已知的，所以在这个“安全游戏”中，我们定义
    Eve 的目标为输出 \(m_b\) 或输出 \(b\) 并不重要。'
- en: '[Definition 2.1](#firstcompdef) seems very natural, but is in fact *impossible*
    to achieve if the key is shorter than the message.'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '[定义 2.1](#firstcompdef) 看起来非常自然，但如果密钥比消息短，实际上 *是无法实现* 的。'
- en: Before reading further, you might want to stop and think if you can *prove*
    that there is no, say, encryption scheme with \(\sqrt{n}\) bits of computational
    security satisfying [Definition 2.1](#firstcompdef) with \(\ell = n+1\) and where
    the time to compute the encryption is polynomial.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 在继续阅读之前，你可能想要停下来思考一下，你是否可以 *证明* 没有这样的加密方案，比如说，具有 \(\sqrt{n}\) 比特计算安全性的加密方案，满足
    [定义 2.1](#firstcompdef) 且 \(\ell = n+1\)，并且加密计算时间是多项式的。
- en: The reason [Definition 2.1](#firstcompdef) can’t be achieved is that if the
    message is even one bit longer than the key, we can always have a very efficient
    procedure that achieves success probability of about \(1/2 + 2^{-n-1}\) by guessing
    the key. This is because we can replace the loop in the Python program `Distinguish`
    by choosing the key at random. Since we have some small chance of guessing correctly,
    we will get a small advantage over half.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: '[定义 2.1](#firstcompdef) 无法实现的原因是，如果消息比密钥多一个比特，我们总可以有一个非常高效的程序，通过猜测密钥来实现大约 \(1/2
    + 2^{-n-1}\) 的成功概率。这是因为我们可以通过随机选择密钥来替换 Python 程序 `Distinguish` 中的循环。由于我们有一些猜对的机会，我们将获得超过一半的小优势。'
- en: 'Of course an advantage of \(2^{-256}\) in guessing the message is not really
    something we would worry about. For example, since the earth is about 5 billion
    years old, we can estimate the chance that an asteroid of the magnitude that caused
    the dinosaurs’ extinction will hit us this very second to be about \(2^{-60}\).
    Hence we want to relax the notion of computational security so it would not consider
    guessing with such a tiny advantage as a “true break” of the scheme. The resulting
    definition is the following:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，在猜测消息时，\(2^{-256}\) 的优势并不是我们真正需要担心的。例如，由于地球大约有50亿年的历史，我们可以估计出，一个造成恐龙灭绝的同等大小的陨石在此时此刻撞击我们的概率大约是
    \(2^{-60}\)。因此，我们希望放宽计算安全的观念，使其不会将这种微小的优势视为“真正的破解”方案。得出的定义如下：
- en: An encryption scheme \((E,D)\) has *\(t\) bits of computational secrecy^([1](#fn:1))*
    if for every two distinct plaintexts \(\{m_0,m_1\} \subseteq {\{0,1\}}^\ell\)
    and every strategy of Eve using at most \(2^t\) computational steps, if we choose
    at random \(b\in{\{0,1\}}\) and a random key \(k\in{\{0,1\}}^n\), then the probability
    that Eve guesses \(m_b\) after seeing \(E_k(m_b)\) is at most \(1/2+2^{-t}\).
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 一个加密方案 \((E,D)\) 如果对于每一对不同的明文 \(\{m_0,m_1\} \subseteq {\{0,1\}}^\ell\) 和Eve使用的最多
    \(2^t\) 计算步骤的策略，如果我们随机选择 \(b\in{\{0,1\}}\) 和一个随机密钥 \(k\in{\{0,1\}}^n\)，那么Eve在看到
    \(E_k(m_b)\) 后猜测 \(m_b\) 的概率至多为 \(1/2+2^{-t}\)，则它具有 *\(t\) 比特计算安全性^([1](#fn:1))。
- en: Having learned our lesson, let’s try to see that this strategy does give us
    the kind of conditions we desired. In particular, let’s verify that this definition
    implies the analogous condition to perfect secrecy.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 吸取了教训后，让我们来看看这种策略是否确实给我们带来了我们想要的条件。特别是，让我们验证这个定义是否意味着与完美保密类似的条件。
- en: If \((E,D)\) has \(t\) bits of computational secrecy as per [Definition 2.2](#compsecconcdef)
    then for every subset \(M \subseteq {\{0,1\}}^\ell\) and every strategy of Eve
    using at most \(2^t-(100\ell+100)\) computational steps, if we choose at random
    \(m\in M\) and a random key \(k\in{\{0,1\}}^n\), then the probability that Eve
    guesses \(m\) after seeing \(E_k(m)\) is at most \(1/|M|+2^{-t+1}\).
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 如果 \((E,D)\) 根据[定义2.2](#compsecconcdef)具有 \(t\) 比特计算安全性，那么对于每一个 \(M \subseteq
    {\{0,1\}}^\ell\) 的子集和Eve使用的最多 \(2^t-(100\ell+100)\) 计算步骤的策略，如果我们随机选择 \(m\in M\)
    和一个随机密钥 \(k\in{\{0,1\}}^n\)，那么Eve在看到 \(E_k(m)\) 后猜测 \(m\) 的概率至多为 \(1/|M|+2^{-t+1}\)。
- en: Before proving this theorem note that it gives us a pretty strong guarantee.
    In the exercises we will strengthen it even further showing that no matter what
    prior information Eve had on the message before, she will never get any non-negligible
    new information on it.^([2](#fn:2)) One way to phrase it is that if the sender
    used a \(256\)-bit secure encryption to encrypt a message, then your chances of
    getting to learn any additional information about it before the universe collapses
    are more or less the same as the chances that a fairy will materialize and whisper
    it in your ear.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 在证明这个定理之前，请注意，它给我们提供了一个相当强的保证。在练习中，我们将进一步强化它，表明无论Eve在消息之前有什么先验信息，她都不会得到任何非微不足道的新的信息。[2](#fn:2)
    一种表述方式是，如果发送者使用256位安全加密来加密一条消息，那么在宇宙崩溃之前，你获得任何额外信息的概率与一个仙女突然出现并在你耳边低语它的概率大致相同。
- en: Before reading the proof, try to again review the proof of [Theorem 1.8](lec_01_introduction.html#twotomanythm),
    and see if you can generalize it yourself to the computational setting.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 在阅读证明之前，再次回顾[定理1.8](lec_01_introduction.html#twotomanythm)的证明，并看看你是否能自己将其推广到计算环境。
- en: 'The proof is rather similar to the equivalence of guessing one of two messages
    vs. one of many messages for perfect secrecy (i.e., [Theorem 1.8](lec_01_introduction.html#twotomanythm)).
    However, in the computational context we need to be careful in keeping track of
    Eve’s running time. In the proof of [Theorem 1.8](lec_01_introduction.html#twotomanythm)
    we showed that if there exists:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 证明与完美保密（即[定理1.8](lec_01_introduction.html#twotomanythm)）中猜测两个消息之一与猜测许多消息之一的等价性相当类似。然而，在计算环境中，我们需要小心跟踪Eve的运行时间。在[定理1.8](lec_01_introduction.html#twotomanythm)的证明中，我们表明如果存在：
- en: A subset \(M\subseteq {\{0,1\}}^\ell\) of messages
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 消息的子集 \(M\subseteq {\{0,1\}}^\ell\)
- en: and
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 和
- en: An adversary \(Eve:{\{0,1\}}^o\rightarrow{\{0,1\}}^\ell\) such that
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个对手 \(Eve:{\{0,1\}}^o\rightarrow{\{0,1\}}^\ell\)，使得
- en: \[ \Pr_{m{\leftarrow_{\tiny R}}M, k{\leftarrow_{\tiny R}}{\{0,1\}}^n}[ Eve(E_k(m))=m
    ] > 1/|M| \]
  id: totrans-28
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: \[ \Pr_{m{\leftarrow_{\tiny R}}M, k{\leftarrow_{\tiny R}}{\{0,1\}}^n}[ Eve(E_k(m))=m
    ] > 1/|M| \]
- en: Then there exist two messages \(m_0,m_1\) and an adversary \(Eve':{\{0,1\}}^o\rightarrow{\{0,1\}}^\ell\)
    such that \(\Pr_{b{\leftarrow_{\tiny R}}{\{0,1\}},k{\leftarrow_{\tiny R}}{\{0,1\}}^n}[Eve'(E_k(m_b))=m_b
    ] > 1/2\).
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，存在两个消息 \(m_0,m_1\) 和一个对手 \(Eve':{\{0,1\}}^o\rightarrow{\{0,1\}}^\ell\)，使得
    \(\Pr_{b{\leftarrow_{\tiny R}}{\{0,1\}},k{\leftarrow_{\tiny R}}{\{0,1\}}^n}[Eve'(E_k(m_b))=m_b
    ] > 1/2\)。
- en: 'To adapt this proof to the computational setting and complete the proof of
    the current theorem it suffices to show that:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 为了将这个证明适应计算环境并完成当前定理的证明，只需证明：
- en: If the probability of \(Eve\) succeeding was \(\tfrac{1}{|M|} + \epsilon\) then
    the probability of \(Eve'\) succeeding is at least \(\tfrac{1}{2} + \epsilon/2\).
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果 \(Eve\) 成功的概率是 \(\tfrac{1}{|M|} + \epsilon\)，那么 \(Eve'\) 成功的概率至少是 \(\tfrac{1}{2}
    + \epsilon/2\)。
- en: If \(Eve\) can be computed in \(T\) operations, then \(Eve'\) can be computed
    in \(T + 100\ell + 100\) operations.
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果 \(Eve\) 可以在 \(T\) 次操作中计算出来，那么 \(Eve'\) 可以在 \(T + 100\ell + 100\) 次操作中计算出来。
- en: This will imply that if \(Eve\) ran in polynomial time and had polynomial advantage
    over \(1/|M|\) in guessing a plaintext chosen from \(M\), then \(Eve'\) would
    run in polynomial time and have polynomial advantage over \(1/2\) in guessing
    a plaintext chosen from \(\{ m_0,m_1\}\).
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 这将意味着，如果 \(Eve\) 在多项式时间内运行，并且在猜测从 \(M\) 中选择的明文时相对于 \(1/|M|\) 有多项式优势，那么 \(Eve'\)
    将会在多项式时间内运行，并且在猜测从 \(\{ m_0,m_1\}\) 中选择的明文时相对于 \(1/2\) 有多项式优势。
- en: The first item can be shown by simply doing the same proof more carefully, keeping
    track how the advantage over \(\tfrac{1}{|M|}\) for \(Eve\) translates into an
    advantage over \(\tfrac{1}{2}\) for \(Eve'\). As the world’s most annoying saying
    goes, doing this is an excellent exercise for the reader.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 第一项可以通过更仔细地做同样的证明来证明，同时跟踪 \(Eve\) 对 \(\tfrac{1}{|M|}\) 的优势如何转化为 \(Eve'\) 对 \(\tfrac{1}{2}\)
    的优势。正如世界上最烦人的说法，这样做是读者的一个极好的练习。
- en: The second item is obtained by looking at the definition of \(Eve'\) from that
    proof. On input \(c\), \(Eve'\) computed \(m=Eve(c)\) (which costs \(T\) operations),
    checked if \(m=m_0\) (which costs, say, at most \(5\ell\) operations), and then
    outputted either \(1\) or a random bit (which is a constant, say at most \(100\)
    operations).
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 第二项是通过查看该证明中 \(Eve'\) 的定义获得的。在输入 \(c\) 时，\(Eve'\) 计算 \(m=Eve(c)\)（这需要 \(T\)
    次操作），检查 \(m=m_0\)（这最多需要 \(5\ell\) 次操作），然后输出 \(1\) 或一个随机位（这是一个常数，最多 \(100\) 次操作）。
- en: Proof by reduction
  id: totrans-36
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 通过归纳法证明
- en: 'The proof of [Theorem 2.3](#twotomanycomp) is a model to how a great many of
    the results in this course will look like. Generally we will have many theorems
    of the form:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: '[定理 2.3](#twotomanycomp) 的证明是本课程中许多结果外观的一个模型。通常，我们将有许多形式为：'
- en: “If there is a scheme \(S'\) satisfying security definition \(X'\) then there
    is a scheme \(S\) satisfying security definition \(X\)”
  id: totrans-38
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “如果存在一个满足安全性定义 \(X'\) 的方案 \(S'\)，那么存在一个满足安全性定义 \(X\) 的方案 \(S\)”
- en: 'In the context of [Theorem 2.3](#twotomanycomp), \(X''\) was “having \(t\)
    bits of security” (in the context distinguishing between encryptions of two ciphertexts)
    and \(X\) was the more general notion of hardness of getting a non-trivial advantage
    over guessing for an encryption of a random \(m\in M\). While in [Theorem 2.3](#twotomanycomp)
    the encryption scheme \(S\) was the same as \(S''\), this need not always be the
    case. However, all of the proofs of such statements will have the same global
    structure— we will assume towards a contradiction, that there is an efficient
    adversary strategy \(Eve\) demonstrating that the scheme \(S\) violates the security
    notion \(X\), and build from \(Eve\) a strategy \(Eve''\) demonstrating that \(S''\)
    violates \(X''\). This is such an important point that it deserves repeating:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 在 [定理 2.3](#twotomanycomp) 的上下文中，\(X'\) 是“具有 \(t\) 比特的安全性”（在区分两个密文加密的上下文中）而
    \(X\) 是一个更一般的概念，即获取一个随机 \(m\in M\) 加密的非平凡优势的难度。虽然 [定理 2.3](#twotomanycomp) 中的加密方案
    \(S\) 与 \(S'\) 相同，但这并不总是必须的。然而，所有这样的证明都将具有相同的全局结构——我们将假设存在一个高效的对手策略 \(Eve\)，它表明方案
    \(S\) 违反了安全性概念 \(X\)，并从 \(Eve\) 构建一个策略 \(Eve'\)，表明 \(S'\) 违反了 \(X'\)。这是一个非常重要的观点，值得重复：
- en: '*The way you show that if \(S''\) is secure then \(S\) is secure is by giving
    a transformation from an adversary that breaks \(S\) into an adversary that breaks
    \(S''\)*'
  id: totrans-40
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*要证明如果 \(S''\) 是安全的，那么 \(S\) 也是安全的，你需要给出一个从破坏 \(S\) 的对手到破坏 \(S''\) 的对手的转换*'
- en: 'For computational secrecy, we will always want that \(Eve''\) will be efficient
    if \(Eve\) is, and that will usually be the case because \(Eve''\) will simply
    use \(Eve\) as a black box, which it will not invoke too many times, and addition
    will use some polynomial time preprocessing and postprocessing. The more challenging
    parts of such proofs are typically:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 对于计算机密性，我们始终希望如果“爱娃”（Eve）是高效的，那么“爱娃'”（Eve'）也是高效的，这通常会是情况，因为“爱娃'”（Eve'）将简单地使用“爱娃”（Eve）作为一个黑盒，它不会调用太多次，并且加法将使用一些多项式时间的前处理和后处理。这类证明的更具挑战性的部分通常是：
- en: Coming up with the strategy \(Eve'\).
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 制定策略“爱娃'”。
- en: Analyzing the probability of success and in particular showing that if \(Eve\)
    had non-negligible advantage then so will \(Eve'\).
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分析成功的概率，特别是证明如果“爱娃”（Eve）有不可忽视的优势，那么“爱娃'”（Eve'）也会有。
- en: '![](../Images/f09f3c55b1ffeaf0912a31606bc5db2c.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f09f3c55b1ffeaf0912a31606bc5db2c.png)'
- en: '??: We show that the security of \(S''\) implies the security of \(S\) by transforming
    an adversary \(Eve\) breaking \(S\) into an adversary \(Eve''\) breaking \(S''\).'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '??: 我们通过将攻击者“爱娃”（Eve）破解“S”转换为攻击者“爱娃''”（Eve''）破解“S''”来证明“S''”的安全性意味着“S”的安全性。'
- en: Note that, just like in the context of NP completeness or uncomputability reductions,
    security reductions work *backwards*. That is, we construct the scheme \(S\) based
    on the scheme \(S'\), but then prove that we can transform an algorithm breaking
    \(S\) into an algorithm breaking \(S'\). Just like in computational complexity,
    it can sometimes be hard to keep track of the direction of the reduction. In fact,
    cryptographic reductions can be even subtler, since they involve an interplay
    of several entities (for example, sender, receiver, and adversary) and probabilistic
    choices (e.g., over the message to be sent and the key).
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: '注意，就像在NP完全性或不可计算性减少的背景下一样，安全性减少是*逆向*工作的。也就是说，我们基于方案“S''”构建方案“S”，然后证明我们可以将破解“S”的算法转换为破解“S''”的算法。就像在计算复杂性中一样，有时很难跟踪减少的方向。事实上，密码学减少可能更加微妙，因为它们涉及多个实体（例如，发送者、接收者和攻击者）和概率选择（例如，关于要发送的消息和密钥）。 '
- en: The asymptotic approach
  id: totrans-47
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 渐近方法
- en: 'For practical security, often every bit of security matters. We want our keys
    to be as short as possible and our schemes to be as fast as possible while satisfying
    a particular level of security. In practice we would usually like to ensure that
    when we use a smallish security parameter such as \(n\) in the few hundreds or
    thousands then:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 对于实际安全性，通常每个比特的安全性都很重要。我们希望我们的密钥尽可能短，我们的方案尽可能快，同时满足特定的安全级别。在实践中，我们通常会希望确保当我们使用几百或几千的小安全参数\(n\)时：
- en: The *honest parties* (the parties running the encryption and decryption algorithms)
    are extremely efficient, something like 100-1000 cycles per byte of data processed.
    In theory terms we would want them be using an \(O(n)\) or at worst \(O(n^2)\)
    time algorithms with not-too-big hidden constants.
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*诚实方*（运行加密和解密算法的各方）非常高效，大约每处理一个字节数据需要100-1000个周期。从理论的角度来看，我们希望他们使用\(O(n)\)或最坏情况下\(O(n^2)\)的时间算法，并且隐藏常数不太大。'
- en: We want to protect against *adversaries* (the parties trying to break the encryption)
    that have much vaster computational capabilities. A typical modern encryption
    is built so that using standard key sizes it can withstand the combined computational
    powers of all computers on earth for several decades. In theory terms we would
    want the time to break the scheme to be \(2^{\Omega(n)}\) (or if not, at least
    \(2^{\Omega(\sqrt{n})}\) or \(2^{\Omega(n^{1/3})}\)) with not too small hidden
    constants.
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们希望保护那些具有更强大计算能力的*对手*（试图破解加密的各方）。典型的现代加密算法设计得如此之好，以至于使用标准密钥大小，它可以在几十年的时间里抵御地球上所有计算机的计算能力的联合攻击。从理论的角度来看，我们希望破解该方案的时间为\(2^{\Omega(n)}\)（或者如果不是，至少为\(2^{\Omega(\sqrt{n})}\)或\(2^{\Omega(n^{1/3})}\)），并且隐藏常数不太小。
- en: For implementing cryptography in practice, the tradeoff between security and
    efficiency can be crucial. However, for understanding the *principles* behind
    cryptography, keeping track of concrete security can be a distraction, and so
    just like we do in algorithms courses, we will use *asymptotic analysis* (also
    known as *big Oh notation*) to sweep many of those details under the carpet.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 在实践中实现密码学时，安全和效率之间的权衡可能至关重要。然而，为了理解密码学背后的*原理*，关注具体的安全性可能会分散注意力，因此就像我们在算法课程中所做的那样，我们将使用*渐近分析*（也称为*大O表示法*）来掩盖许多这些细节。
- en: 'To a first approximation, there will be only two types of running times we
    will encounter in this course:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 在本课程中，我们将遇到两种类型的运行时间：
- en: '*Polynomial* running time of the form \(d\cdot n^c\) for some constants \(d,c>0\)
    (or \(poly(n)=n^{O(1)}\) for short), which we will consider as *efficient*.'
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 形式为 \(d\cdot n^c\) 的 *多项式* 运行时间，其中 \(d,c>0\) 是某些常数（或简写为 \(poly(n)=n^{O(1)}\)），我们将将其视为
    *有效*。
- en: '*Exponential* running time of the form \(2^{d\cdot n^{\epsilon}}\) for some
    constants \(d,\epsilon >0\) (or \(2^{n^{\Omega(1)}}\) for short) which we will
    consider as *infeasible*.^([3](#fn:3))'
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 形式为 \(2^{d\cdot n^{\epsilon}}\) 的 *指数* 运行时间，其中 \(d,\epsilon >0\) 是某些常数（或简写为
    \(2^{n^{\Omega(1)}}\)），我们将将其视为 *不可行*。^([3](#fn:3))
- en: Another way to say it is that in this course, if a scheme has any security at
    all, it will have at least \(n^{\epsilon}\) bits of security where \(n\) is the
    length of the key and \(\epsilon>0\) is some absolute constant such as \(\epsilon=1/3\).
    Hence in this course, whenever you hear the term “super polynomial”, you can equate
    it in your mind with “exponential” and you won’t be far off the truth.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种说法是，在本课程中，如果一个方案有任何安全性，它至少将拥有 \(n^{\epsilon}\) 比特的安全性，其中 \(n\) 是密钥长度，而 \(\epsilon>0\)
    是某个绝对常数，例如 \(\epsilon=1/3\)。因此，在本课程中，每当您听到“超多项式”这个术语时，您可以在心中将其等同于“指数”，这样您就不会离真相太远。
- en: These are not all the theoretically possible running times. One can have intermediate
    functions such as \(n^{\log n}\) though we will generally not encounter those.
    To make things clean (and to correspond to standard terminology), we will generally
    associate “efficient computation” with *polynomial time* in \(n\) where \(n\)
    is either its input length or the key size (the key size and input length will
    always be polynomially related, and so this choice won’t matter). We want our
    algorithms (encryption, decryption, etc.) to be computable in polynomial time,
    but to require *super polynomial time* to break.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 这些并不是所有可能的理论运行时间。可以存在中间函数，例如 \(n^{\log n}\)，尽管我们通常不会遇到这些。为了使事情变得清晰（并且与标准术语相对应），我们通常将“有效计算”与
    \(n\) 的 *多项式时间* 相关联，其中 \(n\) 是其输入长度或密钥大小（密钥大小和输入长度总是多项式相关的，因此这种选择不会影响）。我们希望我们的算法（加密、解密等）能够在多项式时间内计算，但需要
    *超多项式时间* 来破解。
- en: '**Negligible probabilities.** In cryptography, we care not just about the running
    time of the adversary but also about their probability of success (which should
    be as small as possible). If \(\mu:\N \rightarrow [0,\infty)\) is a function (which
    we’ll often think of as corresponding to the adversary’s probability of success
    or advantage over the trivial probability, as a function of the key size \(n\))
    then we say that \(\mu(n)\) is *negligible* if it’s smaller than the inverse of
    every (positive) polynomial. Our security definitions will have the following
    form:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: '**可忽略的概率**。在密码学中，我们不仅关心对手的运行时间，还关心他们成功的概率（这应该尽可能小）。如果 \(\mu:\N \rightarrow
    [0,\infty)\) 是一个函数（我们通常将其视为对应于对手的成功概率或相对于平凡概率的优势，作为密钥大小 \(n\) 的函数），那么我们说 \(\mu(n)\)
    是 *可忽略的*，如果它小于每个（正）多项式的倒数。我们的安全定义将具有以下形式：'
- en: '*"Scheme \(S\) is secure if for every polynomial \(p(\cdot)\) and \(p(n)\)
    time adversary \(Eve\), there is some negligible function \(\mu\) such that the
    probability that \(Eve\) succeeds in the security game for \(S\) is at most \(trivial
    + \mu(n)\)*"'
  id: totrans-58
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “方案 \(S\) 是安全的，如果对于每一个多项式 \(p(\cdot)\) 和 \(p(n)\) 时间的对手 \(Eve\)，都存在某个可忽略函数 \(\mu\)，使得
    \(Eve\) 在 \(S\) 的安全性游戏中的成功概率至多为 \(trivial + \mu(n)\)*”
- en: We now make these notions more formal.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在将这些概念更加形式化。
- en: A function \(\mu:\mathbb{N} \rightarrow [0,\infty)\) is *negligible* if for
    every polynomial \(p:\N \rightarrow \N\) there exists \(N \in \N\) such that \(\mu(n)
    < \tfrac{1}{p(n)}\) for every \(n>N\).^([4](#fn:4))
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 一个函数 \(\mu:\mathbb{N} \rightarrow [0,\infty)\) 是 *可忽略的*，如果对于每个多项式 \(p:\N \rightarrow
    \N\)，存在 \(N \in \N\)，使得对于每个 \(n>N\)，\(\mu(n) < \tfrac{1}{p(n)}\)。^([4](#fn:4))
- en: 'The following exercise provides a good way to get some comfort with this definition:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 以下练习提供了一个很好的方法来熟悉这个定义：
- en: Let \(\mu:\N \rightarrow [0,\infty)\) be a negligible function. Prove that for
    every polynomials \(p,q:\R \rightarrow \R\) with non-negative coefficients such
    that \(p(0) = 0\), the function \(\mu':\N \rightarrow [0,\infty)\) defined as
    \(\mu'(n) = p(\mu(q(n)))\) is negligible.
  id: totrans-62
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 设 \(\mu:\N \rightarrow [0,\infty)\) 是一个可忽略函数。证明对于每个非负系数的多项式 \(p,q:\R \rightarrow
    \R\)，使得 \(p(0) = 0\)，函数 \(\mu':\N \rightarrow [0,\infty)\) 定义为 \(\mu'(n) = p(\mu(q(n)))\)
    是可忽略的。
- en: Let \(\mu:\N \rightarrow [0,\infty)\). Prove that \(\mu\) is negligible if and
    only if for every constant \(c\), \(\lim_{n \rightarrow \infty} n^c \mu(n) = 0\).
  id: totrans-63
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 设 \(\mu:\N \rightarrow [0,\infty)\)。证明 \(\mu\) 是可忽略的当且仅当对于每一个常数 \(c\)，\(\lim_{n
    \rightarrow \infty} n^c \mu(n) = 0\)。
- en: The above definitions could be confusing if you haven’t encountered asymptotic
    analysis before. Reading the beginning of Chapter 3 (pages 43-51) in the KL book,
    as well as the mathematical background lecture in my [intro to TCS notes](http://www.introtcs.org/public/index.html)
    can be extremely useful. As a rule of thumb, if every time you see the word “polynomial”
    you imagine the function \(n^{10}\) and every time you see the word “negligible”
    you imagine the function \(2^{-\sqrt{n}}\) then you will get the right intuition.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你之前没有遇到过渐近分析，上述定义可能会让人困惑。阅读KL书籍的第3章开头（第43-51页），以及我在[我的TCS入门笔记](http://www.introtcs.org/public/index.html)中的数学背景讲座，可能会非常有用。作为一个经验法则，如果你每次看到“多项式”这个词就想象函数
    \(n^{10}\)，每次看到“可忽略”这个词就想象函数 \(2^{-\sqrt{n}}\)，那么你就会得到正确的直觉。
- en: What you need to remember is that negligible is much smaller than any inverse
    polynomial, while polynomials are closed under multiplication, and so we have
    the “equations”
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要记住的是，可忽略的比任何逆多项式都要小得多，而多项式在乘法下是封闭的，因此我们得到“等式”
- en: \[negligible\times polynomial = negligible\]
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: \[可忽略 \times 多项式 = 可忽略\]
- en: and
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 和
- en: \[polynomial \times polynomial = polynomial\]
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: \[多项式 \times 多项式 = 多项式\]
- en: As mentioned, in practice people really want to get as close as possible to
    \(n\) bits of security with an \(n\) bit key, but we would be happy as long as
    the security grows with the key, so when we say a scheme is “secure” you can think
    of it having \(\sqrt{n}\) bits of security (though any function growing faster
    than \(\log n\) would be fine as well).
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，在实践中，人们真正想要的是尽可能接近 \(n\) 比特的安全性，使用 \(n\) 比特密钥，但只要安全性随着密钥的增长而增长，我们就会感到满意，所以当我们说一个方案是“安全的”时，你可以认为它具有
    \(\sqrt{n}\) 比特的安全性（尽管任何比 \(\log n\) 增长得快的函数也行）。
- en: From now on, we will require all of our encryption schemes to be *efficient*
    which means that the encryption and decryption algorithms should run in polynomial
    time. Security will mean that any efficient adversary can make at most a negligible
    gain in the probability of guessing the message over its a priori probability.^([5](#fn:5))
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 从现在起，我们将要求所有的加密方案都应该是**高效的**，这意味着加密和解密算法应该在多项式时间内运行。安全性意味着任何高效的对手在猜测消息的概率上最多只能获得可忽略的增益，相对于其先验概率.^([5](#fn:5))
- en: 'We can now formally define computational secrecy in asymptotic terms:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在可以正式用渐近术语定义计算安全性：
- en: An encryption scheme \((E,D)\) is *computationally secret* if for every two
    distinct plaintexts \(\{m_0,m_1\} \subseteq {\{0,1\}}^\ell\) and every efficient
    (i.e., polynomial time) strategy of Eve, if we choose at random \(b\in{\{0,1\}}\)
    and a random key \(k\in{\{0,1\}}^n\), then the probability that Eve guesses \(m_b\)
    after seeing \(E_k(m_b)\) is at most \(1/2+\mu(n)\) for some negligible function
    \(\mu(\cdot)\).
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 如果对于每一对不同的明文 \(\{m_0,m_1\} \subseteq {\{0,1\}}^\ell\) 和每一个高效的（即多项式时间）的伊娃策略，如果我们随机选择
    \(b\in{\{0,1\}}\) 和一个随机密钥 \(k\in{\{0,1\}}^n\)，那么伊娃在看到 \(E_k(m_b)\) 后猜测 \(m_b\)
    的概率至多为 \(1/2+\mu(n)\)，其中 \(\mu(\cdot)\) 是某个可忽略的函数。\(*计算安全性*
- en: Counting number of operations.
  id: totrans-73
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 计算操作的数量。
- en: One more detail that we’ve so far ignored is what does it mean exactly for a
    function to be computable using at most \(T\) operations. Fortunately, when we
    don’t really care about the difference between \(T\) and, say, \(T^2\), then essentially
    every reasonable definition gives the same answer.^([6](#fn:6)) Formally, we can
    use the notions of Turing machines, Boolean circuits, or straightline programs
    to define complexity. For concreteness, let’s define that a function \(F:{\{0,1\}}^n\rightarrow{\{0,1\}}^m\)
    has complexity at most \(T\) if there is a Boolean circuit that computes \(F\)
    using at most \(T\) Boolean gates (say AND/OR/NOT or NAND; alternatively you can
    choose your favorite universal gate sets.) We will often also consider *probabilistic*
    functions in which case we allow the circuit a RAND gate that outputs a single
    random bit (though this in general does not give extra power). The fact that we
    only care about asymptotics means you don’t really need to think of gates when
    arguing in cryptography. However, it is comforting to know that this notion has
    a precise mathematical formulation.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 我们至今尚未考虑的一个细节是，一个函数使用至多 \(T\) 次操作可计算究竟意味着什么。幸运的是，当我们并不关心 \(T\) 和，比如说，\(T^2\)
    之间的差异时，几乎所有合理的定义都会给出相同的答案.^([6](#fn:6)) 形式上，我们可以使用图灵机、布尔电路或直线程序的概念来定义复杂性。为了具体化，让我们定义一个函数
    \(F:{\{0,1\}}^n\rightarrow{\{0,1\}}^m\) 的复杂性至多为 \(T\)，如果存在一个布尔电路使用至多 \(T\) 个布尔门（比如
    AND/OR/NOT 或 NAND；或者你也可以选择你喜欢的通用门集合）来计算 \(F\)。我们通常会考虑 *概率性* 函数，在这种情况下，我们允许电路有一个
    RAND 门，它输出一个随机的比特（尽管这通常不会提供额外的能力）。我们只关心渐近性的事实意味着在密码学论证中你实际上不需要考虑门。然而，知道这个概念有一个精确的数学表述是令人欣慰的。
- en: '**Uniform vs non-uniform models.** While many computational texts focus on
    models such as Turing machines, in cryptography it is more convenient to use Boolean
    circuits which are a [non uniform model](https://introtcs.org/public/lec_11_running_time.html#nonuniformcompsec)
    of computation in the sense that we allow a different circuit for every given
    input length. The reasons are the following:'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: '**均匀与非均匀模型。** 虽然许多计算文本关注图灵机等模型，但在密码学中，使用布尔电路更为方便，因为布尔电路是计算的非均匀模型 [non uniform
    model](https://introtcs.org/public/lec_11_running_time.html#nonuniformcompsec)，我们允许对于每个给定的输入长度使用不同的电路。原因如下：'
- en: Circuits can express *finite* computation, while Turing machines only make sense
    for computing on arbitrarily large input lengths, and so we can make sense of
    notions such as “\(t\) bits of computational security”.
  id: totrans-76
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 电路可以表达 *有限* 的计算，而图灵机只适用于任意大输入长度的计算，因此我们可以理解诸如“\(t\) 比特的计算安全性”这样的概念。
- en: Circuits allow the notion of “hardwiring” whereby if we can compute a certain
    function \(F:\{0,1\}^{n+s} \rightarrow \{0,1\}^m\) using a circuit of \(T\) gates
    and have a string \(w \in \{0,1\}^s\) then we can compute the function \(x \mapsto
    F(xw)\) using \(T\) gates as well. This is useful in many cryptograhic proofs.
  id: totrans-77
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 电路允许“硬连线”的概念，即如果我们可以使用 \(T\) 个门的电路来计算某个函数 \(F:\{0,1\}^{n+s} \rightarrow \{0,1\}^m\)，并且有一个字符串
    \(w \in \{0,1\}^s\)，那么我们也可以使用 \(T\) 个门来计算函数 \(x \mapsto F(xw)\)。这在许多密码学证明中很有用。
- en: One can build the theory of cryptography using Turing machines as well, but
    it is more cumbersome.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 也可以使用图灵机来构建密码学理论，但这更为繁琐。
- en: Later on in the course, both our cryptographic schemes and the adversaries will
    extend beyond simple functions that map an input to an output, and we will consider
    *interactive algorithms* that exchange messages with one another. Such an algorithm
    can be implemented using circuits or Turing machines that take as input the prior
    state and the history of messages up to a certain point in the interaction, and
    output the next message in the interaction. The number of operations used in such
    a strategy is the total number of gates used in computing all the messages.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 在课程的后期，我们的密码方案和对手都将超越简单的将输入映射到输出的函数，我们将考虑 *交互算法*，这些算法会相互交换消息。这样的算法可以使用电路或图灵机来实现，这些电路或图灵机以先前的状态和交互过程中某个点的消息历史作为输入，并输出交互中的下一个消息。这种策略使用的操作数是计算所有消息所使用的总门数。
- en: Our first conjecture
  id: totrans-80
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我们第一个猜想
- en: 'We are now ready to make our first conjecture:'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在可以提出我们的第一个猜想：
- en: '**The Cipher Conjecture:**^([7](#fn:7)) There exists a computationally secret
    encryption scheme \((E,D)\) (where \(E,D\) are efficient) with length function
    \(\ell(n)=n+1\).'
  id: totrans-82
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**密码猜想：**^([7](#fn:7)) 存在一个计算上保密的加密方案 \((E,D)\)（其中 \(E,D\) 是高效的），其长度函数为 \(\ell(n)=n+1\)。'
- en: 'A *conjecture* is a well defined mathematical statement which (1) we believe
    is true but (2) don’t know yet how to prove. Proving the cipher conjecture will
    be a great achievement and would in particular settle the P vs NP question, which
    is arguably *the* fundamental question of computer science. That is, the following
    theorem is known:'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: '*猜想* 是一个定义良好的数学陈述，我们（1）相信它是正确的，但（2）还不知道如何证明。证明密码猜想将是一项伟大的成就，并且将特别解决 P 与 NP
    问题，这可以说是计算机科学的基本问题。也就是说，以下定理是已知的：'
- en: If \(P=\ensuremath{\mathit{NP}}\) then there does not exist a computationally
    secret encryption with efficient \(E\) and \(D\) and where the message is longer
    than the key.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 如果 \(P=\ensuremath{\mathit{NP}}\)，那么不存在一种计算上安全的加密方式，它具有高效的 \(E\) 和 \(D\)，并且消息长度大于密钥长度。
- en: We just sketch the proof, as this is not the focus of this course. If \(P=\ensuremath{\mathit{NP}}\)
    then whenever we have a loop that searches through some domain to find some string
    that satisfies a particular property (like the loop in the `Distinguish` subroutine
    above that searches over all keys) then this loop can be sped up *exponentially*
    .
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 我们只是简要地概述了证明过程，因为这不是本课程的重点。如果 \(P=\ensuremath{\mathit{NP}}\)，那么每当我们在某个域中搜索某个满足特定属性（如上面
    `Distinguish` 子例程中的循环遍历所有密钥）的字符串时，这个循环可以被指数级地加速。
- en: While it is very widely believed that \(P\neq \ensuremath{\mathit{NP}}\), at
    the moment we do not know how to *prove* this, and so have to settle for accepting
    the cipher conjecture as essentially an axiom, though we will see later in this
    course that we can show it follows from some seemingly weaker conjectures.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管人们普遍认为 \(P\neq \ensuremath{\mathit{NP}}\)，但目前我们还不知道如何 *证明* 这一点，因此只能接受密码猜想作为基本上是一个公理，尽管我们将在本课程后面看到，我们可以证明它可以从一些看似更弱的猜想中得出。
- en: 'There are several reasons to believe the cipher conjecture. We now briefly
    mention some of them:'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 有几个理由相信密码猜想。我们现在简要地提一下其中的一些：
- en: '*Intuition:* If the cipher conjecture is false then it means that for *every*
    possible cipher we can make the exponential time attack described above become
    efficient. It seems “too good to be true” in a similar way that the assumption
    that P=NP seems too good to be true.'
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*直觉*：如果密码猜想是错误的，那么这意味着对于 *每一个* 可能的密码，我们都可以使上述指数时间攻击变得有效。这听起来“好得令人难以置信”，就像假设
    P=NP 似乎好得令人难以置信一样。'
- en: '*Concrete candidates:* As we will see in the next lecture, there are several
    concrete candidate ciphers using keys shorter than messages for which despite
    *tons* of effort, no one knows how to break them. Some of them are widely used
    and hence governments and other benign or not so benign organizations have every
    reason to invest huge resources in trying to break them. Despite that as far as
    we know (and we know a little more after Edward Snowden’s revelations) there is
    no significant break known for the most popular ciphers. Moreover, there are other
    ciphers that can be based on canonical mathematical problems such as factoring
    large integers or decoding random linear codes that are immensely interesting
    in their own right, independently of their cryptographic applications.'
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*具体候选者*：正如我们将在下一节课中看到的，有一些具体的候选密码，它们使用比消息更短的密钥，尽管投入了大量的努力，但没有人知道如何破解它们。其中一些被广泛使用，因此政府和其他善良或不那么善良的组织有充分的理由投入大量资源来尝试破解它们。尽管如此，据我们所知（以及爱德华·斯诺登揭露之后我们知道得更多），对于最流行的密码，还没有出现重大的破解。此外，还有一些密码可以基于规范数学问题，例如分解大整数或解码随机线性码，这些密码本身就有极大的兴趣，独立于它们的密码学应用。'
- en: '*Minimalism:* Clearly if the cipher conjecture is false then we also don’t
    have a secure encryption with a message, say, twice as long as the key. But it
    turns out the cipher conjecture is in fact *necessary* for essentially every cryptographic
    primitive, including not just private key and public key encryptions but also
    digital signatures, hash functions, pseudorandom generators, and more. That is,
    if the cipher conjecture is false then to a large extent cryptography does not
    exist, and so we essentially have to assume this conjecture if we want to do any
    kind of cryptography.'
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*极简主义*：显然，如果密码猜想是错误的，那么我们也就没有一种安全的加密方式，比如消息长度是密钥的两倍。但事实上，密码猜想对于几乎所有加密原语都是必要的，包括不仅仅是私钥和公钥加密，还有数字签名、哈希函数、伪随机生成器等等。也就是说，如果密码猜想是错误的，那么在很大程度上，密码学就不存在了，因此我们基本上必须假设这个猜想，如果我们想要进行任何形式的密码学的话。'
- en: Why care about the cipher conjecture?
  id: totrans-91
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么关心密码猜想？
- en: '*“Give me a place to stand, and I shall move the world”* Archimedes, circa
    250 BC'
  id: totrans-92
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*“给我一个立足点，我将移动世界”* 阿基米德，约公元前250年'
- en: Every perfectly secure encryption scheme is clearly also computationally secret,
    and so if we required a message of size \(n\) instead \(n+1\), then the conjecture
    would have been trivially satisfied by the one-time pad. However, having a message
    longer than the key by just a single bit does not seem that impressive. Sure,
    if we used such a scheme with \(128\)-bit long keys, our communication will be
    smaller by a factor of \(128/129\) (or a saving of about \(0.8\%\)) over the one-time
    pad, but this doesn’t seem worth the risk of using an unproven conjecture. However,
    it turns out that if we assume this rather weak condition, we can actually get
    a computationally secret encryption scheme with a message of size \(p(n)\) for
    *every* polynomial \(p(\cdot)\). In essence, we can fix a single \(n\)-bit long
    key and communicate securely as many bits as we want!
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 每个完美安全的加密方案显然也是计算安全的，因此如果我们需要大小为 \(n\) 的消息而不是 \(n+1\)，那么一次垫方案就可以轻易地满足这个猜想。然而，消息比密钥长仅一个比特似乎并不那么令人印象深刻。当然，如果我们使用128位长密钥的这种方案，我们的通信将比一次垫方案小128/129倍（或者说节省了大约0.8%），但这似乎不值得冒使用未经证明的猜想的风险。然而，结果证明，如果我们假设这个相当弱的条件，我们实际上可以为每个多项式
    \(p(\cdot)\) 获得一个消息大小为 \(p(n)\) 的计算安全加密方案！本质上，我们可以固定一个 \(n\) 位长的密钥，并安全地通信任意多的比特！
- en: 'Moreover, this is just the beginning. There is a huge range of other useful
    cryptographic tools that we can obtain from this seemingly innocent conjecture:
    (We will see what all these names and some of these reductions mean later in the
    course.)'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，这仅仅是开始。从这个看似无害的猜想中，我们可以获得大量其他有用的密码学工具：（我们将在课程中稍后看到所有这些名称以及一些这些归约的含义。）
- en: '![](../Images/8e9fd07ef6c8422c8dbebe2598897fa5.png)'
  id: totrans-95
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/8e9fd07ef6c8422c8dbebe2598897fa5.png)'
- en: '12.1: Web of reductions between notions equivalent to ciphers with larger than
    key messages'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 12.1：与具有大于密钥消息的密码等价的概念之间的归约网
- en: We will soon see the first of the many reductions we’ll learn in this course.
    Together this “web of reductions” forms the scientific core of cryptography, connecting
    many of the core concepts and enabling us to construct increasingly sophisticated
    tools based on relatively simple “axioms” such as the cipher conjecture.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将很快看到本课程中我们将学习的许多归约中的第一个。这个“归约网”构成了密码学的科学核心，连接了许多核心概念，并使我们能够基于相对简单的“公理”如密码猜想构建越来越复杂的工具。
- en: 'Prelude: Computational Indistinguishability'
  id: totrans-98
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 预言：计算不可区分性
- en: 'The task of Eve in breaking an encryption scheme is to *distinguish* between
    an encryption of \(m_0\) and an encryption of \(m_1\). It turns out to be useful
    to consider this question of when two distributions are *computationally indistinguishable*
    more broadly:'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: Eve 破解加密方案的任务是区分 \(m_0\) 的加密和 \(m_1\) 的加密。考虑两个分布何时是*计算不可区分的*这个问题是有用的：
- en: Let \(X\) and \(Y\) be two distributions over \({\{0,1\}}^m\). We say that \(X\)
    and \(Y\) are \((T,\epsilon)\)*-computationally indistinguishable*, denoted by
    \(X \approx_{T,\epsilon} Y\), if for every function \(D:\{0,1\}^m \rightarrow
    \{0,1\}\) computable with at most \(T\) operations,
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 设 \(X\) 和 \(Y\) 是 \({\{0,1\}}^m\) 上的两个分布。我们说 \(X\) 和 \(Y\) 是 \((T,\epsilon)\)*-计算不可区分的*，记为
    \(X \approx_{T,\epsilon} Y\)，如果对于每个最多 \(T\) 次操作可计算函数 \(D:\{0,1\}^m \rightarrow
    \{0,1\}\)，
- en: \[ | \Pr[ D(X) = 1 ] - \Pr[ D(Y) = 1 ] | \leq \epsilon \;. \]
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: \[ | \Pr[ D(X) = 1 ] - \Pr[ D(Y) = 1 ] | \leq \epsilon \;. \]
- en: 'Prove that for every \(X,Y\) and \(T,\epsilon\) as above \(X \approx_{T,\epsilon}
    Y\) if and only if for every \(\leq T\)-operation computable \(Eve\), the probability
    that \(Eve\) wins in the following game is at most \(1/2 + \epsilon/2\):'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 证明对于上述的每个 \(X,Y\) 和 \(T,\epsilon\)，如果且仅当对于每个最多 \(T\) 次操作可计算的 \(\leq T\)-操作 \(Eve\)，\(Eve\)
    在以下游戏中获胜的概率至多为 \(1/2 + \epsilon/2\)：
- en: We pick \(b \leftarrow_R \{0,1\}\).
  id: totrans-103
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们从 \(\{0,1\}\) 中随机选择 \(b \leftarrow_R \{0,1\}\)。
- en: If \(b=0\), we let \(w \leftarrow_R X\). If \(b=1\), we let \(w \leftarrow_R
    Y\).
  id: totrans-104
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果 \(b=0\)，我们让 \(w \leftarrow_R X\)。如果 \(b=1\)，我们让 \(w \leftarrow_R Y\)。
- en: We give \(Eve\) the input \(w\), and \(Eve\) outputs \(b' \in \{0,1\}\).
  id: totrans-105
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们给 \(Eve\) 输入 \(w\)，\(Eve\) 输出 \(b' \in \{0,1\}\)。
- en: \(Eve\) *wins* if \(b=b'\).
  id: totrans-106
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果 \(b=b'\)，\(Eve\) *获胜*。
- en: Working out this exercise on your own is a great way to get comfortable with
    computational indistinguishability, which is a fundamental notion.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 独立完成这个练习是熟悉计算不可区分性的好方法，这是一个基本概念。
- en: For every function \(Eve:\{0,1\}^m \rightarrow \{0,1\}\), let \(p_X = \Pr[ Eve(X)=1]\)
    and \(p_Y = \Pr[Eve(Y)=1]\).
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 对于每个函数 \(Eve:\{0,1\}^m \rightarrow \{0,1\}\)，令 \(p_X = \Pr[ Eve(X)=1]\) 和 \(p_Y
    = \Pr[Eve(Y)=1]\)。
- en: 'Then the probability that \(Eve\) wins the game is:'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，Eve 赢得游戏的概率是：
- en: \[\Pr[ b=0](1-p_X) + \Pr[b=1] p_Y\]
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: \[\Pr[ b=0](1-p_X) + \Pr[b=1] p_Y\]
- en: and since \(\Pr[b=0]=\Pr[b=1]=1/2\) this is
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 由于 \(\Pr[b=0]=\Pr[b=1]=1/2\)，因此这可以表示为
- en: \[ \tfrac{1}{2} - \tfrac{1}{2}p_X + \tfrac{1}{2}p_Y = \tfrac{1}{2} + \tfrac{1}{2}(p_Y-p_X)
    \]
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: \[ \tfrac{1}{2} - \tfrac{1}{2}p_X + \tfrac{1}{2}p_Y = \tfrac{1}{2} + \tfrac{1}{2}(p_Y-p_X)
    \]
- en: We see that \(Eve\) wins the game with success \(1/2 + \epsilon/2\) if and only
    if
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以看到，Eve 以 \(1/2 + \epsilon/2\) 的成功率赢得游戏，当且仅当
- en: \[ \Pr[ Eve(Y) = 1 ] - \Pr[Eve(X)=1] = \epsilon \;. \]Since \(\Pr[ Eve(Y) =
    1 ] - \Pr[Eve(X)=1] \leq \left| \Pr[ Eve(X) = 1 ] - \Pr[Eve(Y)=1] \right|\), this
    already shows that if \(X\) and \(Y\) are \((T,\epsilon)\)-indistinguishable then
    \(Eve\) will win the game with probability at most \(\epsilon/2\).
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: \[ \Pr[ Eve(Y) = 1 ] - \Pr[Eve(X)=1] = \epsilon \;. \]由于 \(\Pr[ Eve(Y) = 1 ]
    - \Pr[Eve(X)=1] \leq \left| \Pr[ Eve(X) = 1 ] - \Pr[Eve(Y)=1] \right|\)，这已经表明如果
    \(X\) 和 \(Y\) 是 \((T,\epsilon)\)-不可区分的，那么 Eve 将以最多 \(\epsilon/2\) 的概率赢得游戏。
- en: For the other direction, assume that \(X\) and \(Y\) are *not* computationally
    indistinguishable and let \(Eve\) be a \(T\) time operation function such that
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 对于另一个方向，假设 \(X\) 和 \(Y\) 不是计算上不可区分的，并设 \(Eve\) 是一个 \(T\) 时间操作函数，使得
- en: \[ \left| \Pr[ Eve(X) = 1 ] - \Pr[Eve(Y)=1] \right| \geq \epsilon \;. \]
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: \[ \left| \Pr[ Eve(X) = 1 ] - \Pr[Eve(Y)=1] \right| \geq \epsilon \;. \]
- en: Then by definition of absolute value, there are two options. Either \(\Pr[ Eve(X)
    = 1 ] - \Pr[Eve(Y)=1] \geq \epsilon\) in which case \(Eve\) wins the game with
    probability at least \(1/2 + \epsilon/2\). Otherwise \(\Pr[ Eve(X) = 1 ] - \Pr[Eve(Y)=1]
    \leq -\epsilon\), in which case the function \(Eve'(w)=1-Eve(w)\) (which is just
    as easy to compute) wins the game with probability at least \(1/2 + \epsilon/2\).
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 根据绝对值的定义，有两种可能的情况。要么 \(\Pr[ Eve(X) = 1 ] - \Pr[Eve(Y)=1] \geq \epsilon\)，在这种情况下，Eve
    以至少 \(1/2 + \epsilon/2\) 的概率赢得游戏。否则，\(\Pr[ Eve(X) = 1 ] - \Pr[Eve(Y)=1] \leq -\epsilon\)，在这种情况下，函数
    \(Eve'(w)=1-Eve(w)\)（同样容易计算）以至少 \(1/2 + \epsilon/2\) 的概率赢得游戏。
- en: Note that above we assume that the class of “functions computable in at most
    \(T\) operations” is *closed under negation*, in the sense that if \(F\) is in
    this class, then \(1-F\) is also. For standard Boolean circuits, this can be done
    if we don’t count negation gates (which can change the total circuit size by at
    most a factor of two), or we can allow for \(Eve'\) to require a constant additional
    number of operations, in which case the exercise is still essentially true but
    is slightly more cumbersome to state.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，上面我们假设“最多 \(T\) 次操作可计算”的函数类在否定下是**封闭的**，即如果 \(F\) 属于这个类，那么 \(1-F\) 也属于。对于标准的布尔电路，如果我们不计否定门（这最多可以改变总电路大小的一个因子），或者允许
    Eve' 需要一个常数额外的操作数，在这种情况下，练习仍然是基本上正确的，但表述稍微繁琐一些。
- en: As we did with computational secrecy, we can also define an asymptotic definition
    of computational indistinguishability.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 就像我们在计算机密性中所做的那样，我们也可以定义计算不可区分性的渐近定义。
- en: Let \(m:\N \rightarrow \N\) be some function and let \(\{ X_n \}_{n\in \N}\)
    and \(\{ Y_n \}_{n\in \N}\) be two sequences of distributions such that \(X_n\)
    and \(Y_n\) are distributions over \(\{0,1\}^{m(n)}\).
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 设 \(m:\N \rightarrow \N\) 是某个函数，并设 \(\{ X_n \}_{n\in \N}\) 和 \(\{ Y_n \}_{n\in
    \N}\) 是两个分布序列，使得 \(X_n\) 和 \(Y_n\) 是 \(\{0,1\}^{m(n)}\) 上的分布。
- en: We say that \(\{ X_n \}_{n\in \N}\) and \(\{ Y_n \}_{n\in\N}\) are *computationally
    indistinguishable*, denoted by \(\{ X_n \}_{n\in\N} \approx \{ Y_n \}_{n\in\N}\),
    if for every polynomial \(p:\N \rightarrow \N\) and sufficiently large \(n\),
    \(X_n \approx_{p(n), 1/p(n)} Y_n\).
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 我们说 \(\{ X_n \}_{n\in \N}\) 和 \(\{ Y_n \}_{n\in\N}\) 在计算上是不可区分的，表示为 \(\{ X_n
    \}_{n\in\N} \approx \{ Y_n \}_{n\in\N}\)，如果对于每个多项式 \(p:\N \rightarrow \N\) 和足够大的
    \(n\)，\(X_n \approx_{p(n), 1/p(n)} Y_n\)。
- en: 'Solving the following asymptotic analog of [Solved Exercise 2.1](#compindex)
    is a good way to get comfortable with the asymptotic definition of computational
    indistinguishability:'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 解决以下渐近类似 [已解决练习 2.1](#compindex) 是熟悉计算不可区分性渐近定义的好方法：
- en: 'Let \(\{ X_n \}_{n\in \N},\{Y_n\}_{n\in \N}\) and \(m:\N \rightarrow \N\) be
    as above. Then \(\{ X_n \}_{n\in\N} \approx \{ Y_n \}_{n\in\N}\) if and only if
    for every polynomial-time \(Eve\), there is some negligible function \(\mu\) such
    that \(Eve\) wins the following game with probability at most \(1/2 + \mu(n)\):'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 设 \(\{ X_n \}_{n\in \N},\{Y_n\}_{n\in \N}\) 和 \(m:\N \rightarrow \N\) 如上所述。那么
    \(\{ X_n \}_{n\in\N} \approx \{ Y_n \}_{n\in\N}\) 当且仅当对于每个多项式时间 \(Eve\)，存在某个可忽略函数
    \(\mu\)，使得 \(Eve\) 在以下游戏中获胜的概率最多为 \(1/2 + \mu(n)\)：
- en: We pick \(b \leftarrow_R \{0,1\}\).
  id: totrans-124
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们随机选择 \(b \leftarrow_R \{0,1\}\)。
- en: If \(b=0\), we let \(w \leftarrow_R X_n\). If \(b=1\), we let \(w \leftarrow_R
    Y_n\).
  id: totrans-125
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果 \(b=0\)，我们让 \(w \leftarrow_R X_n\)。如果 \(b=1\)，我们让 \(w \leftarrow_R Y_n\)。
- en: We give \(Eve\) the input \(w\), and \(Eve\) outputs \(b' \in \{0,1\}\).
  id: totrans-126
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们给 \(Eve\) 输入 \(w\)，\(Eve\) 输出 \(b' \in \{0,1\}\)。
- en: \(Eve\) *wins* if \(b=b'\).
  id: totrans-127
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: \(Eve\) *获胜* 如果 \(b=b'\)。
- en: '**Dropping the index \(n\).** Since the index \(n\) of our distributions would
    often be clear from context (indeed in most cases it will be the length of the
    key), we will sometimes drop it from our notation. So if \(X\) and \(Y\) are two
    random variables that depend on some index \(n\), we will say that \(X\) is computationally
    indistinguishable from \(Y\) (denoted as \(X \approx Y\)) when the sequences \(\{
    X_n \}_{n\in \N}\) and \(\{ Y_n \}_{n\in\N}\) are computationally indistinguishable.'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: '**省略索引 \(n\)。** 由于我们分布的索引 \(n\) 通常可以从上下文中清楚地看出（实际上在大多数情况下它将是密钥的长度），我们有时会从我们的符号中省略它。所以如果
    \(X\) 和 \(Y\) 是依赖于某个索引 \(n\) 的两个随机变量，那么当序列 \(\{ X_n \}_{n\in \N}\) 和 \(\{ Y_n
    \}_{n\in\N}\) 是计算不可区分的时，我们将说 \(X\) 计算上与 \(Y\) 不可区分（表示为 \(X \approx Y\))。'
- en: 'We can use computational indistinguishability to phrase the definition of computational
    secrecy more succinctly:'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以使用计算不可区分性来更简洁地表述计算机密性的定义：
- en: Let \((E,D)\) be a valid encryption scheme. Then \((E,D)\) is computationally
    secret if and only if for every two messages \(m_0,m_1 \in \{0,1\}^\ell\),
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 设 \((E,D)\) 是一个有效的加密方案。那么 \((E,D)\) 是计算机密的当且仅当对于每两条消息 \(m_0,m_1 \in \{0,1\}^\ell\)，
- en: \[ \{ E_k(m_0) \}_{n\in \N} \approx \{ E_k(m_1) \}_{n\in\N}\]where each of these
    two distributions is obtained by sampling a random \(k{\leftarrow_{\tiny R}}{\{0,1\}}^n\).
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: \[ \{ E_k(m_0) \}_{n\in \N} \approx \{ E_k(m_1) \}_{n\in\N}\]其中这些两个分布都是通过从 \(\{0,1\}}^n\)
    中随机采样 \(k{\leftarrow_{\tiny R}}\) 得到的。
- en: Working out the proof is an excellent way to make sure you understand both the
    definition of computational secrecy and computational indistinguishability, and
    hence we leave it as an exercise.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 推导证明是一个确保你理解计算机密性和计算不可区分性定义的绝佳方法，因此我们将其留作练习。
- en: 'One intuition for computational indistinguishability is that it is related
    to some notion of *distance*. If two distributions are computationally indistinguishable,
    then we can think of them as “very close” to one another, at least as far as efficient
    observers are concerned. Intuitively, if \(X\) is close to \(Y\) and \(Y\) is
    close to \(Z\) then \(X\) should be close to \(Z\).^([8](#fn:8)) Similarly if
    four distributions \(X,X'',Y,Y''\) satisfy that \(X\) is close to \(Y\) and \(X''\)
    is close to \(Y''\), then you might expect that the distribution \((X,X'')\) where
    we take two independent samples from \(X\) and \(X''\) respectively, is close
    to the distribution \((Y,Y'')\) where we take two independent samples from \(Y\)
    and \(Y''\) respectively. We will now verify that these intuitions are in fact
    correct:'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 计算不可区分性的一个直观理解是它与某种“距离”概念相关。如果两个分布是计算不可区分的，那么我们可以认为它们彼此“非常接近”，至少对有效观察者来说是这样。直观上，如果
    \(X\) 接近 \(Y\) 且 \(Y\) 接近 \(Z\)，那么 \(X\) 应该接近 \(Z\)。^([8](#fn:8)) 类似地，如果四个分布 \(X,X',Y,Y'\)
    满足 \(X\) 接近 \(Y\) 且 \(X'\) 接近 \(Y'\)，那么你可能会期望从 \(X\) 和 \(X'\) 分别独立抽取的两个样本的分布 \((X,X')\)
    与从 \(Y\) 和 \(Y'\) 分别独立抽取的两个样本的分布 \((Y,Y')\) 是接近的。我们现在将验证这些直觉实际上是正确的：
- en: Suppose \(X_1 \approx_{T,\epsilon} X_2 \approx_{T,\epsilon} \cdots \approx_{T,\epsilon}
    X_m\). Then \(X_1 \approx_{T, (m-1)\epsilon} X_m\).
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 假设 \(X_1 \approx_{T,\epsilon} X_2 \approx_{T,\epsilon} \cdots \approx_{T,\epsilon}
    X_m\). 那么 \(X_1 \approx_{T, (m-1)\epsilon} X_m\).
- en: Suppose that there exists a \(T\) time \(Eve\) such that
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 假设存在一个 \(T\) 时间 \(Eve\) 使得
- en: \[ |\Pr[ Eve(X_1)=1] - \Pr[ Eve(X_m)=1]| > (m-1)\epsilon \;. \]
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: \[ |\Pr[ Eve(X_1)=1] - \Pr[ Eve(X_m)=1]| > (m-1)\epsilon \;. \]
- en: Write
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 写作
- en: \[ \Pr[ Eve(X_1)=1] - \Pr[ Eve(X_m)=1] = \sum_{i=1}^{m-1} \left( \Pr[ Eve(X_i)=1]
    - \Pr[ Eve(X_{i+1})=1] \right) \;. \]
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: \[ \Pr[ Eve(X_1)=1] - \Pr[ Eve(X_m)=1] = \sum_{i=1}^{m-1} \left( \Pr[ Eve(X_i)=1]
    - \Pr[ Eve(X_{i+1})=1] \right) \;. \]
- en: Thus,
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，
- en: \[ \sum_{i=1}^{m-1} \left| \Pr[ Eve(X_i)=1] - \Pr[ Eve(X_{i+1})=1] \right| >
    (m-1)\epsilon \]and hence in particular there must exist some \(i\in\{1,\ldots,m-1\}\)
    such that\[ \left| \Pr[ Eve(X_i)=1] - \Pr[ Eve(X_{i+1})=1] \right| > \epsilon
    \]contradicting the assumption that \(\{ X_i \} \approx_{T,\epsilon} \{ X_{i+1}
    \}\) for all \(i\in\{1,\ldots,m-1\}\).
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: \[ \sum_{i=1}^{m-1} \left| \Pr[ Eve(X_i)=1] - \Pr[ Eve(X_{i+1})=1] \right| >
    (m-1)\epsilon \]因此，特别地，必须存在某个 \(i\in\{1,\ldots,m-1\}\) 使得\[ \left| \Pr[ Eve(X_i)=1]
    - \Pr[ Eve(X_{i+1})=1] \right| > \epsilon \]这与假设对于所有 \(i\in\{1,\ldots,m-1\}\)，\(\{
    X_i \} \approx_{T,\epsilon} \{ X_{i+1} \}\) 相矛盾。
- en: Suppose that \(X_1,\ldots,X_\ell,Y_1,\ldots,Y_\ell\) are distributions over
    \({\{0,1\}}^n\) such that \(X_i \approx_{T,\epsilon} Y_i\). Then \((X_1,\ldots,X_\ell)
    \approx_{T-10\ell n,\ell\epsilon} (Y_1,\ldots,Y_\ell)\).
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 假设 \(X_1,\ldots,X_\ell,Y_1,\ldots,Y_\ell\) 是 \({\{0,1\}}^n\) 上的分布，使得 \(X_i \approx_{T,\epsilon}
    Y_i\)。那么 \((X_1,\ldots,X_\ell) \approx_{T-10\ell n,\ell\epsilon} (Y_1,\ldots,Y_\ell)\)。
- en: For every \(i\in\{0,\ldots,\ell\}\) we define \(H_i\) to be the distribution
    \((X_1,\ldots,X_i,Y_{i+1},\ldots,Y_\ell)\). Clearly \(H_\ell = (X_1,\ldots,X_\ell)\)
    and \(H_0 = (Y_1,\ldots,Y_\ell)\). We will prove that for every \(i\), \(H_{i-1}
    \approx_{T-10\ell n,\epsilon} H_i\), and the proof will then follow from the triangle
    inequality (can you see why?). Indeed, suppose towards the sake of contradiction
    that there was some \(i\in \{1,\ldots,\ell\}\) and some \(T-10\ell n\)-time \(Eve':{\{0,1\}}^{n\ell}\rightarrow{\{0,1\}}\)
    such that
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 对于每个 \(i\in\{0,\ldots,\ell\}\)，我们定义 \(H_i\) 为分布 \((X_1,\ldots,X_i,Y_{i+1},\ldots,Y_\ell)\)。显然
    \(H_\ell = (X_1,\ldots,X_\ell)\) 和 \(H_0 = (Y_1,\ldots,Y_\ell)\)。我们将证明对于每个 \(i\)，\(H_{i-1}
    \approx_{T-10\ell n,\epsilon} H_i\)，然后证明将遵循三角不等式（你能看到为什么吗？）。实际上，假设为了矛盾的假设，存在某个
    \(i\in \{1,\ldots,\ell\}\) 和某个 \(T-10\ell n\) 时间的 \(Eve':{\{0,1\}}^{n\ell}\rightarrow{\{0,1\}}\)，使得
- en: \[ \left| {\mathbb{E}}[ Eve'(H_{i-1}) ] - {\mathbb{E}}[ Eve'(H_i) ] \right|
    > \epsilon\;. \]
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: \[ \left| {\mathbb{E}}[ Eve'(H_{i-1}) ] - {\mathbb{E}}[ Eve'(H_i) ] \right|
    > \epsilon\;. \]
- en: In other words
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说
- en: \[ \left| {\mathbb{E}}_{X_1,\ldots,X_{i-1},Y_i,\ldots,Y_\ell}[ Eve'(X_1,\ldots,X_{i-1},Y_i,\ldots,Y_\ell)
    ] - {\mathbb{E}}_{X_1,\ldots,X_i,Y_{i+1},\ldots,Y_\ell}[ Eve'(X_1,\ldots,X_i,Y_{i+1},\ldots,Y_\ell)
    ] \right| > \epsilon\;. \]
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: \[ \left| {\mathbb{E}}_{X_1,\ldots,X_{i-1},Y_i,\ldots,Y_\ell}[ Eve'(X_1,\ldots,X_{i-1},Y_i,\ldots,Y_\ell)
    ] - {\mathbb{E}}_{X_1,\ldots,X_i,Y_{i+1},\ldots,Y_\ell}[ Eve'(X_1,\ldots,X_i,Y_{i+1},\ldots,Y_\ell)
    ] \right| > \epsilon\;. \]
- en: By linearity of expectation we can write the difference of these two expectations
    as
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 通过期望的线性，我们可以写出这两个期望的差为
- en: \[ {\mathbb{E}}_{X_1,\ldots,X_{i-1},X_i,Y_i,Y_{i+1},\ldots,Y_\ell}\left[ Eve'(X_1,\ldots,X_{i-1},Y_i,Y_{i+1},\ldots,Y_\ell)
    - Eve'(X_1,\ldots,X_{i-1},X_i,Y_{i+1},\ldots,Y_\ell) \right] \]
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: \[ {\mathbb{E}}_{X_1,\ldots,X_{i-1},X_i,Y_i,Y_{i+1},\ldots,Y_\ell}\left[ Eve'(X_1,\ldots,X_{i-1},Y_i,Y_{i+1},\ldots,Y_\ell)
    - Eve'(X_1,\ldots,X_{i-1},X_i,Y_{i+1},\ldots,Y_\ell) \right] \]
- en: By the *averaging principle*^([9](#fn:9)) this means that there exist some values
    \(x_1,\ldots,x_{i-1},y_{i+1},\ldots,y_\ell\) such that
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 根据*平均原理*^([9](#fn:9))，这意味着存在一些值 \(x_1,\ldots,x_{i-1},y_{i+1},\ldots,y_\ell\)，使得
- en: \[ \left|{\mathbb{E}}_{X_i,Y_i}\left[ Eve'(x_1,\ldots,x_{i-1},Y_i,y_{i+1},\ldots,y_\ell)
    - Eve'(x_1,\ldots,x_{i-1},X_i,y_{i+1},\ldots,y_\ell) \right]\right|>\epsilon \]Now
    \(X_i\) and \(Y_i\) are simply independent draws from the distributions \(X\)
    and \(Y\) respectively, and so if we define \(Eve(z) = Eve'(x_1,\ldots,x_{i-1},z,y_{i+1},\ldots,y_\ell)\)
    then \(Eve\) runs in time at most the running time of \(Eve'\) plus \(10\ell n\)^([10](#fn:10))
    and it satisfies\[ \left| {\mathbb{E}}_{X_i} [ Eve(X_i) ] - {\mathbb{E}}_{Y_i}
    [ Eve(Y_i) ] \right| > \epsilon \]contradicting the assumption that \(X_i \approx_{T,\epsilon}
    Y_i\).
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: \[ \left|{\mathbb{E}}_{X_i,Y_i}\left[ Eve'(x_1,\ldots,x_{i-1},Y_i,y_{i+1},\ldots,y_\ell)
    - Eve'(x_1,\ldots,x_{i-1},X_i,y_{i+1},\ldots,y_\ell) \right]\right|>\epsilon \]现在
    \(X_i\) 和 \(Y_i\) 分别是从分布 \(X\) 和 \(Y\) 中独立抽取的，因此如果我们定义 \(Eve(z) = Eve'(x_1,\ldots,x_{i-1},z,y_{i+1},\ldots,y_\ell)\)，那么
    \(Eve\) 的时间复杂度最多是 \(Eve'\) 的时间复杂度加上 \(10\ell n\)^([10](#fn:10))，并且它满足\[ \left|
    {\mathbb{E}}_{X_i} [ Eve(X_i) ] - {\mathbb{E}}_{Y_i} [ Eve(Y_i) ] \right| > \epsilon
    \]这与假设 \(X_i \approx_{T,\epsilon} Y_i\) 相矛盾。
- en: The above proof illustrates a powerful technique known as the *hybrid argument*
    whereby we show that two distribution \(C^0\) and \(C^1\) are close to each other
    by coming up with a sequence of distributions \(H_0,\ldots,H_t\) such that \(H_t
    = C^1, H_0 = C^0\), and we can argue that \(H_i\) is close to \(H_{i+1}\) for
    all \(i\). This type of argument repeats itself time and again in cryptography,
    and so it is important to get comfortable with it.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 上述证明展示了被称为*混合论证*的强大技术，通过提出一系列分布 \(H_0,\ldots,H_t\)，我们展示了两个分布 \(C^0\) 和 \(C^1\)
    相互接近。这些分布满足 \(H_t = C^1, H_0 = C^0\)，并且我们可以论证对于所有 \(i\)，\(H_i\) 都接近于 \(H_{i+1}\)。这种论证在密码学中反复出现，因此熟悉它非常重要。
- en: The Length Extension Theorem or Stream Ciphers
  id: totrans-151
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 长度扩展定理或流密码
- en: 'We now turn to show the *length extension theorem*, stating that if we have
    an encryption for \(n+1\)-length messages with \(n\)-length keys, then we can
    obtain an encryption with \(p(n)\)-length messages for every polynomial \(p(n)\).
    For a warm-up, let’s show the easier fact that we can transform an encryption
    such as above, into one that has keys of length \(tn\) and messages of length
    \(t(n+1)\) for every integer \(t\):'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在转向展示**长度扩展定理**，该定理指出，如果我们有一个对\(n+1\)长度消息使用\(n\)长度密钥的加密方案，那么我们可以获得一个对每个多项式\(p(n)\)长度消息的加密方案。为了热身，让我们展示一个更简单的事实：我们可以将上述加密方案转换为具有长度为\(tn\)的密钥和长度为\(t(n+1)\)的消息的加密方案，对于每个整数\(t\)：
- en: Suppose that \((E',D')\) is a computationally secret encryption scheme with
    \(n\) bit keys and \(n+1\) bit messages. Then the scheme \((E,D)\) where \(E_{k_1,\ldots,k_t}(m_1,\ldots,m_t)=
    (E'_{k_1}(m_1),\ldots, E'_{k_t}(m_t))\) and \(D_{k_1,\ldots,k_t}(c_1,\ldots,c_t)=
    (D'_{k_1}(c_1),\ldots, D'_{k_t}(c_t))\) is a computationally secret scheme with
    \(tn\) bit keys and \(t(n+1)\) bit messages.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 假设\((E',D')\)是一个具有\(n\)位密钥和\(n+1\)位消息的计算上保密的加密方案。那么方案\((E,D)\)，其中\(E_{k_1,\ldots,k_t}(m_1,\ldots,m_t)=
    (E'_{k_1}(m_1),\ldots, E'_{k_t}(m_t))\)和\(D_{k_1,\ldots,k_t}(c_1,\ldots,c_t)=
    (D'_{k_1}(c_1),\ldots, D'_{k_t}(c_t))\)是一个具有\(tn\)位密钥和\(t(n+1)\)位消息的计算上保密方案。
- en: This might seem “obvious” but in cryptography, even obvious facts are sometimes
    wrong, so it’s important to prove this formally. Luckily, this is a fairly straightforward
    implication of the fact that computational indisinguishability is preserved under
    many samples. That is, by the security of \((E',D')\) we know that for every two
    messages \(m,m' \in {\{0,1\}}^{n+1}\), \(E'_k(m) \approx E'_k(m')\) where \(k\)
    is chosen from the distribution \(U_n\). Therefore by the indistinguishability
    of many samples lemma, for every two tuples \(m_1,\ldots,m_t \in {\{0,1\}}^{n+1}\)
    and \(m'_1,\ldots,m'_t\in {\{0,1\}}^{n+1}\),
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能看起来“很明显”，但在密码学中，即使是明显的事实有时也是错误的，因此正式证明这一点很重要。幸运的是，这是计算不可区分性在许多样本下保持不变的事实的一个相当直接的推论。也就是说，根据\((E',D')\)的安全性，我们知道对于每两个消息\(m,m'
    \in {\{0,1\}}^{n+1}\)，\(E'_k(m) \approx E'_k(m')\)，其中\(k\)是从分布\(U_n\)中选择的。因此，根据许多样本不可区分的引理，对于每两个元组\(m_1,\ldots,m_t
    \in {\{0,1\}}^{n+1}\)和\(m'_1,\ldots,m'_t\in {\{0,1\}}^{n+1}\)，
- en: \[ (E'_{k_1}(m_1),\ldots,E'_{k_t}(m_t)) \approx (E'_{k_1}(m'_1),\ldots,E'_{k_t}(m'_t))
    \]
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: \[ (E'_{k_1}(m_1),\ldots,E'_{k_t}(m_t)) \approx (E'_{k_1}(m'_1),\ldots,E'_{k_t}(m'_t))
    \]
- en: for random \(k_1,\ldots,k_t\) chosen independently from \(U_n\) which is exactly
    the condition that \((E,D)\) is computationally secret.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 对于从\(U_n\)独立选择的随机\(k_1,\ldots,k_t\)，这正好是\((E,D)\)是计算上保密的条件。
- en: '**Randomized encryption scheme.** We can now prove the full length extension
    theorem. Before doing so, we will need to generalize the notion of an encryption
    scheme to allow a *randomized encryption scheme*. That is, we will consider encryption
    schemes where the encryption algorithm can “toss coins” in its computation. There
    is a crucial difference between key material and such “as hoc” (sometimes also
    known as “ephemeral”) randomness. Keys need to be not only chosen at random, but
    also shared in advance between the sender and receiver, and stored securely throughout
    their lifetime. The “coin tosses” used by a randomized encryption scheme are generated
    “on the fly” and are not known to the receiver, nor do they need to be stored
    long term by the sender. So, allowing such randomized encryption does not make
    a difference for most applications of encryption schemes. In fact, as we will
    see later in this course, randomized encryption is *necessary* for security against
    more sophisticated attacks such as chosen plaintext and chosen ciphertext attacks,
    as well as for obtaining secure *public key* encryptions. We will use the notation
    \(E_k(m;r)\) to denote the output of the encryption algorithm on key \(k\), message
    \(m\) and using internal randomness \(r\). We often suppress the notation for
    the randomness, and hence use \(E_k(m)\) to denote the random variable obtained
    by sampling a random \(r\) and outputting \(E_k(m;r)\).'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: '**随机化加密方案。** 我们现在可以证明完整的长度扩展定理。在这样做之前，我们需要将加密方案的概念推广到允许 *随机化加密方案*。也就是说，我们将考虑加密方案，其中加密算法可以在其计算中“掷硬币”。密钥材料和这种“临时”随机性之间存在一个关键的区别。密钥不仅需要随机选择，还需要在发送者和接收者之间预先共享，并在其整个生命周期内安全存储。随机化加密方案使用的“掷硬币”是“即时”生成的，接收者不知道，发送者也不需要长期存储。因此，允许这种随机化加密对大多数加密方案的应用没有影响。事实上，正如我们将在本课程后面看到的那样，随机化加密对于抵御更复杂的攻击（如选择明文攻击和选择密文攻击）以及获得安全的
    *公钥* 加密是 *必要的*。我们将使用 \(E_k(m;r)\) 来表示加密算法在密钥 \(k\)、消息 \(m\) 和内部随机性 \(r\) 上的输出。我们通常省略随机性的表示，因此使用
    \(E_k(m)\) 来表示通过采样随机 \(r\) 并输出 \(E_k(m;r)\) 得到的随机变量。'
- en: 'We can now show that given an encryption scheme with messages one bit longer
    than the key, we can obtain a (randomized) encryption scheme with arbitrarily
    long messages:'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们可以证明，给定一个消息长度比密钥长一比特的加密方案，我们可以获得一个具有任意长消息的（随机化）加密方案：
- en: Suppose that there exists a computationally secret encryption scheme \((E',D')\)
    with key length \(n\) and message length \(n+1\). Then for every polynomial \(t(n)\)
    there exists a (randomized) computationally secret encryption scheme \((E,D)\)
    with key length \(n\) and message length \(t(n)\).
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 假设存在一个计算上安全的加密方案 \((E',D')\)，其密钥长度为 \(n\)，消息长度为 \(n+1\)。那么对于每一个多项式 \(t(n)\)，都存在一个具有密钥长度
    \(n\) 和消息长度 \(t(n)\) 的（随机化）计算上安全的加密方案 \((E,D)\)。
- en: '![](../Images/e5b3ba407e1bbcef45022ba8fd6ffaeb.png)'
  id: totrans-160
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/e5b3ba407e1bbcef45022ba8fd6ffaeb.png)'
- en: '2.3: Constructing a cipher with \(t\) bit long messages from one with \(n+1\)
    long messages'
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: '2.3: 从长度为 \(n+1\) 的消息构造一个 \(t\) 位长消息的密码'
- en: This is perhaps our first example of a non trivial cryptographic theorem, and
    the blueprint for this proof will be one that we will follow time and again during
    this course. Please make sure you read this proof carefully and follow the argument.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能是我们第一个非平凡的密码学定理的例子，这个证明的蓝图将是我们在这门课程中反复遵循的。请确保你仔细阅读这个证明并理解论证。
- en: The construction, depicted in [Figure 2.3](#cipherlengthextensionfig), is actually
    quite natural and variants of it are used in practice for *stream ciphers*, which
    are ways to encrypt arbitrarily long messages using a fixed size key. The idea
    is that we use a key \(k_0\) of size \(n\) to encrypt **(1)** a fresh key \(k_1\)
    of size \(n\) and **(2)** one bit of the message. Now we can encrypt \(k_2\) using
    \(k_1\) and so on and so forth. We now describe the construction and analysis
    in detail.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 该构造，如图 [2.3](#cipherlengthextensionfig) 所示，实际上是非常自然的，其实际变体在实践中被用于 *流密码*，这是一种使用固定大小密钥加密任意长消息的方法。其思想是，我们使用一个大小为
    \(n\) 的密钥 \(k_0\) 来加密 **（1）** 一个大小为 \(n\) 的新密钥 \(k_1\) 和 **（2）** 消息的一位。现在我们可以使用
    \(k_1\) 来加密 \(k_2\)，依此类推。我们现在将详细描述该构造和分析。
- en: Let \(t=t(n)\). We are given a cipher \(E'\) which can encrypt \(n+1\)-bit long
    messages with an \(n\)-bit long key and we need to encrypt a \(t\)-bit long message
    \(m=(m_1,\ldots,m_t) \in {\{0,1\}}^t\). Our idea is simple (at least in hindsight).
    Let \(k_0 {\leftarrow_{\tiny R}}{\{0,1\}}^n\) be our key (which is chosen at random).
    To encrypt \(m\) using \(k_0\), the encryption function will choose \(t\) random
    strings \(k_1,\ldots, k_t {\leftarrow_{\tiny R}}{\{0,1\}}^n\). We will then encrypt
    the \(n+1\)-bit long message \((k_1,m_1)\) with the key \(k_0\) to obtain the
    ciphertext \(c_1\), then encrypt the \(n+1\)-bit long message \((k_2,m_2)\) with
    the key \(k_1\) to obtain the ciphertext \(c_2\), and so on and so forth until
    we encrypt the message \((k_t,m_t)\) with the key \(k_{t-1}\).^([11](#fn:11))
    We output \((c_1,\ldots,c_t)\) as the final ciphertext.^([12](#fn:12))
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 令\(t=t(n)\)。我们给定一个加密方案\(E'\)，它可以使用\(n\)比特长的密钥加密\(n+1\)比特长的消息，我们需要加密一个\(t\)比特长的消息\(m=(m_1,\ldots,m_t)
    \in {\{0,1\}}^t\)。我们的想法很简单（至少在事后看来）。令\(k_0 {\leftarrow_{\tiny R}}{\{0,1\}}^n\)为我们密钥（它是随机选择的）。要使用\(k_0\)加密\(m\)，加密函数将选择\(t\)个随机字符串\(k_1,\ldots,
    k_t {\leftarrow_{\tiny R}}{\{0,1\}}^n\)。然后我们将使用密钥\(k_0\)加密\(n+1\)比特长的消息\((k_1,m_1)\)以获得密文\(c_1\)，然后使用密钥\(k_1\)加密\(n+1\)比特长的消息\((k_2,m_2)\)以获得密文\(c_2\)，以此类推，直到我们使用密钥\(k_{t-1}\)加密消息\((k_t,m_t)\)以获得密文\(c_t\)。最后，我们将\((c_1,\ldots,c_t)\)输出为最终的密文。\^([11](#fn:11))\^([12](#fn:12))
- en: To decrypt \((c_1,\ldots,c_t)\) using the key \(k_0\), first decrypt \(c_1\)
    to learn \((k_1,m_1)\), then use \(k_1\) to decrypt \(c_2\) to learn \((k_2,m_2)\),
    and so on until we use \(k_{t-1}\) to decrypt \(c_t\) and learn \((k_t,m_t)\).
    Finally we can simply output \((m_1,\ldots,m_t)\).
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 要使用密钥\(k_0\)解密\((c_1,\ldots,c_t)\)，首先解密\(c_1\)以学习\((k_1,m_1)\)，然后使用\(k_1\)解密\(c_2\)以学习\((k_2,m_2)\)，以此类推，直到我们使用\(k_{t-1}\)解密\(c_t\)并学习\((k_t,m_t)\)。最后，我们可以简单地输出\((m_1,\ldots,m_t)\)。
- en: The above are clearly valid encryption and decryption algorithms, and hence
    the real question becomes *is it secure??*. The intuition is that \(c_1\) hides
    all information about \((k_1,m_1)\) and so in particular the first bit of the
    message is encrypted securely, and \(k_1\) still can be treated as an unknown
    random string even to an adversary that saw \(c_1\). Thus, we can think of \(k_1\)
    as a random secret key for the encryption \(c_2\), and hence the second bit of
    the message is encrypted securely, and so on and so forth.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 上述显然是有效的加密和解密算法，因此真正的问题变成了**它是否安全**？直观上，\(c_1\)隐藏了关于\((k_1,m_1)\)的所有信息，因此特别是消息的第一个比特被安全地加密了，\(k_1\)仍然可以被视为一个未知随机字符串，即使是对看到了\(c_1\)的对手也是如此。因此，我们可以将\(k_1\)视为加密\(c_2\)的随机密钥，因此消息的第二个比特被安全地加密了，以此类推。
- en: 'Our discussion above looks like a reasonable intuitive argument, but to make
    sure it’s true we need to give an actual proof. Let \(m,m'' \in {\{0,1\}}^t\)
    be two messages. We need to show that \(E_{U_n}(m) \approx E_{U_n}(m'')\). The
    heart of the proof will be the following claim:'
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 我们上面的讨论看起来像是一个合理的直观论证，但为了确保它是正确的，我们需要给出一个实际的证明。令\(m,m' \in {\{0,1\}}^t\)为两个消息。我们需要证明\(E_{U_n}(m)
    \approx E_{U_n}(m')\)。证明的核心将是以下断言：
- en: '**Claim:** Let \(\hat{E}\) be the algorithm that on input a message \(m\) and
    key \(k_0\) works like \(E\) except that its \(i^{th}\) block contains \(E''_{k_{i-1}}(k''_i,m_i)\)
    where \(k''_i\) is a *random* string in \({\{0,1\}}^n\), that is chosen *independently*
    of everything else including the key \(k_i\). Then, for every message \(m\in{\{0,1\}}^t\)'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: '**断言**：令\(\hat{E}\)为一种算法，它在输入消息\(m\)和密钥\(k_0\)时，除了其第\(i\)个块包含\(E''_{k_{i-1}}(k''_i,m_i)\)（其中\(k''_i\)是\({\{0,1\}}^n\)中的一个**随机**字符串，它是独立于其他所有东西选择的，包括密钥\(k_i\)）外，与\(E\)的工作方式相同。那么，对于每个消息\(m\in{\{0,1\}}^t\)'
- en: \[ E_{U_n}(m) \approx \hat{E}_{U_n}(m) \;\;(2.1) \;. \]
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: \[ E_{U_n}(m) \approx \hat{E}_{U_n}(m) \;\;(2.1) \;. \]
- en: Note that \(\hat{E}\) is not a valid encryption scheme since it’s not at all
    clear there is a decryption algorithm for it. It is just an hypothetical tool
    we use for the proof. Since both \(E\) and \(\hat{E}\) are randomized encryption
    schemes (with \(E\) using \((t-1)n\) bits of randomness for the ephemeral keys
    \(k_1,\ldots,k_{t-1}\) and \(\hat{E}\) using \((2t-1)n\) bits of randomness for
    the ephemeral keys \(k_1,\ldots,k_t,k'_2,\ldots,k'_t\)), we can also write [Equation
    2.1](#lengthextendclaimeq) as
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，\(\hat{E}\)不是一个有效的加密方案，因为它根本不清楚存在一个解密算法。它只是我们用于证明的一个假设工具。由于\(E\)和\(\hat{E}\)都是随机加密方案（\(E\)使用\((t-1)n\)比特的随机性用于临时密钥\(k_1,\ldots,k_{t-1}\)，而\(\hat{E}\)使用\((2t-1)n\)比特的随机性用于临时密钥\(k_1,\ldots,k_t,k'_2,\ldots,k'_t\)），我们也可以将[方程2.1](#lengthextendclaimeq)写成
- en: \[ E_{U_n}(m; U'_{tn}) \approx \hat{E}_{U_n}(m; U'_{(2t-1)n}) \]where we use
    \(U'_\ell\) to denote a random variable that is chosen uniformly at random from
    \(\{0,1\}^\ell\) and independently from the choice of \(U_n\) (which is chosen
    uniformly at random from \(\{0,1\}^n\)).
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: \[ E_{U_n}(m; U'_{tn}) \approx \hat{E}_{U_n}(m; U'_{(2t-1)n}) \] 其中我们使用 \(U'_\ell\)
    来表示一个从 \(\{0,1\}^\ell\) 中均匀随机选择的随机变量，并且独立于 \(U_n\) 的选择（它是从 \(\{0,1\}^n\) 中均匀随机选择的）。
- en: Once we prove the claim then we are done since we know that for every pair of
    messages \(m,m'\), \(E_{U_n}(m) \approx \hat{E}_{U_n}(m)\) and \(E_{U_n}(m') \approx
    \hat{E}_{U_n}(m')\) but \(\hat{E}_{U_n}(m) \approx \hat{E}_{U_n}(m')\) since \(\hat{E}\)
    is essentially the same as the \(t\)-times repetition scheme we analyzed above.
    Thus by the triangle inequality we can conclude that \(E_{U_n}(m) \approx E_{U_n}(m')\)
    as we desired.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我们证明了断言，那么我们就完成了，因为我们知道对于每对消息 \(m,m'\)， \(E_{U_n}(m) \approx \hat{E}_{U_n}(m)\)
    和 \(E_{U_n}(m') \approx \hat{E}_{U_n}(m')\)，但 \(\hat{E}_{U_n}(m) \approx \hat{E}_{U_n}(m')\)，因为
    \(\hat{E}\) 实质上与我们在上面分析的 \(t\) 次重复方案相同。因此，根据三角不等式，我们可以得出 \(E_{U_n}(m) \approx
    E_{U_n}(m')\)，正如我们所希望的。
- en: '**Proof of claim:** We prove the claim by the hybrid method. For \(j\in \{0,\ldots,
    t\}\), let \(H_j\) be the distribution of ciphertexts where in the first \(j\)
    blocks we act like \(\hat{E}\) and in the last \(t-j\) blocks we act like \(E\).
    That is, we choose \(k_0,\ldots,k_t,k''_1,\ldots,k''_t\) independently at random
    from \(U_n\) and the \(i^{th}\) block of \(H_j\) is equal to \(E''_{k_{i-1}}(k_i,m_i)\)
    if \(i>j\) and is equal to \(E''_{k_{i-1}}(k''_i,m_i)\) if \(i\leq j\). Clearly,
    \(H_t = \hat{E}_{U_n}(m)\) and \(H_0 = E_{U_n}(m)\) and so it suffices to prove
    that for every \(j\), \(H_{j-1} \approx H_j\). Indeed, let \(j \in \{1,\ldots,t\}\)
    and suppose towards the sake of contradiction that there exists an efficient \(Eve''\)
    such that'
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: '**断言的证明：** 我们通过混合方法来证明这个断言。对于 \(j\in \{0,\ldots, t\}\)，令 \(H_j\) 是密文分布，在前 \(j\)
    块中我们像 \(\hat{E}\) 一样行动，在最后 \(t-j\) 块中我们像 \(E\) 一样行动。也就是说，我们独立地从 \(U_n\) 中随机选择
    \(k_0,\ldots,k_t,k''_1,\ldots,k''_t\)，如果 \(i>j\)，则 \(H_j\) 的第 \(i\) 块等于 \(E''_{k_{i-1}}(k_i,m_i)\)，如果
    \(i\leq j\)，则等于 \(E''_{k_{i-1}}(k''_i,m_i)\)。显然，\(H_t = \hat{E}_{U_n}(m)\) 和 \(H_0
    = E_{U_n}(m)\)，因此我们只需要证明对于每个 \(j\)，\(H_{j-1} \approx H_j\)。实际上，令 \(j \in \{1,\ldots,t\}\)，假设为了矛盾的目的存在一个高效的
    \(Eve''\)，'
- en: \[ \left| {\mathbb{E}}[ Eve'(H_{j-1})] - {\mathbb{E}}[ Eve'(H_j)]\right|\geq
    \epsilon \;\;(*) \]
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: \[ \left| {\mathbb{E}}[ Eve'(H_{j-1})] - {\mathbb{E}}[ Eve'(H_j)]\right|\geq
    \epsilon \;\;(*) \]
- en: where \(\epsilon = \epsilon(n)\) is noticeable. By the averaging principle,
    there exists some fixed choice for \(k'_1,\ldots,k'_t,k_0,\ldots,k_{j-2},k_j,\ldots,k_t\)
    such that \((*)\) still holds. Note that in this case the only randomness is the
    choice of \(k_{j-1}{\leftarrow_{\tiny R}}U_n\) and moreover the first \(j-1\)
    blocks and the last \(t-j\) blocks of \(H_{j-1}\) and \(H_j\) would be identical
    and we can denote them by \(\alpha\) and \(\beta\) respectively and hence write
    \((*)\) as
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 \(\epsilon = \epsilon(n)\) 是可注意的。根据平均原理，存在某个固定的 \(k'_1,\ldots,k'_t,k_0,\ldots,k_{j-2},k_j,\ldots,k_t\)
    的选择，使得 \((*)\) 仍然成立。注意，在这种情况下，唯一的随机性是 \(k_{j-1}{\leftarrow_{\tiny R}}U_n\) 的选择，而且
    \(H_{j-1}\) 和 \(H_j\) 的前 \(j-1\) 块和最后 \(t-j\) 块将是相同的，我们可以分别用 \(\alpha\) 和 \(\beta\)
    来表示它们，因此可以将 \((*)\) 写作
- en: \[ \left| {\mathbb{E}}_{k_{j-1}}[ Eve'(\alpha,E'_{k_{j-1}}(k_j,m_j),\beta) -
    Eve'(\alpha,E'_{k_{j-1}}(k'_j,m_j),\beta) ] \right| \geq \epsilon \;\;(**) \]
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: \[ \left| {\mathbb{E}}_{k_{j-1}}[ Eve'(\alpha,E'_{k_{j-1}}(k_j,m_j),\beta) -
    Eve'(\alpha,E'_{k_{j-1}}(k'_j,m_j),\beta) ] \right| \geq \epsilon \;\;(**) \]
- en: But now consider the adversary \(Eve\) that is defined as \(Eve(c) = Eve'(\alpha,c,\beta)\).
    Then \(Eve\) is also efficient and by \((**)\) it can distinguish between \(E'_{U_n}(k_j,m_j)\)
    and \(E'_{U_n}(k'_j,m_j)\) thus contradicting the security of \((E',D')\). This
    concludes the proof of the claim and hence the theorem.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 但现在考虑定义的对手 \(Eve\)，其定义为 \(Eve(c) = Eve'(\alpha,c,\beta)\)。那么 \(Eve\) 也是高效的，并且根据
    \((**)\)，它可以区分 \(E'_{U_n}(k_j,m_j)\) 和 \(E'_{U_n}(k'_j,m_j)\)，从而与 \((E',D')\)
    的安全性相矛盾。这完成了对断言的证明，因此定理得证。
- en: 'Appendix: The computational model'
  id: totrans-178
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 附录：计算模型
- en: For concreteness sake let us give a precise definition of what it means for
    a function or probabilistic process \(f\) mapping \(\{0,1\}^n\) to \(\{0,1\}^m\)
    to be computable using \(T\) operations.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 为了具体起见，让我们给出一个精确的定义，即函数或概率过程 \(f\) 将 \(\{0,1\}^n\) 映射到 \(\{0,1\}^m\) 时，使用 \(T\)
    次操作可计算的含义。
- en: If you have taken any course on computational complexity (such as Harvard CS
    121), then this is the model of Boolean circuits, except that we also allow randomization.
  id: totrans-180
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你已经上过任何关于计算复杂性的课程（例如哈佛 CS 121），那么这就是布尔电路的模型，除了我们也允许随机化。
- en: If you have not taken such a course, you might simply take it on faith that
    it is possible to model what it means for an algorithm to be able to map an input
    \(x\) into an output \(f(x)\) using \(T\) “elementary operations”.
  id: totrans-181
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你没有上过这样的课程，你可能只是相信可以用 \(T\) 个“基本操作”来模拟算法将输入 \(x\) 映射到输出 \(f(x)\) 的含义。
- en: In both cases you might want to skip this appendix and only return to it if
    you find something confusing.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 在这两种情况下，你可能想跳过这个附录，只有在发现某些内容令人困惑时才返回。
- en: The model we use is a Boolean circuit that also has a \(\ensuremath{\mathit{RAND}}\)
    gate that outputs a random bit. We could use as the basic set of gates the standard
    \(\ensuremath{\mathit{AND}}\), \(\ensuremath{\mathit{OR}}\) and \(\ensuremath{\mathit{NOT}}\)
    but for simplicity we use the one-element set \(\ensuremath{\mathit{NAND}}\).
    We represent the circuit as a straightline program, but this is of course just
    a matter of convenience. As shown (for example) in the [CS 121 textbook](http://introtcs.org),
    these two representations are identical.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用的模型是一个布尔电路，它还有一个输出随机位的 \(\ensuremath{\mathit{RAND}}\) 门。我们可以使用标准的 \(\ensuremath{\mathit{AND}}\)、\(\ensuremath{\mathit{OR}}\)
    和 \(\ensuremath{\mathit{NOT}}\) 作为基本门集，但为了简单起见，我们使用只有一个元素的集合 \(\ensuremath{\mathit{NAND}}\)。我们用直线程序表示电路，但这当然只是方便起见。正如（例如）在
    [CS 121 教科书](http://introtcs.org) 中所示，这两种表示是相同的。
- en: 'A *probabilistic straightline program* consists of a sequence of lines, each
    one of them one of the following forms:'
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 一个*概率直线程序*由一系列行组成，其中每一行都是以下形式之一：
- en: '`foo = NAND(bar, baz)` where `foo`,`bar`,`baz` are variable identifiers.'
  id: totrans-185
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`foo = NAND(bar, baz)` 其中 `foo`,`bar`,`baz` 是变量标识符。'
- en: '`foo = RAND()` where `foo` is a variable identifier.'
  id: totrans-186
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`foo = RAND()` 其中 `foo` 是一个变量标识符。'
- en: Given a program \(\pi\), we say that its *size* is the number of lines it contains.
    Variables of the form `X[`\(i\)`]` or `Y[`\(j\)`]` are considered input and output
    variables respectively. If the input variables range from \(0\) to \(n-1\) and
    the output variables range from \(0\) to \(m-1\) then the program computes the
    probabilistic process that maps \(\{0,1\}^n\) to \(\{0,1\}^m\) in the natural
    way. If \(F\) is a (probabilistic or deterministic) map of \(\{0,1\}^n\) to \(\{0,1\}^m\),
    the *complexity* of \(F\) is the size of the smallest program \(P\) that computes
    it.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 给定一个程序 \(\pi\)，我们称其*大小*为它包含的行数。形式为 `X[`\(i\)`]` 或 `Y[`\(j\)`]` 的变量分别被认为是输入和输出变量。如果输入变量范围从
    \(0\) 到 \(n-1\)，输出变量范围从 \(0\) 到 \(m-1\)，则该程序以自然方式计算将 \(\{0,1\}^n\) 映射到 \(\{0,1\}^m\)
    的概率过程。如果 \(F\) 是将 \(\{0,1\}^n\) 映射到 \(\{0,1\}^m\) 的（概率或确定性）映射，则 \(F\) 的*复杂度*是计算它的最小程序
    \(P\) 的大小。
- en: If you haven’t taken a class such as CS121 before, you might wonder how such
    a simple model captures complicated programs that use loops, conditionals, and
    more complex data types than simply a bit in \(\{0,1\}\), not to mention some
    special purpose crypto-breaking devices that might involve tailor-made hardware.
    It turns out that it does (for the same reason we can compile complicated programming
    languages to run on silicon chips with a very limited instruction set). In fact,
    as far as we know, this model can capture even computations that happen in nature,
    whether it’s in a bee colony or the human brain (which contains about \(10^{10}\)
    neurons, so should in principle be simulatable by a program that has up to a few
    order of magnitudes of the same number of lines). Crucially, for cryptography,
    we care about such programs not because we want to actually run them, but because
    we want to argue about their *non existence*. If we have a process that cannot
    be computed by a straightline program of length shorter than \(2^{128}>10^{38}\)
    then it seems safe to say that a computer the size of the human brain (or even
    all the human and nonhuman brains on this planet) will not be able to perform
    it either.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你之前没有上过像 CS121 这样的课程，你可能会想知道这样一个简单的模型是如何捕捉使用循环、条件语句以及比 \(\{0,1\}\) 中的位更复杂的数据类型的复杂程序的。更不用说可能涉及定制硬件的特殊用途密码破解设备了。实际上，它确实可以（出于同样的原因，我们可以将复杂的编程语言编译到运行在具有非常有限的指令集的硅芯片上的程序）。事实上，据我们所知，这个模型甚至可以捕捉自然界中发生的计算，无论是蜜蜂群体还是人类大脑（包含大约
    \(10^{10}\) 个神经元，因此原则上可以通过具有相同数量级行数的程序来模拟）。关键的是，对于密码学来说，我们关心这样的程序并不是因为我们想真正运行它们，而是因为我们想论证它们的*不存在性*。如果我们有一个不能由长度小于
    \(2^{128}>10^{38}\) 的直线程序计算的过程，那么可以说，一个大小如人类大脑（甚至这个星球上所有人类和非人类大脑）的计算机也无法执行它。
- en: '**Advanced note: non uniformity.** The computational model we use in this class
    is [*non uniform*](https://introtcs.org/public/lec_11_running_time.html#nonuniformcompsec)
    (corresponding to Boolean circuits) as opposed to *uniform* (corresponding to
    Turing machines). If this distinction doesn’t mean anything to you, you can ignore
    it as it won’t play a significant role in what we do next. It basically means
    that we do allow our programs to have hardwired constants of \(poly(n)\) bits
    where \(n\) is the input/key length. In fact, to be precise, we will hold ourselves
    to a higher standard than our adversary, in the sense that we require our algorithms
    to be efficient in the stronger sense of being computable in uniform probabilistic
    polynomial time (for some fixed polynomial, often \(O(n)\) or \(O(n^2\))), while
    the adversary is allowed to use non uniformity.'
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: '**高级笔记：非均匀性**。我们在本课程中使用的计算模型是[*非均匀*](https://introtcs.org/public/lec_11_running_time.html#nonuniformcompsec)（对应布尔电路），而不是*均匀*（对应图灵机）。如果这个区别对你来说没有什么意义，你可以忽略它，因为它在我们接下来的工作中不会扮演重要角色。这基本上意味着我们允许我们的程序具有硬编码的
    \(poly(n)\) 位常数，其中 \(n\) 是输入/密钥长度。实际上，为了更精确，我们将对自己提出比对手更高的标准，即我们要求我们的算法在更强的意义上是可计算的，即在均匀概率多项式时间内可计算（对于某个固定的多项式，通常是
    \(O(n)\) 或 \(O(n^2)\)），而对手被允许使用非均匀性。'
- en: '**Quantum computing.** An interesting potential exception to this principle
    that every natural process should be simulatable by a straightline program of
    comparable complexity are processes where the quantum mechanical notions of *interference*
    and *entanglement* play a significant role. We will talk about this notion of
    *quantum computing* towards the end of the course, though note that much of what
    we say does not really change when we add quantum into the picture. As discussed
    in [the CS 121 text](https://introtcs.org/public/lec_26_quantum_computing.html),
    we can still capture these processes by straightline programs (that now have somewhat
    more complex form), and so most of what we’ll do just carries over in the same
    way to the quantum realm as long as we are fine with conjecturing the strong form
    of the cipher conjecture, namely that the cipher is infeasible to break even for
    quantum computers. All current evidence points toward this strong form being true
    as well. The field of constructing encryption schemes that are potentially secure
    against quantum computers is known as [post quantum cryptography](https://en.wikipedia.org/wiki/Post-quantum_cryptography)
    and we will return to this later in the course.'
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: '**量子计算**。一个有趣的潜在例外是，每个自然过程都应该能够通过一个与其复杂度相当的直线程序来模拟这一原则，即那些量子力学中的*干涉*和*纠缠*概念起着重要作用的进程。我们将在课程结束时讨论这个*量子计算*的概念，但请注意，当我们把量子加入进来时，我们所说的许多内容实际上并没有真正改变。正如在[CS
    121 文本](https://introtcs.org/public/lec_26_quantum_computing.html)中讨论的那样，我们仍然可以通过直线程序（现在形式稍微复杂一些）来捕捉这些进程，因此只要我们接受对密码猜想强形式的猜想，即即使对于量子计算机来说，密码也是不可破解的，我们将在量子领域做的大部分工作都将以相同的方式继续进行。所有当前的证据都指向这种强形式也是正确的。构建可能对量子计算机安全的加密方案领域被称为[后量子密码学](https://en.wikipedia.org/wiki/Post-quantum_cryptography)，我们将在课程中稍后回到这个话题。'
- en: Another version of “\(t\) bits of security” is that a scheme has \(t\) bits
    of security if for every \(t_1+t_2 \leq t\), an attacker running in \(2^{t_1}\)
    time can’t get success probability advantage more than \(2^{-t_2}\). However these
    two definitions only differ from one another by at most a factor of two. This
    may be important for practical applications (where the difference between \(64\)
    and \(32\) bits of security could be crucial) but won’t matter for our concerns.
  id: totrans-191
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: “\(t\) 位安全性”的另一种版本是，如果一个方案有 \(t\) 位安全性，那么对于每个 \(t_1+t_2 \leq t\)，一个在 \(2^{t_1}\)
    时间内运行的攻击者不能获得超过 \(2^{-t_2}\) 的成功概率优势。然而，这两个定义之间的差异最多只有两个因子。这可能在实际应用中很重要（其中 \(64\)
    位和 \(32\) 位安全性的差异可能是关键的），但对我们关注的问题来说并不重要。
- en: '[↩](#fnref:1 "return to article")'
  id: totrans-192
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '[↩](#fnref:1 "返回文章")'
- en: The latter property is known as “semantic security”, see also section 3.2.2
    of Katz Lindell on “semantic security” and Section 2 of Boneh-Shoup “computational
    ciphers and semantic security”.
  id: totrans-193
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 后者属性被称为“语义安全性”，参见 Katz-Lindell 关于“语义安全性”的第 3.2.2 节，以及 Boneh-Shoup 的“计算密码和语义安全性”的第
    2 节。
- en: '[↩](#fnref:2 "return to article")'
  id: totrans-194
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '[↩](#fnref:2 "返回文章")'
- en: Some texts reserve the term *exponential* to functions of the form \(2^{\epsilon
    n}\) for some \(\epsilon > 0\) and call a function such as, say, \(2^{\sqrt{n}}\)
    *subexponential* . However, we will generally not make this distinction in this
    course.
  id: totrans-195
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一些文本将术语 *指数* 保留给形式为 \(2^{\epsilon n}\) 的函数（其中 \(\epsilon > 0\)），并将像 \(2^{\sqrt{n}}\)
    这样的函数称为 *次指数*。然而，在本课程中，我们通常不会做出这种区分。
- en: '[↩](#fnref:3 "return to article")'
  id: totrans-196
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '[↩](#fnref:3 "返回文章")'
- en: Negligible functions are sometimes defined with image equalling \([0,1]\) as
    opposed to the set \([0,\infty)\) of non-negative real numbers, since they are
    typically used to bound probabilities. However, this does not make much difference
    since if \(\mu\) is negligible then for large enough \(n\), \(\mu(n)\) will be
    smaller than one.
  id: totrans-197
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可忽略函数有时被定义为像 \([0,1]\) 这样的像，而不是非负实数的集合 \([0,\infty)\)，因为它们通常用于界定概率。然而，这并没有太大的区别，因为如果
    \(\mu\) 是可忽略的，那么对于足够大的 \(n\)，\(\mu(n)\) 将小于一。
- en: '[↩](#fnref:4 "return to article")'
  id: totrans-198
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '[↩](#fnref:4 "返回文章")'
- en: Note that there is a subtle issue here with the order of quantifiers. For a
    scheme to be efficient, the algorithms such as encryption and decryption need
    to run in some *fixed* polynomial time such as \(n^2\) or \(n^3\). In contrast
    we allow the adversary to run in *any* polynomial time. That is, for every \(c\),
    if \(n\) is large enough, then the scheme should be secure against an adversary
    that runs in time \(n^c\). This is in line with the general principle in cryptography
    that we always allow the adversary potentially much more resources than those
    used by the honest users. In practical security we often assume that the gap between
    the honest use and the adversary resources can be *exponential*. For example,
    a low power embedded device can encrypt messages that, as far as we know, are
    undecipherable even by a nation-state using super-computers and massive data centers.
  id: totrans-199
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 注意，这里有一个关于量词顺序的微妙问题。为了使方案高效，加密和解密等算法需要在某些固定的多项式时间内运行，例如 \(n^2\) 或 \(n^3\)。相比之下，我们允许对手在任意多项式时间内运行。也就是说，对于每一个
    \(c\)，如果 \(n\) 足够大，那么方案应该能够抵御运行时间为 \(n^c\) 的对手。这与密码学中的普遍原则一致，即我们总是允许对手拥有比诚实用户更多的潜在资源。在实际安全中，我们通常假设诚实使用和对手资源之间的差距可以是指数级的。例如，一个低功耗的嵌入式设备可以加密消息，据我们所知，即使是使用超级计算机和大型数据中心的国家也无法解密。
- en: '[↩](#fnref:5 "return to article")'
  id: totrans-200
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '[↩](#fnref:5 "返回文章")'
- en: 'With some caveats that need to be added due to *quantum computers*: we’ll get
    to those later in the course, though they won’t change most of our theory. See
    also [this discussion in my intro TCS textbook](https://introtcs.org/public/lec_04_code_and_data.html#PECTTsec)
    and [this presentation of Aaronson](https://www.scottaaronson.com/talks/bernays2.ppt)
    on the “extended Church Turing thesis”.'
  id: totrans-201
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 由于需要添加一些由于 *量子计算机* 引起的注意事项：我们将在课程稍后讨论这些，尽管它们不会改变我们的大多数理论。还可以参考我在我的 TCS 入门教科书中关于“扩展
    Church-Turing 假说”的[这个讨论](https://introtcs.org/public/lec_04_code_and_data.html#PECTTsec)和
    Aaronson 的[这个演示](https://www.scottaaronson.com/talks/bernays2.ppt)。
- en: '[↩](#fnref:6 "return to article")'
  id: totrans-202
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '[↩](#fnref:6 "返回文章")'
- en: As will be the case for other conjectures we talk about, the name “The Cipher
    Conjecture” is not a standard name, but rather one we’ll use in this course. In
    the literature this conjecture is mostly referred to as the conjecture of existence
    of *one way functions*, a notion we will learn about later. These two conjectures
    a priori seem quite different but have been shown to be equivalent.
  id: totrans-203
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 就像我们将讨论的其他猜想一样，“Cipher Conjecture” 这个名字不是一个标准名称，而是一个我们在本课程中会使用的名称。在文献中，这个猜想通常被称为“单向函数存在性”的猜想，这是一个我们稍后将会了解的概念。这两个猜想从先验上看似乎相当不同，但已经被证明是等价的。
- en: '[↩](#fnref:7 "return to article")'
  id: totrans-204
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '[↩](#fnref:7 "返回文章")'
- en: Results of this form are known as “triangle inequalities” since they can be
    viewed as generalizations of the statement that for every three points on the
    plane \(x,y,z\), the distance from \(x\) to \(z\) is not larger than the distance
    from \(x\) to \(y\) plus the distance from \(y\) to \(z\). In other words, the
    edge \(\overline{x,z}\) of the triangle \((x,y,z)\) is not longer than the sum
    of the lengths of the other two edges \(\overline{x,y}\) and \(\overline{y,z}\).
  id: totrans-205
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 这种形式的结果被称为“三角不等式”，因为它们可以被视为平面上的三个点 \(x,y,z\) 的距离从 \(x\) 到 \(z\) 不大于从 \(x\) 到
    \(y\) 的距离加上从 \(y\) 到 \(z\) 的距离这一陈述的推广。换句话说，三角形 \((x,y,z)\) 的边 \(\overline{x,z}\)
    的长度不大于其他两边 \(\overline{x,y}\) 和 \(\overline{y,z}\) 长度的和。
- en: '[↩](#fnref:8 "return to article")'
  id: totrans-206
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '[↩](#fnref:8 "返回文章")'
- en: This is the principle that if the average grade in an exam was at least \(\alpha\)
    then *someone* must have gotten at least \(\alpha\), or in other words that if
    a real-valued random variable \(Z\) satisfies \({\mathbb{E}}[Z] \geq \alpha\)
    then \(\Pr[Z\geq \alpha]>0\).
  id: totrans-207
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 这是这样一个原则：如果一次考试的平均成绩至少是 \(\alpha\)，那么**某人**必须至少得到了 \(\alpha\) 分，换句话说，如果一个实值随机变量
    \(Z\) 满足 \({\mathbb{E}}[Z] \geq \alpha\)，那么 \(\Pr[Z\geq \alpha]>0\)。
- en: '[↩](#fnref:9 "return to article")'
  id: totrans-208
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '[↩](#fnref:9 "返回文章")'
- en: The cost \(10 \ell n\) is for the operations of feeding the “hardwired” strings
    \(x_1,\ldots,x_{i-1}\), \(y_{i+1},\ldots,y_\ell\) into \(Eve'\). These take up
    at most \(\ell n\) bits, and depending on the computational model, storing and
    feeding them into \(Eve'\) may take \(c\ell n\) steps for some small constant
    \(c<10\). In the future, we will usually ignore such minor details and simply
    say that if \(Eve'\) runs in polynomial time then so will \(Eve\).
  id: totrans-209
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 成本 \(10 \ell n\) 是为了将“硬编码”的字符串 \(x_1,\ldots,x_{i-1}\)，\(y_{i+1},\ldots,y_\ell\)
    输入到 \(Eve'\) 中。这些字符串最多占用 \(\ell n\) 位，根据计算模型的不同，存储并将它们输入到 \(Eve'\) 中可能需要 \(c\ell
    n\) 步骤，其中 \(c\) 是小于 10 的小常数。在未来，我们通常会忽略这样的小细节，简单地说，如果 \(Eve'\) 以多项式时间运行，那么 \(Eve\)
    也会以多项式时间运行。
- en: '[↩](#fnref:10 "return to article")'
  id: totrans-210
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '[↩](#fnref:10 "返回文章")'
- en: The keys \(k_1,\ldots,k_t\) are sometimes known as *ephemeral keys* in the crypto
    literature, since they are created only for the purposes of this particular interaction.
  id: totrans-211
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在密码学文献中，密钥 \(k_1,\ldots,k_t\) 有时被称为**临时密钥**，因为它们只为这次特定的交互而创建。
- en: '[↩](#fnref:11 "return to article")'
  id: totrans-212
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '[↩](#fnref:11 "返回文章")'
- en: The astute reader might note that the key \(k_t\) is actually not used anywhere
    in the encryption nor decryption and hence we could encrypt \(n\) more bits of
    the message instead in this final round. We used the current description for the
    sake of symmetry and simplicity of exposition.
  id: totrans-213
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 聪明的读者可能会注意到关键的 \(k_t\) 在加密和解密过程中实际上没有被使用，因此我们可以在最后一轮中用这些密钥加密更多的消息位。我们使用当前的描述是为了对称性和表述的简单性。
- en: '[↩](#fnref:12 "return to article")'
  id: totrans-214
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '[↩](#fnref:12 "返回文章")'
