- en: 2.1\. History of Unix, Linux, and Open Source / Free Software
  id: totrans-26
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 2.1\. Unix、Linux 和开源/自由软件的历史
- en: 原文：[https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/history.html](https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/history.html)
  id: totrans-27
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/history.html](https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/history.html)
- en: 2.1.1\. Unix
  id: totrans-28
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2.1.1\. Unix
- en: 'In 1969-1970, Kenneth Thompson, Dennis Ritchie, and others at AT&T Bell Labs
    began developing a small operating system on a little-used PDP-7. The operating
    system was soon christened Unix, a pun on an earlier operating system project
    called MULTICS. In 1972-1973 the system was rewritten in the programming language
    C, an unusual step that was visionary: due to this decision, Unix was the first
    widely-used operating system that could switch from and outlive its original hardware.
    Other innovations were added to Unix as well, in part due to synergies between
    Bell Labs and the academic community. In 1979, the “seventh edition” (V7) version
    of Unix was released, the grandfather of all extant Unix systems.'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 在 1969-1970 年，肯尼思·汤普森、丹尼斯·里奇和其他在 AT&T 贝尔实验室的人开始在一个很少使用的 PDP-7 上开发一个小型操作系统。这个操作系统很快被命名为
    Unix，是对一个早期操作系统项目 MULTICS 的双关语。在 1972-1973 年，系统用 C 语言重写，这是一个具有前瞻性的不寻常步骤：由于这个决定，Unix
    成为了第一个可以切换并超越其原始硬件的广泛使用的操作系统。Unix 还增加了其他创新，部分得益于贝尔实验室和学术界之间的协同作用。1979 年，Unix 的“第七版”（V7）版本发布，是所有现有
    Unix 系统的祖先。
- en: After this point, the history of Unix becomes somewhat convoluted. The academic
    community, led by Berkeley, developed a variant called the Berkeley Software Distribution
    (BSD), while AT&T continued developing Unix under the names “System III” and later
    “System V”. In the late 1980’s through early 1990’s the “wars” between these two
    major strains raged. After many years each variant adopted many of the key features
    of the other. Commercially, System V won the “standards wars” (getting most of
    its interfaces into the formal standards), and most hardware vendors switched
    to AT&T’s System V. However, System V ended up incorporating many BSD innovations,
    so the resulting system was more a merger of the two branches. The BSD branch
    did not die, but instead became widely used for research, for PC hardware, and
    for single-purpose servers (e.g., many web sites use a BSD derivative).
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 从这一点开始，Unix的历史变得有些复杂。以伯克利大学为首的学术界开发了一个名为伯克利软件发行版（BSD）的变种，而AT&T则继续在“System III”和后来的“System
    V”名称下开发Unix。在20世纪80年代末至90年代初，这两种主要流派之间爆发了“战争”。经过多年，每个变种都采纳了对方的一些关键特性。在商业上，System
    V赢得了“标准战争”（大多数接口都纳入了正式标准），大多数硬件供应商转向了AT&T的System V。然而，System V最终吸收了许多BSD的创新，因此产生的系统更像是两个分支的合并。BSD分支并没有消亡，反而广泛应用于研究、PC硬件和专用服务器（例如，许多网站使用BSD的衍生版本）。
- en: 'The result was many different versions of Unix, all based on the original seventh
    edition. Most versions of Unix were proprietary and maintained by their respective
    hardware vendor, for example, Sun Solaris is a variant of System V. Three versions
    of the BSD branch of Unix ended up as open source: FreeBSD (concentrating on ease-of-installation
    for PC-type hardware), NetBSD (concentrating on many different CPU architectures),
    and a variant of NetBSD, OpenBSD (concentrating on security). More general information
    about Unix history can be found at [http://www.datametrics.com/tech/unix/uxhistry/brf-hist.htm](http://www.datametrics.com/tech/unix/uxhistry/brf-hist.htm),
    [http://perso.wanadoo.fr/levenez/unix](http://perso.wanadoo.fr/levenez/unix),
    and [http://www.crackmonkey.org/unix.html](http://www.crackmonkey.org/unix.html)
    (note that Microsoft Windows systems can’t read that last one). The [Unix Heritage
    Society](http://www.tuhs.org) refers to several sources of Unix history. Much
    more information about the BSD history can be found in [McKusick 1999] and [ftp://ftp.freebsd.org/pub/FreeBSD/FreeBSD-current/src/share/misc/bsd-family-tree](ftp://ftp.freebsd.org/pub/FreeBSD/FreeBSD-current/src/share/misc/bsd-family-tree).'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 结果是出现了许多不同的Unix版本，它们都基于原始的第七版。大多数Unix版本都是专有的，由各自的硬件供应商维护，例如，Sun Solaris是System
    V的一个变种。Unix的BSD分支最终有三个版本成为开源：FreeBSD（专注于PC硬件的安装简便性）、NetBSD（专注于多种不同的CPU架构）以及NetBSD的一个变种，OpenBSD（专注于安全性）。更多关于Unix历史的通用信息可以在[http://www.datametrics.com/tech/unix/uxhistry/brf-hist.htm](http://www.datametrics.com/tech/unix/uxhistry/brf-hist.htm)、[http://perso.wanadoo.fr/levenez/unix](http://perso.wanadoo.fr/levenez/unix)和[http://www.crackmonkey.org/unix.html](http://www.crackmonkey.org/unix.html)（注意，Microsoft
    Windows系统无法读取最后一个链接）。[Unix Heritage Society](http://www.tuhs.org)引用了Unix历史的多个来源。关于BSD历史的更多信息可以在[Mckusick
    1999](McKusick 1999)和[ftp://ftp.freebsd.org/pub/FreeBSD/FreeBSD-current/src/share/misc/bsd-family-tree](ftp://ftp.freebsd.org/pub/FreeBSD/FreeBSD-current/src/share/misc/bsd-family-tree)中找到。
- en: A slightly old but interesting advocacy piece that presents arguments for using
    Unix-like systems (instead of Microsoft’s products) is [John Kirch’s paper “Microsoft
    Windows NT Server 4.0 versus UNIX”](http://web.archive.org/web/20010801155417/www.unix-vs-nt.org/kirch).
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 一篇稍微有些过时但有趣的倡导文章，提出了使用Unix-like系统（而不是Microsoft的产品）的论点，是[John Kirch的论文“Microsoft
    Windows NT Server 4.0 versus UNIX”](http://web.archive.org/web/20010801155417/www.unix-vs-nt.org/kirch)。
- en: 2.1.2\. Free Software Foundation
  id: totrans-33
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2.1.2\. 自由软件基金会
- en: In 1984 Richard Stallman’s Free Software Foundation (FSF) began the GNU project,
    a project to create a free version of the Unix operating system. By free, Stallman
    meant software that could be freely used, read, modified, and redistributed. The
    FSF successfully built a vast number of useful components, including a C compiler
    (gcc), an impressive text editor (emacs), and a host of fundamental tools. However,
    in the 1990’s the FSF was having trouble developing the operating system kernel
    [FSF 1998]; without a kernel their dream of a completely free operating system
    would not be realized.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 1984年，理查德·斯托尔曼的免费软件基金会（FSF）开始了GNU项目，这是一个旨在创建Unix操作系统的免费版本的项目。斯托尔曼所说的“免费”，是指软件可以被自由使用、阅读、修改和重新分发。FSF成功地构建了大量有用的组件，包括C编译器（gcc）、令人印象深刻的文本编辑器（emacs）以及一系列基本工具。然而，在20世纪90年代，FSF在开发操作系统内核方面遇到了困难[FSF
    1998]；没有内核，他们关于一个完全免费的操作系统的梦想将无法实现。
- en: 2.1.3\. Linux
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2.1.3\. Linux
- en: In 1991 Linus Torvalds began developing an operating system kernel, which he
    named “Linux” [Torvalds 1999]. This kernel could be combined with the FSF material
    and other components (in particular some of the BSD components and MIT’s X-windows
    software) to produce a freely-modifiable and very useful operating system. This
    book will term the kernel itself the “Linux kernel” and an entire combination
    as “Linux”. Note that many use the term “GNU/Linux” instead for this combination.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 1991年，林纳斯·托瓦兹开始开发一个操作系统内核，他将其命名为“Linux”[Torvalds 1999]。这个内核可以与FSF材料和其他组件（特别是某些BSD组件和MIT的X窗口软件）结合，以产生一个可以自由修改且非常有用的操作系统。本书将内核本身称为“Linux内核”，而将整个组合称为“Linux”。请注意，许多人使用“GNU/Linux”这个术语来指代这个组合。
- en: 'In the Linux community, different organizations have combined the available
    components differently. Each combination is called a “distribution”, and the organizations
    that develop distributions are called “distributors”. Common distributions include
    Red Hat, Mandrake, SuSE, Caldera, Corel, and Debian. There are differences between
    the various distributions, but all distributions are based on the same foundation:
    the Linux kernel and the GNU glibc libraries. Since both are covered by “copyleft”
    style licenses, changes to these foundations generally must be made available
    to all, a unifying force between the Linux distributions at their foundation that
    does not exist between the BSD and AT&T-derived Unix systems. This book is not
    specific to any Linux distribution; when it discusses Linux it presumes Linux
    kernel version 2.2 or greater and the C library glibc 2.1 or greater, valid assumptions
    for essentially all current major Linux distributions.'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 在Linux社区中，不同的组织以不同的方式组合了可用的组件。每种组合被称为“发行版”，开发发行版的组织被称为“发行商”。常见的发行版包括Red Hat、Mandrake、SuSE、Caldera、Corel和Debian。不同的发行版之间存在差异，但所有发行版都基于相同的基础：Linux内核和GNU
    glibc库。由于两者都受“copyleft”风格许可的保护，对这些基础所做的更改通常必须对所有用户开放，这是Linux发行版在其基础上的一个统一力量，而在BSD和AT&T派生的Unix系统之间则不存在这种力量。本书不针对任何特定的Linux发行版；当它讨论Linux时，假设Linux内核版本为2.2或更高，C库glibc为2.1或更高，这对于几乎所有当前的主要Linux发行版都是有效的假设。
- en: 2.1.4\. Open Source / Free Software
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2.1.4\. 开源/免费软件
- en: 'Increased interest in software that is freely shared has made it increasingly
    necessary to define and explain it. A widely used term is “open source software”,
    which is further defined in [OSI 1999]. Eric Raymond [1997, 1998] wrote several
    seminal articles examining its various development processes. Another widely-used
    term is “free software”, where the “free” is short for “freedom”: the usual explanation
    is “free speech, not free beer.” Neither phrase is perfect. The term “free software”
    is often confused with programs whose executables are given away at no charge,
    but whose source code cannot be viewed, modified, or redistributed. Conversely,
    the term “open source” is sometime (ab)used to mean software whose source code
    is visible, but for which there are limitations on use, modification, or redistribution.
    This book uses the term “open source” for its usual meaning, that is, software
    which has its source code freely available for use, viewing, modification, and
    redistribution; a more detailed definition is contained in the [Open Source Definition](http://www.opensource.org/osd.html).
    In some cases, a difference in motive is suggested; those preferring the term
    “free software” wish to strongly emphasize the need for freedom, while those using
    the term may have other motives (e.g., higher reliability) or simply wish to appear
    less strident. For information on this definition of free software, and the motivations
    behind it, can be found at [http://www.fsf.org](http://www.fsf.org).'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 对免费共享软件的兴趣增加，使得定义和解释它变得越来越必要。一个常用的术语是“开源软件”，它在[OSI 1999]中有进一步的定义。埃里克·雷蒙德（Eric
    Raymond）[1997, 1998]撰写了几篇开创性的文章，考察了其各种开发过程。另一个广泛使用的术语是“免费软件”，其中的“免费”代表“自由”：通常的解释是“言论自由，而非啤酒免费”。这两个短语都不完美。“免费软件”这个术语常被误解为那些可免费获得可执行文件，但源代码无法查看、修改或重新分发的程序。相反，“开源”这个术语有时（滥用）被用来指代源代码可见，但对使用、修改或重新分发有限制的软件。本书使用“开源”这个术语，其含义是指源代码可以自由使用、查看、修改和重新分发的软件；更详细的定义包含在[开源定义](http://www.opensource.org/osd.html)中。在某些情况下，动机上的差异被提出；那些偏好“免费软件”这个术语的人希望强烈强调自由的需求，而使用这个术语的人可能有其他动机（例如，更高的可靠性）或只是希望显得不那么强硬。关于这个免费软件定义及其背后的动机的信息，可以在[http://www.fsf.org](http://www.fsf.org)找到。
- en: Those interested in reading advocacy pieces for open source software and free
    software should see [http://www.opensource.org](http://www.opensource.org) and
    [http://www.fsf.org](http://www.fsf.org). There are other documents which examine
    such software, for example, Miller [1995] found that the open source software
    were noticeably more reliable than proprietary software (using their measurement
    technique, which measured resistance to crashing due to random input).
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 对阅读开源软件和免费软件倡导文章感兴趣的人应该查看[http://www.opensource.org](http://www.opensource.org)和[http://www.fsf.org](http://www.fsf.org)。还有其他一些文档考察了这类软件，例如，米勒（Miller）在1995年发现，开源软件在可靠性方面明显优于专有软件（使用他们的测量技术，该技术测量由于随机输入而崩溃的抵抗力）。
- en: 2.1.5\. Comparing Linux and Unix
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2.1.5. 比较Linux和Unix
- en: This book uses the term “Unix-like” to describe systems intentionally like Unix.
    In particular, the term “Unix-like” includes all major Unix variants and Linux
    distributions. Note that many people simply use the term “Unix” to describe these
    systems instead. Originally, the term “Unix” meant a particular product developed
    by AT&T. Today, the Open Group owns the Unix trademark, and it defines Unix as
    “the worldwide Single UNIX Specification”.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书使用“Unix-like”这个术语来描述有意模仿Unix的系统。特别是，“Unix-like”这个术语包括所有主要的Unix变种和Linux发行版。请注意，许多人简单地使用“Unix”这个术语来描述这些系统。最初，“Unix”这个术语指的是AT&T开发的一个特定产品。如今，开放集团拥有Unix商标，并将其定义为“全球单一UNIX规范”。
- en: Linux is not derived from Unix source code, but its interfaces are intentionally
    like Unix. Therefore, Unix lessons learned generally apply to both, including
    information on security. Most of the information in this book applies to any Unix-like
    system. Linux-specific information has been intentionally added to enable those
    using Linux to take advantage of Linux’s capabilities.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: Linux并非源自Unix源代码，但其接口有意模仿Unix。因此，Unix中学到的经验教训通常适用于两者，包括安全信息。本书中的大部分信息适用于任何Unix-like系统。为了使使用Linux的用户能够利用Linux的功能，特意添加了针对Linux的特定信息。
- en: Unix-like systems share a number of security mechanisms, though there are subtle
    differences and not all systems have all mechanisms available. All include user
    and group ids (uids and gids) for each process and a filesystem with read, write,
    and execute permissions (for user, group, and other). See Thompson [1974] and
    Bach [1986] for general information on Unix systems, including their basic security
    mechanisms. [Chapter 3](features.html) summarizes key security features of Unix
    and Linux.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 类Unix系统共享许多安全机制，尽管存在细微的差异，并不是所有系统都有所有机制可用。所有系统都包括每个进程的用户和组ID（UID和GID）以及具有读取、写入和执行权限的文件系统（对于用户、组和其它）。参见Thompson
    [1974] 和 Bach [1986] 关于Unix系统的一般信息，包括它们的基本安全机制。[第3章](features.html)总结了Unix和Linux的关键安全特性。
- en: 2.2\. Security Principles
  id: totrans-45
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 2.2. 安全原则
- en: 原文：[https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/security-principles.html](https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/security-principles.html)
  id: totrans-46
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/security-principles.html](https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/security-principles.html)
- en: There are many general security principles which you should be familiar with;
    one good place for general information on information security is the Information
    Assurance Technical Framework (IATF) [NSA 2000]. NIST has identified high-level
    “generally accepted principles and practices” [Swanson 1996]. You could also look
    at a general textbook on computer security, such as [Pfleeger 1997]. NIST Special
    Publication 800-27 describes a number of good engineering principles (although,
    since they’re abstract, they’re insufficient for actually building secure programs
    - hence this book); you can get a copy at [http://csrc.nist.gov/publications/nistpubs/800-27/sp800-27.pdf](http://csrc.nist.gov/publications/nistpubs/800-27/sp800-27.pdf).
    A few security principles are summarized here.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 有许多通用的安全原则，你应该熟悉；关于信息安全的一般信息，一个很好的地方是信息保障技术框架（IATF）[NSA 2000]。NIST已经确定了高级的“普遍接受的原则和实践”[Swanson
    1996]。你也可以查看关于计算机安全的一般教科书，例如[Pfleeger 1997]。NIST特别出版物800-27描述了若干好的工程原则（尽管，由于它们是抽象的，它们对于实际构建安全程序是不够的——因此有这本书）；你可以在[http://csrc.nist.gov/publications/nistpubs/800-27/sp800-27.pdf](http://csrc.nist.gov/publications/nistpubs/800-27/sp800-27.pdf)获取副本。这里总结了几个安全原则。
- en: 'Often computer security objectives (or goals) are described in terms of three
    overall objectives:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，计算机安全目标（或目标）是用三个总体目标来描述的：
- en: '*Confidentiality* (also known as secrecy), meaning that the computing system’s
    assets can be read only by authorized parties.'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*保密性*（也称为机密性），意味着计算系统的资产只能由授权方读取。'
- en: '*Integrity*, meaning that the assets can only be modified or deleted by authorized
    parties in authorized ways.'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*完整性*，意味着资产只能以授权的方式由授权方修改或删除。'
- en: '*Availability*, meaning that the assets are accessible to the authorized parties
    in a timely manner (as determined by the systems requirements). The failure to
    meet this goal is called a denial of service.'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*可用性*，意味着资产能够及时地（根据系统要求确定）被授权方访问。未能达到这个目标被称为拒绝服务。'
- en: Some people define additional major security objectives, while others lump those
    additional goals as special cases of these three. For example, some separately
    identify non-repudiation as an objective; this is the ability to “prove” that
    a sender sent or receiver received a message (or both), even if the sender or
    receiver wishes to deny it later. Privacy is sometimes addressed separately from
    confidentiality; some define this as protecting the confidentiality of a *user*
    (e.g., their identity) instead of the data. Most objectives require identification
    and authentication, which is sometimes listed as a separate objective. Often auditing
    (also called accountability) is identified as a desirable security objective.
    Sometimes “access control” and “authenticity” are listed separately as well. For
    example, The U.S. Department of Defense (DoD), in DoD directive 3600.1 defines
    “information assurance” as “information operations (IO) that protect and defend
    information and information systems by ensuring their availability, integrity,
    authentication, confidentiality, and nonrepudiation. This includes providing for
    restoration of information systems by incorporating protection, detection, and
    reaction capabilities.”
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 有些人定义了额外的重大安全目标，而有些人将这些额外目标视为这三个目标的特殊情况。例如，有些人将不可否认性作为一个目标单独识别；这是指即使发送者或接收者后来希望否认，也能“证明”发送者发送了或接收者接收了消息（或两者都是）的能力。隐私有时与机密性分开处理；有些人将其定义为保护用户的机密性（例如，他们的身份），而不是数据。大多数目标都需要身份验证和认证，这有时被列为一个单独的目标。通常，审计（也称为问责制）被确定为理想的安全目标。有时，“访问控制”和“真实性”也被单独列出。例如，美国国防部（DoD）在其指令3600.1中将“信息安全”定义为“通过确保可用性、完整性、真实性、机密性和不可否认性来保护信息及其信息系统的信息操作（IO）。这包括通过结合保护、检测和反应能力来恢复信息系统。”
- en: In any case, it is important to identify your program’s overall security objectives,
    no matter how you group them together, so that you’ll know when you’ve met them.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 在任何情况下，重要的是要确定你程序的整体安全目标，无论你如何将它们分组，这样你就可以知道何时实现了它们。
- en: Sometimes these objectives are a response to a known set of threats, and sometimes
    some of these objectives are required by law. For example, for U.S. banks and
    other financial institutions, there’s a new privacy law called the “Gramm-Leach-Bliley”
    (GLB) Act. This law mandates disclosure of personal information shared and means
    of securing that data, requires disclosure of personal information that will be
    shared with third parties, and directs institutions to give customers a chance
    to opt out of data sharing. [Jones 2000]
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 有时，这些目标是对已知威胁集的回应，有时某些目标是由法律要求的。例如，对于美国的银行和其他金融机构，有一项新的隐私法称为“格拉姆-利奇-布莱利”（GLB）法案。该法案要求披露共享的个人信息和保护这些数据的方法，要求披露将与其他第三方共享的个人信息公开，并指导机构让客户有机会选择退出数据共享。[Jones
    2000]
- en: There is sometimes conflict between security and some other general system/software
    engineering principles. Security can sometimes interfere with “ease of use”, for
    example, installing a secure configuration may take more effort than a “trivial”
    installation that works but is insecure. Often, this apparent conflict can be
    resolved, for example, by re-thinking a problem it’s often possible to make a
    secure system also easy to use. There’s also sometimes a conflict between security
    and abstraction (information hiding); for example, some high-level library routines
    may be implemented securely or not, but their specifications won’t tell you. In
    the end, if your application must be secure, you must do things yourself if you
    can’t be sure otherwise - yes, the library should be fixed, but it’s your users
    who will be hurt by your poor choice of library routines.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 有时安全性与某些其他通用系统/软件工程原则之间会产生冲突。例如，安全性有时会干扰“易用性”，安装一个安全配置可能比一个“简单”但不够安全的安装需要更多的努力。通常，这种明显的冲突可以通过重新思考问题来解决，例如，通常可以设计一个既安全又易于使用的系统。有时，安全性与抽象（信息隐藏）之间也会产生冲突；例如，某些高级库例程可能被安全实现，也可能没有，但它们的规范不会告诉你。最后，如果你的应用程序必须保证安全，那么如果你不能确定其他方法，你必须亲自去做——是的，库应该被修复，但你的用户会因为你在库例程选择上的糟糕决定而受到伤害。
- en: A good general security principle is “defense in depth”; you should have numerous
    defense mechanisms (“layers”) in place, designed so that an attacker has to defeat
    multiple mechanisms to perform a successful attack.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 一个好的通用安全原则是“深度防御”；你应该有多个防御机制（“层”）就位，设计成攻击者必须击败多个机制才能成功攻击。
- en: For general principles on how to design secure programs, see [Section 7.1](follow-good-principles.html).
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 关于如何设计安全程序的一般原则，请参阅[第7.1节](follow-good-principles.html)。
- en: 2.3\. Why do Programmers Write Insecure Code?
  id: totrans-58
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 2.3. 为什么程序员会编写不安全的代码？
- en: 原文：[https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/why-write-insecure.html](https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/why-write-insecure.html)
  id: totrans-59
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/why-write-insecure.html](https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/why-write-insecure.html)
- en: 'Many programmers don’t intend to write insecure code - but do anyway. Here
    are a number of purported reasons for this. Most of these were collected and summarized
    by Aleph One on Bugtraq (in a posting on December 17, 1998):'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 许多程序员并不打算编写不安全的代码——但仍然这样做了。以下是一些所谓的理由。其中大部分是由 Aleph One 在 Bugtraq 上收集和总结的（1998年12月17日的一篇帖子）：
- en: There is no curriculum that addresses computer security in most schools. Even
    when there *is* a computer security curriculum, they often don’t discuss how to
    write secure programs as a whole. Many such curriculum only study certain areas
    such as cryptography or protocols. These are important, but they often fail to
    discuss common real-world issues such as buffer overflows, string formatting,
    and input checking. I believe this is one of the most important problems; even
    those programmers who go through colleges and universities are very unlikely to
    learn how to write secure programs, yet we depend on those very people to write
    secure programs.
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在大多数学校中，没有课程涉及计算机安全。即使有计算机安全课程，他们通常也不会讨论如何编写整个安全程序。许多这样的课程只研究某些领域，如密码学或协议。这些很重要，但它们通常不会讨论常见的现实世界问题，如缓冲区溢出、字符串格式化和输入检查。我相信这是最重要的一个问题；即使那些在大学和学院接受教育的程序员也很少有机会学习如何编写安全程序，但我们却依赖这些人编写安全程序。
- en: Programming books/classes do not teach secure/safe programming techniques. Indeed,
    until recently there were no books on how to write secure programs at all (this
    book is one of those few).
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 编程书籍/课程没有教授安全/安全编程技术。实际上，直到最近，还没有关于如何编写安全程序的书籍（这本书是其中之一）。
- en: No one uses formal verification methods.
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 没有人使用形式化验证方法。
- en: C is an unsafe language, and the standard C library string functions are unsafe.
    This is particularly important because C is so widely used - the “simple” ways
    of using C permit dangerous exploits.
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: C 是一种不安全的语言，标准 C 库中的字符串函数也是不安全的。这一点尤为重要，因为 C 的使用非常广泛——“简单”的 C 使用方式允许危险的利用。
- en: Programmers do not think “multi-user.”
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 程序员没有考虑“多用户”。
- en: Programmers are human, and humans are lazy. Thus, programmers will often use
    the “easy” approach instead of a secure approach - and once it works, they often
    fail to fix it later.
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 程序员是人类，人类是懒惰的。因此，程序员通常会采用“简单”的方法而不是安全的方法——一旦成功，他们往往后来也未能修复它。
- en: Most programmers are simply not good programmers.
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 大多数程序员并不是优秀的程序员。
- en: Most programmers are not security people; they simply don’t often think like
    an attacker does.
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 大多数程序员不是安全专家；他们并不经常像攻击者那样思考。
- en: Most security people are not programmers. This was a statement made by some
    Bugtraq contributors, but it’s not clear that this claim is really true.
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 大多数安全专家不是程序员。这是某些 Bugtraq 贡献者做出的声明，但并不清楚这个说法是否真的正确。
- en: Most computer security models are terrible.
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 大多数计算机安全模型都很糟糕。
- en: There is lots of “broken” legacy software. Fixing this software (to remove security
    faults or to make it work with more restrictive security policies) is difficult.
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有大量的“破损”的遗留软件。修复这些软件（以消除安全漏洞或使其与更严格的安全策略兼容）是困难的。
- en: Consumers don’t care about security. (Personally, I have hope that consumers
    are beginning to care about security; a computer system that is constantly exploited
    is neither useful nor user-friendly. Also, many consumers are unaware that there’s
    even a problem, assume that it can’t happen to them, or think that that things
    cannot be made better.)
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 消费者并不关心安全性。（就我个人而言，我希望能有消费者开始关心安全性；一个不断被利用的计算机系统既不实用也不用户友好。此外，许多消费者甚至不知道存在这个问题，认为这种情况不会发生在他们身上，或者认为事情不能变得更好。）
- en: Security costs extra development time.
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 安全性需要额外的发展时间。
- en: Security costs in terms of additional testing (red teams, etc.).
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 安全成本包括额外的测试（红队等）。
- en: 2.4\. Is Open Source Good for Security?
  id: totrans-75
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 2.4\. 开源软件对安全有益吗？
- en: 原文：[https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/open-source-security.html](https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/open-source-security.html)
  id: totrans-76
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/open-source-security.html](https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/open-source-security.html)
- en: There’s been a lot of debate by security practitioners about the impact of open
    source approaches on security. One of the key issues is that open source exposes
    the source code to examination by everyone, both the attackers and defenders,
    and reasonable people disagree about the ultimate impact of this situation. (Note
    - you can get the latest version of this essay by going to the main website for
    this book, [http://www.dwheeler.com/secure-programs](http://www.dwheeler.com/secure-programs).
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 安全从业者就开源方法对安全的影响进行了很多辩论。一个关键问题是开源使得源代码对所有人开放，包括攻击者和防御者，而理性的人对此情况最终影响持不同意见。（注意
    - 您可以通过访问本书的主网站 [http://www.dwheeler.com/secure-programs](http://www.dwheeler.com/secure-programs)
    获取这篇论文的最新版本）。
- en: 2.4.1\. View of Various Experts
  id: totrans-78
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2.4.1\. 各专家的观点
- en: First, let’s exampine what security experts have to say.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们看看安全专家们有什么看法。
- en: Bruce Schneier is a well-known expert on computer security and cryptography.
    He argues that smart engineers should “demand open source code for anything related
    to security” [Schneier 1999], and he also discusses some of the preconditions
    which must be met to make open source software secure. Vincent Rijmen, a developer
    of the winning Advanced Encryption Standard (AES) encryption algorithm, believes
    that the open source nature of Linux provides a superior vehicle to making security
    vulnerabilities easier to spot and fix, “Not only because more people can look
    at it, but, more importantly, because the model forces people to write more clear
    code, and to adhere to standards. This in turn facilitates security review” [Rijmen
    2000].
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: Bruce Schneier 是计算机安全和密码学方面的知名专家。他认为聪明的工程师应该“要求任何与安全相关的代码都应该是开源的” [Schneier
    1999]，他还讨论了必须满足的一些前提条件，以使开源软件更安全。AES 加密算法的开发商 Vincent Rijmen 认为，Linux 的开源特性为发现和修复安全漏洞提供了更好的途径，“不仅因为更多的人可以查看它，更重要的是，这种模式迫使人们编写更清晰的代码，并遵守标准。这反过来又促进了安全审查”
    [Rijmen 2000]。
- en: 'Elias Levy (Aleph1) is the former moderator of one of the most popular security
    discussion groups - Bugtraq. He discusses some of the problems in making open
    source software secure in his article ["Is Open Source Really More Secure than
    Closed?"](http://www.securityfocus.com/commentary/19). His summary is:'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: Elias Levy (Aleph1) 是最受欢迎的安全讨论组之一 - Bugtraq 的前版主。他在文章 ["开源软件真的比封闭源代码更安全吗？](http://www.securityfocus.com/commentary/19)
    中讨论了开源软件安全方面的一些问题。他的总结是：
- en: So does all this mean Open Source Software is no better than closed source software
    when it comes to security vulnerabilities? No. Open Source Software certainly
    does have the potential to be more secure than its closed source counterpart.
    But make no mistake, simply being open source is no guarantee of security.
  id: totrans-82
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 那么，这一切是否意味着开源软件在安全漏洞方面并不比封闭源代码软件更好？不。开源软件确实有可能比其封闭源代码版本更安全。但不要误解，仅仅因为是开源的并不能保证其安全性。
- en: 'Whitfield Diffie is the co-inventor of public-key cryptography (the basis of
    all Internet security) and chief security officer and senior staff engineer at
    Sun Microsystems. In his 2003 article [Risky business: Keeping security a secret](http://zdnet.com.com/2100-1107-980938.html),
    he argues that proprietary vendor’s claims that their software is more secure
    because it’s secret is nonsense. He identifies and then counters two main claims
    made by proprietary vendors: (1) that release of code benefits attackers more
    than anyone else because a lot of hostile eyes can also look at open-source code,
    and that (2) a few expert eyes are better than several random ones. He first notes
    that while giving programmers access to a piece of software doesn’t guarantee
    they will study it carefully, there is a group of programmers who can be expected
    to care deeply: Those who either use the software personally or work for an enterprise
    that depends on it. “In fact, auditing the programs on which an enterprise depends
    for its own security is a natural function of the enterprise’s own information-security
    organization.” He then counters the second argument, noting that “As for the notion
    that open source’s usefulness to opponents outweighs the advantages to users,
    that argument flies in the face of one of the most important principles in security:
    A secret that cannot be readily changed should be regarded as a vulnerability.”
    He closes noting that'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 威尔特菲尔德·迪菲（Whitfield Diffie）是公钥加密（所有互联网安全的基础）的共同发明者，同时也是太阳微系统公司（Sun Microsystems）的首席安全官和高级工程师。在他的2003年文章
    [风险业务：保持安全为秘密](http://zdnet.com.com/2100-1107-980938.html) 中，他辩称，专有供应商声称他们的软件因为保密而更安全是胡说八道。他识别并反驳了专有供应商提出的两个主要论点：（1）代码的发布对攻击者比其他人更有利，因为许多敌对的目光也可以查看开源代码，以及（2）少数专家的眼睛比几个随机的人更好。他首先指出，虽然给程序员访问软件的一部分并不能保证他们会仔细研究它，但有一群程序员可以预期会非常关心：那些要么个人使用该软件，要么为依赖该软件的企业工作的人。“事实上，审计企业依赖的软件以保障其自身安全是企业管理信息安全的自然功能。”然后他反驳第二个论点，指出：“至于开源对对手的有用性超过对用户的优势这一观点，这一论点与安全领域最重要的原则之一相悖：一个不能轻易更改的秘密应被视为一个漏洞。”他最后总结说：
- en: “It’s simply unrealistic to depend on secrecy for security in computer software.
    You may be able to keep the exact workings of the program out of general circulation,
    but can you prevent the code from being reverse-engineered by serious opponents?
    Probably not.”
  id: totrans-84
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “在计算机软件中依赖保密来保证安全是不切实际的。你可能能够将程序的精确工作原理从公众视野中隐藏起来，但你能否阻止严肃的对手对其进行逆向工程？可能不能。”
- en: 'John Viega’s article ["The Myth of Open Source Security"](http://dev-opensourceit.earthweb.com/news/000526_security.html)
    also discusses issues, and summarizes things this way:'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 约翰·维加（John Viega）的文章 ["开源安全神话](http://dev-opensourceit.earthweb.com/news/000526_security.html)"
    也讨论了相关问题，并这样总结：
- en: Open source software projects can be more secure than closed source projects.
    However, the very things that can make open source programs secure -- the availability
    of the source code, and the fact that large numbers of users are available to
    look for and fix security holes -- can also lull people into a false sense of
    security.
  id: totrans-86
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 开源软件项目可能比封闭源代码项目更安全。然而，那些可以使开源程序更安全的因素——源代码的可用性，以及大量用户可用于寻找和修复安全漏洞的事实——也可能使人们陷入一种虚假的安全感。
- en: '[Michael H. Warfield’s "Musings on open source security"](http://www.linuxworld.com/linuxworld/lw-1998-11/lw-11-ramparts.html)
    is very positive about the impact of open source software on security. In contrast,
    Fred Schneider doesn’t believe that open source helps security, saying “there
    is no reason to believe that the many eyes inspecting (open) source code would
    be successful in identifying bugs that allow system security to be compromised”
    and claiming that “bugs in the code are not the dominant means of attack” [Schneider
    2000]. He also claims that open source rules out control of the construction process,
    though in practice there is such control - all major open source programs have
    one or a few official versions with “owners” with reputations at stake. Peter
    G. Neumann discusses “open-box” software (in which source code is available, possibly
    only under certain conditions), saying “Will open-box software really improve
    system security? My answer is not by itself, although the potential is considerable”
    [Neumann 2000]. TruSecure Corporation, under sponsorship by Red Hat (an open source
    company), has developed a paper on why they believe open source is more effective
    for security [TruSecure 2001]. [Natalie Walker Whitlock’s IBM DeveloperWorks article](http://www-106.ibm.com/developerworks/linux/library/l-oss.html?open&I=252,t=gr,p=SeclmpOS)
    discusses the pros and cons as well. Brian Witten, Carl Landwehr, and Micahel
    Caloyannides [Witten 2001] published in IEEE Software an article tentatively concluding
    that having source code available should work in the favor of system security;
    they note:'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: '[迈克尔·H·沃菲尔德的《关于开源安全的沉思》](http://www.linuxworld.com/linuxworld/lw-1998-11/lw-11-ramparts.html)对开源软件对安全性的影响持非常积极的态度。相比之下，弗雷德·施奈德不相信开源有助于安全性，他说“没有理由相信那些检查（开源）源代码的众多眼睛能够成功识别出导致系统安全性被破坏的漏洞”并声称“代码中的漏洞不是攻击的主要手段”
    [施奈德 2000]。他还声称开源排除了对构建过程的控制，尽管在实践中确实存在这样的控制——所有主要的开源程序都有一个或几个官方版本，有“所有者”在声誉上有所赌注。彼得·G·纽曼讨论了“开箱软件”（其中源代码可用，可能仅在特定条件下），他说“开箱软件真的能提高系统安全性吗？我的回答是，它本身并不能，尽管潜力是相当大的”
    [纽曼 2000]。在红帽（一家开源公司）的赞助下，TruSecure公司开发了一份关于他们为什么认为开源在安全性方面更有效的论文 [TruSecure 2001]。[娜塔莉·沃克·惠洛克在IBM
    DeveloperWorks上的文章](http://www-106.ibm.com/developerworks/linux/library/l-oss.html?open&I=252,t=gr,p=SeclmpOS)也讨论了利弊。布赖恩·威滕、卡尔·兰德韦尔和迈克尔·卡洛扬尼迪斯
    [威滕 2001] 在IEEE Software上发表了一篇文章，初步得出结论，认为源代码可用应该有利于系统安全性；他们指出：'
- en: “We can draw four additional conclusions from this discussion. First, access
    to source code lets users improve system security -- if they have the capability
    and resources to do so. Second, limited tests indicate that for some cases, open
    source life cycles produce systems that are less vulnerable to nonmalicious faults.
    Third, a survey of three operating systems indicates that one open source operating
    system experienced less exposure in the form of known but unpatched vulnerabilities
    over a 12-month period than was experienced by either of two proprietary counterparts.
    Last, closed and proprietary system development models face disincentives toward
    fielding and supporting more secure systems as long as less secure systems are
    more profitable. Notwithstanding these conclusions, arguments in this important
    matter are in their formative stages and in dire need of metrics that can reflect
    security delivered to the customer.”
  id: totrans-88
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “从这次讨论中，我们可以得出四个额外的结论。首先，访问源代码使用户能够提高系统安全性——如果他们具备这样做的能力和资源。其次，有限的测试表明，在某些情况下，开源的生命周期会产生对非恶意故障更不脆弱的系统。第三，对三种操作系统的调查表明，在12个月的时间里，一个开源操作系统在已知但未修补的漏洞方面的暴露程度低于两个专有操作系统的任何一个。最后，只要不安全的系统更有利可图，封闭和专有系统开发模型就会面临不利于部署和支持更安全系统的障碍。尽管有这些结论，但在这个重要问题上的争论还处于形成阶段，迫切需要能够反映提供给客户的实际安全性的指标。”
- en: Scott A. Hissam and Daniel Plakosh’s [“Trust and Vulnerability in Open Source
    Software”](http://www.ics.uci.edu/~wscacchi/Papers/New/IEE_hissam.pdf) discuss
    the pluses and minuses of open source software. As with other papers, they note
    that just because the software is open to review, it should not automatically
    follow that such a review has actually been performed. Indeed, they note that
    this is a general problem for all software, open or closed - it is often questionable
    if many people examine any given piece of software. One interesting point is that
    they demonstrate that attackers can learn about a vulnerability in a closed source
    program (Windows) from patches made to an OSS/FS program (Linux). In this example,
    Linux developers fixed a vulnerability before attackers tried to attack it, and
    attackers correctly surmised that a similar problem might be still be in Windows
    (and it was). Unless OSS/FS programs are forbidden, this kind of learning is difficult
    to prevent. Therefore, the existance of an OSS/FS program can reveal the vulnerabilities
    of both the OSS/FS and proprietary program performing the same function - but
    at in this example, the OSS/FS program was fixed first.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: Scott A. Hissam 和 Daniel Plakosh 在他们的论文《“开源软件中的信任与漏洞”》（[“Trust and Vulnerability
    in Open Source Software”](http://www.ics.uci.edu/~wscacchi/Papers/New/IEE_hissam.pdf)）中讨论了开源软件的优缺点。与其他论文一样，他们指出，尽管软件是开放的，可以接受审查，但这并不意味着这种审查实际上已经完成。实际上，他们指出，这是所有软件（无论是开源还是封闭）的一个普遍问题——许多人是否审查了任何特定的软件，这往往是可疑的。一个有趣的观点是，他们证明了攻击者可以从对开源/自由软件程序（Linux）进行的补丁中了解到封闭源代码程序（Windows）中的漏洞。在这个例子中，Linux
    开发者在攻击者尝试攻击之前修复了一个漏洞，攻击者正确地推测，Windows 中可能还存在类似的问题（确实如此）。除非禁止开源/自由软件程序，否则这种学习是难以阻止的。因此，开源/自由软件程序的存在可以揭示执行相同功能的开源/自由软件和专有软件的漏洞——但在这个例子中，开源/自由软件程序是首先被修复的。
- en: 2.4.2\. Why Closing the Source Doesn’t Halt Attacks
  id: totrans-90
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2.4.2. 为什么关闭源代码不能阻止攻击
- en: It’s been argued that a system without source code is more secure because, since
    there’s less information available for an attacker, it should be harder for an
    attacker to find the vulnerabilities. This argument has a number of weaknesses,
    however, because although source code is extremely important when trying to add
    new capabilities to a program, attackers generally don’t need source code to find
    a vulnerability. Also, this argument assumes you can always keep the source code
    a secret, which is often untrue.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 有观点认为，没有源代码的系统更安全，因为攻击者可获取的信息较少，因此应该更难发现漏洞。然而，这种论点存在许多弱点，因为尽管源代码在尝试为程序添加新功能时非常重要，但攻击者通常不需要源代码来发现漏洞。此外，这种论点还假设你总能保守源代码的秘密，这往往是不真实的。
- en: First, it’s important to distinguish between “destructive” acts and “constructive”
    acts. In the real world, it is much easier to destroy a car than to build one.
    In the software world, it is much easier to find and exploit a vulnerability than
    to add new significant new functionality to that software. Attackers have many
    advantages against defenders because of this difference. Software developers must
    try to have no security-relevant mistakes anywhere in their code, while attackers
    only need to find one. Developers are primarily paid to get their programs to
    work... attackers don’t need to make the program work, they only need to find
    a single weakness. And as I’ll describe in a moment, it takes less information
    to attack a program than to modify one.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，重要的是要区分“破坏性”行为和“建设性”行为。在现实世界中，毁掉一辆车比建造一辆车容易得多。在软件世界中，发现和利用漏洞比向软件添加新的重要功能要容易得多。由于这种差异，攻击者相对于防御者有许多优势。软件开发者必须努力确保他们的代码中没有任何与安全相关的错误，而攻击者只需要找到一处。开发者主要被雇佣来使他们的程序运行……攻击者不需要使程序运行，他们只需要找到一处弱点。而且，正如我稍后将描述的，攻击一个程序所需的信息比修改一个程序所需的信息要少。
- en: Generally attackers (against both open and closed programs) start by knowing
    about the general kinds of security problems programs have. There’s no point in
    hiding this information; it’s already out, and in any case, defenders need that
    kind of information to defend themselves. Attackers then use techniques to try
    to find those problems; I’ll group the techniques into “dynamic” techniques (where
    you run the program) and “static” techniques (where you examine the program’s
    code - be it source code or machine code).
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，攻击者（针对开源和闭源程序）首先了解程序可能存在的各种安全问题。隐藏这种信息是没有意义的；它已经公开了，而且无论如何，防御者需要这种信息来自卫。然后，攻击者使用技术来尝试找到这些问题；我将这些技术分为“动态”技术（运行程序）和“静态”技术（检查程序的代码——无论是源代码还是机器码）。
- en: In “dynamic” approaches, an attacker runs the program, sending it data (often
    problematic data), and sees if the programs’ response indicates a common vulnerability.
    Open and closed programs have no difference here, since the attacker isn’t looking
    at code.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 在“动态”方法中，攻击者运行程序，向其发送数据（通常是问题数据），并查看程序的响应是否表明了常见的漏洞。开源和闭源程序在这里没有区别，因为攻击者没有查看代码。
- en: 'Attackers may also look at the code, the “static” approach. For open source
    software, they’ll probably look at the source code and search it for patterns.
    For closed source software, you can search the machine code (usually presented
    in assembly language format to simplify the task) for patterns that suggest security
    problems. In fact, there’s are several tools that do this. Attackers might also
    use tools called “decompilers” that turn the machine code back into source code
    and then search the source code for the vulnerable patterns (the same way they
    would search for vulnerabilities in source code in open source software). See
    Flake [2001] for one discussion of how closed code can still be examined for security
    vulnerabilities (e.g., using disassemblers). This point is important: even if
    an attacker wanted to use source code to find a vulnerability, a closed source
    program has no advantage, because the attacker can use a disassembler to re-create
    the source code of the product (for analysis), or use a binary scanning tool.'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 攻击者也可能查看代码，采用“静态”方法。对于开源软件，他们可能会查看源代码并搜索其中的模式。对于闭源软件，你可以搜索机器码（通常以汇编语言格式呈现以简化任务）中表明安全问题的模式。实际上，有几种工具可以做到这一点。攻击者还可能使用称为“反汇编器”的工具，将机器码转换回源代码，然后在源代码中搜索易受攻击的模式（就像他们在开源软件中搜索漏洞一样）。参见Flake
    [2001] 中关于如何检查闭源代码中的安全漏洞的讨论（例如，使用反汇编器）。这一点很重要：即使攻击者想使用源代码来寻找漏洞，闭源程序也没有优势，因为攻击者可以使用反汇编器重新创建产品的源代码（用于分析），或者使用二进制扫描工具。
- en: Non-developers might ask “if decompilers can create source code from machine
    code, then why do developers say they need source code instead of just machine
    code?” The problem is that although developers don’t need source code to find
    security problems, developers do need source code to make substantial improvements
    to the program. Although decompilers can turn machine code back into a “source
    code” of sorts, the resulting source code is extremely hard to modify. Typically
    most understandable names are lost, so instead of variables like “grand_total”
    you get “x123123”, instead of methods like “display_warning” you get “f123124”,
    and the code itself may have spatterings of assembly in it. Also, _ALL_ comments
    and design information are lost. This isn’t a serious problem for finding security
    problems, because generally you’re searching for patterns indicating vulnerabilities,
    not for internal variable or method names. Thus, decompilers and binary code scanning
    tools can be useful for finding ways to attack programs, or to see how vulnerable
    a program is, but aren’t helpful for updating programs.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 非开发者可能会问：“如果反汇编器可以从机器码创建源代码，那么为什么开发者说他们需要源代码而不是仅仅机器码？”问题在于，尽管开发者不需要源代码来发现安全问题，但他们确实需要源代码来对程序进行实质性的改进。尽管反汇编器可以将机器码转换回某种“源代码”，但生成的源代码极难修改。通常，大多数可理解的名字都会丢失，所以你得到的不是“grand_total”这样的变量，而是“x123123”，不是“display_warning”这样的方法，而是“f123124”，而且代码本身可能还夹杂着汇编代码。此外，_所有_注释和设计信息都会丢失。这对于发现安全问题来说并不是一个严重的问题，因为通常你是在寻找表明漏洞的模式，而不是内部变量或方法名称。因此，反汇编器和二进制代码扫描工具可以用来寻找攻击程序的方法，或者查看程序有多脆弱，但它们对于更新程序并没有帮助。
- en: Thus, developers will say “source code is vital” when they intend to add functionality),
    but the fact that the source code for closed source programs is hidden doesn’t
    protect the program very much. In fact, users of binary-only programs can have
    a problem when they use decompilers or binary scanning tools; it’s quite possible
    for a diligent user to know of a security flaw they can exploit but can’t easily
    fix, and they many not be able to convince the vendor to fix it either.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，当开发者意图添加功能时，他们会说“源代码至关重要”，但实际上，封闭源代码程序的源代码是隐藏的，这并不能很好地保护程序。事实上，仅使用二进制程序的用户在使用反编译器或二进制扫描工具时可能会遇到问题；一个勤奋的用户可能会知道一个可以利用的安全漏洞，但无法轻易修复，而且他们可能也无法说服供应商修复它。
- en: And this assumes you can keep the source code secret from attackers anyway.
    For example, Microsoft has had at least parts of its source code stolen several
    times, at least once from Microsoft itself and at least once from another company
    it shared data with. Microsoft also has programs to share its source code with
    various governments, companies, and educational settings; some of those organizations
    include attackers, and those organizations could be attacked by others to acquire
    the source code. I use this merely as an example; there are many reasons source
    code must be shared by many companies. And this doesn’t even take into consideration
    that aggreved workers might maliciously release the source code. Depending on
    long-term secrecy of source code is self-deception; you many delay its release,
    but if it’s important, it will probably be stolen sooner or later. Keeping the
    source code secret makes financial sense for proprietary vendors as a way to encourage
    customers to buy the products and support, but it is not a strong security measure.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 这还假设你无论如何都能从攻击者那里保守源代码的秘密。例如，微软至少有几次被盗取了其源代码，至少有一次是从微软本身，至少有一次是从它共享数据的另一家公司。微软还有与各种政府、公司和教育机构共享其源代码的计划；其中一些组织包括攻击者，这些组织可能会被其他人攻击以获取源代码。我仅以此为例；许多公司必须共享源代码有许多原因。而且这还没有考虑到恶意泄露源代码的受损害员工。依赖于源代码的长期保密是一种自我欺骗；你可以推迟其发布，但如果它很重要，它迟早会被盗取。保守源代码的秘密对专有软件供应商来说在经济上是有意义的，作为一种鼓励客户购买产品和支持的方式，但这并不是一个强大的安全措施。
- en: 2.4.3\. Why Keeping Vulnerabilities Secret Doesn’t Make Them Go Away
  id: totrans-99
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2.4.3. 为什么隐藏漏洞并不能使它们消失
- en: Sometimes it’s noted that a vulnerability that exists but is unknown can’t be
    exploited, so the system “practically secure.” In theory this is true, but the
    problem is that once someone finds the vulnerability, the finder may just exploit
    the vulnerability instead of helping to fix it. Having unknown vulnerabilities
    doesn’t really make the vulnerabilities go away; it simply means that the vulnerabilities
    are a time bomb, with no way to know when they’ll be exploited. Fundamentally,
    the problem of someone exploiting a vulnerability they discover is a problem for
    both open and closed source systems.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 有时人们会指出，一个存在但未知的漏洞无法被利用，因此系统“实际上很安全”。从理论上讲，这是正确的，但问题是，一旦有人发现了这个漏洞，发现者可能会利用这个漏洞而不是帮助修复它。未知漏洞并不会真正使漏洞消失；它只是意味着漏洞像定时炸弹一样，无法知道它们何时会被利用。从根本上讲，有人利用他们发现的漏洞的问题，对开源和封闭源代码系统都是一个问题。
- en: 'One related claim sometimes made (though not as directly related to OSS/FS)
    is that people should not post warnings about vulnerabilities and discuss them.
    This sounds good in theory, but the problem is that attackers already distribute
    information about vulnerabilities through a large number of channels. In short,
    such approaches would leave defenders vulnerable, while doing nothing to inhibit
    attackers. In the past, companies actively tried to prevent disclosure of vulnerabilities,
    but experience showed that, in general, companies didn’t fix vulnerabilities until
    they were widely known to their users (who could then insist that the vulnerabilities
    be fixed). This is all part of the argument for “full disclosure.” Gartner Group
    has a blunt commentary in a CNET.com article titled “Commentary: Hype is the real
    issue - Tech News.” They stated:'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 有时候会提出一个相关的说法（尽管与开源/自由软件没有直接关系），即人们不应该发布关于漏洞的警告并讨论它们。在理论上这听起来不错，但问题是攻击者已经通过大量渠道分发关于漏洞的信息。简而言之，这种做法会让防御者处于脆弱状态，而对攻击者却没有任何抑制作用。在过去，公司积极尝试防止漏洞信息的披露，但经验表明，总的来说，公司只有在漏洞被广泛告知用户（用户随后可以要求修复漏洞）之后才会修复漏洞。这全是“完全披露”论点的组成部分。Gartner集团在CNET.com文章《评论：炒作才是真正的问题
    - 科技新闻》中有一段直率的评论。他们表示：
- en: The comments of Microsoft’s Scott Culp, manager of the company’s security response
    center, echo a common refrain in a long, ongoing battle over information. Discussions
    of morality regarding the distribution of information go way back and are very
    familiar. Several centuries ago, for example, the church tried to squelch Copernicus'
    and Galileo’s theory of the sun being at the center of the solar system... Culp’s
    attempt to blame "information security professionals" for the recent spate of
    vulnerabilities in Microsoft products is at best disingenuous. Perhaps, it also
    represents an attempt to deflect criticism from the company that built those products...
    [The] efforts of all parties contribute to a continuous process of improvement.
    The more widely vulnerabilities become known, the more quickly they get fixed.
  id: totrans-102
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 微软安全响应中心经理斯科特·库普的评论与关于信息分布的道德讨论相呼应，这种讨论由来已久，非常熟悉。例如，几个世纪以前，教会试图压制哥白尼和伽利略关于太阳是太阳系中心的学说...库普试图将最近微软产品中出现的漏洞归咎于“信息安全专业人士”的做法至多是不诚实的。也许，这也代表了试图将批评从构建这些产品的公司身上转移开来的尝试...各方的努力都有助于一个持续改进的过程。漏洞越广泛为人所知，修复的速度就越快。
- en: 2.4.4\. How OSS/FS Counters Trojan Horses
  id: totrans-103
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2.4.4\. 如何识别开源/自由软件中的特洛伊木马
- en: It’s sometimes argued that open source programs, because there’s no enforced
    control by a single company, permit people to insert Trojan Horses and other malicious
    code. Trojan horses can be inserted into open source code, true, but they can
    also be inserted into proprietary code. A disgruntled or bribed employee can insert
    malicious code, and in many organizations it’s much less likely to be found than
    in an open source program. After all, no one outside the organization can review
    the source code, and few companies review their code internally (or, even if they
    do, few can be assured that the reviewed code is actually what is used). And the
    notion that a closed-source company can be sued later has little evidence; nearly
    all licenses disclaim all warranties, and courts have generally not held software
    development companies liable.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 有时候人们会争论，由于开源程序没有单一公司的强制控制，这允许人们插入特洛伊木马和其他恶意代码。确实，特洛伊木马可以被插入到开源代码中，但它们也可以被插入到专有代码中。一个不满或受贿的员工可以插入恶意代码，而且在许多组织中，这种恶意代码被发现的可能性比在开源程序中要小得多。毕竟，组织外部没有人可以审查源代码，而且很少有公司会内部审查他们的代码（或者即使他们这样做，也很少能保证审查过的代码实际上就是使用的代码）。而且，一个闭源公司可以事后被起诉的观念几乎没有证据；几乎所有许可证都声明不承担任何保证，而且法院通常没有判定软件开发公司负有责任。
- en: Borland’s InterBase server is an interesting case in point. Some time between
    1992 and 1994, Borland inserted an intentional “back door” into their database
    server, “InterBase”. This back door allowed any local or remote user to manipulate
    any database object and install arbitrary programs, and in some cases could lead
    to controlling the machine as “root”. This vulnerability stayed in the product
    for at least 6 years - no one else could review the product, and Borland had no
    incentive to remove the vulnerability. Then Borland released its source code on
    July 2000. The "Firebird" project began working with the source code, and uncovered
    this serious security problem with InterBase in December 2000. By January 2001
    the CERT announced the existence of this back door as [CERT advisory CA-2001-01](http://www.cert.org/advisories/CA-2001-01.html).
    What’s discouraging is that the backdoor can be easily found simply by looking
    at an ASCII dump of the program (a common cracker trick). Once this problem was
    found by open source developers reviewing the code, it was patched quickly. You
    could argue that, by keeping the password unknown, the program stayed safe, and
    that opening the source made the program less secure. I think this is nonsense,
    since ASCII dumps are trivial to do and well-known as a standard attack technique,
    and not all attackers have sudden urges to announce vulnerabilities - in fact,
    there’s no way to be certain that this vulnerability has not been exploited many
    times. It’s clear that after the source was opened, the source code was reviewed
    over time, and the vulnerabilities found and fixed. One way to characterize this
    is to say that the original code was vulnerable, its vulnerabilities became easier
    to exploit when it was first made open source, and then finally these vulnerabilities
    were fixed.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 博兰德的InterBase服务器是一个有趣的案例。在1992年至1994年之间，博兰德故意在他们的数据库服务器“InterBase”中插入了一个“后门”。这个后门允许任何本地或远程用户操纵任何数据库对象并安装任意程序，在某些情况下甚至可能导致以“root”身份控制机器。这个漏洞在该产品中至少存在了6年——没有人可以审查该产品，博兰德也没有动力去除这个漏洞。然后博兰德在2000年7月发布了其源代码。"Firebird"项目开始使用源代码，并在2000年12月揭露了InterBase的这个严重安全问题。到2001年1月，CERT宣布了这个后门的存在，作为[CERT咨询CA-2001-01](http://www.cert.org/advisories/CA-2001-01.html)。令人沮丧的是，这个后门可以通过简单地查看程序的ASCII转储（一个常见的黑客技巧）来轻松找到。一旦开源开发者通过审查代码发现了这个问题，它就很快得到了修复。你可以争论，通过保持密码未知，程序保持了安全，而开放源代码使得程序变得不那么安全。我认为这是无稽之谈，因为ASCII转储是微不足道的，并且作为标准的攻击技术而众所周知，并不是所有攻击者都有突然宣布漏洞的冲动——事实上，根本无法确定这个漏洞是否已经被多次利用。很明显，在源代码开放之后，随着时间的推移，源代码得到了审查，发现了漏洞并得到了修复。可以这样描述，原始代码是脆弱的，当它首次开源时，其漏洞更容易被利用，然后最终这些漏洞得到了修复。
- en: 2.4.5\. Other Advantages
  id: totrans-106
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2.4.5. 其他优势
- en: The advantages of having source code open extends not just to software that
    is being attacked, but also extends to vulnerability assessment scanners. Vulnerability
    assessment scanners intentionally look for vulnerabilities in configured systems.
    A recent Network Computing evaluation found that the best scanner (which, among
    other things, found the most legitimate vulnerabilities) was Nessus, an open source
    scanner [Forristal 2001].
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 开放源代码的优势不仅限于正在遭受攻击的软件，还扩展到了漏洞评估扫描器。漏洞评估扫描器故意在配置的系统内寻找漏洞。最近的一次网络计算评估发现，最好的扫描器（在许多方面，它发现了最多的合法漏洞）是Nessus，一个开源扫描器[Forristal
    2001]。
- en: 2.4.6\. Bottom Line
  id: totrans-108
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2.4.6. 总结
- en: 'So, what’s the bottom line? I personally believe that when a program began
    as closed source and is then first made open source, it often starts less secure
    for any users (through exposure of vulnerabilities), and over time (say a few
    years) it has the potential to be much more secure than a closed program. If the
    program began as open source software, the public scrutiny is more likely to improve
    its security before it’s ready for use by significant numbers of users, but there
    are several caveats to this statement (it’s not an ironclad rule). Just making
    a program open source doesn’t suddenly make a program secure, and just because
    a program is open source does not guarantee security:'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，底线是什么呢？我个人认为，当一个程序最初是封闭源代码，然后首次开源时，它通常对任何用户来说都更不安全（通过暴露漏洞），随着时间的推移（比如说几年），它有可能比封闭程序更安全。如果一个程序最初就是开源软件，公众的审查更有可能在它准备好供大量用户使用之前提高其安全性，但这个陈述有几个注意事项（这不是一个不可动摇的规则）。仅仅将一个程序开源并不会突然使其变得安全，而且一个程序是开源的并不保证其安全性：
- en: 'First, people have to actually review the code. This is one of the key points
    of debate - will people really review code in an open source project? All sorts
    of factors can reduce the amount of review: being a niche or rarely-used product
    (where there are few potential reviewers), having few developers, and use of a
    rarely-used computer language. Clearly, a program that has a single developer
    and no other contributors of any kind doesn’t have this kind of review. On the
    other hand, a program that has a primary author and many other people who occasionally
    examine the code and contribute suggests that there are others reviewing the code
    (at least to create contributions). In general, if there are more reviewers, there’s
    generally a higher likelihood that someone will identify a flaw - this is the
    basis of the “many eyeballs” theory. Note that, for example, the OpenBSD project
    continuously examines programs for security flaws, so the components in its innermost
    parts have certainly undergone a lengthy review. Since OSS/FS discussions are
    often held publicly, this level of review is something that potential users can
    judge for themselves.'
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 首先，人们必须真正审查代码。这是辩论的关键点之一——人们真的会在开源项目中审查代码吗？各种因素可以减少审查的数量：是一个利基或很少使用的产品（那里很少有潜在的审查者），开发者数量少，以及使用很少使用的计算机语言。显然，只有一个开发者和没有其他任何类型贡献者的程序没有这种审查。另一方面，一个有主要作者和许多偶尔审查代码并做出贡献的人的程序表明，其他人正在审查代码（至少是为了创建贡献）。一般来说，如果有更多的审查者，通常有更高的可能性有人会识别出缺陷——这是“许多眼睛”理论的基础。请注意，例如，OpenBSD项目持续检查程序的安全漏洞，因此其最内层的组件肯定已经经过了长时间的审查。由于OSS/FS讨论通常是公开进行的，这种审查水平是潜在用户可以自己判断的。
- en: One factor that can particularly reduce review likelihood is not actually being
    open source. Some vendors like to posture their “disclosed source” (also called
    “source available”) programs as being open source, but since the program owner
    has extensive exclusive rights, others will have far less incentive to work “for
    free” for the owner on the code. Even open source licenses which have unusually
    asymmetric rights (such as the MPL) have this problem. After all, people are less
    likely to voluntarily participate if someone else will have rights to their results
    that they don’t have (as Bruce Perens says, “who wants to be someone else’s unpaid
    employee?”). In particular, since the reviewers with the most incentive tend to
    be people trying to modify the program, this disincentive to participate reduces
    the number of “eyeballs”. Elias Levy made this mistake in his article about open
    source security; his examples of software that had been broken into (e.g., TIS’s
    Gauntlet) were not, at the time, open source.
  id: totrans-111
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 一个可能特别降低审查可能性的因素实际上并不是开源。一些供应商喜欢将他们的“披露源代码”程序（也称为“源代码可用”）定位为开源，但由于程序所有者拥有广泛的独家权利，其他人将很少有动力为所有者免费工作在代码上。即使是具有异常不对称权利的开源许可证（如MPL）也存在这个问题。毕竟，如果其他人将有权获得他们的成果而他们自己没有（正如布鲁斯·佩雷斯所说，“谁愿意成为别人的无偿雇员？”），人们自愿参与的意愿就会降低。特别是，由于最有激励力的审查者往往是试图修改程序的人，这种参与的不激励因素减少了“眼睛”的数量。伊利亚斯·利维在他的关于开源安全性的文章中犯了错误；他举的软件被破解的例子（例如，TIS的Gauntlet）在那时并不是开源的。
- en: Second, at least some of the people developing and reviewing the code must know
    how to write secure programs. Hopefully the existence of this book will help.
    Clearly, it doesn’t matter if there are “many eyeballs” if none of the eyeballs
    know what to look for. Note that it’s not necessary for everyone to know how to
    write secure programs, as long as those who do know how are examining the code
    changes.
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第二，至少一些开发和审查代码的人必须知道如何编写安全程序。希望这本书的存在能有所帮助。显然，如果没有人知道要寻找什么，那么“许多眼睛”也没有用。请注意，并非每个人都必须知道如何编写安全程序，只要那些知道的人正在审查代码更改即可。
- en: Third, once found, these problems need to be fixed quickly and their fixes distributed.
    Open source systems tend to fix the problems quickly, but the distribution is
    not always smooth. For example, the OpenBSD developers do an excellent job of
    reviewing code for security flaws - but they don’t always report the identified
    problems back to the original developer. Thus, it’s quite possible for there to
    be a fixed version in one system, but for the flaw to remain in another. I believe
    this problem is lessening over time, since no one “downstream” likes to repeatedly
    fix the same problem. Of course, ensuring that security patches are actually installed
    on end-user systems is a problem for both open source and closed source software.
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第三，一旦发现问题，就需要迅速修复并分发其修复方案。开源系统通常能迅速修复问题，但分发并不总是顺利。例如，OpenBSD 开发者对代码进行安全漏洞审查做得非常出色——但他们并不总是将识别出的问题报告给原始开发者。因此，在某个系统中可能存在修复版本，但在另一个系统中漏洞仍然存在。我相信随着时间的推移，这个问题正在减少，因为没有人“下游”喜欢反复修复相同的问题。当然，确保安全补丁实际上安装在了最终用户系统上，对于开源和闭源软件都是一个问题。
- en: Another advantage of open source is that, if you find a problem, you can fix
    it immediately. This really doesn’t have any counterpart in closed source.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 开源的另一个优点是，如果你发现一个问题，你可以立即修复它。这在闭源中是没有对应的。
- en: In short, the effect on security of open source software is still a major debate
    in the security community, though a large number of prominent experts believe
    that it has great potential to be more secure.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，开源软件对安全性的影响在安全社区中仍然是一个主要的争论点，尽管大量知名专家认为它具有更大的安全潜力。
- en: 2.5\. Types of Secure Programs
  id: totrans-116
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 2.5. 安全程序类型
- en: 原文：[https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/types-of-programs.html](https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/types-of-programs.html)
  id: totrans-117
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/types-of-programs.html](https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/types-of-programs.html)
- en: 'Many different types of programs may need to be secure programs (as the term
    is defined in this book). Some common types are:'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 许多不同类型的程序可能需要是安全程序（如本书中定义的术语）。一些常见的类型包括：
- en: Application programs used as viewers of remote data. Programs used as viewers
    (such as word processors or file format viewers) are often asked to view data
    sent remotely by an untrusted user (this request may be automatically invoked
    by a web browser). Clearly, the untrusted user’s input should not be allowed to
    cause the application to run arbitrary programs. It’s usually unwise to support
    initialization macros (run when the data is displayed); if you must, then you
    must create a secure sandbox (a complex and error-prone task that almost never
    succeeds, which is why you shouldn’t support macros in the first place). Be careful
    of issues such as buffer overflow, discussed in [Chapter 6](buffer-overflow.html),
    which might allow an untrusted user to force the viewer to run an arbitrary program.
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用作远程数据查看器的应用程序。用作查看器（如文字处理程序或文件格式查看器）的程序通常会被要求查看由不受信任的用户发送的远程数据（此请求可能由网络浏览器自动调用）。显然，不应允许不受信任的用户输入导致应用程序运行任意程序。通常支持初始化宏（在数据显示时运行）是不明智的；如果必须这样做，那么你必须创建一个安全沙盒（这是一个复杂且容易出错的任务，几乎从未成功，这也是为什么一开始就不应该支持宏的原因）。小心像缓冲区溢出这样的问题，这些问题在[第6章](buffer-overflow.html)中讨论过，可能会允许不受信任的用户强制查看器运行任意程序。
- en: Application programs used by the administrator (root). Such programs shouldn’t
    trust information that can be controlled by non-administrators.
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 管理员（root）使用的应用程序。这些程序不应信任非管理员可以控制的信息。
- en: Local servers (also called daemons).
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 本地服务器（也称为守护进程）。
- en: Network-accessible servers (sometimes called network daemons).
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可通过网络访问的服务器（有时称为网络守护进程）。
- en: Web-based applications (including CGI scripts). These are a special case of
    network-accessible servers, but they’re so common they deserve their own category.
    Such programs are invoked indirectly via a web server, which filters out some
    attacks but nevertheless leaves many attacks that must be withstood.
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基于Web的应用程序（包括CGI脚本）。这些是网络可访问服务器的特殊情况，但由于它们非常普遍，因此值得单独分类。这类程序是通过Web服务器间接调用的，Web服务器可以过滤掉一些攻击，但仍然有许多攻击必须承受。
- en: Applets (i.e., programs downloaded to the client for automatic execution). This
    is something Java is especially famous for, though other languages (such as Python)
    support mobile code as well. There are several security viewpoints here; the implementer
    of the applet infrastructure on the client side has to make sure that the only
    operations allowed are “safe” ones, and the writer of an applet has to deal with
    the problem of hostile hosts (in other words, you can’t normally trust the client).
    There is some research attempting to deal with running applets on hostile hosts,
    but frankly I’m skeptical of the value of these approaches and this subject is
    exotic enough that I don’t cover it further here.
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 小程序（即下载到客户端以自动执行的程序）。这是Java特别著名的事情，尽管其他语言（如Python）也支持移动代码。这里有几个安全观点；客户端小程序基础设施的实现者必须确保只允许“安全”的操作，而小程序的编写者必须处理恶意主机的难题（换句话说，你通常不能信任客户端）。有一些研究试图处理在恶意主机上运行小程序的问题，但坦白说，我对这些方法的价值持怀疑态度，这个主题足够奇特，所以我在这里没有进一步讨论。
- en: setuid/setgid programs. These programs are invoked by a local user and, when
    executed, are immediately granted the privileges of the program’s owner and/or
    owner’s group. In many ways these are the hardest programs to secure, because
    so many of their inputs are under the control of the untrusted user and some of
    those inputs are not obvious.
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: setuid/setgid程序。这些程序由本地用户调用，在执行时，立即获得程序所有者及其/或所有者组的权限。在许多方面，这些是最难保护的程序，因为它们的大多数输入都受不受信任用户的控制，其中一些输入并不明显。
- en: This book merges the issues of these different types of program into a single
    set. The disadvantage of this approach is that some of the issues identified here
    don’t apply to all types of programs. In particular, setuid/setgid programs have
    many surprising inputs and several of the guidelines here only apply to them.
    However, things are not so clear-cut, because a particular program may cut across
    these boundaries (e.g., a CGI script may be setuid or setgid, or be configured
    in a way that has the same effect), and some programs are divided into several
    executables each of which can be considered a different “type” of program. The
    advantage of considering all of these program types together is that we can consider
    all issues without trying to apply an inappropriate category to a program. As
    will be seen, many of the principles apply to all programs that need to be secured.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 本书将这些不同类型程序的问题合并为一个单一集合。这种方法的缺点是，这里确定的一些问题并不适用于所有类型的程序。特别是，setuid/setgid程序有许多意外的输入，这里的一些指南仅适用于它们。然而，事情并不那么简单明了，因为某个特定的程序可能跨越这些边界（例如，CGI脚本可能是setuid或setgid，或者配置成具有相同效果的方式），而且一些程序被分成几个可执行文件，每个可执行文件都可以被视为不同的“类型”的程序。考虑所有这些程序类型的优点是，我们可以考虑所有问题，而无需试图将不适当的类别应用于程序。正如将看到的，许多原则适用于所有需要被保护的程序。
- en: There is a slight bias in this book toward programs written in C, with some
    notes on other languages such as C++, Perl, PHP, Python, Ada95, and Java. This
    is because C is the most common language for implementing secure programs on Unix-like
    systems (other than CGI scripts, which tend to use languages such as Perl, PHP,
    or Python). Also, most other languages’ implementations call the C library. This
    is not to imply that C is somehow the “best” language for this purpose, and most
    of the principles described here apply regardless of the programming language
    used.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书在某种程度上偏向于用C语言编写的程序，并对其他语言如C++、Perl、PHP、Python、Ada95和Java做了一些注释。这是因为C语言是Unix-like系统上实现安全程序最常用的语言（除了CGI脚本，它们通常使用Perl、PHP或Python等语言）。此外，大多数其他语言的实现都调用了C库。这并不是说C语言在实现这一目的上“最好”，这里描述的大多数原则无论使用哪种编程语言都适用。
- en: 2.6\. Paranoia is a Virtue
  id: totrans-128
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 2.6. 偏执是一种美德
- en: 原文：[https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/paranoia.html](https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/paranoia.html)
  id: totrans-129
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/paranoia.html](https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/paranoia.html)
- en: The primary difficulty in writing secure programs is that writing them requires
    a different mind-set, in short, a paranoid mind-set. The reason is that the impact
    of errors (also called defects or bugs) can be profoundly different.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 编写安全程序的主要困难在于，编写它们需要不同的思维方式，简而言之，就是偏执的思维方式。原因是错误的（也称为缺陷或错误）的影响可能非常不同。
- en: Normal non-secure programs have many errors. While these errors are undesirable,
    these errors usually involve rare or unlikely situations, and if a user should
    stumble upon one they will try to avoid using the tool that way in the future.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 正常的非安全程序有很多错误。虽然这些错误是不受欢迎的，但这些错误通常涉及罕见或不寻常的情况，如果用户偶然遇到一个错误，他们将来会尽量避免以这种方式使用该工具。
- en: In secure programs, the situation is reversed. Certain users will intentionally
    search out and cause rare or unlikely situations, in the hope that such attacks
    will give them unwarranted privileges. As a result, when writing secure programs,
    paranoia is a virtue.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 在安全程序中，情况相反。某些用户会故意寻找并造成罕见或不寻常的情况，希望这样的攻击能给他们带来不应得的特权。因此，在编写安全程序时，偏执是一种美德。
- en: 2.7\. Why Did I Write This Document?
  id: totrans-133
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 2.7. 为什么我写这份文档？
- en: 原文：[https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/why-write.html](https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/why-write.html)
  id: totrans-134
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/why-write.html](https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/why-write.html)
- en: 'One question I’ve been asked is “why did you write this book”? Here’s my answer:
    Over the last several years I’ve noticed that many application developers seem
    to keep falling into the same security pitfalls, again and again. Auditors were
    slowly catching problems, but it would have been better if the problems weren’t
    put into the code in the first place. I believe that part of the problem was that
    there wasn’t a single, obvious place where developers could go and get information
    on how to avoid known pitfalls. The information was publicly available, but it
    was often hard to find, out-of-date, incomplete, or had other problems. Most such
    information didn’t particularly discuss Linux at all, even though it was becoming
    widely used! That leads up to the answer: I developed this book in the hope that
    future software developers won’t repeat past mistakes, resulting in more secure
    systems. You can see a larger discussion of this at [http://www.linuxsecurity.com/feature_stories/feature_story-6.html](http://www.linuxsecurity.com/feature_stories/feature_story-6.html).'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 我被问到的其中一个问题是“你为什么写这本书”？以下是我的回答：在过去的几年里，我发现许多应用开发者似乎一直在重复犯同样的安全错误。审计员逐渐发现了问题，但最好是在代码中一开始就避免这些问题。我相信问题的一部分是，没有单一、明显的地方让开发者去获取如何避免已知陷阱的信息。这些信息是公开可用的，但往往很难找到，过时，不完整，或者有其他问题。大多数此类信息根本不讨论Linux，尽管它已经被广泛使用！这导致了答案：我编写这本书的目的是希望未来的软件开发者不会重复过去的错误，从而构建更安全的系统。你可以在[http://www.linuxsecurity.com/feature_stories/feature_story-6.html](http://www.linuxsecurity.com/feature_stories/feature_story-6.html)看到对此的更深入讨论。
- en: 'A related question that could be asked is “why did you write your own book
    instead of just referring to other documents”? There are several answers:'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 一个相关的问题是“你为什么写自己的书而不是仅仅参考其他文档”？有几个答案：
- en: Much of this information was scattered about; placing the critical information
    in one organized document makes it easier to use.
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这部分信息大部分是分散的；将关键信息放在一个有组织的文档中，使其更容易使用。
- en: Some of this information is not written for the programmer, but is written for
    an administrator or user.
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 其中一些信息并非为程序员编写，而是为管理员或用户编写的。
- en: Much of the available information emphasizes portable constructs (constructs
    that work on all Unix-like systems), and failed to discuss Linux at all. It’s
    often best to avoid Linux-unique abilities for portability’s sake, but sometimes
    the Linux-unique abilities can really aid security. Even if non-Linux portability
    is desired, you may want to support the Linux-unique abilities when running on
    Linux. And, by emphasizing Linux, I can include references to information that
    is helpful to someone targeting Linux that is not necessarily true for others.
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 大部分可用的信息都强调了可移植的结构（在所有类Unix系统上都能工作的结构），但并未讨论Linux。通常最好为了避免可移植性问题而避免使用Linux特有的功能，但有时Linux特有的功能确实能帮助提高安全性。即使希望实现非Linux的可移植性，当在Linux上运行时，你可能仍然希望支持Linux特有的功能。而且，通过强调Linux，我可以包括对那些针对Linux但可能不适用于其他人的信息的引用。
- en: 2.8\. Sources of Design and Implementation Guidelines
  id: totrans-140
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 2.8. 设计和实现指南的来源
- en: 原文：[https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/sources-of-guidelines.html](https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/sources-of-guidelines.html)
  id: totrans-141
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/sources-of-guidelines.html](https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/sources-of-guidelines.html)
- en: Several documents help describe how to write secure programs (or, alternatively,
    how to find security problems in existing programs), and were the basis for the
    guidelines highlighted in the rest of this book.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 几份文档有助于描述如何编写安全程序（或者，也可以说是如何发现现有程序中的安全漏洞），并且是本书其余部分所强调的指南的基础。
- en: For general-purpose servers and setuid/setgid programs, there are a number of
    valuable documents (though some are difficult to find without having a reference
    to them).
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 对于通用服务器和setuid/setgid程序，有许多有价值的文档（尽管在没有相关参考的情况下，一些文档可能难以找到）。
- en: Matt Bishop [1996, 1997] has developed several extremely valuable papers and
    presentations on the topic, and in fact he has a web page dedicated to the topic
    at [http://olympus.cs.ucdavis.edu/~bishop/secprog.html](http://olympus.cs.ucdavis.edu/~bishop/secprog.html).
    AUSCERT has released a programming checklist [[AUSCERT 1996]](ftp://ftp.auscert.org.au/pub/auscert/papers/secure_programming_checklist),
    based in part on chapter 23 of Garfinkel and Spafford’s book discussing how to
    write secure SUID and network programs [[Garfinkel 1996]](http://www.oreilly.com/catalog/puis).
    [Galvin [1998a]](http://www.sunworld.com/swol-04-1998/swol-04-security.html) described
    a simple process and checklist for developing secure programs; he later updated
    the checklist in [Galvin [1998b]](http://www.sunworld.com/sunworldonline/swol-08-1998/swol-08-security.html).
    [Sitaker [1999]](http://www.pobox.com/~kragen/security-holes.html) presents a
    list of issues for the “Linux security audit” team to search for. [Shostack [1999]](http://www.homeport.org/~adam/review.html)
    defines another checklist for reviewing security-sensitive code. The NCSA [[NCSA]](http://www.ncsa.uiuc.edu/General/Grid/ACES/security/programming)
    provides a set of terse but useful secure programming guidelines. Other useful
    information sources include the *Secure Unix Programming FAQ* [[Al-Herbish 1999]](http://www.whitefang.com/sup/),
    the *Security-Audit’s Frequently Asked Questions* [[Graham 1999]](http://lsap.org/faq.txt),
    and [Ranum [1998]](http://www.clark.net/pub/mjr/pubs/pdf/). Some recommendations
    must be taken with caution, for example, the BSD setuid(7) man page [[Unknown]](http://www.homeport.org/~adam/setuid.7.html)
    recommends the use of access(3) without noting the dangerous race conditions that
    usually accompany it. Wood [1985] has some useful but dated advice in its “Security
    for Programmers” chapter. [Bellovin [1994]](http://www.research.att.com/~smb/talks)
    includes useful guidelines and some specific examples, such as how to restructure
    an ftpd implementation to be simpler and more secure. FreeBSD provides some guidelines
    [FreeBSD [1999]](http://www.freebsd.org/security/security.html) [[Quintero 1999]](http://developer.gnome.org/doc/guides/programming-guidelines/book1.html)
    is primarily concerned with GNOME programming guidelines, but it includes a section
    on security considerations. [[Venema 1996]](http://www.fish.com/security/murphy.html)
    provides a detailed discussion (with examples) of some common errors when programming
    secure programs (widely-known or predictable passwords, burning yourself with
    malicious data, secrets in user-accessible data, and depending on other programs).
    [[Sibert 1996]](http://www.fish.com/security/maldata.html) describes threats arising
    from malicious data. Michael Bacarella’s article [The Peon’s Guide To Secure System
    Development](http://m.bacarella.com/papers/secsoft/html) provides a nice short
    set of guidelines.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: Matt Bishop [1996, 1997] 在这个主题上开发了几个极其有价值的论文和演示文稿，实际上他有一个专门针对这个主题的网页，网址是 [http://olympus.cs.ucdavis.edu/~bishop/secprog.html](http://olympus.cs.ucdavis.edu/~bishop/secprog.html)。AUSCERT
    发布了一个编程检查清单 [[AUSCERT 1996]](ftp://ftp.auscert.org.au/pub/auscert/papers/secure_programming_checklist)，部分基于
    Garfinkel 和 Spafford 的书中第 23 章讨论如何编写安全的 SUID 和网络程序 [[Garfinkel 1996]](http://www.oreilly.com/catalog/puis)。[Galvin
    [1998a]](http://www.sunworld.com/swol-04-1998/swol-04-security.html) 描述了一个简单的流程和检查清单，用于开发安全程序；他后来在
    [Galvin [1998b]](http://www.sunworld.com/sunworldonline/swol-08-1998/swol-08-security.html)
    中更新了检查清单。[Sitaker [1999]](http://www.pobox.com/~kragen/security-holes.html) 为“Linux
    安全审计”团队提供了一份需要搜索的问题清单。[Shostack [1999]](http://www.homeport.org/~adam/review.html)
    定义了另一个用于审查安全敏感代码的检查清单。NCSA [[NCSA]](http://www.ncsa.uiuc.edu/General/Grid/ACES/security/programming)
    提供了一套简洁但有用的安全编程指南。其他有用的信息来源包括 *Secure Unix Programming FAQ* [[Al-Herbish 1999]](http://www.whitefang.com/sup/)、*Security-Audit’s
    Frequently Asked Questions* [[Graham 1999]](http://lsap.org/faq.txt) 和 [Ranum
    [1998]](http://www.clark.net/pub/mjr/pubs/pdf/)。一些推荐必须谨慎对待，例如，BSD setuid(7) 手册页
    [[Unknown]](http://www.homeport.org/~adam/setuid.7.html) 推荐使用 access(3)，但没有提到通常伴随它的危险竞争条件。Wood
    [1985] 在其“程序员安全”章节中提供了一些有用但过时的建议。[Bellovin [1994]](http://www.research.att.com/~smb/talks)
    包括有用的指南和一些具体示例，例如如何重构 ftpd 实现以使其更简单、更安全。FreeBSD 提供了一些指南 [FreeBSD [1999]](http://www.freebsd.org/security/security.html)
    [[Quintero 1999]](http://developer.gnome.org/doc/guides/programming-guidelines/book1.html)
    主要关注 GNOME 编程指南，但包括一个关于安全考虑的章节。[Venema 1996](http://www.fish.com/security/murphy.html)
    提供了一些编程安全程序时常见的错误（广为人知或可预测的密码、用恶意数据烧伤自己、用户可访问数据中的秘密以及依赖于其他程序）的详细讨论（附带示例）。[[Sibert
    1996]](http://www.fish.com/security/maldata.html) 描述了恶意数据引起的威胁。Michael Bacarella
    的文章 [The Peon’s Guide To Secure System Development](http://m.bacarella.com/papers/secsoft/html)
    提供了一套很好的简短指南。
- en: There are many documents giving security guidelines for programs using the Common
    Gateway Interface (CGI) to interface with the web. These include [Van Biesbrouck
    [1996]](http://www.csclub.uwaterloo.ca/u/mlvanbie/cgisec), [Gundavaram [unknown]](http://language.perl.com/CPAN/doc/FAQs/cgi/perl-cgi-faq.html),
    [[Garfinkle 1997]](http://webreview.com/wr/pub/97/08/08/bookshelf) [Kim [1996]](http://www.eekim.com/pubs/cgibook),
    [Phillips [1995]](http://www.go2net.com/people/paulp/cgi-security/safe-cgi.txt),
    [Stein [1999]](http://www.w3.org/Security/Faq/www-security-faq.html), [[Peteanu
    2000]](http://members.home.net/razvan.peteanu), and [[Advosys 2000]](http://advosys.ca/tips/web-security.html).
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 有许多文档提供了使用通用网关接口（CGI）与网络接口的程序的安全指南。这些包括 [Van Biesbrouck [1996]](http://www.csclub.uwaterloo.ca/u/mlvanbie/cgisec),
    [Gundavaram [unknown]](http://language.perl.com/CPAN/doc/FAQs/cgi/perl-cgi-faq.html),
    [[Garfinkle 1997]](http://webreview.com/wr/pub/97/08/08/bookshelf) [Kim [1996]](http://www.eekim.com/pubs/cgibook),
    [Phillips [1995]](http://www.go2net.com/people/paulp/cgi-security/safe-cgi.txt),
    [Stein [1999]](http://www.w3.org/Security/Faq/www-security-faq.html), [[Peteanu
    2000]](http://members.home.net/razvan.peteanu), 和 [[Advosys 2000]](http://advosys.ca/tips/web-security.html)。
- en: There are many documents specific to a language, which are further discussed
    in the language-specific sections of this book. For example, the Perl distribution
    includes [perlsec(1)](http://www.perl.com/pub/doc/manual/html/pod/perlsec.html),
    which describes how to use Perl more securely. The Secure Internet Programming
    site at [http://www.cs.princeton.edu/sip](http://www.cs.princeton.edu/sip) is
    interested in computer security issues in general, but focuses on mobile code
    systems such as Java, ActiveX, and JavaScript; Ed Felten (one of its principles)
    co-wrote a book on securing Java ([[McGraw 1999]](http://www.securingjava.com))
    which is discussed in [Section 10.6](java.html). Sun’s security code guidelines
    provide some guidelines primarily for Java and C; it is available at [http://java.sun.com/security/seccodeguide.html](http://java.sun.com/security/seccodeguide.html).
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 有许多特定于语言的文档，这些文档在本书的语言特定部分中进一步讨论。例如，Perl 发行版包括 [perlsec(1)](http://www.perl.com/pub/doc/manual/html/pod/perlsec.html)，它描述了如何更安全地使用
    Perl。位于 [http://www.cs.princeton.edu/sip](http://www.cs.princeton.edu/sip) 的安全互联网编程网站对计算机安全问题感兴趣，但专注于移动代码系统，如
    Java、ActiveX 和 JavaScript；Ed Felten（其创始人之一）合著了一本关于保护 Java 的书 ([[McGraw 1999]](http://www.securingjava.com))，在
    [第 10.6 节](java.html) 中进行了讨论。Sun 的安全代码指南主要针对 Java 和 C 提供了一些指南；它可在 [http://java.sun.com/security/seccodeguide.html](http://java.sun.com/security/seccodeguide.html)
    获取。
- en: Yoder [1998] contains a collection of patterns to be used when dealing with
    application security. It’s not really a specific set of guidelines, but a set
    of commonly-used patterns for programming that you may find useful. The Schmoo
    group maintains a web page linking to information on how to write secure code
    at [http://www.shmoo.com/securecode](http://www.shmoo.com/securecode).
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: Yoder [1998] 收集了一系列在处理应用程序安全时可以使用的模式。它并不是一套具体的指南，而是一套编程中常用的模式，可能对你有用。Schmoo
    团队维护了一个网页，链接到有关如何编写安全代码的信息 [http://www.shmoo.com/securecode](http://www.shmoo.com/securecode)。
- en: There are many documents describing the issue from the other direction (i.e.,
    “how to crack a system”). One example is McClure [1999], and there’s countless
    amounts of material from that vantage point on the Internet. There are also more
    general documents on computer architectures on how attacks must be developed to
    exploit them, e.g., [LSD 2001]. The Honeynet Project has been collecting information
    (including statistics) on how attackers actually perform their attacks; see their
    website at [http://project.honeynet.org](http://project.honeynet.org) for more
    information. [Insecure Programming by example](http://community.corest.com/~gera/InsecureProgramming/)
    provides a set of insecure programs, intended for use as exercises to practice
    attacking insecure programs.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 还有许多文档从另一个方向描述了这个问题（即，“如何破解一个系统”）。一个例子是 McClure [1999]，在互联网上有大量从这个角度的材料。还有关于计算机体系结构的更普遍的文档，讨论了如何开发攻击来利用它们，例如
    [LSD 2001]。蜜网项目一直在收集有关攻击者实际攻击方式的信息（包括统计数据）；更多信息请访问他们的网站 [http://project.honeynet.org](http://project.honeynet.org)。[通过示例进行不安全编程](http://community.corest.com/~gera/InsecureProgramming/)
    提供了一系列不安全的程序，旨在用作练习攻击不安全程序的练习。
- en: There’s also a large body of information on vulnerabilities already identified
    in existing programs. This can be a useful set of examples of “what not to do,”
    though it takes effort to extract more general guidelines from the large body
    of specific examples. There are mailing lists that discuss security issues; one
    of the most well-known is [Bugtraq](http://SecurityFocus.com/forums/bugtraq/faq.html),
    which among other things develops a list of vulnerabilities. The CERT Coordination
    Center (CERT/CC) is a major reporting center for Internet security problems which
    reports on vulnerabilities. The CERT/CC occasionally produces advisories that
    provide a description of a serious security problem and its impact, along with
    instructions on how to obtain a patch or details of a workaround; for more information
    see [http://www.cert.org](http://www.cert.org). Note that originally the CERT
    was a small computer emergency response team, but officially “CERT” doesn’t stand
    for anything now. The Department of Energy’s [Computer Incident Advisory Capability
    (CIAC)](http://ciac.llnl.gov/ciac) also reports on vulnerabilities. These different
    groups may identify the same vulnerabilities but use different names. To resolve
    this problem, MITRE supports the Common Vulnerabilities and Exposures (CVE) list
    which creates a single unique identifier (“name”) for all publicly known vulnerabilities
    and security exposures identified by others; see [http://www.cve.mitre.org](http://www.cve.mitre.org).
    NIST’s ICAT is a searchable catalog of computer vulnerabilities, categorizing
    each CVE vulnerability so that they can be searched and compared later; see [http://csrc.nist.gov/icat](http://csrc.nist.gov/icat).
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 关于现有程序中已识别出的漏洞，也有大量信息。这可以是一组有用的“不要这样做”的例子，尽管从大量具体例子中提取更普遍的指导方针需要付出努力。有一些邮件列表讨论安全问题；其中最著名的是
    [Bugtraq](http://SecurityFocus.com/forums/bugtraq/faq.html)，它除了其他事情外，还开发了一个漏洞列表。CERT
    协调中心（CERT/CC）是互联网安全问题的主要报告中心，负责报告漏洞。CERT/CC 不时发布警告，提供对严重安全问题和其影响的描述，以及获取补丁或绕过细节的说明；更多信息请参阅
    [http://www.cert.org](http://www.cert.org)。请注意，最初 CERT 是一个小型计算机紧急响应小组，但现在官方上“CERT”并不代表任何含义。能源部的
    [计算机事件咨询能力（CIAC）](http://ciac.llnl.gov/ciac) 也报告漏洞。这些不同的团体可能会识别出相同的漏洞，但使用不同的名称。为了解决这个问题，MITRE
    支持通用漏洞和暴露（CVE）列表，为所有由他人识别的已知漏洞和安全暴露创建一个唯一的标识符（“名称”）；请参阅 [http://www.cve.mitre.org](http://www.cve.mitre.org)。NIST
    的 ICAT 是计算机漏洞的可搜索目录，对每个 CVE 漏洞进行分类，以便以后可以搜索和比较；请参阅 [http://csrc.nist.gov/icat](http://csrc.nist.gov/icat)。
- en: This book is a summary of what I believe are the most useful and important guidelines.
    My goal is a book that a good programmer can just read and then be fairly well
    prepared to implement a secure program. No single document can really meet this
    goal, but I believe the attempt is worthwhile. My objective is to strike a balance
    somewhere between a “complete list of all possible guidelines” (that would be
    unending and unreadable) and the various “short” lists available on-line that
    are nice and short but omit a large number of critical issues. When in doubt,
    I include the guidance; I believe in that case it’s better to make the information
    available to everyone in this “one stop shop” document. The organization presented
    here is my own (every list has its own, different structure), and some of the
    guidelines (especially the Linux-unique ones, such as those on capabilities and
    the FSUID value) are also my own. Reading all of the referenced documents listed
    above as well is highly recommended, though I realize that for many it’s impractical.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 本书是对我认为最有用和重要的指导方针的总结。我的目标是编写一本好书，让优秀的程序员阅读后能够相当充分地准备编写一个安全的程序。没有任何单一文件能够真正达到这个目标，但我相信这种尝试是值得的。我的目标是在这两个极端之间找到一个平衡点：“所有可能指导方针的完整列表”（这将是没有尽头的且无法阅读的）和在线上可获得的“各种简短”列表之间（它们很简洁，但省略了许多关键问题）。在不确定的情况下，我会包含指导方针；我相信在这种情况下，将信息提供给所有人这个“一站式”文件是更好的选择。这里呈现的组织是我自己的（每个列表都有自己的不同结构），其中一些指导方针（特别是Linux特有的，如关于能力和FSUID值）也是我自己的。强烈推荐阅读上面列出的所有参考文档，尽管我意识到对于许多人来说这是不切实际的。
- en: 2.9\. Other Sources of Security Information
  id: totrans-151
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 2.9. 其他安全信息来源
- en: 原文：[https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/other-sources.html](https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/other-sources.html)
  id: totrans-152
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/other-sources.html](https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/other-sources.html)
- en: 'There are a vast number of web sites and mailing lists dedicated to security
    issues. Here are some other sources of security information:'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 有大量专注于安全问题的网站和邮件列表。以下是一些其他安全信息来源：
- en: '[Securityfocus.com](http://www.securityfocus.com) has a wealth of general security-related
    news and information, and hosts a number of security-related mailing lists. See
    their website for information on how to subscribe and view their archives. A few
    of the most relevant mailing lists on SecurityFocus are:'
  id: totrans-154
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Securityfocus.com](http://www.securityfocus.com)拥有丰富的与安全相关的新闻和信息，并托管多个安全相关的邮件列表。请访问他们的网站以获取订阅和查看存档的信息。SecurityFocus上一些最相关的邮件列表包括：'
- en: 'The “Bugtraq” mailing list is, as noted above, a “full disclosure moderated
    mailing list for the detailed discussion and announcement of computer security
    vulnerabilities: what they are, how to exploit them, and how to fix them.”'
  id: totrans-155
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如上所述，“Bugtraq”邮件列表是一个“全面公开的、经过审核的邮件列表，用于详细讨论和宣布计算机安全漏洞：它们是什么，如何利用它们，以及如何修复它们。”
- en: The “secprog” mailing list is a moderated mailing list for the discussion of
    secure software development methodologies and techniques. I specifically monitor
    this list, and I coordinate with its moderator to ensure that resolutions reached
    in SECPROG (if I agree with them) are incorporated into this document.
  id: totrans-156
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: “secprog”邮件列表是一个经过审核的邮件列表，用于讨论安全软件开发方法和技巧。我特别关注这个列表，并与它的管理员协调，确保SECPROG中达成的解决方案（如果我同意）被纳入这份文档。
- en: The “vuln-dev” mailing list discusses potential or undeveloped holes.
  id: totrans-157
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: “vuln-dev”邮件列表讨论潜在或未开发的漏洞。
- en: 'IBM’s “developerWorks: Security” has a library of interesting articles. You
    can learn more from [http://www.ibm.com/developer/security](http://www.ibm.com/developer/security).'
  id: totrans-158
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'IBM的“developerWorks: Security”有一个有趣的文章库。你可以从[http://www.ibm.com/developer/security](http://www.ibm.com/developer/security)了解更多信息。'
- en: For Linux-specific security information, a good source is [LinuxSecurity.com](http://www.linuxsecurity.com).
    If you’re interested in auditing Linux code, places to see include the [Linux
    Security-Audit Project FAQ](http://www.linuxhelp.org/lsap.shtml) and [Linux Kernel
    Auditing Project](http://www.lkap.org) are dedicated to auditing Linux code for
    security issues.
  id: totrans-159
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于Linux特定的安全信息，一个很好的来源是[LinuxSecurity.com](http://www.linuxsecurity.com)。如果你对审计Linux代码感兴趣，可以查看[Linux
    Security-Audit Project FAQ](http://www.linuxhelp.org/lsap.shtml)和[Linux Kernel
    Auditing Project](http://www.lkap.org)，它们致力于审计Linux代码中的安全问题。
- en: Of course, if you’re securing specific systems, you should sign up to their
    security mailing lists (e.g., Microsoft's, Red Hat's, etc.) so you can be warned
    of any security updates.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，如果你正在保护特定的系统，你应该注册他们的安全邮件列表（例如，微软的、红帽的等），这样你就可以被警告任何安全更新。
- en: 2.10\. Document Conventions
  id: totrans-161
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 2.10\. 文档约定
- en: 原文：[https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/conventions.html](https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/conventions.html)
  id: totrans-162
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/conventions.html](https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/conventions.html)
- en: System manual pages are referenced in the format *name(number)*, where *number*
    is the section number of the manual. The pointer value that means “does not point
    anywhere” is called NULL; C compilers will convert the integer 0 to the value
    NULL in most circumstances where a pointer is needed, but note that nothing in
    the C standard requires that NULL actually be implemented by a series of all-zero
    bits. C and C++ treat the character “\0” (ASCII 0) specially, and this value is
    referred to as NIL in this book (this is usually called “NUL”, but “NUL” and “NULL”
    sound identical). Function and method names always use the correct case, even
    if that means that some sentences must begin with a lower case letter. I use the
    term “Unix-like” to mean Unix, Linux, or other systems whose underlying models
    are very similar to Unix; I can’t say POSIX, because there are systems such as
    Windows 2000 that implement portions of POSIX yet have vastly different security
    models.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 系统手册页以*名称(编号)*的格式引用，其中*编号*是手册的章节号。表示“不指向任何地方”的指针值称为NULL；在大多数需要指针的情况下，C编译器会将整数0转换为NULL值，但请注意，C标准中没有任何内容要求NULL实际上通过一系列全零位来实现。C和C++将字符“\0”（ASCII
    0）特别处理，本书中这个值被称为NIL（这通常被称为“NUL”，但“NUL”和“NULL”听起来很相似）。函数和方法名称始终使用正确的字母大小写，即使这意味着某些句子必须以小写字母开头。我使用“Unix-like”这个术语来表示Unix、Linux或其他底层模型与Unix非常相似的系统；我不能说POSIX，因为像Windows
    2000这样的系统虽然实现了POSIX的部分内容，但具有截然不同的安全模型。
- en: An attacker is called an “attacker”, “cracker”, or “adversary”, and not a “hacker”.
    Some journalists mistakenly use the word “hacker” instead of “attacker”; this
    book avoids this misuse, because many Linux and Unix developers refer to themselves
    as “hackers” in the traditional non-evil sense of the term. To many Linux and
    Unix developers, the term “hacker” continues to mean simply an expert or enthusiast,
    particularly regarding computers. It is true that some hackers commit malicious
    or intrusive actions, but many other hackers do not, and it’s unfair to claim
    that all hackers perform malicious activities. Many other glossaries and books
    note that not all hackers are attackers. For example, the Industry Advisory Council’s
    Information Assurance (IA) Special Interest Group (SIG)’s [Information Assurance
    Glossary](https://web.archive.org/web/20021214041204/http://www.iaconline.org/sig_infoassure.html)
    defines hacker as “A person who delights in having an intimate understanding of
    the internal workings of computers and computer networks. The term is misused
    in a negative context where ‘cracker’ should be used.” [The Jargon File](http://www.catb.org/~esr/jargon)
    has a [long and complicate definition for hacker](http://www.catb.org/~esr/jargon/html/entry/hacker.html),
    starting with “A person who enjoys exploring the details of programmable systems
    and how to stretch their capabilities, as opposed to most users, who prefer to
    learn only the minimum necessary.”; it notes although some people use the term
    to mean “A malicious meddler who tries to discover sensitive information by poking
    around”, it also states that this definition is deprecated and that the correct
    term for this sense is “cracker” instead.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 攻击者被称为“攻击者”、“黑客”或“对手”，而不是“黑客”。一些记者错误地使用“黑客”一词来代替“攻击者”；这本书避免这种误用，因为许多 Linux 和
    Unix 开发者将自己称为“黑客”，在传统上非邪恶的意义上使用这个术语。对于许多 Linux 和 Unix 开发者来说，“黑客”这个术语仍然仅仅意味着一个专家或爱好者，尤其是在计算机方面。确实，有些黑客会进行恶意或侵入性的行为，但许多其他黑客并没有，声称所有黑客都进行恶意活动是不公平的。许多其他词汇表和书籍也指出，并非所有黑客都是攻击者。例如，行业咨询委员会的信息保障（IA）特别兴趣小组（SIG）的[信息保障词汇表](https://web.archive.org/web/20021214041204/http://www.iaconline.org/sig_infoassure.html)将黑客定义为“一个喜欢深入了解计算机和计算机网络内部工作原理的人。这个术语在负面语境中被误用，而应该使用‘黑客’。”
    [《术语文件》](http://www.catb.org/~esr/jargon)对黑客有一个[长而复杂的定义](http://www.catb.org/~esr/jargon/html/entry/hacker.html)，从“一个喜欢探索可编程系统的细节以及如何扩展其功能的人”开始，与大多数只愿意学习最少必要知识的用户形成对比；它指出，尽管有些人使用这个术语来表示“一个试图通过四处窥探来发现敏感信息的有恶意的人”，但它也指出这个定义已被弃用，并且正确的术语应该是“黑客”。
- en: This book uses the *logical* quotation system, not the misleading *typesetters’*
    quotation system. This means that quoted information does *not* include any trailing
    punctuation if the punctuation is not part of the material being quoted. The typesetters’
    quotation system causes extraneous characters to be placed inside the quotes;
    this has no affect in poetry but is a serious problem when accuracy is important.
    The typesetters’ quotation system often falsifies quotes (since it includes punctuation
    not in the quote) and can be disastrously erroneous in code or computer commands.
    The logical quotation system is widely used in a variety of publications, including
    [*The Jargon File*](http://www.catb.org/jargon/html/writing-style.html), [Wikipedia](http://en.wikipedia.org/wiki/Wikipedia:Logical_quotation_on_Wikipedia),
    and the Linguistic Society of America. This book uses standard American (not British)
    spelling.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 本书使用的是*逻辑*引号系统，而不是误导性的*排字工*引号系统。这意味着，如果标点符号不是被引用材料的一部分，则引用的信息中不包含任何尾随标点。排字工的引号系统会导致无关字符被放置在引号内；这在诗歌中可能没有影响，但在准确性很重要的情况下却是一个严重问题。排字工的引号系统常常会伪造引语（因为它包括了引语中不存在的标点），在代码或计算机命令中可能会造成灾难性的错误。逻辑引号系统在各种出版物中广泛使用，包括[*《术语文件》*](http://www.catb.org/jargon/html/writing-style.html)、[维基百科](http://en.wikipedia.org/wiki/Wikipedia:Logical_quotation_on_Wikipedia)和美国语言学协会。本书使用标准的美国（而不是英国）拼写。
