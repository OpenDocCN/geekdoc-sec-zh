- en: Chapter 10\. Language-Specific Issues
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/language-specific.html](https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/language-specific.html)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '|   |  **Undoubtedly there are all sorts of languages in the world, yet none
    of them is without meaning.**  |'
  prefs: []
  type: TYPE_TB
- en: '|   | *1 Corinthians 14:10 (NIV)* |'
  prefs: []
  type: TYPE_TB
- en: '**Table of Contents**'
  prefs: []
  type: TYPE_NORMAL
- en: 10.1\. [C/C++](c-cpp.html)
  prefs: []
  type: TYPE_NORMAL
- en: 10.2\. [Perl](perl.html)
