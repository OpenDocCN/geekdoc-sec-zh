  prefs: []
  type: TYPE_NORMAL
- en: 10.5\. [Ada](ada.html)
  prefs: []
  type: TYPE_NORMAL
- en: 10.6\. [Java](java.html)
  prefs: []
  type: TYPE_NORMAL
- en: 10.7\. [Tcl](tcl.html)
  prefs: []
  type: TYPE_NORMAL
