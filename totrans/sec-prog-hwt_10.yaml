- en: Note that this solution presumes that the potentially malicious text is concatenated
    to the end of the text; as with all languages, make sure the attacker cannot control
    the format text.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，这个解决方案假设潜在的恶意文本被连接到文本的末尾；就像所有语言一样，确保攻击者不能控制文本格式。
- en: 'As a matter of style always use curly braces when using if, while, for, expr,
    and any other command which parses an argument using expr/eval/subst. Doing this
    will avoid a common error when using Tcl called unintended double substitution
    (aka double substitution). This is best explained by example; the following code
    is incorrect:'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一种风格，始终在if、while、for、expr和任何其他使用expr/eval/subst解析参数的命令中使用花括号。这样做将避免使用Tcl时常见的错误，即意外的双重替换（也称为双重替换）。这最好通过例子来解释；以下代码是错误的：
- en: '|  [PRE24]  |'
  id: totrans-152
  prefs: []
  type: TYPE_TB
  zh: '|  [PRE24]  |'
- en: 'The code is incorrect because the "![eof $file]" text will be evaluated by
    the Tcl parser when the while command is executed the first time, and not re-evaluated
    in every iteration as it should be. Instead, do this:'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 代码错误是因为在第一次执行while命令时，“![eof $file]”文本将被Tcl解析器评估，而不是在每次迭代中重新评估，正如它应该做的那样。相反，你应该这样做：
- en: '|  [PRE25]  |'
  id: totrans-154
  prefs: []
  type: TYPE_TB
  zh: '|  [PRE25]  |'
- en: Note that both the condition, and the action to be performed, are surrounded
    by curly braces. Although there are cases where the braces are redundant, they
    never hurt, and when you fail to include the curly braces where they’re needed
    (say, when making a minor change) subtle and hard-to-find errors often result.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，条件和要执行的操作都被大括号包围。尽管在某些情况下大括号是多余的，但它们并不会造成伤害，而且当您忘记在需要的地方包含大括号时（比如，在做一些小的更改时），往往会发生微妙且难以发现的错误。
- en: More information on good Tcl style can be found in documents such as [Ray Johnson’s
    Tcl Style Guide](http://www.tcl.tk/doc/styleGuide.pdf).
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 关于良好的 Tcl 风格的更多信息可以在诸如 [Ray Johnson 的 Tcl 风格指南](http://www.tcl.tk/doc/styleGuide.pdf)
    等文档中找到。
- en: In the past, I have stated that I don’t recommend Tcl for writing programs which
    must mediate a security boundary. Tcl seems to have improved since that time,
    so while I cannot guarantee Tcl will work for your needs, I can’t guarantee that
    any other language will work for you either. Again, my thanks to Wojciech Kocjan
    who provided some of these suggestions on how to write Tcl code for secure applications.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去，我曾表示不推荐使用 Tcl 编写必须处理安全边界的程序。自那时起，Tcl 似乎有所改进，因此虽然我不能保证 Tcl 会满足您的需求，但我也不能保证其他任何语言会满足您的需求。再次感谢
    Wojciech Kocjan，他提供了一些关于如何编写安全应用中 Tcl 代码的建议。
- en: 10.8\. PHP
  id: totrans-158
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 10.8\. PHP
- en: 原文：[https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/php.html](https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/php.html)
  id: totrans-159
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/php.html](https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/php.html)
- en: SecureReality has put out a very interesting paper titled “A Study In Scarlet
    - Exploiting Common Vulnerabilities in PHP” [Clowes 2001], which discusses some
    of the problems in writing secure programs in PHP, particularly in versions before
    PHP 4.1.0. Clowes concludes that “it is very hard to write a secure PHP application
    (in the default configuration of PHP), even if you try”.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: SecureReality 发布了一篇非常有趣的论文，题为“血色研究 - PHP 中常见漏洞的利用” [Clowes 2001]，讨论了在 PHP 中编写安全程序的一些问题，尤其是在
    PHP 4.1.0 之前的版本中。Clowes 总结说：“即使在默认配置下尝试编写安全的 PHP 应用程序（在 PHP 的默认配置中），也是非常困难的”。
- en: 'Granted, there are security issues in any language, but one particular issue
    stands out in older versions of PHP that arguably makes older PHP versions less
    secure than most languages: the way it loads data into its namespace. By default,
    in PHP (versions 4.1.0 and lower) all environment variables and values sent to
    PHP over the web are automatically loaded into the same namespace (global variables)
    that normal variables are loaded into - so attackers can set arbitrary variables
    to arbitrary values, which keep their values unless explicitly reset by a PHP
    program. In addition, PHP automatically creates variables with a default value
    when they’re first requested, so it’s common for PHP programs to not initialize
    variables. If you forget to set a variable, PHP can report it, but by default
    PHP won’t - and note that this simply an error report, it won’t stop an attacker
    who finds an unusual way to cause it. Thus, by default PHP allows an attacker
    to completely control the values of all variables in a program unless the program
    takes special care to override the attacker. Once the program takes over, it can
    reset these variables, but failing to reset any variable (even one not obvious)
    might open a vulnerability in the PHP program.'
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，任何语言都存在安全问题，但 PHP 的一个特定问题在旧版本中尤为突出，这使旧版本的 PHP 相比大多数语言来说安全性更低：它将数据加载到其命名空间的方式。默认情况下，在
    PHP（版本 4.1.0 及以下）中，所有环境变量和通过网络发送到 PHP 的值都会自动加载到与普通变量相同的命名空间（全局变量）中——因此攻击者可以设置任意变量为任意值，除非
    PHP 程序明确重置，这些值才会保持不变。此外，PHP 在首次请求时自动创建具有默认值的变量，因此 PHP 程序不初始化变量是很常见的。如果您忘记设置变量，PHP
    可以报告它，但默认情况下 PHP 不会——请注意，这只是一个错误报告，它不会阻止找到异常方法来引发它的攻击者。因此，默认情况下，PHP 允许攻击者完全控制程序中所有变量的值，除非程序特别小心地覆盖攻击者。一旦程序接管，它可以重置这些变量，但未能重置任何变量（即使是那些不明显变量）可能会在
    PHP 程序中打开漏洞。
- en: 'For example, the following PHP program (an example from Clowes) intends to
    only let those who know the password to get some important information, but an
    attacker can set “auth” in their web browser and subvert the authorization check:'
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，以下 PHP 程序（来自 Clowes 的示例）旨在仅允许知道密码的人获取一些重要信息，但攻击者可以在他们的网络浏览器中设置“auth”并绕过授权检查：
- en: '|  [PRE26]  |'
  id: totrans-163
  prefs: []
  type: TYPE_TB
  zh: '|  [PRE26]  |'
- en: I and many others have complained about this particularly dangerous problem;
    it’s particularly a problem because PHP is widely used. A language that’s supposed
    to be easy to use better make it easy to write secure programs in, after all.
    It’s possible to disable this misfeature in PHP by turning the setting “register_globals”
    to “off”, but by default PHP versions up through 4.1.0 default set this to “on”
    and PHP before 4.1.0 is harder to use with register_globals off. The PHP developers
    warned in their PHP 4.1.0 announcenment that “as of the next semi-major version
    of PHP, new installations of PHP will default to having register_globals set to
    off.” This has now happened; as of PHP version 4.2.0, External variables (from
    the environment, the HTTP request, cookies or the web server) are no longer registered
    in the global scope by default. The preferred method of accessing these external
    variables is by using the new Superglobal arrays, introduced in PHP 4.1.0.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 我和许多其他人都对这个问题表示了特别的担忧；这尤其是一个问题，因为PHP被广泛使用。毕竟，一种本应易于使用的语言应该使得编写安全的程序变得容易。通过将设置“register_globals”设置为“off”，可以在PHP中禁用这个错误特性，但默认情况下，PHP版本直到4.1.0都将此设置为“on”，而4.1.0之前的PHP版本在关闭register_globals时更难使用。PHP开发者在PHP
    4.1.0的公告中警告说：“从PHP的下一个半主要版本开始，PHP的新安装将默认将register_globals设置为off。”现在这已经发生了；从PHP版本4.2.0开始，默认情况下不再在全局范围内注册外部变量（来自环境、HTTP请求、cookie或Web服务器）。访问这些外部变量的首选方法是使用在PHP
    4.1.0中引入的新超级全局数组。
- en: PHP with “register_globals” set to “on” is a dangerous choice for nontrivial
    programs - it’s just too easy to write insecure programs. However, once “register_globals”
    is set to “off”, PHP is quite a reasonable language for development.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 将“register_globals”设置为“on”的PHP对于非平凡程序来说是一个危险的选择——编写不安全的程序真是太容易了。然而，一旦将“register_globals”设置为“off”，PHP就成为一个相当合理的开发语言。
- en: The secure default should include setting “register_globals” to “off”, and also
    including several functions to make it much easier for users to specify and limit
    the input they’ll accept from external sources. Then web servers (such as Apache)
    could separately configure this secure PHP installation. Routines could be placed
    in the PHP library to make it easy for users to list the input variables they
    want to accept; some functions could check the patterns these variables must have
    and/or the type that the variable must be coerced to. In my opinion, PHP is a
    bad choice for secure web development if you set register_globals on.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 安全的默认设置应包括将“register_globals”设置为“off”，并包括几个函数，使用户能够更容易地指定和限制他们从外部来源接受的输入。然后，Web服务器（如Apache）可以分别配置这个安全的PHP安装。可以将例程放入PHP库中，使用户能够列出他们想要接受的输入变量；一些函数可以检查这些变量必须具有的模式和/或变量必须被强制转换的类型。在我看来，如果你将register_globals设置为on，PHP不是一个安全的Web开发选择。
- en: As I suggested in earlier versions of this book, PHP has been modified to become
    a reasonable choice for secure web development. However, note that PHP doesn’t
    have a particularly good security vulnerability track record (e.g., register_globals,
    a file upload problem, and a format string problem in the error reporting library);
    I believe that security issues were not considered sufficiently in early editions
    of PHP; I also think that the PHP developers are now emphasizing security and
    that these security issues are finally getting worked out. One evidence is the
    major change that the PHP developers have made to get turn off register_globals;
    this had a significant impact on PHP users, and their willingness to make this
    change is a good sign. Unfortunately, it’s not yet clear how secure PHP really
    is; PHP just hasn’t had much of a track record now that the developers of PHP
    are examining it seriously for security issues. Hopefully this will become clear
    quickly.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我在本书的早期版本中所建议的，PHP已经被修改，成为安全Web开发的合理选择。然而，请注意，PHP在安全漏洞方面的记录并不特别出色（例如，register_globals、文件上传问题以及错误报告库中的格式字符串问题）；我相信在PHP的早期版本中，安全问题没有得到足够的考虑；我也认为PHP开发者现在正在强调安全性，并且这些安全问题最终得到了解决。一个证据是PHP开发者对关闭register_globals所做的重大改变；这对PHP用户产生了重大影响，他们愿意做出这个改变是一个好兆头。不幸的是，目前尚不清楚PHP实际上有多安全；PHP的开发者现在才开始认真检查安全问题，PHP的记录还没有太多。希望这会很快变得清楚。
- en: 'If you’ve decided to use PHP, here are some of my recommendations (many of
    these recommendations are based on ways to counter the issues that Clowes raises):'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你已经决定使用PHP，以下是我的一些推荐（许多这些建议是基于解决Clowes提出的问题的方法）：
- en: 'Set the PHP configuration option “register_globals” off, and use PHP 4.2.0
    or greater. PHP 4.1.0 adds several special arrays, particularly $_REQUEST, which
    makes it far simpler to develop software in PHP when “register_globals” is off.
    Setting register_globals off, which is the default in PHP 4.2.0, completely eliminates
    the most common PHP attacks. If you’re assuming that register_globals is off,
    you should check for this first (and halt if it’s not true) - that way, people
    who install your program will quickly know there’s a problem. Note that many third-party
    PHP applications cannot work with this setting, so it can be difficult to keep
    it off for an entire website. It’s possible to set register_globals off for only
    some programs. For example, for Apache, you could insert these lines into the
    file .htaccess in the PHP directory (or use Directory directives to control it
    further):'
  id: totrans-169
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将 PHP 配置选项“register_globals”关闭，并使用 PHP 4.2.0 或更高版本。PHP 4.1.0 添加了几个特殊数组，特别是 $_REQUEST，这使得在关闭“register_globals”时开发
    PHP 软件变得简单得多。关闭 register_globals（PHP 4.2.0 中的默认设置）完全消除了最常见的 PHP 攻击。如果你假设 register_globals
    已关闭，你应该首先检查这一点（如果实际情况不是这样，则停止操作）——这样，安装你的程序的人会很快知道存在问题。请注意，许多第三方 PHP 应用程序无法使用此设置，因此可能很难在整个网站上保持关闭状态。对于某些程序，可以仅关闭
    register_globals。例如，对于 Apache，你可以在 PHP 目录中的 .htaccess 文件中插入以下行（或使用 Directory 指令进一步控制）：
- en: '|  [PRE27]  |'
  id: totrans-170
  prefs:
  - PREF_IND
  type: TYPE_TB
  zh: '|  [PRE27]  |'
- en: However, the .htaccess file itself is ignored unless the Apache web server is
    configured to permit overrides; often the Apache global configuration is set so
    that AllowOverride is set to None. So, for Apache users, if you can convince your
    web hosting service to set “AllowOverride Options” in their configuration file
    (often /etc/http/conf/http.conf) for your host, do that. Then write helper functions
    to simplify loading the data you need (and only that data).
  id: totrans-171
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 然而，除非 Apache 网络服务器配置为允许覆盖，否则 .htaccess 文件本身会被忽略；通常 Apache 的全局配置设置为将 AllowOverride
    设置为 None。因此，对于 Apache 用户来说，如果你能说服你的网络托管服务在你的主机配置文件（通常是 /etc/http/conf/http.conf）中设置“AllowOverride
    Options”，那么请这样做。然后编写辅助函数以简化加载数据（仅加载数据）。
- en: If you must develop software where register_globals might be on while running
    (e.g., a widely-deployed PHP application), always set values not provided by the
    user. Don’t depend on PHP default values, and don’t trust any variable you haven’t
    explicitly set. Note that you have to do this for *every* entry point (e.g., every
    PHP program or HTML file using PHP). The best approach is to begin each PHP program
    by setting all variables you’ll be using, even if you’re simply resetting them
    to the usual default values (like "" or 0). This includes global variables referenced
    in included files, even all libraries, transitively. Unfortunately, this makes
    this recommendation hard to do, because few developers truly know and understand
    all global variables that may be used by all functions they call. One lesser alternative
    is to search through HTTP_GET_VARS, HTTP_POST_VARS, HTTP_COOKIE_VARS, and HTTP_POST_FILES
    to see if the user provided the data - but programmers often forget to check all
    sources, and what happens if PHP adds a new data source (e.g., HTTP_POST_FILES
    wasn’t in old versions of PHP). Of course, this simply tells you how to make the
    best of a bad situation; in case you haven’t noticed yet, turn off register_globals!
  id: totrans-172
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你必须开发在运行时可能开启 register_globals 的软件（例如，广泛部署的 PHP 应用程序），始终设置用户未提供的值。不要依赖 PHP
    默认值，也不要信任任何你没有明确设置的变量。请注意，你必须为 *每个* 入口点（例如，每个 PHP 程序或使用 PHP 的 HTML 文件）这样做。最佳做法是在每个
    PHP 程序开始时设置所有你将使用的变量，即使你只是将它们重置为通常的默认值（如 "" 或 0）。这包括在包含文件中引用的全局变量，甚至所有库，间接地。不幸的是，这使得这个建议难以实施，因为很少有开发者真正了解并理解他们可能调用的所有函数中可能使用的所有全局变量。一个较小的替代方案是搜索
    HTTP_GET_VARS、HTTP_POST_VARS、HTTP_COOKIE_VARS 和 HTTP_POST_FILES，以查看用户是否提供了数据——但程序员经常忘记检查所有来源，如果
    PHP 添加了新的数据源（例如，HTTP_POST_FILES 在 PHP 的旧版本中并不存在），会发生什么。当然，这仅仅告诉你如何最大限度地利用一个糟糕的情况；如果你还没有注意到，请关闭
    register_globals！
- en: 'Set the error reporting level to E_ALL, and resolve all errors reported by
    it during testing. Among other things, this will complain about un-initialized
    variables, which are a key issues in PHP. This is a good idea anyway whenever
    you start using PHP, because this helps debug programs, too. There are many ways
    to set the error reporting level, including in the “php.ini” file (global), the
    “.htttpd.conf” file (single-host), the “.htaccess” file (multi-host), or at the
    top of the script through the error_reporting function. I recommend setting the
    error reporting level in both the php.ini file and also at the top of the script;
    that way, you’re protected if (1) you forget to insert the command at the top
    of the script, or (2) move the program to another machine and forget to change
    the php.ini file. Thus, every PHP program should begin like this:'
  id: totrans-173
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将错误报告级别设置为 E_ALL，并在测试期间解决它报告的所有错误。除此之外，这还会对未初始化的变量提出警告，这是 PHP 中的关键问题。无论如何，当你开始使用
    PHP 时，这是一个好主意，因为这也有助于调试程序。设置错误报告级别有许多方法，包括在“php.ini”文件（全局）、“.htttpd.conf”文件（单主机）、“.htaccess”文件（多主机）中，或者在脚本顶部通过
    error_reporting 函数。我建议在 php.ini 文件和脚本顶部都设置错误报告级别；这样，如果你（1）忘记在脚本顶部插入命令，或者（2）将程序移到另一台机器并忘记更改
    php.ini 文件，你都会受到保护。因此，每个 PHP 程序都应该像这样开始：
- en: '|  [PRE28]  |'
  id: totrans-174
  prefs:
  - PREF_IND
  type: TYPE_TB
  zh: '|  [PRE28]  |'
- en: It could be argued that this error reporting should be turned on during development,
    but turned off when actually run on a real site (since such error message could
    give useful information to an attacker). The problem is that if they’re disabled
    during “actual use” it’s all too easy to leave them disabled during development.
    So for the moment, I suggest the simple approach of simply including it in every
    entrance. A much better approach is to record all errors, but direct the error
    reports so they’re only included in a log file (instead of having them reported
    to the attacker).
  id: totrans-175
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 可以争论说，这种错误报告应该在开发期间开启，但在实际运行在真实网站上时关闭（因为这样的错误信息可能会给攻击者提供有用的信息）。问题是，如果它们在“实际使用”期间被禁用，那么在开发期间也容易忘记启用它们。所以，目前我建议简单的方法，就是将其包含在每一个入口点。一个更好的方法是记录所有错误，但将错误报告直接导向日志文件（而不是将它们报告给攻击者）。
- en: Filter any user information used to create filenames carefully, in particular
    to prevent remote file access. PHP by default comes with “remote files” functionality
    -- that means that file-opening commands like fopen(), that in other languages
    can only open local files, can actually be used to invoke web or ftp requests
    from another site.
  id: totrans-176
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 仔细过滤用于创建文件名的任何用户信息，特别是为了防止远程文件访问。PHP 默认自带“远程文件”功能——这意味着像 fopen() 这样的文件打开命令，在其他语言中只能打开本地文件，但实际上可以用来从另一个网站发起网络或
    ftp 请求。
- en: Do not use old-style PHP file uploads; use the HTTP_POST_FILES array and related
    functions. PHP supports file uploads by uploading the file to some temporary directory
    with a special filename. PHP originally set a collection of variables to indicate
    where that filename was, but since an attacker can control variable names and
    their values, attackers could use that ability to cause great mischief. Instead,
    always use HTTP_POST_FILES and related functions to access uploaded files. Note
    that even in this case, PHP’s approach permits attackers to temporarily upload
    files to you with arbitrary content, which is risky by itself.
  id: totrans-177
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不要使用旧式的 PHP 文件上传；使用 HTTP_POST_FILES 数组和相关函数。PHP 通过将文件上传到某个临时目录并使用特殊文件名来支持文件上传。PHP
    最初设置了一系列变量来指示该文件名所在的位置，但由于攻击者可以控制变量名及其值，攻击者可以利用这一能力造成很大的麻烦。相反，始终使用 HTTP_POST_FILES
    和相关函数来访问上传的文件。请注意，即使在这种情况下，PHP 的方法也允许攻击者暂时上传任意内容的文件到你的服务器，这本身就具有风险。
- en: 'Only place protected entry points in the document tree; place all other code
    (which should be most of it) outside the document tree. PHP has a history of unfortunate
    advice on this topic. Originally, PHP users were supposed to use the “.inc” (include)
    extension for “included” files, but these included files often had passwords and
    other information, and Apache would just give requesters the contents of the “.inc”
    files when asked to do so when they were in the document tree. Then developers
    gave all files a “.php” extension - which meant that the contents weren’t seen,
    but now files never meant to be entry points became entry points and were sometimes
    exploitable. As mentioned earlier, the usual security advice is the best: place
    only the proected entry points (files) in the document tree, and place other code
    (e.g., libraries) outside the document tree. There shouldn’t be any “.inc” files
    in the document tree at all.'
  id: totrans-178
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 只在文档树中放置受保护的入口点；将所有其他代码（应该是大部分）放置在文档树之外。PHP在这方面有不幸的历史建议。最初，PHP用户应该使用“ .inc”（包含）扩展名来为“包含”文件，但这些包含文件通常包含密码和其他信息，当Apache在文档树中请求时，会直接将“
    .inc”文件的内容提供给请求者。然后开发者给所有文件都添加了“ .php”扩展名——这意味着内容不会被看到，但现在原本不是入口点的文件变成了入口点，有时可能被利用。如前所述，通常的安全建议是最好的：只在文档树中放置受保护的入口点（文件），并将其他代码（例如库）放置在文档树之外。文档树中根本不应该有任何“
    .inc”文件。
- en: Avoid the session mechanism. The “session” mechanism is handy for storing persistent
    data, but its current implementation has many problems. First, by default sessions
    store information in temporary files - so if you’re on a multi-hosted system,
    you open yourself up to many attacks and revelations. Even those who aren’t currently
    multi-hosted may find themselves multi-hosted later! You can "tie" this information
    into a database instead of the filesystem, but if others on a multi-hosted database
    can access that database with the same permissions, the problem is the same. There
    are also ambiguities if you’re not careful (“is this the session value or an attacker’s
    value”?) and this is another case where an attacker can force a file or key to
    reside on the server with content of their choosing - a dangerous situation -
    and the attacker can even control to some extent the name of the file or key where
    this data will be placed.
  id: totrans-179
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 避免使用会话机制。虽然“会话”机制对于存储持久数据来说很方便，但其当前实现存在许多问题。首先，默认情况下会话将信息存储在临时文件中——因此，如果你在一个多主机系统上，你将使自己容易受到许多攻击和泄露。即使那些目前没有多主机的人也可能在将来发现自己处于多主机状态！你可以将此信息“绑定”到数据库而不是文件系统，但如果其他多主机数据库的用户可以以相同的权限访问该数据库，问题仍然是相同的。如果不小心，也会存在一些歧义（“这是会话值还是攻击者的值？”），而且这也是攻击者可以强制将文件或密钥放置在服务器上，并包含他们选择的内容的另一个案例——这是一个危险的情况——攻击者甚至可以控制到一定程度将此数据放置的文件或密钥的名称。
- en: Use directives to limit privileges (such as safe_mode, disable_function, and
    open_basedir), but do not rely on them. These directives can help limit some simple
    casual attacks, so they’re worth applying. However, they’re unlikely to be sufficient
    to protect against real attacks; they depend only on the user-space PHP program
    to do protection, a function it’s not really designed to perform. Instead, you
    should employ operating system protections (e.g., running separate processes and
    users) for serious protection.
  id: totrans-180
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用指令来限制权限（例如safe_mode、disable_function和open_basedir），但不要过分依赖它们。这些指令可以帮助限制一些简单的偶然攻击，因此它们值得应用。然而，它们可能不足以保护免受真实攻击；它们仅依赖于用户空间PHP程序进行保护，而该程序并不是真正设计来执行此操作的。相反，你应该使用操作系统保护（例如，运行单独的进程和用户）来进行严肃的保护。
- en: 'For all inputs, check that they match a pattern for acceptability (as with
    any language), and then use type casting to coerce non-string data into the type
    it should have. Develop “helper” functions to easily check and import a selected
    list of (expected) inputs. PHP is loosely typed, and this can cause trouble. For
    example, if an input datum has the value "000", it won’t be equal to "0" nor is
    it empty(). This is particularly important for associative arrays, because their
    indexes are strings; this means that $data["000"] is different than $data["0"].
    For example, to make sure $bar has type double (after making sure it only has
    the format legal for a double):'
  id: totrans-181
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于所有输入，检查它们是否匹配可接受的模式（就像任何语言一样），然后使用类型转换将非字符串数据强制转换为应有的类型。开发“辅助”函数以轻松检查和导入所选的（预期）输入列表。PHP是弱类型语言，这可能会引起麻烦。例如，如果输入数据有值为"000"，它不会等于"0"也不会是空()。这对于关联数组尤其重要，因为它们的索引是字符串；这意味着$data["000"]与$data["0"]不同。例如，为了确保$bar具有double类型（在确保它只有double合法格式之后）：
- en: '|  [PRE29]  |'
  id: totrans-182
  prefs:
  - PREF_IND
  type: TYPE_TB
  zh: '|  [PRE29]  |'
- en: Be careful of any functions that execute PHP code as strings - make sure attackers
    cannot control the string contents. This includes eval(), exec(), include(), passthru(),
    popen(), preg_replace() when the /e modifier is used, require(), system(), and
    the backtick operator.
  id: totrans-183
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 小心任何将PHP代码作为字符串执行的函数 - 确保攻击者不能控制字符串内容。这包括eval()、exec()、include()、passthru()、popen()、preg_replace()（当使用/e修饰符时）、require()、system()和反引号操作符。
- en: Be especially careful of risky functions. For example, this includes functions
    that open files (e.g., fopen(), readfile(), and file()); make sure attackers cannot
    force the program to open arbitrary files. Older versions of PHP (prior to 4.3.0)
    had a buffer overflow vulnerability in the wordwrap() function, so if you use
    old versions beware (or even better, upgrade, and make sure your customers upgrade
    by checking the version number in the installer).
  id: totrans-184
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 特别小心有风险的函数。例如，这包括打开文件的函数（例如，fopen()、readfile() 和 file()）；确保攻击者不能强迫程序打开任意文件。PHP的旧版本（4.3.0之前）在wordwrap()函数中存在缓冲区溢出漏洞，所以如果你使用旧版本要小心（或者更好的做法是升级，并确保你的客户通过检查安装程序中的版本号来升级）。
- en: Use magic_quotes_gpc() where appropriate - this eliminates many kinds of attacks.
  id: totrans-185
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在适当的地方使用magic_quotes_gpc() - 这消除了许多种类的攻击。
- en: Avoid file uploads, and consider modifying the php.ini file to disable them
    (file_uploads = Off). File uploads have had security holes in the past, so on
    older PHP’s this is a necessity, and until more experience shows that they’re
    safe this isn’t a bad thing to remove. Remember, in general, to secure a system
    you should disable or remove anything you don’t need.
  id: totrans-186
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 避免文件上传，并考虑修改php.ini文件来禁用它们（file_uploads = Off）。文件上传过去存在安全漏洞，所以在较旧的PHP版本中这是必需的，并且直到有更多经验表明它们是安全的，这并不是一个坏主意来移除。记住，一般来说，为了确保系统安全，你应该禁用或移除你不需要的任何东西。
