- en: 'The issues discussed in the rest of this book generally apply to all languages
    (though some are more common, or not present, in particular languages). However,
    there are also many language-specific security issues. Many of them can be summarized
    as follows:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 本书余下部分讨论的问题通常适用于所有语言（尽管某些问题在特定语言中更为常见或不存在）。然而，也存在许多特定于语言的安全问题。其中许多可以概括如下：
- en: Turn on all relevant warnings and protection mechanisms available to you where
    practical. For compiled languages, this includes both compile-time mechanisms
    and run-time mechanisms. In general, security-relevant programs should compile
    cleanly with all warnings turned on.
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在实际可行的情况下，打开所有相关的警告和保护机制。对于编译型语言，这包括编译时机制和运行时机制。一般来说，与安全相关的程序应该在没有警告的情况下编译干净。
- en: If you can use a “safe mode” (e.g., a mode that limits the activities of the
    executable), do so. Many interpreted languages include such a mode. In general,
    don’t depend on the safe mode to provide absolute protection; most language’s
    safe modes have not been sufficiently analyzed for their security, and when they
    are, people usually discover many ways to exploit it. However, by writing your
    code so that it’s secure out of safe mode, and then adding the safe mode, you
    end up with defense-in-depth (since in many cases, an attacker has to break both
    your application code and the safe mode).
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果可以使用“安全模式”（例如，限制可执行文件活动的模式），请使用它。许多解释型语言包括这样的模式。一般来说，不要依赖安全模式提供绝对的保护；大多数语言的安全模式尚未得到充分的安全分析，并且当它们被分析时，人们通常会发现许多利用它的方法。然而，通过编写安全模式之外的代码，然后添加安全模式，你最终实现了多层次防御（因为在许多情况下，攻击者必须破坏你的应用程序代码和安全模式）。
- en: Avoid dangerous and deprecated operations in the language. By “dangerous”, I
    mean operations which are difficult to use correctly. For example, many languages
    include some mechanisms or functions that are “magical”, that is, they try to
    infer the “right” thing to do using a heuristic - generally you should avoid them,
    because an attacker may be able to exploit the heuristic and do something dangerous
    instead of what was intended. A common error is an “off-by-one” error, in which
    the bound is off by one, and sometimes these result in exploitable errors. In
    general, write code in a way that minimizes the likelihood of off-by-one errors.
    If there are standard conventions in the language (e.g., for writing loops), use
    them.
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 避免语言中的危险和已弃用操作。所谓“危险”，是指难以正确使用的操作。例如，许多语言包括一些“魔法”机制或函数，即它们试图通过启发式方法推断出“正确”的操作。通常你应该避免使用它们，因为攻击者可能能够利用启发式方法执行危险的操作而不是预期的操作。一个常见的错误是“偏移量错误”，其中边界偏移了一个单位，有时这些错误可能导致可利用的错误。一般来说，编写代码时应尽量减少偏移量错误的可能性。如果语言中有标准约定（例如，编写循环），则应使用它们。
- en: Ensure that the languages’ infrastructure (e.g., run-time library) is available
    and secured.
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确保语言的底层基础设施（例如，运行时库）可用且安全。
- en: Languages that automatically garbage-collect strings should be especially careful
    to immediately erase secret data (in particular secret keys and passwords).
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自动垃圾回收字符串的语言应特别注意立即擦除秘密数据（特别是秘密密钥和密码）。
- en: Know precisely the semantics of the operations that you are using. Look up each
    operation’s semantics in its documentation. Do not ignore return values unless
    you’re sure they cannot be relevant. Don’t ignore the difference between “signed”
    and “unsigned” values. This is particularly difficult in languages which don’t
    support exceptions, like C, but that’s the way it goes.
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 精确了解你所使用的操作的语义。在其文档中查找每个操作的语义。除非你确定它们不可能相关，否则不要忽略返回值。不要忽略“有符号”和“无符号”值之间的区别。这在不支持异常的语言中尤其困难，比如
    C，但就是这样。
- en: Here are some of the key issues for specific languages. However, do not forget
    the issues discussed elsewhere. For example, most languages have a formatting
    library, so be careful to ensure that an attacker cannot control the format commands
    (see [Section 9.4](control-formatting.html) for more information).
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些特定语言的要点。然而，不要忘记其他地方讨论过的问题。例如，大多数语言都有一个格式化库，因此请确保攻击者无法控制格式命令（有关更多信息，请参阅[第
    9.4 节](control-formatting.html)）。
- en: 10.1\. C/C++
  id: totrans-21
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 10.1\. C/C++
- en: 原文：[https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/c-cpp.html](https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/c-cpp.html)
  id: totrans-22
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/c-cpp.html](https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/c-cpp.html)
- en: It is possible to develop secure code using C or C++, but both languages include
    fundamental design decisions that make it more difficult to write secure code.
    C and C++ easily permit buffer overflows, force programmers to do their own memory
    management, and are fairly lax in their typing systems. For systems programs (such
    as an operating system kernel), C and C++ are fine choices. For applications,
    C and C++ are often over-used. Strongly consider using an even higher-level language,
    at least for the majority of the application. But clearly, there are many existing
    programs in C and C++ which won’t get completely rewritten, and many developers
    may choose to develop in C and C++.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 C 或 C++ 开发安全代码是可能的，但这两种语言都包含了一些基本的设计决策，使得编写安全代码变得更加困难。C 和 C++ 容易导致缓冲区溢出，强迫程序员进行自己的内存管理，并且在类型系统中相当宽松。对于系统程序（如操作系统内核），C
    和 C++ 是不错的选择。对于应用程序，C 和 C++ 往往被过度使用。强烈考虑使用更高层次的编程语言，至少对于应用程序的大部分部分。但显然，有许多现有的
    C 和 C++ 程序不会完全重写，许多开发者可能会选择在 C 和 C++ 中进行开发。
- en: One of the biggest security problems with C and C++ programs is buffer overflow;
    see [Chapter 6](buffer-overflow.html) for more information. C has the additional
    weakness of not supporting exceptions, which makes it easy to write programs that
    ignore critical error situations.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: C 和 C++ 程序最大的安全问题是缓冲区溢出；有关更多信息，请参阅[第 6 章](buffer-overflow.html)。
- en: 'Another problem with C and C++ is that developers have to do their own memory
    management (e.g., using malloc(), alloc(), free(), new, and delete), and failing
    to do it correctly may result in a security flaw. The more serious problem is
    that programs may erroneously free memory that should not be freed (e.g., because
    it’s already been freed). This can result in an immediate crash or be exploitable,
    allowing an attacker to cause arbitrary code to be executed; see [Anonymous Phrack
    2001]. Some systems (such as many GNU/Linux systems) don’t protect against double-freeing
    at all by default, and it is not clear that those systems which attempt to protect
    themselves are truly unsubvertable. Although I haven’t seen anything written on
    the subject, I suspect that using the incorrect call in C++ (e.g., mixing new
    and malloc()) could have similar effects. For example, on March 11, 2002, it was
    announced that the zlib library had this problem, affecting the many programs
    that use it. Thus, when testing programs on GNU/Linux, you should set the environment
    variable MALLOC_CHECK_ to 1 or 2, and you might consider executing your program
    with that environment variable set with 0, 1, 2. The reason for this variable
    is explained in GNU/Linux malloc(3) man page:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: C和C++的另一个问题是开发者必须自己进行内存管理（例如，使用malloc()、alloc()、free()、new和delete），如果操作不当可能会导致安全漏洞。更严重的问题是程序可能会错误地释放不应该释放的内存（例如，因为它已经被释放）。这可能导致程序立即崩溃或被利用，允许攻击者执行任意代码；参见[匿名Phrack
    2001]。一些系统（如许多GNU/Linux系统）默认根本不保护双重释放，而且不清楚那些试图保护自己的系统是否真正不可攻破。尽管我没有看到关于这个主题的任何书面材料，但我怀疑在C++中使用错误的调用（例如，混合new和malloc()）可能产生类似的效果。例如，2002年3月11日，宣布zlib库存在这个问题，影响了使用它的许多程序。因此，在GNU/Linux上测试程序时，你应该将环境变量MALLOC_CHECK_设置为1或2，并且你可能考虑在设置该环境变量为0、1、2的情况下执行你的程序。这个变量的原因在GNU/Linux
    malloc(3)手册页中解释如下：
- en: Recent versions of Linux libc (later than 5.4.23) and GNU libc (2.x) include
    a malloc implementation which is tunable via environment variables. When MALLOC_CHECK_
    is set, a special (less efficient) implementation is used which is designed to
    be tolerant against simple errors, such as double calls of free() with the same
    argument, or overruns of a single byte (off-by-one bugs). Not all such errors
    can be protected against, however, and memory leaks can result. If MALLOC_CHECK_
    is set to 0, any detected heap corruption is silently ignored; if set to 1, a
    diagnostic is printed on stderr; if set to 2, abort() is called immediately. This
    can be useful because otherwise a crash may happen much later, and the true cause
    for the problem is then very hard to track down.
  id: totrans-26
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: Linux libc（晚于5.4.23）和GNU libc（2.x）的最近版本包括一个可以通过环境变量调整的malloc实现。当MALLOC_CHECK_被设置时，将使用一个特殊（效率较低）的实现，该实现旨在对简单错误具有容错性，例如具有相同参数的双重free()调用，或单个字节的越界（off-by-one错误）。然而，并非所有此类错误都可以得到保护，并且可能会导致内存泄漏。如果MALLOC_CHECK_设置为0，则任何检测到的堆损坏都将被静默忽略；如果设置为1，则会在stderr上打印诊断信息；如果设置为2，则立即调用abort()。这可能是有用的，因为否则崩溃可能发生得晚得多，而真正的问题原因可能很难追踪。
- en: There are various tools to deal with this, such as Electric Fence and Valgrind;
    see [Section 11.7](tools.html) for more information. If unused memory is not free’d,
    (e.g., using free()), that unused memory may accumulate - and if enough unused
    memory can accumulate, the program may stop working. As a result, the unused memory
    may be exploitable by attackers to create a denial of service. It’s theoretically
    possible for attackers to cause memory to be fragmented and cause a denial of
    service, but usually this is a fairly impractical and low-risk attack.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 有各种工具可以处理这个问题，例如Electric Fence和Valgrind；有关更多信息，请参阅[第11.7节](tools.html)。如果未使用的内存没有被释放（例如，使用free()），那么这些未使用的内存可能会积累——如果足够的未使用内存积累，程序可能会停止工作。结果，未使用的内存可能被攻击者利用来创建拒绝服务。理论上，攻击者可能造成内存碎片化并导致拒绝服务，但通常这种攻击相当不切实际且风险较低。
- en: Be as strict as you reasonably can when you declare types. Where you can, use
    “enum” to define enumerated values (and not just a “char” or “int” with special
    values). This is particularly useful for values in switch statements, where the
    compiler can be used to determine if all legal values have been covered. Where
    it’s appropriate, use “unsigned” types if the value can’t be negative.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 在声明类型时尽可能严格。在可能的情况下，使用“enum”来定义枚举值（而不仅仅是具有特殊值的“char”或“int”）。这对于switch语句中的值特别有用，编译器可以用来确定是否覆盖了所有合法值。如果适当，如果值不能为负，则使用“unsigned”类型。
- en: One complication in C and C++ is that the character type “char” can be signed
    or unsigned, depending on the compiler and machine; the C standard permits either.
    When a signed char with its high bit set is saved in an integer, the result will
    be a negative number; in some cases this can be exploitable. In general, use “unsigned
    char” instead of char or signed char for buffers, pointers, and casts when dealing
    with character data that may have values greater than 127 (0x7f). And when compiling,
    try to invoke a compiler option that forces unspecified "char"s to be unsigned.
    Portable programs shouldn’t depend on whether a char is signed or not, and by
    forcing it to be unsigned, the resulting executable can avoid a few nasty security
    vulnerabilities. In gcc, you can make this happen using the "-funsigned-char"
    option.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: C 和 C++ 中一个复杂的问题是字符类型 “char” 可以是有符号或无符号的，这取决于编译器和机器；C 标准允许两者。当一个设置了高位的带符号 char
    被保存到整数中时，结果将是一个负数；在某些情况下这可能被利用。通常，在处理可能具有大于 127（0x7f）值的字符数据时，使用 “unsigned char”
    而不是 char 或 signed char 作为缓冲区、指针和类型转换。在编译时，尝试调用一个强制未指定的 "char" 为无符号的编译器选项。可移植程序不应依赖于
    char 是否有符号，通过强制它为无符号，生成的可执行文件可以避免一些讨厌的安全漏洞。在 gcc 中，你可以使用 "-funsigned-char" 选项来实现这一点。
- en: 'C and C++ are by definition rather lax in their type-checking support, but
    you can at least increase their level of checking so that some mistakes can be
    detected automatically. Turn on as many compiler warnings as you can and change
    the code to cleanly compile with them, and strictly use ANSI prototypes in separate
    header (.h) files to ensure that all function calls use the correct types. For
    C or C++ compilations using gcc, use at least the following as compilation flags
    (which turn on a host of warning messages) and try to eliminate all warnings (note
    that -O2 is used since some warnings can only be detected by the data flow analysis
    performed at higher optimization levels):'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: C 和 C++ 在类型检查支持方面定义上相当宽松，但你至少可以增加它们的检查级别，以便自动检测一些错误。尽可能打开编译器警告，并更改代码以干净地编译它们，并在单独的头文件
    (.h) 中严格使用 ANSI 原型，以确保所有函数调用都使用正确的类型。对于使用 gcc 的 C 或 C++ 编译，至少使用以下作为编译标志（这些标志会打开大量警告消息）并尝试消除所有警告（注意，使用
    -O2，因为一些警告只能在更高优化级别执行的数据流分析中检测到）：
- en: '|  [PRE0]  |'
  id: totrans-31
  prefs: []
  type: TYPE_TB
  zh: '|  [PRE0]  |'
- en: 'Doc Shankar (of IBM) recommends the following set of compiler options when
    using gcc; it may take some effort to make existing programs conform to all these
    checks, but these checks can also help find a number problems:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: IBM 的 Doc Shankar 建议在使用 gcc 时使用以下编译器选项集；使现有程序符合所有这些检查可能需要一些努力，但这些检查也可以帮助发现许多问题：
- en: '|  [PRE1]  |'
  id: totrans-33
  prefs: []
  type: TYPE_TB
  zh: '|  [PRE1]  |'
- en: You might want “-W -pedantic” too. Remember to add the "-funsigned-char" option
    to this set.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能还想使用 “-W -pedantic”。记住要添加 "-funsigned-char" 选项到这个集合中。
- en: 'Many C/C++ compilers can detect inaccurate format strings. For example, gcc
    can warn about inaccurate format strings for functions you create if you use its
    __attribute__() facility (a C extension) to mark such functions, and you can use
    that facility without making your code non-portable. Here is an example of what
    you’d put in your header (.h) file:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 许多 C/C++ 编译器可以检测不准确的格式字符串。例如，如果你使用 gcc 的 __attribute__() 功能（一个 C 扩展）来标记这样的函数，并且你可以使用这个功能而不使你的代码不可移植，gcc
    可以警告你创建的函数中不准确的格式字符串。以下是在你的头文件 (.h) 中可能包含的示例：
- en: '|  [PRE2]  |'
  id: totrans-36
  prefs: []
  type: TYPE_TB
  zh: '|  [PRE2]  |'
- en: The "format" attribute takes either "printf" or "scanf", and the numbers that
    follow are the parameter number of the format string and the first variadic parameter
    (respectively). The GNU docs talk about this well. Note that there are other __attribute__
    facilities as well, such as "noreturn" and "const".
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: '"format" 属性可以是 "printf" 或 "scanf"，后面的数字分别是格式字符串的参数数和第一个可变参数（分别）。GNU 文档对此有很好的说明。注意，还有其他
    __attribute__ 功能，例如 "noreturn" 和 "const"。'
- en: Avoid common errors made by C/C++ developers. Using warning systems and style
    checkers can help avoid common errors. For example, be careful about not using
    “=” when you mean “==”. The gcc compiler’s -Wall option, recommended above, turns
    on a -Wparenthesis option. This -Wparenthesis option warns you when incorrectly
    use "=", and requires adding extra parentheses if you really mean to use "=").
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 避免由 C/C++ 开发者犯的常见错误。使用警告系统和风格检查器可以帮助避免常见错误。例如，当你的意思是 “==” 时，要小心不要使用 “=”。上面推荐的
    gcc 编译器的 -Wall 选项打开了 -Wparenthesis 选项。这个 -Wparenthesis 选项会在错误地使用 “=” 时警告你，并且如果你真的想使用
    “=”，则需要添加额外的括号）。
- en: Some organizations have defined a subset of a well-known language to try to
    make common mistakes in it either impossible or more obvious. One better-known
    subset of C is the MISRA C guidelines [MISRA 1998]. If you intend to use a subset,
    it’s wise to use automated tools to check if you’ve actually used only a subset.
    There’s a proprietary tool called [Safer C](http://www.oakcomp.co.uk/SCT_About.html)
    that checks code to see if it meets most of the MISRA C requirements (it’s not
    quite 100%, because some MISRA C requirements are difficult to check automatically).
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 一些组织已经定义了一个知名语言的子集，试图使其中的常见错误要么不可能发生，要么更加明显。C的一个更知名的子集是MISRA C指南[MISRA 1998]。如果你打算使用子集，明智的做法是使用自动化工具来检查你是否实际上只使用了子集。有一个名为[Safer
    C](http://www.oakcomp.co.uk/SCT_About.html)的专有工具，它可以检查代码是否满足大多数MISRA C要求（它并不完全达到100%，因为一些MISRA
    C要求难以自动检查）。
- en: 'Other approaches include building many more safety checks into the language,
    or changing the language itself into a variant dialect that is hopefully easier
    to write secure programs in. have not had any experience using them: The Safe
    C Compiler (SCC) is a C-to-C compiler that adds extended pointer and array access
    semantics to automatically detect memory access errors. Its [front page](http://www.cs.wisc.edu/~austin/scc.html)
    and [talk](http://www.cs.wisc.edu/~austin/talk.scc) provide interesting information,
    but its distribution appears limited as of 2004. [Cyclone](http://www.research.att.com/projects/cyclone)
    is a variant of C with far more "compile-time, link-time, and run-time checks
    designed to ensure safety" (where they define safe as free of crashes, buffer
    overflows, format string attacks, and some other problems). At this point you’re
    really starting to use a different (though similar) language, and you should carefully
    decide on a language before its use.'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 其他方法包括在语言中构建更多的安全检查，或者将语言本身改变为一个更容易编写安全程序的变体方言。我还没有使用过它们：安全C编译器（Safe C Compiler，简称SCC）是一个C到C的编译器，它增加了扩展的指针和数组访问语义，以自动检测内存访问错误。它的[首页](http://www.cs.wisc.edu/~austin/scc.html)和[演讲](http://www.cs.wisc.edu/~austin/talk.scc)提供了有趣的信息，但截至2004年，其分发似乎有限。[Cyclone](http://www.research.att.com/projects/cyclone)是C的一个变体，它具有更多的“编译时、链接时和运行时检查，旨在确保安全性”（其中他们将安全性定义为无崩溃、缓冲区溢出、格式字符串攻击和一些其他问题）。此时，你实际上开始使用一种不同的（尽管相似）语言，在使用之前你应该仔细选择语言。
- en: 10.2\. Perl
  id: totrans-41
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 10.2. Perl
- en: 原文：[https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/perl.html](https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/perl.html)
  id: totrans-42
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/perl.html](https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/perl.html)'
- en: Perl programmers should first read the man page perlsec(1), which describes
    a number of issues involved with writing secure programs in Perl. In particular,
    perlsec(1) describes the “taint” mode, which most secure Perl programs should
    use. Taint mode is automatically enabled if the real and effective user or group
    IDs differ, or you can use the -T command line flag (use the latter if you’re
    running on behalf of someone else, e.g., a CGI script). Taint mode turns on various
    checks, such as checking path directories to make sure they aren’t writable by
    others.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: Perl程序员首先应该阅读man页面的perlsec(1)，它描述了在Perl中编写安全程序涉及的一些问题。特别是，perlsec(1)描述了“污染”模式，大多数安全的Perl程序都应该使用。如果真实用户或组ID与有效用户或组ID不同，或者你可以使用-T命令行标志（如果你代表其他人运行，例如CGI脚本，请使用后者），则自动启用污染模式。污染模式会开启各种检查，例如检查路径目录以确保它们不会被其他人写入。
- en: 'The most obvious affect of taint mode, however, is that you may not use data
    derived from outside your program to affect something else outside your program
    by accident. In taint mode, all externally-obtained input is marked as “tainted”,
    including command line arguments, environment variables, locale information (see
    perllocale(1)), results of certain system calls (readdir, readlink, the gecos
    field of getpw* calls), and all file input. Tainted data may not be used directly
    or indirectly in any command that invokes a sub-shell, nor in any command that
    modifies files, directories, or processes. There is one important exception: If
    you pass a list of arguments to either system or exec, the elements of that list
    are NOT checked for taintedness, so be especially careful with system or exec
    while in taint mode.'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，taint模式最明显的影响是，你可能会意外地使用来自程序外部的数据来影响程序外部的其他事物。在taint模式下，所有外部获取的输入都被标记为“污染”，包括命令行参数、环境变量、区域信息（参见perllocale(1)）、某些系统调用的结果（readdir、readlink、getpw*调用的gecos字段）以及所有文件输入。污染数据不能直接或间接地用于任何调用子shell的命令，也不能用于任何修改文件、目录或进程的命令。有一个重要的例外：如果你向system或exec传递一个参数列表，该列表的元素不会被检查是否污染，所以在taint模式下使用system或exec时要格外小心。
- en: Any data value derived from tainted data becomes tainted also. There is one
    exception to this; the way to untaint data is to extract a substring of the tainted
    data. Don’t just use “.*” blindly as your substring, though, since this would
    defeat the tainting mechanism’s protections. Instead, identify patterns that identify
    the “safe” pattern allowed by your program, and use them to extract “good” values.
    After extracting the value, you may still need to check it (in particular for
    its length).
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 从污染数据派生出的任何数据值也会变成污染的。对此有一个例外；取消数据污染的方法是提取污染数据的一个子串。不过，不要盲目地使用“.*”作为子串，因为这会破坏污染机制的防护。相反，确定由你的程序允许的“安全”模式，并使用它们来提取“良好”的值。提取值之后，你可能还需要检查它（特别是其长度）。
- en: The open, glob, and backtick functions call the shell to expand filename wild
    card characters; this can be used to open security holes. You can try to avoid
    these functions entirely, or use them in a less-privileged “sandbox” as described
    in perlsec(1). In particular, backticks should be rewritten using the system()
    call (or even better, changed entirely to something safer).
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: open、glob和反引号函数调用shell来展开文件名通配符；这可能会被用来打开安全漏洞。你可以尝试完全避免使用这些函数，或者像在perlsec(1)中描述的那样，在更受限制的“沙盒”中使用它们。特别是，反引号应该被重写为system()调用（或者更好，完全改为更安全的东西）。
- en: The perl open() function comes with, frankly, “way too much magic” for most
    secure programs; it interprets text that, if not carefully filtered, can create
    lots of security problems. Before writing code to open or lock a file, consult
    the perlopentut(1) man page. In most cases, sysopen() provides a safer (though
    more convoluted) approach to opening a file. [The new Perl 5.6 adds an open()
    call with 3 parameters to turn off the magic behavior without requiring the convolutions
    of sysopen()](http://www.xray.mpe.mpg.de/mailing-lists/perl5-porters/2000-03/msg02596.html).
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: Perl的open()函数对于大多数安全程序来说，“魔法”太多了；它解释文本，如果不仔细过滤，可能会创建很多安全问题。在编写打开或锁定文件的代码之前，请查阅perlopentut(1)手册页。在大多数情况下，sysopen()提供了打开文件的一种更安全（尽管更复杂）的方法。[新的Perl
    5.6添加了一个带有3个参数的open()调用，以关闭魔法行为，而不需要sysopen()的复杂操作](http://www.xray.mpe.mpg.de/mailing-lists/perl5-porters/2000-03/msg02596.html)。
- en: Perl programs should turn on the warning flag (-w), which warns of potentially
    dangerous or obsolete statements.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: Perl程序应该打开警告标志（-w），它会警告潜在危险或过时的语句。
- en: You can also run Perl programs in a restricted environment. For more information
    see the “Safe” module in the standard Perl distribution. I’m uncertain of the
    amount of auditing that this has undergone, so beware of depending on this for
    security. You might also investigate the “Penguin Model for Secure Distributed
    Internet Scripting”, though at the time of this writing the code and documentation
    seems to be unavailable.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 你还可以在受限环境中运行Perl程序。更多信息请参阅标准Perl发行版中的“Safe”模块。我无法确定它经历了多少审计，所以请勿依赖它来保证安全。你还可以调查“Penguin
    Model for Secure Distributed Internet Scripting”，尽管在撰写本文时，代码和文档似乎不可用。
- en: 'Many installations include a setuid root version of perl named “suidperl”.
    However, the perldelta man page version 5.6.1 recommends using sudo instead, stating
    the following:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 许多安装包括一个名为“suidperl”的setuid root版本的perl。然而，perldelta手册页面的5.6.1版本建议使用sudo，如下所述：
- en: '"Note that suidperl is neither built nor installed by default in any recent
    version of perl. Use of suidperl is highly discouraged. If you think you need
    it, try alternatives such as sudo first. See http://www.courtesan.com/sudo/".'
  id: totrans-51
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '"请注意，在最近版本的 Perl 中，suidperl 既没有编译也没有默认安装。强烈不建议使用 suidperl。如果你认为你需要它，首先尝试使用
    sudo 等替代方案。更多信息请参阅 http://www.courtesan.com/sudo/"。'
- en: 10.3\. Python
  id: totrans-52
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 10.3\. Python
- en: 原文：[https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/python.html](https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/python.html)
  id: totrans-53
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/python.html](https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/python.html)
- en: As with any language, beware of any functions which allow data to be executed
    as parts of a program, to make sure an untrusted user can’t affect their input.
    This includes exec(), eval(), and execfile() (and frankly, you should check carefully
    any call to compile()). The input() statement is also surprisingly dangerous.
    [Watters 1996, 150].
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 与任何语言一样，要小心任何允许数据作为程序一部分执行的功能，以确保不受信任的用户无法影响他们的输入。这包括 exec()、eval() 和 execfile()（坦白说，你应该仔细检查任何编译()的调用）。input()
    语句也出奇地危险。[Watters 1996, 150]。
- en: Python programs with privileges that can be invoked by unprivileged users (e.g.,
    setuid/setgid programs) must *not* import the “user” module. The user module causes
    the pythonrc.py file to be read and executed. Since this file would be under the
    control of an untrusted user, importing the user module allows an attacker to
    force the trusted program to run arbitrary code.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 具有可由无权限用户调用的权限的 Python 程序（例如，setuid/setgid 程序）不得导入“用户”模块。用户模块会导致 pythonrc.py
    文件被读取和执行。由于此文件将受不受信任的用户控制，导入用户模块允许攻击者强制受信任的程序运行任意代码。
- en: Python does very little compile-time checking -- it has essentially no compile-time
    type information, for example. This is unfortunate, resulting in a lot of latent
    bugs (both John Viega and I have experienced this problem). Hopefully someday
    Python will implement optional static typing and type-checking, an idea that’s
    been discussed for some time. A partial solution for now is PyChecker, a lint-like
    program that checks for common bugs in Python source code. You can get PyChecker
    from [http://pychecker.sourceforge.net](http://pychecker.sourceforge.net)
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: Python 在编译时进行的检查非常少——例如，它几乎没有编译时类型信息。这是不幸的，导致了许多潜在的错误（我和 John Viega 都经历过这个问题）。希望有一天
    Python 将实现可选的静态类型和类型检查，这是一个已经讨论了一段时间的想法。目前的部分解决方案是 PyChecker，这是一个类似 lint 的程序，用于检查
    Python 源代码中的常见错误。您可以从 [http://pychecker.sourceforge.net](http://pychecker.sourceforge.net)
    获取 PyChecker。
- en: Before Python version 2.3, Python included support for “Restricted Execution”
    through its RExec and Bastion classes. The RExec class was primarily intended
    for executing applets and mobile code, but it could also be used to try to limit
    privilege in a program even when the code has not been provided externally. The
    Bastion module was intended to supports restricted access to another object. For
    more information, see Kuchling [2000]. Earlier versions of this book identified
    these functions but noted them as "programmer beware", and I was right to be concerned.
    More recent analysis has found that RExec and Bastion are fundamentally flawed,
    and have unfixable exploitable security flaws. Thus, these classes have been removed
    from Python 2.3, and should not be used to enforce security in any version of
    Python. There is ongoing work to develop alternative approaches to running untrusted
    Python code, such as the experimental [Sandbox.py module](http://www.procoders.net/download.php?fname=SandBox.py).
    Do not use this experimental Sandbox.py module for serious purposes yet.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Python 2.3 版本之前，Python 通过其 RExec 和 Bastion 类支持“受限执行”。RExec 类主要用于执行小程序和移动代码，但它也可以用来尝试在代码未外部提供的情况下限制程序权限。Bastion
    模块旨在支持对另一个对象的受限访问。更多信息，请参阅 Kuchling [2000]。本书的早期版本识别了这些函数，但将其标记为“程序员注意”，我确实有理由担心。最近的分析发现，RExec
    和 Bastion 存在根本性的缺陷，并且有无法修复的安全漏洞。因此，这些类已被从 Python 2.3 中移除，不应在任何版本的 Python 中用于强制执行安全。目前正在进行开发替代方法来运行不受信任的
    Python 代码，例如实验性的 [Sandbox.py 模块](http://www.procoders.net/download.php?fname=SandBox.py)。请勿将此实验性的
    Sandbox.py 模块用于重要目的。
- en: Supporting secure execution of untrusted code in Python turns out to be a rather
    difficult problem. For example, allowing a user to unrestrictedly add attributes
    to a class permits all sorts of ways to subvert the environment because Python’s
    implementation calls many “hidden” methods. By default, most Python objects are
    passed by reference; if you insert a reference to a mutable value into a restricted
    program’s environment, the restricted program can change the object in a way that’s
    visible outside the restricted environment. Thus, if you want to give access to
    a mutable value, in many cases you should copy the mutable value. Fundamentally,
    Python is designed to be a clean and highly reflexive language, which is good
    for a general-purpose language but makes handling malicious code more difficult.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 在Python中支持不受信任代码的安全执行证明是一个相当困难的问题。例如，允许用户无限制地向类添加属性允许以各种方式破坏环境，因为Python的实现调用了许多“隐藏”的方法。默认情况下，大多数Python对象是通过引用传递的；如果你将一个可变值的引用插入到受限程序的环境中，受限程序可以以在受限环境之外可见的方式更改对象。因此，如果你想要访问一个可变值，在许多情况下你应该复制这个可变值。从根本上说，Python被设计成一个干净且高度自反的语言，这对于通用语言来说是好的，但使得处理恶意代码变得更加困难。
- en: Python supports operations called "pickle" and "unpickling" to conveniently
    store and retrieve sets of objects. NEVER unpickle data from an untrusted source.
    Python 2.2 did a half-hearted job of trying to support unpickling from untrusted
    sources (the __safe_for_unpickling__ attribute), but it was never audited and
    probably never really worked. Python 2.3 has removed all of this, and made explicitly
    clear that unpickling is not a safe operation. For more information, see [PEP
    307](http://www.python.org/peps/pep-0307.html).
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: Python支持名为“pickle”和“unpickling”的操作，以便方便地存储和检索对象集合。绝对不要从不受信任的源中反序列化数据。Python
    2.2尝试半心半意地支持从不受信任的源反序列化（通过__safe_for_unpickling__属性），但它从未经过审计，可能从未真正工作过。Python
    2.3移除了所有这些，并明确指出反序列化不是一个安全操作。更多信息，请参阅[PEP 307](http://www.python.org/peps/pep-0307.html)。
- en: 10.4\. Shell Scripting Languages (sh and csh Derivatives)
  id: totrans-60
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 10.4. Shell脚本语言（sh和csh派生）
- en: 原文：[https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/shell.html](https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/shell.html)
  id: totrans-61
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/shell.html](https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/shell.html)
- en: I strongly recommend against using standard command shell scripting languages
    (such as csh, sh, and bash) for setuid/setgid secure code. Some systems (such
    as Linux) completely disable setuid/setgid shell scripts, so creating setuid/setgid
    shell scripts creates an unnecessary portability problem. On some old systems
    they are fundamentally insecure due to a race condition (as discussed in [Section
    3.1.3](processes.html#PROCESS-CREATION)). Even for other systems, they’re not
    really a good idea.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 我强烈反对使用标准的命令行脚本语言（如csh、sh和bash）来编写setuid/setgid安全代码。一些系统（如Linux）完全禁用了setuid/setgid的shell脚本，因此创建setuid/setgid的shell脚本会带来不必要的可移植性问题。在一些旧系统中，由于竞争条件（如第3.1.3节中讨论的），它们本身就不安全。即使对于其他系统，这也不是一个好主意。
- en: In fact, there are a vast number of circumstances where shell scripting languages
    shouldn’t be used at all for secure programs. Standard command shells are notorious
    for being affected by nonobvious inputs - generally because command shells were
    designed to try to do things “automatically” for an interactive user, not to defend
    against a determined attacker. Shell programs are fine for programs that don’t
    need to be secure (e.g., they run at the same privilege as the unprivileged user
    and don’t accept “untrusted” data). They can also be useful when they’re running
    with privilege, as long as all the input (e.g., files, directories, command line,
    environment, etc.) are all from trusted users - which is why they’re often used
    quite successfully in startup/shutdown scripts.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，有许多情况下不应该在安全程序中使用shell脚本语言。标准的命令行外壳程序因其受非明显输入影响而臭名昭著——通常是因为命令行外壳程序是为了尝试为交互式用户“自动”执行事情而设计的，而不是为了防御有决心的攻击者。对于不需要安全性的程序（例如，它们以无特权的用户相同的权限运行且不接受“不受信任”的数据），shell程序是合适的。只要所有输入（例如，文件、目录、命令行、环境等）都来自受信任的用户，它们也可以在启动/关闭脚本中使用，这也是为什么它们经常在启动/关闭脚本中非常成功的原因。
- en: 'Writing secure shell programs in the presence of malicious input is harder
    than in many other languages because of all the things that shells are affected
    by. For example, “hidden” environment variables (e.g., the ENV, BASH_ENV, and
    IFS values) can affect how they operate or even execute arbitrary user-defined
    code before the script can even execute. Even things like filenames of the executable
    or directory contents can affect execution. If an attacker can create filenames
    containing some control characters (e.g., newline), or whitespace, or shell metacharacters,
    or begin with a dash (the option flag syntax), there are often ways to exploit
    them. For example, on many Bourne shell implementations, doing the following will
    grant root access (thanks to NCSA for describing this exploit):'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 在存在恶意输入的情况下编写安全的shell程序比许多其他语言更困难，因为shell会受到许多因素的影响。例如，“隐藏”的环境变量（例如，ENV、BASH_ENV和IFS的值）可能会影响它们的操作，甚至在脚本执行之前执行任意用户定义的代码。即使是可执行文件的文件名或目录内容也可能影响执行。如果攻击者可以创建包含一些控制字符（例如，换行符）、空白字符、shell元字符或以短横线开头（选项标志语法）的文件名，通常有方法可以利用这些漏洞。例如，在许多Bourne
    shell实现中，执行以下操作将授予root访问权限（感谢NCSA描述了这个漏洞）：
- en: '|  [PRE3]  |'
  id: totrans-65
  prefs: []
  type: TYPE_TB
  zh: '|  [PRE3]  |'
- en: 'Some systems may have closed this hole, but the point still stands: most command
    shells aren’t intended for writing secure setuid/setgid programs. For programming
    purposes, avoid creating setuid shell scripts, even on those systems that permit
    them. Instead, write a small program in another language to clean up the environment,
    then have it call other executables (some of which might be shell scripts).'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 一些系统可能已经关闭了这个漏洞，但这个观点仍然成立：大多数命令shell并不是为了编写安全的setuid/setgid程序而设计的。出于编程目的，避免创建setuid
    shell脚本，即使在允许它们的系统上也是如此。相反，用另一种语言编写一个小程序来清理环境，然后让它调用其他可执行文件（其中一些可能是shell脚本）。
- en: If you still insist on using shell scripting languages, at least put the script
    in a directory where it cannot be moved or changed. Set PATH and IFS to known
    values very early in your script; indeed, the environment should be cleaned before
    the script is called. Also, very early on, “cd” to a safe directory. Use data
    only from directories that is controlled by trusted users, e.g., /etc, so that
    attackers can’t insert maliciously-named files into those directories. Be sure
    to quote every filename passed on a command line, e.g., use "$1" not $1, because
    filenames with whitespace will be split. Call commands using "--" to disable additional
    options where you can, because attackers may create or pass filenames beginning
    with dash in the hope of tricking the program into processing it as an option.
    Be especially careful of filenames embedding other characters (e.g., newlines
    and other control characters). Examine input filenames especially carefully and
    be very restrictive on what filenames are permitted.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你仍然坚持使用shell脚本语言，至少将脚本放在一个无法移动或更改的目录中。在脚本开始时尽早设置PATH和IFS为已知值；实际上，应该在调用脚本之前清理环境。此外，尽早“cd”到一个安全的目录。仅使用受信任用户控制的目录中的数据，例如，/etc，这样攻击者就不能将这些目录中插入恶意命名的文件。确保在命令行上引用每个文件名，例如，使用"$1"而不是$1，因为包含空白的文件名将被分割。使用"--"调用命令以禁用可能的地方的附加选项，因为攻击者可能会创建或传递以短横线开头的文件名，希望欺骗程序将其作为选项处理。特别小心嵌入其他字符（例如，换行符和其他控制字符）的文件名。特别仔细检查输入文件名，并对允许的文件名非常严格。
- en: 'If you don’t mind limiting your program to only work with GNU tools (or if
    you detect and optionally use the GNU tools instead when they are available),
    you might want to use NIL characters as the filename terminator instead of newlines.
    By using NIL characters, rather than whitespace or newlines, handling nasty filenames
    (e.g., those with embedded newlines) is much simpler. Several GNU tools that output
    or input filenames can use this format instead of the more common “one filename
    per line” format. Unfortunately, the name of this option isn’t consistent between
    tools; for many tools the name of this option is “--null” or “-0”. GNU programs
    xargs and cpio allow using either --null or -0, tar uses --null, find uses -print0,
    grep uses either --null or -Z, and sort uses either -z or --zero-terminated. Those
    who find this inconsistency particularly disturbing are invited to supply patches
    to the GNU authors; I would suggest making sure every program supported “--null”
    since that seems to be the most common option name. For example, here’s one way
    to move files to a target directory, even if there may be a vast number of files
    and some may have awkward names with embedded newlines (thanks to Jim Dennis for
    reminding me of this):'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您不介意将您的程序限制为仅与GNU工具一起工作（或者如果您检测到并可选地使用可用的GNU工具），您可能希望使用NIL字符作为文件名终止符而不是换行符。通过使用NIL字符，而不是空白或换行符，处理讨厌的文件名（例如，包含嵌入换行符的文件）要简单得多。几个输出或输入文件名的GNU工具可以使用这种格式而不是更常见的“每行一个文件名”格式。不幸的是，这个选项的名称在不同的工具之间并不一致；对于许多工具，这个选项的名称是“--null”或“-0”。GNU程序xargs和cpio允许使用--null或-0，tar使用--null，find使用-print0，grep使用--null或-Z，而sort使用-z或--zero-terminated。那些发现这种不一致性特别令人烦恼的人被邀请向GNU作者提供补丁；我建议确保每个程序都支持“--null”，因为这似乎是最常见的选项名称。例如，以下是将文件移动到目标目录的一种方法，即使可能有大量文件，其中一些可能具有不规则的名称，包含嵌入的换行符（感谢Jim
    Dennis提醒我这一点）：
- en: '|  [PRE4]  |'
  id: totrans-69
  prefs: []
  type: TYPE_TB
  zh: '|  [PRE4]  |'
- en: In a similar vein, I recommend *not* trusting “restricted shells” to implement
    secure policies. Restricted shells are shells that intentionally prevent users
    from performing a large set of activities - their goal is to force users to only
    run a small set of programs. A restricted shell can be useful as a defense-in-depth
    measure, but restricted shells are notoriously hard to configure correctly and
    as configured are often subvertable. For example, some restricted shells will
    start by running some file in an unrestricted mode (e.g., “.profile”) - if a user
    can change this file, they can force execution of that code. A restricted shell
    should be set up to only run a few programs, but if any of those programs have
    “shell escapes” to let users run more programs, attackers can use those shell
    escapes to escape the restricted shell. Even if the programs don’t have shell
    escapes, it’s quite likely that the various programs can be used together (along
    with the shell’s capabilities) to escape the restrictions. Of course, if you don’t
    set the PATH of a restricted shell (and allow any program to run), then an attacker
    can use the shell escapes of many programs (including text editors, mailers, etc.).
    The problem is that the purpose of a shell is to run other programs, but those
    other programs may allow unintended operations -- and the shell doesn’t interpose
    itself to prevent these operations.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 同样地，我建议**不要**信任“受限外壳”来实现安全策略。受限外壳是有意阻止用户执行大量活动的外壳 - 它们的目标是强制用户只运行一小套程序。受限外壳可以作为多层次防御措施的一部分是有用的，但受限外壳在正确配置上非常困难，并且一旦配置好，通常容易被绕过。例如，一些受限外壳会首先以不受限制的模式运行一些文件（例如，“.profile”）
    - 如果用户可以更改此文件，他们可以强制执行该代码。受限外壳应该仅配置为运行少数几个程序，但如果其中任何程序都有“外壳逃逸”功能以允许用户运行更多程序，攻击者可以使用这些外壳逃逸来绕过受限外壳。即使程序没有外壳逃逸功能，也很可能各种程序可以一起使用（包括外壳的功能）来绕过限制。当然，如果您不设置受限外壳的PATH（并允许运行任何程序），那么攻击者可以使用许多程序的外壳逃逸（包括文本编辑器、邮件程序等）。问题是外壳的目的是运行其他程序，但这些其他程序可能允许未预期的操作
    -- 而外壳本身并不介入以阻止这些操作。
- en: 10.5\. Ada
  id: totrans-71
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 10.5\. Ada
- en: 原文：[https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/ada.html](https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/ada.html)
  id: totrans-72
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/ada.html](https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/ada.html)
- en: In Ada95, the Unbounded_String type is often more flexible than the String type
    because it is automatically resized as necessary. However, don’t store especially
    sensitive secret values such as passwords or secret keys in an Unbounded_String,
    since core dumps and page areas might still hold them later. Instead, use the
    String type for this data, lock it into memory while it’s used, and overwrite
    the data as soon as possible with some constant value such as (others => ' ').
    Use the Ada pragma Inspection_Point on the object holding the secret after erasing
    the memory. That way, you can be certain that the object containing the secret
    will really be erased (and that the the overwriting won’t be optimized away).
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Ada95 中，Unbounded_String 类型通常比 String 类型更灵活，因为它会根据需要自动调整大小。然而，不要将特别敏感的秘密值（如密码或密钥）存储在
    Unbounded_String 中，因为核心转储和页面区域可能会在以后仍然保留它们。相反，使用 String 类型来存储此类数据，在它被使用时将其锁定在内存中，并尽快用一些常数值（如
    (others => ' ')）覆盖数据。在擦除内存后，使用 Ada 的 Inspection_Point 约束对包含秘密的对象进行操作。这样，你可以确信包含秘密的对象确实被删除了（并且覆盖不会被优化掉）。
- en: Like many other languages, Ada’s string types (including String and Unbounded_String)
    can hold ASCII 0. If that’s then passed to a C library (including a kernel), that
    can be interpreted very differently by the library than the caller intended.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 与许多其他语言一样，Ada 的字符串类型（包括 String 和 Unbounded_String）可以存储 ASCII 0。如果将其传递给 C 库（包括内核），库可能会将其解释为与调用者意图完全不同。
- en: It’s common for beginning Ada programmers to believe that the String type’s
    first index value is always 1, but this isn’t true if the string is sliced. Avoid
    this error.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 对于初学 Ada 的程序员来说，认为 String 类型的第一个索引值总是 1 是很常见的，但如果字符串被截断，这就不正确了。避免这种错误。
- en: It’s worth noting that SPARK is a “high-integrity subset of the Ada programming
    language”; SPARK users use a tool called the “SPARK Examiner” to check conformance
    to SPARK rules, including flow analysis, and there are various supports for full
    formal proof of the code if desired. [See the SPARK website for more information](http://www.sparkada.com).
    To my knowledge, there are no OSS/FS SPARK tools. If you’re storing passwords
    and private keys you should still lock them into memory if appropriate and overwrite
    them as soon as possible. Note that SPARK is often used in environments where
    paging does not occur.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 值得注意的是，SPARK 是 Ada 编程语言的一个“高完整性子集”；SPARK 用户使用一个名为“SPARK Examiner”的工具来检查对 SPARK
    规则的符合性，包括流程分析，如果需要的话，还有对代码的完整形式化证明的支持。[更多信息请参见 SPARK 网站](http://www.sparkada.com)。据我所知，目前没有开源的
    SPARK 工具。如果你正在存储密码和私钥，如果适当的话，你应该仍然将它们锁定在内存中，并尽快覆盖它们。请注意，SPARK 通常用于不会发生分页的环境。
- en: 10.6\. Java
  id: totrans-77
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 10.6\. Java
- en: 原文：[https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/java.html](https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/java.html)
  id: totrans-78
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/java.html](https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/java.html)
- en: If you’re developing secure programs using Java, frankly your first step (after
    learning Java) is to read the two primary texts for Java security, namely Gong
    [1999] and McGraw [1999] (for the latter, look particularly at section 7.1). You
    should also look at Sun’s posted security code guidelines at [http://java.sun.com/security/seccodeguide.html](http://java.sun.com/security/seccodeguide.html),
    and there’s a nice [article by Sahu et al [2002]](http://www-106.ibm.com/developerworks/java/library/j-staticsec.html?loc=dwmain)
    A set of slides describing Java’s security model are freely available at [http://www.dwheeler.com/javasec](http://www.dwheeler.com/javasec).
    You can also see McGraw [1998].
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你正在使用 Java 开发安全程序，坦白说，你的第一步（在学习 Java 之后）是阅读 Java 安全性的两本主要文献，即 Gong [1999]
    和 McGraw [1999]（对于后者，特别关注第 7.1 节）。你还应该查看 Sun 发布的安全代码指南，网址为 [http://java.sun.com/security/seccodeguide.html](http://java.sun.com/security/seccodeguide.html)，以及
    Sahu 等人 [2002] 的优秀文章 [http://www-106.ibm.com/developerworks/java/library/j-staticsec.html?loc=dwmain]。描述
    Java 安全模型的幻灯片在 [http://www.dwheeler.com/javasec](http://www.dwheeler.com/javasec)
    上免费提供。你还可以查看 McGraw [1998]。
- en: 'Obviously, a great deal depends on the kind of application you’re developing.
    Java code intended for use on the client side has a completely different environment
    (and trust model) than code on a server side. The general principles apply, of
    course; for example, you must check and filter any input from an untrusted source.
    However, in Java there are some “hidden” inputs or potential inputs that you need
    to be wary of, as discussed below. Johnathan Nightingale [2000] made an interesting
    statement summarizing many of the issues in Java programming:'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 显然，很大程度上取决于你正在开发的应用程序类型。打算在客户端使用的 Java 代码与服务器端代码的环境（和信任模型）完全不同。当然，一般原则适用；例如，你必须检查和过滤来自不受信任来源的任何输入。然而，在
    Java 中，有一些“隐藏”的输入或潜在的输入，你需要小心，如下所述。Johnathan Nightingale [2000] 作出了一些有趣的陈述，总结了
    Java 编程中的许多问题：
- en: '... the big thing with Java programming is minding your inheritances. If you
    inherit methods from parents, interfaces, or parents’ interfaces, you risk opening
    doors to your code.'
  id: totrans-81
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '... 在 Java 编程中，最重要的是注意你的继承。如果你从父类、接口或父类的接口继承方法，你可能会打开你的代码的大门。'
- en: 'The following are a few key guidelines, based on Gong [1999], McGraw [1999],
    Sun’s guidance, and my own experience:'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一些关键指南，基于 Gong [1999]、McGraw [1999]、Sun 的指导以及我的个人经验：
- en: Do not use public fields or variables; declare them as private and provide accessors
    to them so you can limit their accessibility.
  id: totrans-83
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 不要使用公共字段或变量；将它们声明为私有并提供访问器，以便您可以限制它们的可访问性。
- en: Make methods private unless there is a good reason to do otherwise (and if you
    do otherwise, document why). These non-private methods must protect themselves,
    because they may receive tainted data (unless you’ve somehow arranged to protect
    them).
  id: totrans-84
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 除非有充分的理由，否则不要将方法设置为私有（如果这样做，请记录原因）。这些非私有方法必须保护自己，因为它们可能会收到受污染的数据（除非你以某种方式安排了保护它们）。
- en: 'The JVM may not actually enforce the accessibility modifiers (e.g., “private”)
    at run-time in an application (as opposed to an applet). My thanks to John Steven
    (Cigital Inc.), who pointed this out on the “Secure Programming” mailing list
    on November 7, 2000. The issue is that it all depends on what class loader the
    class requesting the access was loaded with. If the class was loaded with a trusted
    class loader (including the null/ primordial class loader), the access check returns
    "TRUE" (allowing access). For example, this works (at least with Sun’s 1.2.2 VM
    ; it might not work with other implementations):'
  id: totrans-85
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: JVM 可能实际上不会在应用程序运行时强制执行可访问修饰符（例如，“私有”）（与 applet 相反）。感谢 John Steven（Cigital Inc.），他在
    2000 年 11 月 7 日的“Secure Programming”邮件列表上指出了这一点。问题是这完全取决于请求访问的类所使用的类加载器。如果类是由可信的类加载器（包括
    null/原初类加载器）加载的，则访问检查返回“TRUE”（允许访问）。例如，这可行（至少在 Sun 的 1.2.2 VM 中；它可能不适用于其他实现）：
- en: write a victim class (V) with a public field, compile it.
  id: totrans-86
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 编写一个受害者类（V），其中包含一个公共字段，然后编译它。
- en: write an “attack” class (A) that accesses that field, compile it
  id: totrans-87
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 编写一个“攻击”类（A），它访问该字段，然后编译它
- en: change V’s public field to private, recompile
  id: totrans-88
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将 V 的公共字段改为私有，重新编译
- en: run A - it’ll access V’s (now private) field.
  id: totrans-89
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 运行 A - 它将访问 V 的（现在是私有的）字段。
- en: However, the situation is different with applets. If you convert A to an applet
    and run it as an applet (e.g., with appletviewer or browser), its class loader
    is no longer a trusted (or null) class loader. Thus, the code will throw java.lang.IllegalAccessError,
    with the message that you’re trying to access a field V.secret from class A.
  id: totrans-90
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 然而，applet 的情况不同。如果你将 A 转换为 applet 并以 applet 的形式运行它（例如，使用 appletviewer 或浏览器），它的类加载器就不再是可信的（或
    null）类加载器。因此，代码将抛出 java.lang.IllegalAccessError，消息是你正在尝试从类 A 访问字段 V.secret。
- en: Avoid using static field variables. Such variables are attached to the class
    (not class instances), and classes can be located by any other class. As a result,
    static field variables can be found by any other class, making them much more
    difficult to secure.
  id: totrans-91
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 避免使用静态字段变量。此类变量附加到类（而非类实例）上，并且任何其他类都可以定位到类。因此，静态字段变量可以被任何其他类找到，这使得它们更难以保证安全性。
- en: Never return a mutable object to potentially malicious code (since the code
    may decide to change it). Note that arrays are mutable (even if the array contents
    aren’t), so don’t return a reference to an internal array with sensitive data.
  id: totrans-92
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 永远不要向可能恶意代码返回可变对象（因为代码可能会决定更改它）。请注意，数组是可变的（即使数组内容不是），因此不要返回指向包含敏感数据的内部数组的引用。
- en: Never store user given mutable objects (including arrays of objects) directly.
    Otherwise, the user could hand the object to the secure code, let the secure code
    “check” the object, and change the data while the secure code was trying to use
    the data. Clone arrays before saving them internally, and be careful here (e.g.,
    beware of user-written cloning routines).
  id: totrans-93
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 不要直接存储用户提供的可变对象（包括对象数组）。否则，用户可能会将对象交给安全代码，让安全代码“检查”该对象，并在安全代码尝试使用数据时更改数据。在内部保存之前，先克隆数组，并在此处小心（例如，警惕用户编写的克隆例程）。
- en: Don’t depend on initialization. There are several ways to allocate uninitialized
    objects.
  id: totrans-94
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 不要依赖于初始化。有几种方法可以分配未初始化的对象。
- en: Make everything final, unless there’s a good reason not to. If a class or method
    is non-final, an attacker could try to extend it in a dangerous and unforeseen
    way. Note that this causes a loss of extensibility, in exchange for security.
  id: totrans-95
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 除非有很好的理由不这样做，否则请将所有内容都设置为final。如果一个类或方法不是final，攻击者可能会尝试以危险和不可预见的方式扩展它。请注意，这会导致可扩展性的损失，以换取安全性。
- en: Don’t depend on package scope for security. A few classes, such as java.lang,
    are closed by default, and some Java Virtual Machines (JVMs) let you close off
    other packages. Otherwise, Java classes are not closed. Thus, an attacker could
    introduce a new class inside your package, and use this new class to access the
    things you thought you were protecting.
  id: totrans-96
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 不要依赖于包作用域进行安全。一些类，如java.lang，默认是封闭的，一些Java虚拟机（JVM）允许您关闭其他包。否则，Java类不是封闭的。因此，攻击者可以在您的包内引入一个新的类，并使用这个新类来访问您认为您正在保护的东西。
- en: Don’t use inner classes. When inner classes are translated into byte codes,
    the inner class is translated into a class accesible to any class in the package.
    Even worse, the enclosing class’s private fields silently become non-private to
    permit access by the inner class!
  id: totrans-97
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 不要使用内部类。当内部类被转换为字节码时，内部类会被转换为对包中任何类都可见的类。更糟糕的是，封装类的私有字段会静默地变为非私有，以便内部类可以访问！
- en: Minimize privileges. Where possible, don’t require any special permissions at
    all. McGraw goes further and recommends not signing any code; I say go ahead and
    sign the code (so users can decide to “run only signed code by this list of senders”),
    but try to write the program so that it needs nothing more than the sandbox set
    of privileges. If you must have more privileges, audit that code especially hard.
  id: totrans-98
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 最小化权限。在可能的情况下，不要要求任何特殊权限。McGraw 进一步建议不要签名任何代码；我说继续签名代码（这样用户可以决定“只运行此列表中的发送者的签名代码”），但尽量编写程序，使其不需要比沙盒权限集更多的权限。如果您必须拥有更多权限，请特别严格地审计该代码。
- en: 'If you must sign your code, put it all in one archive file. Here it’s best
    to quote McGraw [1999]:'
  id: totrans-99
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果您必须签名您的代码，请将其全部放入一个存档文件中。这里最好引用McGraw [1999]的话：
- en: The goal of this rule is to prevent an attacker from carrying out a mix-and-match
    attack in which the attacker constructs a new applet or library that links some
    of your signed classes together with malicious classes, or links together signed
    classes that you never meant to be used together. By signing a group of classes
    together, you make this attack more difficult. Existing code-signing systems do
    an inadequate job of preventing mix-and-match attacks, so this rule cannot prevent
    such attacks completely. But using a single archive can’t hurt.
  id: totrans-100
  prefs:
  - PREF_IND
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 本规则的目标是防止攻击者执行混合匹配攻击，攻击者构建一个新的小程序或库，将一些您的签名类与恶意类链接在一起，或者将您从未打算一起使用的签名类链接在一起。通过将一组类一起签名，您使这种攻击更加困难。现有的代码签名系统在防止混合匹配攻击方面做得不够好，因此本规则不能完全防止此类攻击。但使用单个存档文件并不会造成伤害。
- en: 'Make your classes uncloneable. Java’s object-cloning mechanism allows an attacker
    to instantiate a class without running any of its constructors. To make your class
    uncloneable, just define the following method in each of your classes:'
  id: totrans-101
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使您的类不可克隆。Java的对象克隆机制允许攻击者实例化一个类，而不运行其任何构造函数。要使您的类不可克隆，只需在每个类中定义以下方法：
- en: '|  [PRE5]  |'
  id: totrans-102
  prefs:
  - PREF_IND
  type: TYPE_TB
  zh: '|  [PRE5]  |'
- en: 'If you really need to make your class cloneable, then there are some protective
    measures you can take to prevent attackers from redefining your clone method.
    If you’re defining your own clone method, just make it final. If you’re not, you
    can at least prevent the clone method from being maliciously overridden by adding
    the following:'
  id: totrans-103
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 如果您确实需要使您的类可克隆，那么您可以采取一些保护措施来防止攻击者重新定义您的克隆方法。如果您正在定义自己的克隆方法，只需将其设置为final。如果您没有，您至少可以通过添加以下内容来防止克隆方法被恶意覆盖：
- en: '|  [PRE6]  |'
  id: totrans-104
  prefs:
  - PREF_IND
  type: TYPE_TB
  zh: '|  [PRE6]  |'
- en: 'Make your classes unserializeable. Serialization allows attackers to view the
    internal state of your objects, even private portions. To prevent this, add this
    method to your classes:'
  id: totrans-105
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使你的类不可反序列化。序列化允许攻击者查看你的对象的内部状态，甚至包括私有部分。为了防止这种情况，请向你的类中添加以下方法：
- en: '|  [PRE7]  |'
  id: totrans-106
  prefs:
  - PREF_IND
  type: TYPE_TB
  zh: '|  [PRE7]  |'
- en: Even in cases where serialization is okay, be sure to use the transient keyword
    for the fields that contain direct handles to system resources and that contain
    information relative to an address space. Otherwise, deserializing the class may
    permit improper access. You may also want to identify sensitive information as
    transient.
  id: totrans-107
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 即使在序列化是可接受的情况下，也务必使用transient关键字来标记包含直接引用系统资源的信息以及包含与地址空间相关的信息的字段。否则，反序列化该类可能会允许不恰当的访问。你也许还希望将敏感信息标记为transient。
- en: 'If you define your own serializing method for a class, it should not pass an
    internal array to any DataInput/DataOuput method that takes an array. The rationale:
    All DataInput/DataOutput methods can be overridden. If a Serializable class passes
    a private array directly to a DataOutput(write(byte [] b)) method, then an attacker
    could subclass ObjectOutputStream and override the write(byte [] b) method to
    enable him to access and modify the private array. Note that the default serialization
    does not expose private byte array fields to DataInput/DataOutput byte array methods.'
  id: totrans-108
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 如果你为某个类定义了自己的序列化方法，那么它不应该将内部数组传递给任何接收数组的DataInput/DataOutput方法。理由是：所有DataInput/DataOutput方法都可以被覆盖。如果一个可序列化类直接将私有数组传递给DataOutput（write(byte
    [] b)）方法，那么攻击者可以创建ObjectOutputStream的子类并覆盖write(byte [] b)方法，从而能够访问和修改私有数组。请注意，默认的序列化不会将私有字节数组字段暴露给DataInput/DataOutput字节数组方法。
- en: 'Make your classes undeserializeable. Even if your class is not serializeable,
    it may still be deserializeable. An attacker can create a sequence of bytes that
    happens to deserialize to an instance of your class with values of the attacker’s
    choosing. In other words, deserialization is a kind of public constructor, allowing
    an attacker to choose the object’s state - clearly a dangerous operation! To prevent
    this, add this method to your classes:'
  id: totrans-109
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使你的类不可反序列化。即使你的类不是可序列化的，它仍然可能是可反序列化的。攻击者可以创建一个字节序列，该序列恰好反序列化为攻击者选择的你的类的一个实例。换句话说，反序列化是一种公开的构造函数，允许攻击者选择对象的状态——这显然是一个危险的操作！为了防止这种情况，请向你的类中添加以下方法：
- en: '|  [PRE8]  |'
  id: totrans-110
  prefs:
  - PREF_IND
  type: TYPE_TB
  zh: '|  [PRE8]  |'
- en: 'Don’t compare classes by name. After all, attackers can define classes with
    identical names, and if you’re not careful you can cause confusion by granting
    these classes undesirable privileges. Thus, here’s an example of the *wrong* way
    to determine if an object has a given class:'
  id: totrans-111
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 不要通过名称比较类。毕竟，攻击者可以定义具有相同名称的类，如果你不小心，可能会通过授予这些类不希望的权限而造成混淆。因此，以下是一个*错误*的确定对象是否具有特定类的方法的例子：
- en: '|  [PRE9]  |'
  id: totrans-112
  prefs:
  - PREF_IND
  type: TYPE_TB
  zh: '|  [PRE9]  |'
- en: 'If you need to determine if two objects have exactly the same class, instead
    use getClass() on both sides and compare using the == operator, Thus, you should
    use this form:'
  id: totrans-113
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 如果你需要确定两个对象是否具有完全相同的类，请在两边都使用getClass()，并使用==运算符进行比较。因此，你应该使用以下形式：
- en: '|  [PRE10]  |'
  id: totrans-114
  prefs:
  - PREF_IND
  type: TYPE_TB
  zh: '|  [PRE10]  |'
- en: 'If you truly need to determine if an object has a given classname, you need
    to be pedantic and be sure to use the current namespace (of the current class’s
    ClassLoader). Thus, you’ll need to use this format:'
  id: totrans-115
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 如果你确实需要确定一个对象是否具有特定的类名，你需要严谨并确保使用当前命名空间（当前类的ClassLoader的命名空间）。因此，你需要使用以下格式：
- en: '|  [PRE11]  |'
  id: totrans-116
  prefs:
  - PREF_IND
  type: TYPE_TB
  zh: '|  [PRE11]  |'
- en: This guideline is from McGraw and Felten, and it’s a good guideline. I’ll add
    that, where possible, it’s often a good idea to avoid comparing class values anyway.
    It’s often better to try to design class methods and interfaces so you don’t need
    to do this at all. However, this isn’t always practical, so it’s important to
    know these tricks.
  id: totrans-117
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这条指南来自McGraw和Felten，它是一个很好的指南。我还要补充说，在可能的情况下，通常避免比较类值也是一个好主意。通常，尝试设计类方法和接口，以便根本不需要这样做会更好。然而，这并不总是实用的，因此了解这些技巧很重要。
- en: Don’t store secrets (cryptographic keys, passwords, or algorithm) in the code
    or data. Hostile JVMs can quickly view this data. Code obfuscation doesn’t really
    hide the code from serious attackers.
  id: totrans-118
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 不要在代码或数据中存储秘密（加密密钥、密码或算法）。敌对的JVM可以快速查看这些数据。代码混淆并不能真正隐藏代码，以防止严重攻击者。
- en: 10.7\. Tcl
  id: totrans-119
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 10.7\. Tcl
- en: 原文：[https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/tcl.html](https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/tcl.html)
  id: totrans-120
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/tcl.html](https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/tcl.html)
- en: 'Tcl stands for “tool command language” and is pronounced “tickle.” Tcl is divided
    into two parts: a language and a library. The language is a simple language, originally
    intended for issuing commands to interactive programs and including basic programming
    capabilities. The library can be embedded in application programs. You can find
    more information about Tcl at sites such as the [Tcl.tk](http://www.tcl.tk/) and
    the [Tcl WWW Info](http://www.sco.com/Technology/tcl/Tcl.html) web page and the
    comp.lang.tcl FAQ launch page at [http://www.tclfaq.wservice.com/tcl-faq](http://www.tclfaq.wservice.com/tcl-faq).
    My thanks go to Wojciech Kocjan for providing some of this detailed information
    on using Tcl in secure applications.'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: Tcl代表“工具命令语言”，发音为“tickle”。Tcl分为两部分：一种语言和一个库。这种语言是一种简单的语言，最初旨在向交互式程序发出命令，并包括基本的编程能力。库可以嵌入到应用程序中。您可以在[Tcl.tk](http://www.tcl.tk/)和[Tcl
    WWW Info](http://www.sco.com/Technology/tcl/Tcl.html)网页以及[http://www.tclfaq.wservice.com/tcl-faq](http://www.tclfaq.wservice.com/tcl-faq)的comp.lang.tcl
    FAQ启动页面上找到更多关于Tcl的信息。我要感谢Wojciech Kocjan提供了一些关于在安全应用程序中使用Tcl的详细资料。
- en: For some security applications, especially interesting components of Tcl are
    Safe-Tcl (which creates a sandbox in Tcl) and Safe-TK (which implements a sandboxed
    portable GUI for Safe Tcl), as well as the WebWiseTclTk Toolkit which permits
    Tcl packages to be automatically located and loaded from anywhere on the World
    Wide Web. You can find more about the latter from [http://www.cbl.ncsu.edu/software/WebWiseTclTk](http://www.cbl.ncsu.edu/software/WebWiseTclTk).
    It’s not clear to me how much code review this has received.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 对于某些安全应用程序，Tcl的一些特别有趣的组件包括Safe-Tcl（在Tcl中创建沙盒）和Safe-TK（为Safe Tcl实现沙盒化的便携式GUI），以及允许Tcl包从全球互联网上的任何地方自动定位和加载的WebWiseTclTk工具包。您可以从[http://www.cbl.ncsu.edu/software/WebWiseTclTk](http://www.cbl.ncsu.edu/software/WebWiseTclTk)了解更多关于后者的信息。对我来说，不清楚它收到了多少代码审查。
- en: Tcl’s original design goal to be a small, simple language resulted in a language
    that was originally somewhat limiting and slow. For an example of the limiting
    weaknesses in the original language, see [Richard Stallman’s “Why You Should Not
    Use Tcl”](http://sdg.lcs.mit.edu/~jchapin/6853-FT97/Papers/stallman-tcl.html).
    For example, Tcl was originally designed to really support only one data type
    (string). Thankfully, these issues have been addressed over time. In particular,
    version 8.0 added support for more data types (integers are stored internally
    as integers, lists as lists and so on). This improves its capabilities, and in
    particular improves its speed.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: Tcl最初的设计目标是成为一个小型、简单的语言，这导致了一种最初有些限制和缓慢的语言。例如，在原始语言中的限制性弱点，请参阅[理查德·斯托尔曼的“为什么你不应该使用Tcl”](http://sdg.lcs.mit.edu/~jchapin/6853-FT97/Papers/stallman-tcl.html)。例如，Tcl最初设计为仅真正支持一种数据类型（字符串）。幸运的是，这些问题随着时间的推移得到了解决。特别是，版本8.0增加了对更多数据类型的支持（整数内部以整数存储，列表以列表存储等）。这提高了其能力，特别是提高了其速度。
- en: As with essentially all scripting languages, Tcl has an "eval" command that
    parses and executes arbitrary Tcl commands. And like all such scripting languages,
    this eval command needs to be used especially carefully, or an attacker could
    insert characters in the input to cause malicious things to occur. For example,
    an attackers may be able insert characters with special meaning to Tcl such as
    embedded whitespace (including space and newline), double-quote, curly braces,
    square brackets, dollar signs, backslash, semicolon, or pound sign (or create
    input to cause these characters to be created during processing). This also applies
    to any function that passes data to eval as well (depending on how eval is called).
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 与几乎所有脚本语言一样，Tcl有一个“eval”命令，它可以解析并执行任意Tcl命令。并且像所有这样的脚本语言一样，这个eval命令需要特别小心地使用，否则攻击者可能会在输入中插入字符，导致恶意事件发生。例如，攻击者可能能够插入对Tcl有特殊意义的字符，如嵌入的空白（包括空格和新行）、双引号、花括号、方括号、美元符号、反斜杠、分号或井号（或创建输入以在处理过程中创建这些字符）。这也适用于任何将数据传递给eval的函数（取决于如何调用eval）。
- en: 'Here is a small example that may make this concept clearer; first, let’s define
    a small function and then interactively invoke it directly - note that these uses
    are fine:'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个小例子，可能会使这个概念更清晰；首先，让我们定义一个小函数，然后直接交互式地调用它——请注意，这些用法是可以的：
- en: '|  [PRE12]  |'
  id: totrans-126
  prefs: []
  type: TYPE_TB
  zh: '|  [PRE12]  |'
- en: 'However, continuing the example, let’s see how "eval" can be incorrectly and
    correctly called. If you call eval in an incorrect (dangerous) way, it allows
    attackers to misuse it. However, by using commands like list or lrange to correctly
    group the input, you can avoid this problem:'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，继续这个例子，让我们看看"eval"如何被错误和正确地调用。如果你以错误（危险）的方式调用eval，它允许攻击者滥用它。然而，通过使用list或lrange等命令正确地分组输入，你可以避免这个问题：
- en: '|  [PRE13]  |'
  id: totrans-128
  prefs: []
  type: TYPE_TB
  zh: '|  [PRE13]  |'
- en: 'Using lrange is useful when concatenating arguments to a called function, e.g.,
    with more complex libraries using callbacks. In Tcl, eval is often used to create
    a one-argument version of a function that takes a variable number of arguments,
    and you need to be careful when using it this way. Here’s another example (presuming
    that you’ve defined a "printf" function):'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 使用lrange在连接调用函数的参数时很有用，例如，使用更复杂的库和回调。在Tcl中，eval经常用于创建一个接受可变数量参数的函数的单参数版本，使用它时需要小心。以下是一个例子（假设你已经定义了一个"printf"函数）：
- en: '|  [PRE14]  |'
  id: totrans-130
  prefs: []
  type: TYPE_TB
  zh: '|  [PRE14]  |'
- en: 'Fundamentally, when passing a command that will be eventually evaluated, you
    must pass Tcl commands as a properly built list, and not as a (possibly concatentated)
    string. For example, the "after" command runs a Tcl command after a given number
    of milliseconds; if the data in $param1 can be controlled by an attacker, this
    Tcl code is dangerously wrong:'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 基本上，当传递最终将被评估的命令时，你必须以正确构建的列表形式传递Tcl命令，而不是作为（可能连接的）字符串。例如，“after”命令在给定数量的毫秒后运行Tcl命令；如果$param1中的数据可以被攻击者控制，则此Tcl代码是危险错误的：
- en: '|  [PRE15]  |'
  id: totrans-132
  prefs: []
  type: TYPE_TB
  zh: '|  [PRE15]  |'
- en: This is wrong, because if an attacker can control the value of $param1, the
    attacker can control the program. For example, if the attacker can cause $param1
    to have “[exit]”, then the program will exit. Also, if $param1 would be “;exit”,
    it would also exit.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 这是错误的，因为如果攻击者可以控制$param1的值，攻击者就可以控制程序。例如，如果攻击者可以导致$param1具有“[exit]”，则程序将退出。此外，如果$param1是“;exit”，它也会退出。
- en: 'Thus, the proper alternative would be:'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，合适的替代方案将是：
- en: '|  [PRE16]  |'
  id: totrans-135
  prefs: []
  type: TYPE_TB
  zh: '|  [PRE16]  |'
- en: 'Even better would be something like the following:'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 更好的方法可能是以下这样：
- en: '|  [PRE17]  |'
  id: totrans-137
  prefs: []
  type: TYPE_TB
  zh: '|  [PRE17]  |'
- en: 'Here’s another example showing what you shouldn’t do, pretending that $params
    is data controlled by possibly malicious user:'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 这里还有一个例子，展示了你不应该做什么，假设$params是可能恶意用户控制的数据：
- en: '|  [PRE18]  |'
  id: totrans-139
  prefs: []
  type: TYPE_TB
  zh: '|  [PRE18]  |'
- en: 'will result in:'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 将导致：
