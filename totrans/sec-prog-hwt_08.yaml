- en: Chapter 8\. Carefully Call Out to Other Resources
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/call-out.html](https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/call-out.html)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '|   |  **Do not put your trust in princes, in mortal men, who cannot save.**  |'
  prefs: []
  type: TYPE_TB
- en: '|   | *Psalms 146:3 (NIV)* |'
  prefs: []
  type: TYPE_TB
