  type: TYPE_NORMAL
  zh: PAKE在Boneh-Shoup的第21.11章有所介绍。
- en: Client to client key exchange for secure text messaging - ZRTP, OTR, TextSecure
  id: totrans-102
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 客户端到客户端的密钥交换，用于安全文本消息——ZRTP、OTR、TextSecure。
- en: To be completed. See [Matthew Green’s blog](http://blog.cryptographyengineering.com/2013/03/here-come-encryption-apps.html)
    , [text secure](https://whispersystems.org/blog/advanced-ratcheting/), [OTR](https://otr.cypherpunks.ca/Protocol-v3-4.0.0.html).
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 待完成。参见 [Matthew Green的博客](http://blog.cryptographyengineering.com/2013/03/here-come-encryption-apps.html)
    ， [text secure](https://whispersystems.org/blog/advanced-ratcheting/) ， [OTR](https://otr.cypherpunks.ca/Protocol-v3-4.0.0.html)。
- en: 'Security requirements: forward secrecy, deniability.'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 安全要求：前向保密，可否认性。
- en: Heartbleed and logjam attacks
  id: totrans-105
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 心脏出血和日志拥堵攻击
- en: Vestiges of past crypto policies.
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 过去密码政策的遗迹。
- en: Importance of “perfect forward secrecy”
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “完美前向保密”的重要性
- en: '![](../Images/21c231935bd902c8ca8db6b7d43def7c.png)'
  id: totrans-108
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/21c231935bd902c8ca8db6b7d43def7c.png)'
- en: '12.1: How the NSA feels about breaking encrypted communication'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 12.1：NSA对破解加密通信的看法
- en: The first attack of this flavor was given in the 1982 paper of Goldwasser, Micali,
    and Tong. Interestingly, this notion of “hardcore bits” has been used for both
    practical *attacks* against cryptosystems as well as theoretical (and sometimes
    practical) *constructions* of other cryptosystems.
  id: totrans-110
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 这种类型的第一次攻击是在1982年Goldwasser、Micali和Tong的论文中给出的。有趣的是，这种“核心位”的概念已经被用于对密码系统的实际*攻击*，以及其他密码系统的理论（有时是实际）*构造*。
- en: '[↩](#fnref:1 "return to article")'
  id: totrans-111
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '[↩](#fnref:1 "返回文章")'
- en: Recall that it’s easy to obtain two independent random oracles \(H,H'\) from
    a single oracle \(H''\), for example by letting \(H(x)=H''(0\|x)\) and \(H'(x)=H''(1\|x)\).
    Similarly we can extend this to three, four or any number of oracles.
  id: totrans-112
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 记住，从单个预言机 \(H''\) 获取两个独立的随机预言机 \(H\) 和 \(H'\) 是很容易的，例如通过让 \(H(x)=H''(0\|x)\)
    和 \(H'(x)=H''(1\|x)\) 来实现。同样，我们可以将这个方法扩展到三个、四个或任何数量的预言机。
- en: '[↩](#fnref:2 "return to article")'
  id: totrans-113
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '[↩](#fnref:2 "返回文章")'
- en: The registration process could be more subtle than that, and for example Alice
    might need to *prove* to the CA that she does indeed know the corresponding secret
    key.
  id: totrans-114
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 注册过程可能比这更微妙，例如，Alice可能需要向CA*证明*她确实知道相应的密钥。
- en: '[↩](#fnref:3 "return to article")'
  id: totrans-115
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '[↩](#fnref:3 "返回文章")'
