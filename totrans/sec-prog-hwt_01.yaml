- en: Chapter 1\. Introduction
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/introduction.html](https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/introduction.html)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '|   |  **A wise man attacks the city of the mighty and pulls down the stronghold
    in which they trust.**  |'
  prefs: []
  type: TYPE_TB
- en: '|   | *Proverbs 21:22 (NIV)* |'
  prefs: []
  type: TYPE_TB
- en: This book describes a set of guidelines for writing secure programs. For purposes
    of this book, a “secure program” is a program that sits on a security boundary,
    taking input from a source that does not have the same access rights as the program.
    Such programs include application programs used as viewers of remote data, web
    applications (including CGI scripts), network servers, and setuid/setgid programs.
    This book does not address modifying the operating system kernel itself, although
    many of the principles discussed here do apply. These guidelines were developed
    as a survey of “lessons learned” from various sources on how to create such programs
    (along with additional observations by the author), reorganized into a set of
    larger principles. This book includes specific guidance for a number of languages,
    including C, C++, Java, Perl, PHP, Python, Tcl, and Ada95. It especially covers
    Linux and Unix based systems, but much of its material applies to any system.
  prefs: []
  type: TYPE_NORMAL
- en: 'Why read this book? Because today, programs are under attack. Techniques such
    as constantly patching systems and training users in computer security are simply
    not enough to counter computer attacks. The [Witty worm of 2004](http://www.caida.org/analysis/security/witty/),
    for example, demonstrated that depending on patches "failed spectacularly" because
    attackers could deploy attacks faster than users could install patches (the attack
    began one day after the patch was announced, and only 45 minutes later most vulnerable
    systems were invected). The Witty worm also demonstrated that deploying proactive
    measures wasn’t enough: all attackees had at least installed a firewall. Long
    ago, putting a fence around a computer eliminated most threats. Today, most programs
    have network connections or take data sent through a network (and possibly from
    an attacker), and other defensive measures simply haven’t been able to counter
    attackers. Thus, all software developers must know how to counter attacks.'
  prefs: []
  type: TYPE_NORMAL
- en: You can find the master copy of this book at [http://www.dwheeler.com/secure-programs](http://www.dwheeler.com/secure-programs).
    This book is also part of the Linux Documentation Project (LDP) at [http://www.tldp.org](http://www.tldp.org)
    It’s also mirrored in several other places. Please note that these mirrors, including
    the LDP copy and/or the copy in your distribution, may be older than the master
    copy. I’d like to hear comments on this book, but please do not send comments
    until you’ve checked to make sure that your comment is valid for the latest version.
  prefs: []
  type: TYPE_NORMAL
- en: This book does not cover assurance measures, software engineering processes,
    and quality assurance approaches, which are important but widely discussed elsewhere.
    Such measures include testing, peer review, configuration management, and formal
    methods. Documents specifically identifying sets of development assurance measures
    for security issues include the Common Criteria (CC, [CC 1999]) and the Systems
    Security Engineering Capability Maturity Model [SSE-CMM 1999]. Inspections and
    other peer review techniques are discussed in [Wheeler 1996]. This book does briefly
    discuss ideas from the CC, but only as an organizational aid to discuss security
    requirements. More general sets of software engineering processes are defined
    in documents such as the Software Engineering Institute’s Capability Maturity
    Model for Software (SW-CMM) [Paulk 1993a, 1993b] and ISO 12207 [ISO 12207]. General
    international standards for quality systems are defined in ISO 9000 and ISO 9001
    [ISO 9000, 9001].
  prefs: []
  type: TYPE_NORMAL
- en: This book does not discuss how to configure a system (or network) to be secure
    in a given environment. This is clearly necessary for secure use of a given program,
    but a great many other documents discuss secure configurations. An excellent general
    book on configuring Unix-like systems to be secure is Garfinkel [1996]. Other
    books for securing Unix-like systems include Anonymous [1998]. You can also find
    information on configuring Unix-like systems at web sites such as [http://www.unixtools.com/security.html](http://www.unixtools.com/security.html).
    Information on configuring a Linux system to be secure is available in a wide
    variety of documents including Fenzi [1999], Seifried [1999], Wreski [1998], Swan
    [2001], and Anonymous [1999]. Geodsoft [2001] describes how to harden OpenBSD,
    and many of its suggestions are useful for any Unix-like system. Information on
    auditing existing Unix-like systems are discussed in Mookhey [2002]. For Linux
    systems (and eventually other Unix-like systems), you may want to examine the
    Bastille Hardening System, which attempts to “harden” or “tighten” the Linux operating
    system. You can learn more about Bastille at [http://www.bastille-linux.org](http://www.bastille-linux.org);
    it is available for free under the General Public License (GPL). Other hardening
    systems include [grsecurity](http://www.grsecurity.net). For Windows 2000, you
    might want to look at Cox [2000]. The U.S. National Security Agency (NSA) maintains
    a set of security recommendation guides at [http://nsa1.www.conxion.com](http://nsa1.www.conxion.com),
    including the “60 Minute Network Security Guide.” If you’re trying to establish
    a public key infrastructure (PKI) using open source tools, you might want to look
    at the [Open Source PKI Book.](http://ospkibook.sourceforge.net) More about firewalls
    and Internet security is found in [Cheswick 1994].
  prefs: []
  type: TYPE_NORMAL
- en: Configuring a computer is only part of Computer Security Management, a larger
    area that also covers how to deal with viruses, what kind of organizational security
    policy is needed, business continuity plans, and so on. There are international
    standards and guidance for security management. ISO 13335 is a five-part technical
    report giving guidance on security management [ISO 13335]. ISO/IEC 17799:2000
    defines a code of practice [ISO 17799]; its stated purpose is to give high-level
    and general “recommendations for information security management for use by those
    who are responsible for initiating, implementing or maintaining security in their
    organization.” The document specifically identifies itself as “a starting point
    for developing organization specific guidance.” It also states that not all of
    the guidance and controls it contains may be applicable, and that additional controls
    not contained may be required. Even more importantly, they are intended to be
    broad guidelines covering a number of areas. and not intended to give definitive
    details or "how-tos". It’s worth noting that the original signing of ISO/IEC 17799:2000
    was controversial; Belgium, Canada, France, Germany, Italy, Japan and the US voted
    *against* its adoption. However, it appears that these votes were primarily a
    protest on parliamentary procedure, not on the content of the document, and certainly
    people are welcome to use ISO 17799 if they find it helpful. More information
    about ISO 17799 can be found in NIST’s [ISO/IEC 17799:2000 FAQ](http://csrc.nist.gov/publications/secpubs/otherpubs/reviso-faq.pdf).
    ISO 17799 is highly related to BS 7799 part 1 and 2; more information about BS
    7799 can be found at [http://www.xisec.com/faq.htm](http://www.xisec.com/faq.htm).
    ISO 17799 is currently under revision. It’s important to note that none of these
    standards (ISO 13335, ISO 17799, or BS 7799 parts 1 and 2) are intended to be
    a detailed set of technical guidelines for software developers; they are all intended
    to provide broad guidelines in a number of areas. This is important, because software
    developers who simply only follow (for example) ISO 17799 will generally *not*
    produce secure software - developers need much, much, much more detail than ISO
    17799 provides.
  prefs: []
  type: TYPE_NORMAL
- en: Of course, computer security management is part of the even broader area of
    security in general. Clearly you should ensure that your physical environment
    is secure as well, depending on your threats. You might find [this Anti-Defamation
    League document](http://www.adl.org/security/safe.pdf) useful.
  prefs: []
  type: TYPE_NORMAL
- en: The Commonly Accepted Security Practices & Recommendations (CASPR) project at
    [http://www.caspr.org](http://www.caspr.org) is trying to distill information
    security knowledge into a series of papers available to all (under the GNU FDL
    license, so that future document derivatives will continue to be available to
    all). Clearly, security management needs to include keeping with patches as vulnerabilities
    are found and fixed. Beattie [2002] provides an interesting analysis on how to
    determine when to apply patches contrasting risk of a bad patch to the risk of
    intrusion (e.g., under certain conditions, patches are optimally applied 10 or
    30 days after they are released).
  prefs: []
  type: TYPE_NORMAL
- en: If you’re interested in the current state of vulnerabilities, there are other
    resources available to use. The CVE at http://cve.mitre.org gives a standard identifier
    for each (widespread) vulnerability. The paper [SecurityTracker Statistics](http://securitytracker.com/learn/securitytracker-stats-2002.pdf)
    analyzes vulnerabilities to determine what were the most common vulnerabilities.
    The Internet Storm Center at http://isc.incidents.org/ shows the prominence of
    various Internet attacks around the world.
  prefs: []
  type: TYPE_NORMAL
- en: This book assumes that the reader understands computer security issues in general,
    the general security model of Unix-like systems, networking (in particular TCP/IP
    based networks), and the C programming language. This book does include some information
    about the Linux and Unix programming model for security. If you need more information
    on how TCP/IP based networks and protocols work, including their security protocols,
    consult general works on TCP/IP such as [Murhammer 1998].
  prefs: []
  type: TYPE_NORMAL
- en: When I first wrote this document, there were many short articles but no books
    on writing secure programs. There are now other books on writing secure programs.
    One is “Building Secure Software” by John Viega and Gary McGraw [Viega 2002];
    this is a very good book that discusses a number of important security issues,
    but it omits a large number of important security problems that are instead covered
    here. Basically, this book selects several important topics and covers them well,
    but at the cost of omitting many other important topics. The Viega book has a
    little more information for Unix-like systems than for Windows systems, but much
    of it is independent of the kind of system. The other book is “Writing Secure
    Code” by Michael Howard and David LeBlanc [Howard 2002]. The title of that book
    is misleading; that book is solely about writing secure programs for Windows,
    and is not very helpful if you are writing programs for any other system. This
    shouldn’t be surprising; it’s published by Microsoft press, and its copyright
    is owned by Microsoft. If you are trying to write secure programs for Microsoft’s
    Windows systems, though, it’s a good book. Another useful source of secure programming
    guidance is the [The Open Web Application Security Project (OWASP) Guide to Building
    Secure Web Applications and Web Services](http://www.owasp.org/guide); it has
    more on process, and less specifics than this book, but it has useful material
    in it.
  prefs: []
  type: TYPE_NORMAL
- en: This book expecially focuses on all Unix-like systems, including Linux-based
    systems (including Debian, Ubuntu, Red Hat Enterprise Linux, Fedora, CentOS, and
    SuSE), Unix systems (including Solaris, FreeBSD, NetBSD, and OpenBSD), MacOS,
    Android, and iOS. In several places it includes details about Linux specifically.
    That said, much of this material is not limited to a particular operating system,
    and there’s some material specifically on other systems like Windows. If you know
    relevant information not already included here, please let me know.
  prefs: []
  type: TYPE_NORMAL
