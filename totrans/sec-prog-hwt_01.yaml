  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 本书版权所有（C）1999-2015 大卫·A·惠勒，受 GNU 自由文档许可证（GFDL）保护；有关更多信息，请参阅 [附录 C](about-license.html)
    和 [附录 D](fdl.html)。
- en: '[Chapter 2](background.html) discusses the background of Unix, Linux, and security.
    [Chapter 3](features.html) describes the general Unix and Linux security model,
    giving an overview of the security attributes and operations of processes, filesystem
    objects, and so on. (Windows is not the same, but there are many similarities.)
    This is followed by the meat of this book, a set of design and implementation
    guidelines for developing applications. This focuses more on Linux and Unix systems,
    but not exclusively so. The book ends with conclusions in [Chapter 12](conclusion.html),
    followed by a lengthy bibliography and appendixes.'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: '[第二章](background.html) 讨论了 Unix、Linux 和安全性的背景。[第三章](features.html) 描述了通用的 Unix
    和 Linux 安全模型，概述了进程、文件系统对象等的安全属性和操作。（Windows 与之不同，但有许多相似之处。）接着是本书的核心内容，即一组开发应用程序的设计和实施指南。本书更侧重于
    Linux 和 Unix 系统，但并非仅限于此。本书以 [第 12 章](conclusion.html) 的结论结束，随后是篇幅较长的参考文献和附录。'
- en: The design and implementation guidelines are divided into categories which I
    believe emphasize the programmer’s viewpoint. Programs accept inputs, process
    data, call out to other resources, and produce output, as shown in [Figure 1-1](introduction.html#ABSTRACT-PROGRAM);
    notionally all security guidelines fit into one of these categories. I’ve subdivided
    “process data” into structuring program internals and approach, avoiding buffer
    overflows (which in some cases can also be considered an input issue), language-specific
    information, and special topics. The chapters are ordered to make the material
    easier to follow. Thus, the book chapters giving guidelines discuss validating
    all input ([Chapter 5](input.html)), avoiding buffer overflows ([Chapter 6](buffer-overflow.html)),
    structuring program internals and approach ([Chapter 7](internals.html)), carefully
    calling out to other resources ([Chapter 8](call-out.html)), judiciously sending
    information back ([Chapter 9](output.html)), language-specific information ([Chapter
    10](language-specific.html)), and finally information on special topics such as
    how to acquire random numbers ([Chapter 11](special.html)).
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 设计和实现指南被分为几个类别，我认为这些类别强调了程序员的视角。程序接受输入，处理数据，调用其他资源，并产生输出，如图[图1-1](introduction.html#ABSTRACT-PROGRAM)所示；从概念上讲，所有安全指南都适合这些类别之一。我将“处理数据”细分为结构化程序内部和方式、避免缓冲区溢出（在某些情况下也可以被视为输入问题）、特定语言的信息和特殊主题。章节的顺序安排使得材料更容易跟随。因此，提供指南的书籍章节讨论了验证所有输入（[第5章](input.html)）、避免缓冲区溢出（[第6章](buffer-overflow.html)）、结构化程序内部和方式（[第7章](internals.html)）、谨慎调用其他资源（[第8章](call-out.html)）、审慎发送信息回（[第9章](output.html)）、特定语言的信息（[第10章](language-specific.html)），以及最后关于如何获取随机数等特殊主题的信息（[第11章](special.html)）。
