- en: Software Obfuscation
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 软件混淆
- en: 原文：[https://intensecrypto.org/public/lec_21_obfuscation.html](https://intensecrypto.org/public/lec_21_obfuscation.html)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://intensecrypto.org/public/lec_21_obfuscation.html](https://intensecrypto.org/public/lec_21_obfuscation.html)
- en: '*See any bugs/typos/confusing explanations? [Open a GitHub issue](https://github.com/boazbk/crypto/issues/new).
    You can also [comment below](#commentform)*'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '*看到任何错误/打字错误/令人困惑的解释？[在GitHub上打开一个issue](https://github.com/boazbk/crypto/issues/new)。您也可以[在下面评论](#commentform)*'
- en: '**★ See also the [**PDF version of this chapter**](https://files.boazbarak.org/crypto/lec_21_obfuscation.pdf)
    (better formatting/references) ★'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '**★ 另请参阅本章的 [**PDF版本**](https://files.boazbarak.org/crypto/lec_21_obfuscation.pdf)（更好的格式/参考文献）★'
- en: 'Let us stop and think of the notions we have seen in cryptography. We have
    seen that under reasonable computational assumptions (such as LWE) we can achieve
    the following:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们停下来思考一下我们在密码学中看到的观点。我们看到，在合理的计算假设（如LWE）下，我们可以实现以下目标：
- en: CPA secure *private key encryption* and *Message Authentication codes* (which
    can be combined to get CCA security or authenticated encryption)- this means that
    two parties that share a key can have virtual secure channel between them. An
    adversary cannot get *any additional information* beyond whatever is her prior
    knowledge given an encryption of a message sent from Alice to Bob. Moreover, she
    cannot modify this message by even a single bit. It’s lucky we only discovered
    these results from the 1970’s onwards— if the Germans had used such an encryption
    instead of ENIGMA in World War II there’s no telling how many more lives would
    have been lost.
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: CPA安全的 *私钥加密* 和 *消息认证码*（可以组合起来获得CCA安全或认证加密）——这意味着共享密钥的两个当事人之间可以有一个虚拟安全的通道。敌手在给定从爱丽丝发送给鲍勃的消息的加密后，无法获得
    *任何额外的信息* 超出她先前知识所给的信息。此外，她甚至无法通过修改一个比特来修改这条消息。幸运的是，我们只是在20世纪70年代以后才发现了这些结果——如果德国人在第二次世界大战中使用了这种加密而不是ENIGMA，那么无法预测会有多少更多的生命损失。
- en: '*Public key encryption* and *digital signatures* that enable Alice and Bob
    to set up such a virtually secure channel without *sharing a prior key*. This
    enables our “information economy” and protects virtually every financial transaction
    over the web. Moreover, it is the crucial mechanism for supplying “over the air”
    software updates to smart devices, whether they be phones, cars, thermostats or
    anything else. Some had predicted that this invention would change the nature
    of our form of government to [crypto anarchy](http://www.activism.net/cypherpunk/crypto-anarchy.html)
    and while this may be hyperbole, governments everywhere are [worried](https://www.fbi.gov/about-us/otd/going-dark-issue)
    about this invention.'
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*公钥加密* 和 *数字签名* 使得爱丽丝和鲍勃能够在不 *共享先前密钥* 的情况下建立这样一个几乎安全的通道。这使我们的“信息经济”得以发展，并保护了网络上的几乎所有金融交易。此外，它还是向智能设备提供“空中”软件更新的关键机制，无论是手机、汽车、恒温器还是其他任何设备。有些人预测这项发明将改变我们政府形式的本质，变成
    [加密无政府主义](http://www.activism.net/cypherpunk/crypto-anarchy.html)，虽然这可能有些夸张，但全世界各地的政府都对这项发明感到
    [担忧](https://www.fbi.gov/about-us/otd/going-dark-issue)。'
- en: '*Hash functions* and *pseudorandom functions* enable us to create authentication
    tokens for deriving one-time passwords out of shared keys, or deriving long keys
    from short passwords. They are also useful as a tool in a *password based key
    exchange*, which enables two parties to communicate securely (with fairly good
    but not overwhelming probability) when they share a 6 digit PIN, even if the adversary
    can easily afford much much more than \(10^6\) computational cycles.'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*散列函数* 和 *伪随机函数* 使我们能够从共享密钥中创建用于生成一次性密码的认证令牌，或者从短密码中生成长密钥。它们在基于密码的密钥交换中也很有用，这使两个当事人能够在共享一个6位PIN码的情况下安全地（以相当好的但不是压倒性的概率）进行通信，即使敌手可以轻易地提供比
    \(10^6\) 计算周期多得多的计算资源。'
- en: '*Fully homomorphic encryption* allows computing over encrypted data. Bob could
    prepare Alice’s taxes without knowing what her income is, and more generally store
    all her data and perform computations on it, without knowing what the data is.'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*全同态加密* 允许在加密数据上执行计算。鲍勃可以为爱丽丝准备税收，而不知道她的收入是多少，更普遍地，可以存储她的所有数据并在其上执行计算，而不了解数据的内容。'
- en: '*Zero knowledge proofs* can be used to prove a statement is true without revealing
    *why* its true. In particular since you can use zero knowledge proofs to prove
    that you posses X bitcoins without giving any information about their identity,
    they have been used to obtain [fully anonymous electronic currency](http://zerocash-project.org/).'
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*零知识证明* 可以用来证明一个陈述是真实的，而不必透露其*为什么*是真实的。特别是，由于你可以使用零知识证明来证明你拥有X比特币，而不必提供任何关于其身份的信息，因此它们已被用于获取[完全匿名的电子货币](http://zerocash-project.org/)。'
- en: '*Multiparty secure computation* are a fully general tool that enable Alice
    and Bob (and Charlie, David, Elana, Fran, etc.) to perform any computation on
    their private inputs, whether it is to compute the result of a vote, a second-price
    auction, privacy-preserving data mining, perform a cryptographic operation in
    a distributed manner (without any party ever learning the secret key) or simply
    play poker online without needing to trust any central server.'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*多方安全计算*是一个完全通用的工具，它使Alice和Bob（以及Charlie、David、Elana、Fran等）能够对其私有输入执行任何计算，无论是计算投票结果、第二价格拍卖、隐私保护的数据挖掘、以分布式方式执行加密操作（没有任何一方学习到密钥）或简单地在线玩扑克，而不需要信任任何中央服务器。'
- en: (BTW all of the above points are notions that you should be familiar and be
    able to explain what are their security guarantees if you ever need to use them,
    for example, in the unlikely event that you ever find yourself needing to take
    a cryptography final exam…)
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: （顺便说一下，上述所有点都是你应该熟悉的概念，并且能够在需要时解释它们的安全保证，例如，在不太可能的情况下，你需要参加一次密码学期末考试……）
- en: While clearly there are issues of efficiency, is there anything more in terms
    of *functionality* we could ask for? Given all these riches, can we be even more
    greedy?
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然显然存在效率问题，但在功能方面我们还能要求什么？考虑到所有这些财富，我们还能更加贪婪吗？
- en: 'It turns out that the answer is *yes*. Here are some scenarios that are still
    not covered by the above tools:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 结果是*是的*。以下是一些上述工具尚未涵盖的场景：
- en: Witness encryption
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 证人加密
- en: Suppose that you have uncovered a conspiracy that involves very powerful people,
    and you are afraid that something bad might happen to you. You would like an “insurance
    policy” in the form of writing down everything you know and making sure it is
    published in the case of your untimely death, but are afraid these powerful people
    could find and attack any trusted agent. Ideally you would want to publish an
    encrypted form of your manuscript far and wide, and make sure the decryption key
    is automatically revealed if anything happens to you, but how could you do that?
    A *UA-secure encryption* (which stands for secure against an [Underwood](https://goo.gl/8ms4wP)
    attack) gives an ability to create an encryption \(c\) of a message \(m\) that
    is CPA secure but such that there is an algorithm \(D\) such that on input \(c\)
    and any string \(w\) which is a (digitally signed) New York Times obituary for
    Janine Skorsky will output \(m\).
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你揭露了一个涉及非常有权势的人的阴谋，你担心可能会发生对你不利的事情。你希望有一个“保险单”，形式是写下你所知道的一切，并确保在你不幸去世时发表，但担心这些有权势的人可能会找到并攻击任何受信任的代理人。理想情况下，你希望广泛发布你手稿的加密形式，并确保在你发生任何事情时自动揭示解密密钥，但你怎么能做呢？一种*UA-安全加密*（代表抵御[Underwood](https://goo.gl/8ms4wP)攻击）能够创建一个消息\(m\)的加密\(c\)，它是CPA安全的，但存在一个算法\(D\)，它在输入\(c\)和任何字符串\(w\)（这是一份（数字签名）的纽约时报对Janine
    Skorsky的讣告）时输出\(m\)。
- en: The technical term for this notion is *witness encryption*, by which we mean
    that for every circuit \(F\) we have an algorithm \(E\) that on input \(F\) and
    a message \(m\) creates a ciphertext \(c\) that is CPA secure, and there is an
    algorithm \(D\) that on input \(c\) and some string \(w\), outputs \(m\) if \(F(w)=1\).
    In other words, instead of the key being a unique string, the key is *any* string
    \(w\) that satisfies a certain condition. Witness encryption can be used for other
    applications. For example, you could encrypt a message to future members of humanity,
    that can be decrypted only using a valid proof of the Riemann Hypothesis.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 这个概念的技术术语是*证人加密*，这意味着对于每个电路\(F\)，我们都有一个算法\(E\)，它在输入\(F\)和消息\(m\)时创建一个密文\(c\)，该密文是CPA安全的，并且存在一个算法\(D\)，它在输入\(c\)和某些字符串\(w\)时，如果\(F(w)=1\)，则输出\(m\)。换句话说，密钥不再是唯一的字符串，而是满足一定条件的*任何*字符串\(w\)。证人加密可用于其他应用。例如，你可以加密一个消息给未来的人类成员，只有使用有效的黎曼猜想证明才能解密。
- en: Deniable encryption
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 可否认加密
- en: Here is another scenario that is seemingly not covered by our current tools.
    Suppose that Alice uses a public key system \((G,E,D)\) to encrypt a message \(m\)
    by computing \(c=E_e(m,r)\) and sending \(c\) to Bob that will compute \(m=D_d(c)\).
    The ciphertext is intercepted by Bob’s archenemy Freddie Baskerville Ignatius
    (or FBI for short) who has the means to force Alice to reveal the message and
    as proof reveal the randomness used in encryption as well. Could Alice find, for
    any choice of \(m'\), some string \(r'\) that is pseudorandom and for which \(c\)
    equals \(E_e(m',r')\)? An encryption scheme with this property is called *deniable*,
    since we Alice can deny she sent \(m\) and claim she sent \(m'\) instead.^([1](#fn:1))
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个看似未被我们当前工具覆盖的场景。假设Alice使用一个公钥系统 \((G,E,D)\) 通过计算 \(c=E_e(m,r)\) 并将 \(c\)
    发送给Bob，Bob将计算 \(m=D_d(c)\)。密文被Bob的宿敌弗雷迪·巴克斯特尔·伊格纳蒂乌斯（简称FBI）截获，他有能力强迫Alice透露消息，并作为证据透露加密中使用的随机性。Alice能否找到，对于任何选择的
    \(m'\)，一些伪随机的字符串 \(r'\)，使得 \(c\) 等于 \(E_e(m',r')\)？具有这种属性的加密方案称为 *可否认的*，因为Alice可以否认她发送了
    \(m\) 并声称她发送了 \(m'\)^([1](#fn:1))。
- en: Functional encryption
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 功能加密
- en: It’s not just individuals that don’t have all their needs met by our current
    tools. Think of a large enterprise that uses a public key encryption \((G,E,D)\).
    When a ciphertext \(c=E_e(m)\) is received by the enterprise’s servers, it needs
    to be decrypted using the secret key \(d\). But this creates a single point of
    failure. It would be much better if we could create a “weakened key” \(d_1\) that,
    for example, can only decrypt messages related to sales that were sent in the
    date range X-Y, a key \(d_2\) that can only decrypt messages that contain certain
    keywords, or maybe a key \(d_3\) that only allows to detect whether the message
    encoded by a particular ciphertext satisfies a certain regular expression.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 不仅个人没有通过我们当前的工具满足所有需求。想想一个使用公钥加密 \((G,E,D)\) 的大型企业。当企业服务器收到密文 \(c=E_e(m)\) 时，它需要使用秘密密钥
    \(d\) 进行解密。但这创建了一个单点故障。如果能创建一个“弱密钥” \(d_1\)，例如，只能解密X-Y日期范围内发送的销售相关消息，一个密钥 \(d_2\)，只能解密包含某些关键词的消息，或者可能是一个密钥
    \(d_3\)，它只允许检测特定密文编码的消息是否满足某个正则表达式，那就好多了。
- en: This will allow us to give the key \(d_1\) to the manager of the sales department
    (and not worry about her taking the key with her if she leaves the company), or
    more generally give every employee a key that corresponds to his or her role.
    Furthermore, if the company receives a subpoena for all emails relating to a particular
    topic, it could give out a cryptographic key that reveals precisely these emails
    and nothing else. It could also run a spam filter on encrypted messages without
    needing to give the server performing this filter access to the full contents
    of the messages (and so perhaps even outsource spam filtering to a different company).
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 这将允许我们将密钥 \(d_1\) 给销售部门的经理（并且不必担心她离开公司时带走密钥），或者更普遍地给每个员工一个与其角色相对应的密钥。此外，如果公司收到与特定主题相关的所有电子邮件的传票，它可以提供一种加密密钥，仅揭示这些电子邮件，而不揭示其他任何内容。它还可以在加密消息上运行垃圾邮件过滤器，而无需将执行此过滤器的服务器的完整消息内容提供给它（因此甚至可以将垃圾邮件过滤外包给另一家公司）。
- en: The general form of this is called a *functional encryption*. The idea is that
    for every function \(f:\{0,1\}^*\rightarrow\{0,1\}^*\) we can create a decryption
    key \(d_f\) such that on input \(c= E_e(m)\), \(D_{d_f}(c)=f(m)\) but \(d_f\)
    cannot be used to gain any other information on the message except for \(f(m)\),
    and even if several parties holding \(d_{f_1},\ldots,d_{f_k}\) collude together,
    they can’t learn more than simply \(f_1(m),\ldots,f_k(m)\). Note that using fully
    homomorphic encryption we can easily transform an encryption of \(m\) to an encryption
    of \(f(m)\) but what we want here is the ability to *selectively decrypt* only
    some information about the message.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 这种一般形式被称为 *功能加密*。其想法是，对于每个函数 \(f:\{0,1\}^*\rightarrow\{0,1\}^*\)，我们可以创建一个解密密钥
    \(d_f\)，使得在输入 \(c= E_e(m)\) 时，\(D_{d_f}(c)=f(m)\)，但 \(d_f\) 不能用来获取关于消息的任何其他信息，除了
    \(f(m)\)，即使几个持有 \(d_{f_1},\ldots,d_{f_k}\) 的各方串谋在一起，他们也不能学到比简单的 \(f_1(m),\ldots,f_k(m)\)
    更多。请注意，使用全同态加密，我们可以轻松地将 \(m\) 的加密转换为 \(f(m)\) 的加密，但这里我们想要的是能够 *选择性地解密* 消息的某些信息。
- en: 'The formal definition of functional encryption is the following:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 功能加密的正式定义如下：
- en: 'A tuple \((G,E,D,KeyDist)\) is a *functional encryption scheme* if:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 一个元组 \((G,E,D,KeyDist)\) 是一个 *功能加密方案*，如果：
- en: For every function \(f:\{0,1\}^\ell\rightarrow\{0,1\}\), if \((d,e)=G(1^n)\)
    and \(d_f = KeyDist(d,f)\), then for every message \(m\), \(D_{d_f}(E_e(m))=f(m)\).
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于每一个函数 \(f:\{0,1\}^\ell\rightarrow\{0,1\}\)，如果 \((d,e)=G(1^n)\) 并且 \(d_f =
    KeyDist(d,f)\)，那么对于每一条消息 \(m\)，\(D_{d_f}(E_e(m))=f(m)\)。
- en: 'Every efficient adversary Eve wins the following game with probability at most
    \(1/2 + negl(n)\):'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每个有效的对手爱丽丝以最多 \(1/2 + negl(n)\) 的概率赢得以下游戏：
- en: We generate \((d,e) \leftarrow_R G(1^n)\).
  id: totrans-27
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们生成 \((d,e) \leftarrow_R G(1^n)\)。
- en: Eve is given \(e\) and for \(i=1,\ldots,T=poly(n)\) repeatedly chooses \(f_i\)
    and receives \(d_{f_i}\).
  id: totrans-28
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 爱丽丝被给出 \(e\)，对于 \(i=1,\ldots,T=poly(n)\) 重复选择 \(f_i\) 并接收 \(d_{f_i}\)。
- en: Eve chooses two messages \(m_0,m_1\) such that \(f_i(m_0)=f_i(m_1)\) for all
    \(i = 1,\ldots, T\).
  id: totrans-29
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 爱丽丝选择两个消息 \(m_0,m_1\)，使得对于所有 \(i = 1,\ldots, T\)，\(f_i(m_0)=f_i(m_1)\)。
- en: For \(b \leftarrow_R \{0,1\}\), Eve receives \(c^* = E_e(m_b)\) and outputs
    \(b'\).
  id: totrans-30
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对于 \(b \leftarrow_R \{0,1\}\)，爱丽丝收到 \(c^* = E_e(m_b)\) 并输出 \(b'\)。
- en: Eve *wins* if \(b'=b\).
  id: totrans-31
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果 \(b'=b\)，爱丽丝 *获胜*。
- en: The software patch problem
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 软件补丁问题
- en: It’s not only exotic forms of encryption that we’re missing. Here is another
    application that is not yet solved by the above tools. From time to time software
    companies discover a vulnerability in their products. For example, they might
    discover that if fed an input \(x\) of some particular form (e.g., satisfying
    a regular expression \(R\)) to a server running their software could give an adversary
    unlimited access to it. In such a case, you might want to release a patch that
    modifies the software to check if \(R(x)=1\) and if so rejects the input. However
    the fear is that hackers who didn’t know about the vulnerability before could
    discover it by examining the patch and then use it to attack the customers who
    are slow to update their software. Could we come up for a regular expression \(R\)
    with a program \(P\) such that \(P(x)=1\) if and only if \(R(x)=1\) but examining
    the code of \(P\) doesn’t make it any easier to find some \(x\) satisfying \(R\)?
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 不仅是我们缺少加密的异构形式。这里还有一个尚未被上述工具解决的问题。软件公司时不时地会发现他们产品中的漏洞。例如，他们可能会发现，如果向运行他们软件的服务器提供某种特定形式（例如，满足正则表达式
    \(R\)）的输入 \(x\)，可能会给对手无限的访问权限。在这种情况下，你可能希望发布一个补丁，修改软件以检查 \(R(x)=1\)，如果是这样，就拒绝该输入。然而，担心的是，那些之前不知道漏洞的黑客可能会通过检查补丁来发现它，然后利用它来攻击那些软件更新缓慢的客户。我们能否找到一个程序
    \(P\)，使得 \(P(x)=1\) 当且仅当 \(R(x)=1\)，但检查 \(P\) 的代码并不使找到满足 \(R\) 的某些 \(x\) 更容易？
- en: Software obfuscation
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 软件混淆
- en: All these applications and more could in principle be solved by a single general
    tool known as *virtual black-box (VBB) secure software obfuscation*. In fact,
    such an obfuscation is a general tool that can also be directly used to yield
    public key encryption, fully homomorphic encryption, zero knowledge proofs, secure
    function evaluation, and many more applications.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些应用以及更多，原则上都可以通过一个称为 *虚拟黑盒（VBB）安全软件混淆* 的单一通用工具来解决。事实上，这种混淆是一个通用工具，也可以直接用来产生公钥加密、全同态加密、零知识证明、安全函数评估以及许多其他应用。
- en: We will now give the definition of VBB secure obfuscation and prove the central
    result about it, which is unfortunately that secure VBB obfuscators do not exist.
    We will then talk about the relaxed notion of *indistinguishablity obfuscators*
    (IO) - this object turns out to be good enough for many of the above applications
    and whether it exists is one of the most exciting open questions in cryptography
    at the moment. We will survey some of the research on this front.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在将给出 VBB 安全混淆的定义，并证明关于它的中心结果，遗憾的是，安全的 VBB 混淆器不存在。然后我们将讨论 *不可区分混淆器*（IO）的放宽概念——这个对象对于许多上述应用来说已经足够好了，它是否存在是当前密码学中最激动人心的开放问题之一。我们将概述这方面的部分研究。
- en: 'Let’s define a *compiler* to be an efficient (i.e., polynomial time) possibly
    probabilistic map \(\mathcal{O}\) that takes a Boolean circuit \(C\) on \(n\)
    bits of input and outputs a Boolean circuit \(C''\) that also takes \(n\) input
    bits and computes the same function; i.e., \(C(x)=C''(x)\) for every \(x\in\{0,1\}^n\).
    (If \(\mathcal{O}\) is probabilistic then this should happen for every choice
    of its coins.) This might seem a strange definition, since it even allows the
    trivial compiler \(\mathcal{O}(C)=C\). That is OK, since later we will require
    additional properties such as the following:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们定义一个**编译器**为一个高效的（即多项式时间）可能概率映射 \(\mathcal{O}\)，它将 \(n\) 位输入的布尔电路 \(C\) 转换为另一个布尔电路
    \(C'\)，该电路也接受 \(n\) 位输入并计算相同的函数；即对于每个 \(x\in\{0,1\}^n\)，有 \(C(x)=C'(x)\)。如果 \(\mathcal{O}\)
    是概率性的，那么这应该对它的所有硬币选择都成立。这个定义可能看起来很奇怪，因为它甚至允许平凡的编译器 \(\mathcal{O}(C)=C\)。这是可以的，因为稍后我们将要求额外的属性，如下所示：
- en: 'A compiler \(\mathcal{O}\) is a *virtual black box (VBB) secure obfuscator*
    if it satisfies the following property: for every efficient adversary \(A\) mapping
    \(\{0,1\}^*\) to \(\{0,1\}\), there exists an efficient simulator \(S\) such that
    for every circuit \(C\) the following random variables are computationally indistinguishable:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 如果编译器 \(\mathcal{O}\) 满足以下属性，则它是一个**虚拟黑盒（VBB）安全混淆器**：对于每个将 \(\{0,1\}^*\) 映射到
    \(\{0,1\}\) 的有效对手 \(A\)，存在一个有效的模拟器 \(S\)，使得对于每个电路 \(C\)，以下随机变量在计算上是不可区分的：
- en: \(A(\mathcal{O}(C))\)
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: \(A(\mathcal{O}(C))\)
- en: \(S^C(1^{|C|})\) where by this we mean the output of \(S\) when it is given
    the length of \(C\) and access to the function \(x \mapsto C(x)\) as a black box
    (aka oracle access).
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: \(S^C(1^{|C|})\)，其中我们指的是当 \(S\) 被给出 \(C\) 的长度和访问函数 \(x \mapsto C(x)\) 作为黑盒（即占位符访问）时的输出。
- en: (Note that the distributions above are of a single bit, and so being indistinguishable
    simply means that the probability of outputting \(1\) is equal in both cases up
    to a negligible additive factor.)
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: （注意，上述分布是单比特的，因此不可区分意味着在两种情况下输出 \(1\) 的概率相等，最多加上一个可忽略的加性因子。）
- en: Applications of obfuscation
  id: totrans-42
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 混淆的应用
- en: The writings of Diffie and Hellman, James Ellis, and others that thought of
    public key encryption, shows that one of the first approaches they considered
    was to use obfuscation to transform a private-key encryption scheme into a public
    key one. That is, given a private key encryption scheme \((E,D)\) we can transform
    it to a public key encryption scheme \((G,E',D)\) by having the key generation
    algorithm select a private key \(k\leftarrow_R\{0,1\}^n\) that will serve as the
    decryption key, and let the encryption key \(e\) be the circuit \(\mathcal{O}(C)\)
    where \(\mathcal{O}\) is an obfuscator and \(C\) is a circuit mapping \(c\) to
    \(E_k(c)\). The new encryption algorithm \(E'\) takes \(e\) and \(c\) and simply
    outputs \(e(c)\).
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: Diffie 和 Hellman、James Ellis 以及其他考虑公钥加密的人的著作表明，他们最初考虑的第一个方法之一是使用混淆将私钥加密方案转换为公钥方案。也就是说，给定一个私钥加密方案
    \((E,D)\)，我们可以通过让密钥生成算法选择一个私钥 \(k\leftarrow_R\{0,1\}^n\) 作为解密密钥，并让加密密钥 \(e\) 是电路
    \(\mathcal{O}(C)\)，其中 \(\mathcal{O}\) 是一个混淆器，\(C\) 是将 \(c\) 映射到 \(E_k(c)\) 的电路，将其转换为公钥加密方案
    \((G,E',D)\)。新的加密算法 \(E'\) 接受 \(e\) 和 \(c\)，并简单地输出 \(e(c)\)。
- en: These days we know other approaches for obtaining public key encryption, but
    the obfuscation-based approach has significant additional flexibility. To turn
    this into a fully homomorphic encryption, we simply publish the obfuscation of
    \(c,c' \mapsto D_k(c) ~\ensuremath{\mathit{NAND}}~ D_k(c')\). To turn this into
    a functional encryption, for every function \(f\) we can define \(d_f\) as the
    obfuscation of \(c \mapsto f(D_k(c))\).
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们知道其他获得公钥加密的方法，但基于混淆的方法具有显著额外的灵活性。为了将其转化为全同态加密，我们只需发布 \(c,c' \mapsto D_k(c)
    ~\ensuremath{\mathit{NAND}}~ D_k(c')\) 的混淆。为了将其转化为功能加密，对于每个函数 \(f\)，我们可以定义 \(d_f\)
    为 \(c \mapsto f(D_k(c))\) 的混淆。
- en: 'We can also use obfuscation to get a witness encryption: to encrypt a message
    \(m\) to be opened using any \(w\) such that \(F(w)=1\), we can obfuscate the
    function that maps \(w\) to \(m\) if \(F(w)=1\) and outputs `error` otherwise.
    To solve the patch problem, for a given regular expression we can obfuscate the
    function that maps \(x\) to \(R(x)\).'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还可以使用混淆来获得一个证据加密：为了加密一个消息 \(m\)，该消息可以使用任何 \(w\) 打开，只要 \(F(w)=1\)，我们可以在 \(F(w)=1\)
    时混淆将 \(w\) 映射到 \(m\) 的函数，否则输出 `error`。为了解决补丁问题，对于给定的正则表达式，我们可以混淆将 \(x\) 映射到 \(R(x)\)
    的函数。
- en: Impossibility of obfuscation
  id: totrans-46
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 混淆的不可能性
- en: 'So far, we’ve learned that in cryptography no concept is too fantastic to be
    realized. Unfortunately, VBB secure obfuscation [is an exception](http://www.boazbarak.org/Papers/obfuscate.pdf):'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们已经了解到在密码学中，没有任何概念过于离奇而无法实现。不幸的是，VBB安全混淆[是一个例外](http://www.boazbarak.org/Papers/obfuscate.pdf)：
- en: Under the PRG assumption, there does not exist a VBB secure obfuscating compiler.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 在PRG假设下，不存在VBB安全的混淆编译器。
- en: Proof of impossibility of VBB obfuscation
  id: totrans-49
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: VBB混淆不可行的证明
- en: We will now show the proof of [Theorem 20.3](#obfimpthm). For starters, note
    that obfuscation is trivial for *learnable* functions. That is, if \(F\) is a
    function such that given black-box access to \(F\) we can recover a circuit that
    computes it, then we can obfuscate it. Given a circuit \(C\), the obfuscator \(\mathcal{O}\)
    will simply use it as a black box to learn a circuit \(C'\) that computes the
    same function and output it. Since \(\mathcal{O}\) itself only uses black box
    access to \(C\), it can be trivially simulated perfectly. (Verifying that this
    is indeed the case is a good way to make sure you followed the definition.)
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在将展示[定理20.3](#obfimpthm)的证明。首先，请注意，对于*可学习*的函数，混淆是平凡的。也就是说，如果 \(F\) 是一个函数，给定对
    \(F\) 的黑盒访问，我们可以恢复一个计算它的电路，那么我们可以混淆它。给定一个电路 \(C\)，混淆器 \(\mathcal{O}\) 将简单地将其作为黑盒来学习一个计算相同函数的电路
    \(C'\) 并输出它。由于 \(\mathcal{O}\) 本身只使用对 \(C\) 的黑盒访问，它可以被完美地模拟。 (验证这一点确实是按照定义进行的，这是一个确保你遵循定义的好方法。)
- en: However, this is not so useful, since it’s not hard to see that all the examples
    above where we wanted to use obfuscation involved functions that were unlearnable.
    But it already suggests that we should use an unlearnable function for our negative
    result. Here is an extremely simple unlearnable function. For every \(\alpha,\beta\in\{0,1\}^n\),
    we define \(F_{\alpha,\beta}:\{0,1\}^n\rightarrow\{0,1\}^n\) to be the function
    that on input \(x\) outputs \(\beta\) if \(x=\alpha\) and otherwise outputs \(0^n\).
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，这并不那么有用，因为不难看出，上述所有我们想要使用混淆的例子都涉及无法学习的函数。但这已经暗示我们应该在我们的负结果中使用不可学习的函数。这里有一个极其简单的不可学习函数。对于每一个
    \(\alpha,\beta\in\{0,1\}^n\)，我们定义 \(F_{\alpha,\beta}:\{0,1\}^n\rightarrow\{0,1\}^n\)
    为一个函数，它在输入 \(x\) 时，如果 \(x=\alpha\) 则输出 \(\beta\)，否则输出 \(0^n\)。
- en: Given black box access for this function for a random \(\alpha,\beta\), it’s
    extremely unlikely that we would hit \(\alpha\) with a polynomial number of queries
    and hence will not be able to recover \(\beta\) and so in particular will not
    be able to learn a circuit that computes \(F_{\alpha,\beta}\).^([2](#fn:2))
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 给定对这个函数的随机 \(\alpha,\beta\) 的黑盒访问，我们用多项式数量的查询击中 \(\alpha\) 的可能性极低，因此无法恢复 \(\beta\)，所以特别地，无法学习一个计算
    \(F_{\alpha,\beta}\) 的电路。\(^([2](#fn:2))\)
- en: 'This function already yields a counterexample for a stronger version of the
    VBB definition. We define a *strong VBB obfuscator* to be a compiler \(\mathcal{O}\)
    that satisfies the above definition for adversaries that can output not just one
    bit but an arbitrary long string. We can now prove the following:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 这个函数已经为VBB定义的更强大版本提供了一个反例。我们定义一个*强大的VBB混淆器*为一个编译器 \(\mathcal{O}\)，它满足上述定义，对于可以输出不仅仅是单个比特而是任意长字符串的对手。我们现在可以证明以下内容：
- en: There does not exist a strong VBB obfuscator.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 不存在一个强大的VBB混淆器。
- en: Suppose towards a contradiction that there exists a strong VBB obfuscator \(\mathcal{O}\).
    Let \(F_{\alpha,\beta}\) be defined as above, and let \(A\) be the adversary that
    on input a circuit \(C'\) simply outputs \(C'\). We claim that for every \(S\)
    there exists some \(\alpha,\beta\) and an efficient algorithm \(D_{\alpha,\beta}\)
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 假设存在一个强大的VBB混淆器 \(\mathcal{O}\)。令 \(F_{\alpha,\beta}\) 如上定义，令 \(A\) 为一个对手，它在输入一个电路
    \(C'\) 时简单地输出 \(C'\)。我们声称对于每一个 \(S\)，都存在某些 \(\alpha,\beta\) 和一个有效的算法 \(D_{\alpha,\beta}\)
- en: \(\left| \Pr[ D_{\alpha,\beta}(A(\mathcal{O}(F_{\alpha,\beta})))=1] -\Pr[ D_{\alpha,\beta}(S^{F_{\alpha,\beta}}(1^{10n}))=1
    ] \right| > 0.9 \;\; (*)\)
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: \(\left| \Pr[ D_{\alpha,\beta}(A(\mathcal{O}(F_{\alpha,\beta})))=1] -\Pr[ D_{\alpha,\beta}(S^{F_{\alpha,\beta}}(1^{10n}))=1
    ] \right| > 0.9 \;\; (*)\)
- en: these probabilities are over the coins of \(\mathcal{O}\) and the simulator
    \(S\). Note that we identify the function \(F_{\alpha,\beta}\) with the obvious
    circuit of size at most \(10n\) that computes it.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 这些概率是在 \(\mathcal{O}\) 和模拟器 \(S\) 的硬币上计算的。请注意，我们将函数 \(F_{\alpha,\beta}\) 与计算它的大小最多为
    \(10n\) 的明显电路相等同。
- en: Clearly \((*)\) implies that that these two distributions are not indistinguishable,
    and so proving \((*)\) will finish the proof. The algorithm \(D_{\alpha,\beta}\)
    on input a circuit \(C'\) will simply output \(1\) iff \(C'(\alpha)=\beta\). By
    the definition of a compiler and the algorithm \(A\), for every \(\alpha,\beta\),
    \(\Pr[ D_{\alpha,\beta}(A(\mathcal{O}(F_{\alpha,\beta})))=1]=1\).
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 显然 \((*)\) 表明这两个分布是不可区分的，因此证明 \((*)\) 将完成证明。算法 \(D_{\alpha,\beta}\) 在输入电路 \(C'\)
    时，将简单地输出 \(1\) 当且仅当 \(C'(\alpha)=\beta\)。根据编译器的定义和算法 \(A\)，对于每一个 \(\alpha,\beta\)，\(\Pr[
    D_{\alpha,\beta}(A(\mathcal{O}(F_{\alpha,\beta})))=1]=1\)。
- en: On the other hand, for \(D_{\alpha,\beta}\) to output \(1\) on \(C' = S^{F_{\alpha,\beta}}(1^{10n})\),
    it must be the case that \(C'(\alpha)=\beta\). We claim that there exists some
    \(\alpha,\beta\) such that this will happen with negligible probability. Indeed,
    assume \(S\) makes \(T=poly(n)\) queries and pick \(\alpha,\beta\) independently
    and uniformly at random from \(\{0,1\}^n\). For every \(i=1,\ldots,T\), let \(E_i\)
    be the event that the \(i^{th}\) query of \(S\) is the first in which it gets
    a response other than \(0^n\). The probability of \(E_i\) is at most \(2^{-n}\)
    because as long as \(S\) got all responses to be \(0^n\), it got no information
    about \(\alpha\) and so the choice of \(S\)’s \(i^{th}\) query is independent
    of \(\alpha\) which is chosen at random in \(\{0,1\}^n\). By a union bound, the
    probability that \(S\) got any response other than \(0^n\) is negligible. In which
    case if we let \(C'\) be the output of \(S\) and let \(\beta' = C'(\alpha)\),
    then \(\beta'\) is independent of \(\beta\) and so the probability that they are
    equal is at most \(2^{-n}\).
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，对于 \(D_{\alpha,\beta}\) 在 \(C' = S^{F_{\alpha,\beta}}(1^{10n})\) 上输出 \(1\)，必须满足
    \(C'(\alpha)=\beta\)。我们断言存在某些 \(\alpha,\beta\)，使得这种情况将以可忽略的概率发生。实际上，假设 \(S\) 进行
    \(T=poly(n)\) 次查询，并独立且均匀地从 \(\{0,1\}^n\) 中随机选择 \(\alpha,\beta\)。对于每一个 \(i=1,\ldots,T\)，令
    \(E_i\) 为事件，即 \(S\) 的第 \(i\) 次查询是它第一次得到除了 \(0^n\) 之外的响应。\(E_i\) 的概率至多为 \(2^{-n}\)，因为只要
    \(S\) 得到的所有响应都是 \(0^n\)，它就得不到关于 \(\alpha\) 的任何信息，因此 \(S\) 的第 \(i\) 次查询的选择与 \(\alpha\)
    无关，\(\alpha\) 是在 \(\{0,1\}^n\) 中随机选择的。通过并集界限，\(S\) 得到任何除了 \(0^n\) 之外的响应的概率是可忽略的。在这种情况下，如果我们让
    \(C'\) 是 \(S\) 的输出，并让 \(\beta' = C'(\alpha)\)，那么 \(\beta'\) 与 \(\beta\) 无关，因此它们相等的概率至多为
    \(2^{-n}\)。
- en: 'The adversary in the proof of [Lemma 20.4](#strongvbblem) does not seem very
    impressive. After all, it merely printed out its input. Indeed, the definition
    of strong VBB security might simply be an overkill, and “plain” VBB is enough
    for almost all applications. However, as mentioned above, plain VBB is impossible
    to achieve as well. We’ll prove a slightly weaker version of [Theorem 20.3](#obfimpthm):'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: '[引理 20.4](#strongvbblem) 的证明中的对手似乎并不令人印象深刻。毕竟，它只是打印出了它的输入。实际上，强 VBB 安全性的定义可能只是过度杀鸡用牛刀，而“普通”的
    VBB 对于几乎所有应用来说就足够了。然而，如上所述，普通的 VBB 也是无法实现的。我们将证明 [定理 20.3](#obfimpthm) 的一个稍微弱一些的版本：'
- en: If fully homomorphic encryption exists then there is no VBB secure obfuscating
    compiler.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 如果存在全同态加密，那么就没有 VBB 安全的混淆编译器。
- en: (To get the original theorem from this, note that if VBB obfuscation exists
    then we can transform any private key encryption into a fully homomorphic public
    key encryption.)
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: （为了从这一点得到原始定理，请注意，如果存在 VBB 混淆，那么我们可以将任何私钥加密转换为全同态公钥加密。）
- en: 'Let \((G,E,D,\ensuremath{\mathit{EVAL}})\) be a fully homomorphic encryption
    scheme. For strings \(d,e,c,\alpha,\beta,\gamma\), we will define the function
    \(F_{d,e,c,\alpha,\beta,\gamma}\) as follows: for inputs of the form \(00x\),
    it will output \(\beta\) if and only if \(x=\alpha\), and otherwise output \(0^n\).
    For inputs of the form \(01c''\), it will output \(\gamma\) iff \(D_d(c'')=\beta\)
    and otherwise output \(0^n\). And for the input \(1^n\), it will output \(c\).
    For all other inputs it will output \(0^n\).'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 设 \((G,E,D,\ensuremath{\mathit{EVAL}})\) 为一个全同态加密方案。对于字符串 \(d,e,c,\alpha,\beta,\gamma\)，我们将定义函数
    \(F_{d,e,c,\alpha,\beta,\gamma}\) 如下：对于形式为 \(00x\) 的输入，它将输出 \(\beta\) 当且仅当 \(x=\alpha\)，否则输出
    \(0^n\)。对于形式为 \(01c'\) 的输入，它将输出 \(\gamma\) 当且仅当 \(D_d(c')=\beta\)，否则输出 \(0^n\)。对于输入
    \(1^n\)，它将输出 \(c\)。对于所有其他输入，它将输出 \(0^n\)。
- en: We will use this function family where \(d,e\) are the keys of the FHE, and
    \(c=E_e(\alpha)\). We now define our adversary \(A\). On input some circuit \(C'\),
    \(A\) will compute \(c'=C'(1^n)\) and let \(C''\) be the circuit that on input
    \(x\) outputs \(C'(00x)\). It will then let \(c'' = \ensuremath{\mathit{EVAL}}_e(C'',c')\).
    Note that if \(c'\) is an encryption of \(\alpha\) and \(C'\) computes \(F=F_{d,e,c,\alpha,\beta,\gamma}\)
    then \(c''\) will be an encryption of \(F(00\alpha)=\beta\). The adversary \(A\)
    will then compute \(\gamma' = C'(01c'')\) and output \(\gamma_1'\).
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用这个函数族，其中 \(d,e\) 是 FHE 的密钥，\(c=E_e(\alpha)\)。我们现在定义我们的攻击者 \(A\)。在输入某个电路
    \(C'\) 时，\(A\) 将计算 \(c'=C'(1^n)\)，并让 \(C''\) 是一个电路，它在输入 \(x\) 时输出 \(C'(00x)\)。然后它将
    \(c'' = \ensuremath{\mathit{EVAL}}_e(C'',c')\)。注意，如果 \(c'\) 是 \(\alpha\) 的加密，且
    \(C'\) 计算出 \(F=F_{d,e,c,\alpha,\beta,\gamma}\)，那么 \(c''\) 将是 \(F(00\alpha)=\beta\)
    的加密。攻击者 \(A\) 然后计算 \(\gamma' = C'(01c'')\) 并输出 \(\gamma_1'\)。
- en: We claim that for every simulator \(S\), there exist some tuple \((d,e,c,\alpha,\beta,\gamma)\)
    and a distinguisher \(D\) such that
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 我们断言，对于每个模拟器 \(S\)，都存在一些元组 \((d,e,c,\alpha,\beta,\gamma)\) 和一个区分器 \(D\)，使得
- en: \[\left| \Pr[D(A(\mathcal{O}(F_{d,e,c,\alpha,\beta,\gamma})))=1] - \Pr[D(S^{F_{d,e,c,\alpha,\beta,\gamma}}(1^{|F_{d,e,c,\alpha,\beta,\gamma}|}))=1]
    \right| \geq 0.1\]
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: \[\left| \Pr[D(A(\mathcal{O}(F_{d,e,c,\alpha,\beta,\gamma})))=1] - \Pr[D(S^{F_{d,e,c,\alpha,\beta,\gamma}}(1^{|F_{d,e,c,\alpha,\beta,\gamma}|}))=1]
    \right| \geq 0.1\]
- en: 'Indeed, the distinguisher \(D\) will depend on \(\gamma\) and on input a bit
    \(b\) will simply output \(1\) iff \(b=\gamma_1\). Clearly, if \((d,e)\) are keys
    of the FHE and \(c=E_e(\alpha)\) then no matter what circuit \(C''\) the obfuscator
    \(\mathcal{O}\) outputs on input \(F_{d,e,c,\alpha,\beta,\gamma}\), the adversary
    \(A\) will output \(\gamma_1\) on \(C''\) and hence \(D\) will output \(1\) with
    probability one on \(A\)’s output. > In contrast if we let \(S\) be a simulator
    and generate \((d,e)=G(1^n)\), pick \(\alpha,\beta,\gamma\) independently at random
    in \(\{0,1\}^n\) and let \(c=E_e(\alpha)\), we claim that the probability that
    \(S\) will output \(\gamma_1\) will be equal to \(1/2 \pm negl(n)\). Indeed, suppose
    otherwise, and define the event \(E_i\) to be that the \(i^{th}\) query is the
    first query (apart from the query \(1^n\) whose answer is \(c\)) on which \(S\)
    receives an answer other than \(0^n\). Now there are two cases:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，区分器 \(D\) 将取决于 \(\gamma\)，并且在输入一个比特 \(b\) 时，将简单地输出 \(1\) 当且仅当 \(b=\gamma_1\)。显然，如果
    \((d,e)\) 是 FHE 的密钥，且 \(c=E_e(\alpha)\)，那么无论混淆器 \(\mathcal{O}\) 在输入 \(F_{d,e,c,\alpha,\beta,\gamma}\)
    时输出什么电路 \(C'\)，攻击者 \(A\) 都会在 \(C'\) 上输出 \(\gamma_1\)，因此 \(D\) 在 \(A\) 的输出上以概率一输出
    \(1\)。> 相反，如果我们让 \(S\) 成为模拟器并生成 \((d,e)=G(1^n)\)，独立地在 \(\{0,1\}^n\) 中随机选择 \(\alpha,\beta,\gamma\)，并让
    \(c=E_e(\alpha)\)，我们断言 \(S\) 输出 \(\gamma_1\) 的概率将是 \(1/2 \pm negl(n)\)。事实上，假设否则，并定义事件
    \(E_i\) 为 \(S\) 在第 \(i\) 次查询（除了答案为 \(c\) 的查询 \(1^n\) 之外）收到除 \(0^n\) 之外的其他答案的第
    \(i\) 次查询。现在有两种情况：
- en: '**Case 1:** The query is equal to \(00\alpha\).'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: '**情况 1**：查询等于 \(00\alpha\)。'
- en: '**Case 2:** The query is equal to \(01c''\) for some \(c''\) such that \(D_d(c'')=\beta\).'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: '**情况 2**：查询等于 \(01c''\)，其中 \(c''\) 是使得 \(D_d(c'')=\beta\) 的某个 \(c''\)。'
- en: Case 2 only happens with negligible probability because if \(S\) only received
    the value \(e\) (which is independent of \(\beta\)) and did not receive any other
    non \(0^n\) response up to the \(i^{th}\) point then it did not learn any information
    about \(\beta\). Therefore the value \(\beta\) is independent of the \(i^{th}\)
    query and the probability that it decrypts to \(\beta\) is at most \(2^{-n}\).
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 情况 2 只会以可忽略的概率发生，因为如果 \(S\) 只收到了 \(e\)（与 \(\beta\) 无关）的值，并且在第 \(i\) 次点之前没有收到任何其他非
    \(0^n\) 的响应，那么它没有学到关于 \(\beta\) 的任何信息。因此，\(\beta\) 与第 \(i\) 次查询独立，它解密到 \(\beta\)
    的概率最多是 \(2^{-n}\)。
- en: Case 1 only happens with negligible probability because otherwise \(S\) is an
    algorithm that on input an encryption of \(\alpha\) (and a bunch of answers of
    the form \(0^n\), which are of course not helpful) manages to output \(\alpha\)
    with non-negligible probability, hence violating the CPA security of the encryption
    scheme.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 情况 1 只会以可忽略的概率发生，因为否则 \(S\) 是一个算法，在输入 \(\alpha\) 的加密（以及一些形式为 \(0^n\) 的答案，这些答案当然没有帮助）的情况下，能够以非可忽略的概率输出
    \(\alpha\)，从而违反加密方案的 CPA 安全性。
- en: Now if neither case happens, then \(S\) does not receive any information about
    \(\gamma\), and hence the probability that its output is \(\gamma_1\) is at most
    \(1/2\).
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 现在如果两种情况都没有发生，那么 \(S\) 没有收到关于 \(\gamma\) 的任何信息，因此它的输出是 \(\gamma_1\) 的概率最多是 \(1/2\)。
- en: This proof is simple but deserves a second read. A crucial point here is to
    use FHE to allow the adversary to essentially “feed \(C'\) to itself” so it can
    obtain from an encryption of \(\alpha\) an encryption of \(\beta\), even though
    that would not be possible using black box access only.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 证明简单，但值得再次阅读。这里的一个关键点是使用FHE（功能同态加密）允许对手基本上“将\(C'\)喂给自身”，从而可以从\(\alpha\)的加密中获得\(\beta\)的加密，尽管仅使用黑盒访问是不可能的。
- en: Indistinguishability obfuscation
  id: totrans-74
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 不可区分模糊化
- en: 'The proof can be generalized to give private key encryption for which the transformation
    to public key encryption would be insecure, and many other such constructions.
    So, this result might (and indeed to a large extent did) seem like a death blow
    to general-purpose obfuscation. However, already in that paper we noticed that
    there was a variant of obfuscation that we could not rule out, and this is the
    following:'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 证明可以推广，以提供私钥加密，其转换为公钥加密将是不安全的，以及许多其他类似构造。因此，这个结果可能（实际上在很大程度上确实如此）对通用模糊化构成了致命打击。然而，在那篇论文中，我们已经注意到存在一种我们无法排除的模糊化变体，如下所示：
- en: We say a compiler \(\mathcal{O}\) is an *indistinguishability obfuscator (IO)*
    if for every two circuits \(C,C'\) that have the same size and compute the same
    function, the random variables \(\mathcal{O}(C)\) and \(\mathcal{O}(C')\) are
    computationally indistinguishable.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 我们说编译器\(\mathcal{O}\)是一个*不可区分模糊化器（I/O）*，如果对于大小相同且计算相同函数的两个电路\(C\)和\(C'\)，随机变量\(\mathcal{O}(C)\)和\(\mathcal{O}(C')\)在计算上是不可区分的。
- en: 'It is a good exercise to understand why the proof of the impossibility result
    above does not apply to rule out IO. Nevertheless, a reasonable guess would be
    that:'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 理解为什么上述不可能性结果的证明不适用于排除I/O是一个很好的练习。尽管如此，一个合理的猜测可能是：
- en: IO is impossible to achieve.
  id: totrans-78
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: I/O是不可能实现的。
- en: Even if it was possible to achieve, it is not good enough for most of the interesting
    applications of obfuscation.
  id: totrans-79
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 即使可能实现，对于大多数有趣的模糊化应用来说，这也不够好。
- en: However, it turns out that this guess is (most likely) wrong. New results have
    shown that IO is extremely useful for many applications, including those outlined
    above. They also gave some evidence that it might be possible to achieve. We’ll
    talk about those works in the next lecture.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，结果证明这个猜测（很可能是）错误的。新的结果表明，I/O对于许多应用都极为有用，包括上面概述的那些。他们还提供了一些证据，表明这可能实现。我们将在下一讲中讨论这些工作。
- en: One could also think of a deniable witness encryption, and so if Janine in the
    scenario above is forced to open the ciphertexts she sent by reveal the randomness
    used to create them, she can credibly claim that she didn’t encrypt her knowledge
    of the conspiracy, but merely wanted to make sure that her family secret recipe
    for pumpkin pie is not lost when she passes away.
  id: totrans-81
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 人们还可以考虑可否认的证人加密，因此如果在上面的场景中Janine被迫打开她发送的密文并揭示用于创建它们的随机数，她可以可信地声称她没有加密她对阴谋的了解，而只是想确保当她去世时她家的南瓜派秘方不会丢失。
- en: '[↩](#fnref:1 "return to article")'
  id: totrans-82
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '[↩](#fnref:1 "返回文章")'
- en: Pseudorandom functions can be used to construct examples of functions that are
    unlearnable in the much stronger sense that we cannot achieve the machine learning
    goal of outputting some circuit that *approximately predicts* the function.
  id: totrans-83
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可以使用伪随机函数来构造函数的例子，这些函数在更强的意义上是不可学习的，即我们无法实现机器学习的目标，输出一些*近似预测*该函数的电路。
- en: '[↩](#fnref:2 "return to article")'
  id: totrans-84
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '[↩](#fnref:2 "返回文章")'
