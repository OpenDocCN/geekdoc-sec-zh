- en: Lattice based cryptography
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 基于格的密码学
- en: 原文：[https://intensecrypto.org/public/lec_12_lattices.html](https://intensecrypto.org/public/lec_12_lattices.html)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://intensecrypto.org/public/lec_12_lattices.html](https://intensecrypto.org/public/lec_12_lattices.html)
