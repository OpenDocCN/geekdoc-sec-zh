- en: Lattice based cryptography
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://intensecrypto.org/public/lec_12_lattices.html](https://intensecrypto.org/public/lec_12_lattices.html)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*See any bugs/typos/confusing explanations? [Open a GitHub issue](https://github.com/boazbk/crypto/issues/new).
    You can also [comment below](#commentform)*'
  prefs: []
  type: TYPE_NORMAL
- en: '**★ See also the [**PDF version of this chapter**](https://files.boazbarak.org/crypto/lec_12_lattices.pdf)
    (better formatting/references) ★'
  prefs: []
  type: TYPE_NORMAL
- en: Lattice based public key encryption (and its cousins known as knapsack and coding
    based encryption) have almost as long a history as discrete logarithm and factoring
    based schemes. Already in 1976, right after the Diffie-Hellman key exchange was
    discovered (and before RSA), Ralph Merkle was working on building public key encryption
    from the NP hard *knapsack* problem (see [Diffie’s recollection](http://cr.yp.to/bib/1988/diffie.pdf)).
    This can be thought of as the task of solving a linear equation of the form \(Ax
    = y\) (where \(A\) is a given matrix, \(y\) is a given vector, and the unknown
    are \(x\)) over the real numbers but with the additional constraint that \(x\)
    must be either \(0\) or \(1\). His proposal evolved into the Merkle-Hellman system
    proposed in 1978 (which was broken in 1984).
  prefs: []
  type: TYPE_NORMAL
- en: 'McEliece proposed in 1978 a system based on the difficulty of the decoding
    problem for general linear codes. This is the task of solving *noisy linear equations*
    where one is given \(A\) and \(y\) such that \(y=Ax+e\) for a “small” error vector
    \(e\), and needs to recover \(x\). Crucially, here we work in a finite field,
    such as working modulo \(q\) for some prime \(q\) (that can even be \(2\)) rather
    than over the reals or rationals. There are special matrices \(A^*\) for which
    we know how to solve this problem efficiently: these are known as efficiently
    decodable [error correcting codes](https://goo.gl/vM7Pvv). McEliece suggested
    a scheme where the key generator lets \(A\) be a “scrambled” version of a special
    \(A^*\) (based on the [Goppa algebraic geometric code](https://goo.gl/Vd4yye)).
    So, someone that knows the scrambling could solve the problem, but (hopefully)
    someone that doesn’t know it wouldn’t. McEliece’s system has so far not been broken.'
  prefs: []
  type: TYPE_NORMAL
- en: In a 1996 breakthrough, Ajtai showed a *private key* scheme based on integer
    lattices that had a very curious property- its security could be based on the
    assumption that certain problems were only hard in the *worst case*, and moreover
    variants of these problems were known to be NP hard. This re-ignited the hope
    that we could perhaps realize the old dream of basing crypto on the mere assumption
    that \(P\neq \ensuremath{\mathit{NP}}\). Alas, we now understand that there are
    fundamental barriers to this approach.
  prefs: []
  type: TYPE_NORMAL
- en: Nevertheless, Ajtai’s work attracted significant interest, and within a year
    both Ajtai and Dwork, as well as Goldreich, Goldwasser and Halevi came up with
    lattice based constructions for *public key* encryption (the former based also
    on *worst case* assumptions). At about the same time, Hoffstein, Pipher, and Silverman
    came up with their NTRU public key system which is based on stronger assumptions
    but offers better performance, and they started a company around it together with
    Daniel Lieman.
  prefs: []
  type: TYPE_NORMAL
- en: You may note that I haven’t yet said what *lattices* are; we will do so later,
    but for now if you simply think of questions involving linear equations modulo
    some prime \(q\), you will get enough of the intuition that you need. (The lattice
    viewpoint is more geometric, and we’ll discuss it more below; it was first used
    to *attack* cryptosystems and in particular break the Merkle-Hellman knapsack
    scheme and many of its variants.)
  prefs: []
  type: TYPE_NORMAL
- en: Lattice based cryptography has captured a lot of attention recently from both
    theory and practice. In the theory side, many cool new constructions are now based
    on lattice based cryptography, and chief among them fully homomorphic encryption,
    as well as indistinguishability obfuscation (though the latter’s security’s foundations
    are still far less solid). On the applied side, the steady advances in the technology
    of quantum computers have finally gotten practitioners worried about RSA, Diffie
    Hellman and Elliptic Curves. While current constructions for quantum computers
    are nowhere near being able to, say, factor larger numbers that can be done classically
    (or even than can be done by hand), given that it takes many years to develop
    new standards and get them deployed, many believe the effort to transition away
    from these factoring/dlog based schemes should start today (or perhaps should
    have started several years ago). Based on this, the National Institute of Standards
    and Technology has started a [process to identify “post quantum” public key encryption
    scheme](https://csrc.nist.gov/projects/post-quantum-cryptography). All the finalist
    for public-key encryption are based on lattices/codes.
  prefs: []
  type: TYPE_NORMAL
- en: Cryptography has the peculiar/unfortunate feature that if a machine is built
    that can factor large integers in 20 years, it can still be used to break the
    communication we transmit *today*, provided this communication was recorded. So,
    if you have some data that you expect you’d want still kept secret in 20 years
    (as many government and commercial entities do), you might have reasons to worry.
    Currently lattice based cryptography is the only real “game in town” for potentially
    quantum-resistant public key encryption schemes.
  prefs: []
  type: TYPE_NORMAL
- en: Lattice based cryptography is a huge area, and in this lecture and this course
    we only touch on few aspects of it. I highly recommend [Chris Peikert’s Survey](https://web.eecs.umich.edu/~cpeikert/pubs/lattice-survey.pdf)
    for a much more in depth treatment of this area.
  prefs: []
  type: TYPE_NORMAL
- en: Quick linear algebra recap
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A *field* \(\mathbb{F}\) is a set that supports the operations \(+,\cdot\) and
    contains the numbers \(0\) and \(1\) (more formally the additive identity and
    multiplicative identity) with the usual properties that the real numbers have.
    (That is associative, commutative, and distributive law, the fact that for every
    \(x \in \mathbb{F}\) there is an element \(-x\) such that \(x + (-x) = 0\) and
    that if \(x \neq 0\) there is an element \(x^{-1}\) such that \(x \cdot x^{-1}
    = 1\).) Apart from the real numbers, the main field we will be interested in this
    section is the field \(\Z_q\) of the numbers \(\{0,1,\ldots,q-1\}\) with addition
    and multiplication done modulo \(q\), where \(q\) is a prime number.^([1](#fn:1))
  prefs: []
  type: TYPE_NORMAL
- en: 'You should be comfortable with the following notions (these are covered in
    a number of sources, including the appendix of Katz-Lindell and [Shoup’s online-available
    book](https://shoup.net/ntb/)):'
  prefs: []
  type: TYPE_NORMAL
- en: A vector \(v \in \mathbb{F}^n\) and a *matrix* \(M \in \mathbb{F}^{m \times
    n}\). An \(m\times n\) matrix has \(m\) rows and \(n\) columns. We think of vectors
    as *column vectors* and so we can think of a vector \(v \in \mathbb{F}^n\) as
    an \(n\times 1\) matrix. We write the \(i\)-th coordinate of \(v\) as \(v_i\)
    and the \((i,j)\)-th coordinate of \(M\) as \(M_{i,j}\) (i.e. the coordinate in
    the \(i\)-th row and the \(j\)-th column.) We often write a vector \(v\) as \((v_1,\ldots,v_n)\)
    but we still mean that it’s a column vector unless we say otherwise.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If \(\alpha \in \mathbb{F}\) is a *scalar* (i.e., a number) and \(v \in \mathbb{F}^n\)
    is a vector then \(\alpha v\) is the vector \((\alpha v_1 ,\ldots, \alpha v_n)\).
    If \(u,v\) are \(n\) dimensional vectors then \(u+v\) is the vector \((u_1+v_1,\ldots,u_n+v_n)\).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'A *linear subspace* \(V \subseteq \mathbb{F}^n\) is a non-empty set of vectors
    such that for every vectors \(u,v \in V\) and \(\alpha,\beta \in \mathbb{F}\),
    \(\alpha u + \beta v \in V\). In particular this means that \(V\) contains the
    all zero vector \(0^n\) (can you see why?). A subset \(A \subseteq V\) is *linearly
    independent* if there is no collection \(a_1,\ldots,a_k \in A\) and scalars \(\alpha_1,\ldots,\alpha_k\)
    such that \(\sum \alpha_i a_i = 0^n\). It is known (and not hard to prove) that
    if \(A\) is linearly independent then \(|A| \leq n\). It is known that for every
    such linear subspace there is a linearly independent set \(B = \{ b_1,\ldots,b_d
    \}\) of vectors, with \(d \leq n\), such that for every \(u \in V\) there exist
    \(\alpha_1,\ldots,\alpha_d\) such that \(v = \sum \alpha_i b_i\). Such a set is
    known as a *basis* for \(V\). A subspace \(V\) has many bases, but all of them
    have the same size \(d\) which is known as the *dimension* of \(V\). An *affine
    subspace* is a set \(U\) of the form \(\{ u_0 + v : v\in V \}\) where \(V\) is
    a linear subspace. We can also write \(U\) as \(u_0 + V\). We denote the dimension
    of \(U\) as the dimension of \(V\) in such a case.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The inner product (also known as “dot product”) \(\langle u,v \rangle\) between
    two vectors of the same dimension \(n\) is defined as \(\sum u_i v_i\) (addition
    done in the field \(\mathbb{F}\)).^([2](#fn:2))
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The *matrix product* \(\ensuremath{\mathit{AB}}\) of an \(m \times k\) and
    a \(k\times n\) matrix results in an \(m\times n\) matrix. If we think of the
    rows of \(A\) as the vectors \(A_1,\ldots,A_m \in \mathbb{F}^k\) and the columns
    of \(B\) as \(B_1,\ldots,B_n \in \mathbb{F}^k\), then the \((i,j)\)-th coordinate
    of \(\ensuremath{\mathit{AB}}\) is \(\langle A_i , B_j \rangle\). Matrix product
    is associative and satisfies the distributive law but is *not commutative*: there
    are pairs of square matrices \(A,B\) such that \(\ensuremath{\mathit{AB}} \neq
    \ensuremath{\mathit{BA}}\).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The *transpose* of an \(n\times m\) matrix \(A\) is the \(m\times n\) matrix
    \(A^\top\) such that \((A^\top)_{i,j} = A_{j,i}\).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The *inverse* of a square \(n\times n\) matrix \(A\) is the matrix \(A^{-1}\)
    such that \(\ensuremath{\mathit{AA}}^{-1} = I\) where \(I\) is the \(n\times n\)
    *identity matrix* such that \(I_{i,j}=1\) if \(i=j\) and \(I_{i,j}=0\) otherwise.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The *rank* of an \(m\times n\) matrix \(A\) is the minimum number \(r\) such
    that we can write \(A\) as \(\sum_{i=1}^r u_i(v_i)^\top\) where \(u_i \in \mathbb{F}^m\)
    and \(v_i \in \mathbb{F}^n\). We can think of the \(u_i\)’s as the columns of
    an \(m\times r\) matrix \(U\) and the \(v_i\)’s as the rows of an \(r\times n\)
    matrix \(V\), and hence the rank of \(A\) is the minimum \(r\) such that \(A=\ensuremath{\mathit{UV}}\)
    where \(U\) is \(m\times r\) and \(V\) is \(r\times n\). It can be shown that
    an \(n\times n\) matrix is full rank if and only if it has an inverse.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Solving *linear equations* can be thought of as the task of given an \(m \times
    n\) matrix \(A\) and \(m\)-dimensional vector \(y\), finding the \(n\)-dimensional
    vector \(x\) such that \(Ax = y\). If the rank of \(A\) is at least \(n\) (which
    in particular means that \(m \geq n\)) then by dropping \(m-n\) rows of \(A\)
    and coordinates of \(y\) we can obtain the equation \(A'x = y'\) where \(A'\)
    is an \(n\times n\) matrix that has an inverse. In this case a solution (if it
    exists) will be equal to \((A')^{-1}y\). If for a set of equations we have \(m>n\)
    and we can find two such matrices \(A',A''\) such that \((A')^{-1}y \neq (A'')^{-1}y\)
    then we say it is *over determined* and in such a case it has no solutions. If
    a set of equations has more variables \(n\) than equations \(m\) we say it’s *under-determined*.
    In such a case it either has no solutions or the solutions form an affine subspace
    of dimension at least \(n-m\).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The *gaussian elimination* algorithm can be used to obtain, given a set of equations
    \(Ax = y\) a solution to \(x\) if such exists or a certification that no solution
    exists. It can be executed in time polynomial in the dimensions and the bit complexity
    of the numbers involved. This algorithm can also be used to obtain an inverse
    of a given matrix \(A\), if such an inverse exists.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Throughout this chapter, and while working in lattice based cryptography in
    general, it is crucial to keep track of the dimensions. Whenever you see a symbol
    such as \(v,A,x,y\) ask yourself:'
  prefs: []
  type: TYPE_NORMAL
- en: Is it a *scalar*, a *vector* or a *matrix*?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If it is a vector or a matrix, what are its dimensions?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If it’s a matrix, is it “square” (i.e., \(m=n\)), “short and fat” (i.e., \(m
    \ll n\)) or “tall and skinny”? (\(m\gg n\))?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A world without Gaussian elimination
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The general approach people use to get a public key encryption is to obtain
    a hard computational problem with some mathematical *structure*. We’ve seen this
    in the *discrete logarithm* problem, where the task is to invert the map \(a \mapsto
    g^a \pmod{p}\), and the integer factoring problem, where the task is to invert
    the map \(a,b \mapsto a\cdot b\). Perhaps the simplest structure to consider is
    the task of solving linear equations.
  prefs: []
  type: TYPE_NORMAL
- en: Pretend that we didn’t know of Gaussian elimination,^([3](#fn:3)) and that if
    we picked a “generic” matrix \(A\) then the map \(x \mapsto Ax\) would be hard
    to invert. (Here and elsewhere, our default interpretation of a vector \(x\) is
    as a *column* vector, and hence if \(x\) is \(n\) dimensional and \(A\) is \(m\times
    n\) then \(Ax\) is \(m\) dimensional. We use \(x^\top\) to denote the row vector
    obtained by *transposing* \(x\).) Could we use that to get a public key encryption
    scheme?
  prefs: []
  type: TYPE_NORMAL
- en: Here is a concrete approach. Let us fix some prime \(q\) (think of it as polynomial
    size, e.g., \(q\) is smaller than \(1024\) or so, though people can and sometimes
    do consider \(q\) of exponential size), and all computation below will be done
    modulo \(q\). The secret key is a vector \(x\in\Z_q^n\), and the public key is
    \((A,y)\) where \(A\) is a random \(m\times n\) matrix with entries in \(\Z_q\)
    and \(y=Ax\). Under our assumption, it is hard to recover the secret key from
    the public key, but how do we use the public key to encrypt?
  prefs: []
  type: TYPE_NORMAL
- en: The crucial observation is that even if we don’t know how to solve linear equations,
    we can still combine several equations to get new ones. To keep things simple,
    let’s consider the case of encrypting a single bit.
  prefs: []
  type: TYPE_NORMAL
- en: If you have a CPA secure public key encryption scheme for single bit messages
    then you can extend it to a CPA secure encryption scheme for messages of any length.
    Can you see why?
  prefs: []
  type: TYPE_NORMAL
- en: If \(a_1,\ldots,a_m\) are the rows of \(A\), we can think of the public key
    as the set of equations \(\langle a_1,x \rangle=y_1,\ldots, \langle a_m,x \rangle=y_m\)
    in the unknown variables \(x\). The idea is that to encrypt the value \(0\) we
    will generate a new *correct* equation on \(x\), while to encrypt the value \(1\)
    we will generate an *incorrect* equation. To decrypt a ciphertext \((a,\sigma)\in
    \Z_q^{n+1}\), we think of it as an equation of the form \(\langle a,x \rangle=\sigma\)
    and output \(1\) if and only if the equation is incorrect.
  prefs: []
  type: TYPE_NORMAL
- en: How does the encrypting algorithm, that does not know \(x\), get a correct or
    incorrect equation on demand? One way would be to simply take two equations \(\langle
    a_i,x \rangle=y_i\) and \(\langle a_j,x \rangle=y_j\) and add them together to
    get the equation \(\langle a_i+a_j,x \rangle=y_i+y_j\). This equation is correct
    and so one can use it to encrypt \(0\), while to encrypt \(1\) we simply add some
    fixed nonzero number \(\alpha\in\Z_q\) to the right hand side to get the incorrect
    equation \(\langle a_i+a_j,x \rangle= y_i+y_j + \alpha\). However, even if it’s
    hard to solve for \(x\) given the equations, an attacker (who also knows the public
    key \((A,y)\)) can try itself all pairs of equations and do the same thing.
  prefs: []
  type: TYPE_NORMAL
- en: Our solution for this is simple- just add more equations! If the encryptor adds
    a random subset of equations then there are \(2^m\) possibilities for that, and
    an attacker can’t guess them all. That is, if the rows of \(A\) are \(a_1,\ldots,a_m\),
    then we can pick a vector \(w \in \{0,1\}^m\) at random, and consider the equation
    \(\langle a ,x \rangle = y\) where \(a = \sum w_i a_i\) and \(y = \sum w_i y_i\).
    In other words, we can think of this as the equation \(w^\top A x = \langle w,y
    \rangle\) (note that \(\langle w,y \rangle = w^\top y\) and so we can think of
    this as the equation that we obtain from \(Ax = y\) by multiplying both sides
    on the left by the row vector \(w^\top\)).
  prefs: []
  type: TYPE_NORMAL
- en: 'Thus, at least intuitively, the following encryption scheme would be “secure”
    in the Gaussian elimination-free world of attackers that haven’t taken freshman
    linear algebra:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Scheme “LwoE-ENC”:** Public key encryption under the hardness of “learning
    linear equations without errors”.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*Key generation*: Pick random \(m\times n\) matrix \(A\) over \(\Z_q\), and
    \(x\leftarrow_R\Z_q^n\), the secret key is \(x\) and the public key is \((A,y)\)
    where \(y=Ax\).'
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  - PREF_IND
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  - PREF_IND
  type: TYPE_NORMAL
- en: '*Encryption*: To encrypt a message \(b\in\{0,1\}\), pick \(w\in\{0,1\}^m\)
    and output \(w^\top A,\langle w,y \rangle+\alpha b\) for some fixed nonzero \(\alpha\in\Z_q\).'
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  - PREF_IND
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  - PREF_IND
  type: TYPE_NORMAL
- en: '*Decryption:* To decrypt a ciphertext \((a,\sigma)\), output \(0\) iff \(\langle
    a,x \rangle=\sigma\).'
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: Please stop here and make sure that you see why this is a valid encryption (not
    in the sense that it is secure - it’s not - but in the sense that decryption of
    an encryption of \(b\) returns the bit \(b\)), and this description corresponds
    to the previous one; as usual all calculations are done modulo \(q\).
  prefs: []
  type: TYPE_NORMAL
- en: Security in the real world.
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Like it or not (and cryptographers typically don’t) Gaussian elimination *is*
    possible in the real world and the scheme above is completely insecure. However,
    the Gaussian elimination algorithm is extremely *brittle*.
  prefs: []
  type: TYPE_NORMAL
- en: Errors tend to be amplified when you combine equations. This is usually thought
    of as a bad thing, and numerical analysis is much about dealing with this issue.
    However, from the cryptographic point of view, these errors can be our saving
    grace and enable us to salvage the security of the ridiculous scheme above.
  prefs: []
  type: TYPE_NORMAL
- en: 'To see why Gaussian elimination is brittle, let us recall how it works. Think
    of \(m=n\) for simplicity. Given equations \(Ax=y\) in the unknown variables \(x\),
    the goal of Gaussian elimination is to transform them into the equations \(Ix
    = y''\) where \(I\) is the identity matrix (and hence the solution is simply \(x=y''\)).
    Recall how we do it: by rearranging and scaling, we can assume that the top left
    corner of \(A\) is equal to \(1\), and then we add the first equation to the other
    equations (scaled appropriately) to zero out the first entry in all the other
    rows of \(A\) (i.e., make the first column of \(A\) equal to \((1,0,\ldots,0)\))
    and continue onwards to the second column and so on and so forth.'
  prefs: []
  type: TYPE_NORMAL
- en: Now, suppose that the equations were *noisy*, in the sense that we added to
    \(y\) a vector \(e\in\Z_q^m\) such that \(|e_i|<\delta q\) for every \(i\).^([4](#fn:4))
    Even ignoring the effect of the scaling step, simply adding the first equation
    to the rest of the equations would typically tend to increase the relative error
    of equations \(2,\ldots,m\) from \(\approx \delta\) to \(\approx 2\delta\). Now,
    when we repeat the process, we increase the error of equations \(3,\ldots,m\)
    from \(\approx 2\delta\) to \(\approx 4\delta\), and we see that by the time we’re
    done dealing with about \(n/2\) variables, the remaining equations have error
    level roughly \(2^{n/2}\delta\). So, unless \(\delta\) was truly tiny (and \(q\)
    truly big, in which case the difference between working in \(\Z_q\) and simply
    working with integers or rationals disappears), the resulting equations have the
    form \(Ix = y' + e'\) where \(e'\) is so big that we get no information on \(x\).
  prefs: []
  type: TYPE_NORMAL
- en: 'The *Learning With Errors (LWE)* conjecture is that this is *inherent*:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Conjecture (Learning with Errors, Regev 2005):** Let \(q=q(n)\) and \(\delta=\delta(n)\)
    be some functions. The *Learning with Error (LWE) conjecture with respect to \(q,\delta\)*,denoted
    as \(\ensuremath{\mathit{LWE}}_{q,\delta}\), is the following conjecture: for
    every polynomial \(m(n)\) and polynomial-time adversary \(R\),'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: \[\Pr[ R(A,Ax+e) = x ] < negl(n)\]where for \(q=q(n)\) and \(\delta = \delta(n)\),
    this probability is taken over \(A\) a random \(m\times n\) matrix over \(\Z_q\),
    \(x\) a random vector in \(\Z_q^n,\) and \(e\) a random “noise vector” in \(\Z_q^m\)
    where \(|e_i| < \delta q\) for every \(i \in [m]\).^([5](#fn:5))
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The *LWE conjecture* (without any parameters) is that there is some absolute
    constant \(c\) such that for every polynomial \(p(n)\) there, if \(q(n) > p(n)^c\)
    then LWE holds with respect to \(q(n)\) and \(\delta(n)=1/p(n)\).^([6](#fn:6))
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: It is important to note the order of quantifiers in the learning with error
    conjecture. If we want to handle a noise of low enough magnitude (say \(\delta(n)
    = 1/n^2\)) then we need to choose the modulos \(q\) to be large enough (for example
    it is believed that \(q > n^4\) will be good enough for this case) and then the
    adversary can choose \(m(n)\) to be as big a polynomial as they like, and of course
    run in time which is an arbitrary polynomial in \(n\). Therefore we can think
    of such an adversary \(R\) as getting access to a “magic box” that they can use
    \(m=poly(n)\) number of times to get “noisy equations on \(x\)” of the form \((a_i,y_i)\)
    with \(a_i\in \Z_q^n\), \(y_i \in \Z_q\) where \(y_i = \langle a_i, x \rangle
    + e_i\).
  prefs: []
  type: TYPE_NORMAL
- en: The LWE conjecture posits that no *efficient* algorithm can recover \(x\) given
    \(A\) and \(Ax + e\). But you might wonder whether it’s possible to do this is
    *inefficiently*. The answer is yes. Intuitively the reason is that if we have
    more equations than unknown (i.e., if \(m>n\)) then these equations contain enough
    information to determine the unknown variables even if they are noisy. It can
    be shown that if \(m\) is sufficiently large (\(m>10n\) will do) then with high
    probability over \(A,x,e\), given \(A\) and \(y=x +e\), if we enumerate over all
    \(\tilde{x} \in \Z_q^n\) and output the string minimizing \(| A\tilde{x} - y|\)
    (where we define \(|v| =\sum |v_i|\) for a vector \(v\)), then \(\tilde{x}\) will
    equal \(x\).
  prefs: []
  type: TYPE_NORMAL
- en: It is a good exercise to work out the details, but a hint is this can be proven
    by showing that for every \(\tilde{x}\neq x\), with high probability over \(A\),
    \(|A\tilde{x} - Ax| > \delta q m\). The latter fact holds because \(v = A(x-\tilde{x})\)
    is a random vector in \(\Z_q^m\), and the probability that \(|v|<\delta q m\)
    is much smaller than \(q^{-0.1 m} < q^{-n}\). Hence we can take a union bound
    over all possible \(\tilde{x} \in \Z_q^n\).
  prefs: []
  type: TYPE_NORMAL
- en: Search to decision
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'It turns out that if the LWE is hard, then it is even hard to distinguish between
    random equations and nearly correct ones:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9eb66e5f71e3145ced21aa6286fa150d.png)'
  prefs: []
  type: TYPE_IMG
- en: '11.1: The search to decision reduction ([Theorem 11.2](#LWEsearchtodecthm))
    implies that under the LWE conjecture, for every \(m=poly(n)\), if we choose and
    fix a random \(m\times n\) matrix \(A\) over \(\Z_q\), the distribution \(Ax+e\)
    is indistinguishable from a random vector in \(\Z_q^m\), where \(x\) is a random
    vector in \(\Z_q^n\) and \(e\) is a random “short” vector in \(\Z_q^m\). The two
    distributions are indistinguishable even to an adversary that knows \(A\).'
  prefs: []
  type: TYPE_NORMAL
- en: 'If the LWE conjecture is true then for every \(q=poly(n)\) and \(\delta=1/poly(n)\)
    and \(m=poly(n)\), the following two distributions are computationally indistinguishable:'
  prefs: []
  type: TYPE_NORMAL
- en: \(\{ (A,Ax+e) \}\) where \(A\) is random \(m\times n\) matrix in \(\Z_q\), \(x\)
    is random in \(\Z_q^n\) and \(e\in \Z_q^m\) is random noise vector of magnitude
    \(\delta\).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: \(\{ (A,y) \}\) where \(A\) is random \(m\times n\) matrix in \(\Z_q\) and \(y\)
    is random in \(\Z_q^m\).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Suppose that we had a decisional adversary \(D\) that succeeds in distinguishing
    the two distributions above with bias \(\epsilon\). For example, suppose that
    \(D\) outputs \(1\) with probability \(p+\epsilon\) on inputs from the first distribution,
    and outputs \(1\) with probability \(p\) on inputs from the second distribution.
  prefs: []
  type: TYPE_NORMAL
- en: We will show how we can use this to obtain a polynomial-time algorithm \(S\)
    that on input \(m\) noisy equations on \(x\) and a value \(a\in\ Z_q\), will learn
    with high probability whether or not the first coordinate of \(x\) equals \(a\).
    Clearly, we can repeat this for all the possible \(q\) values of \(a\) to learn
    the first coordinate exactly, and then continue in this way to learn all coordinates.
  prefs: []
  type: TYPE_NORMAL
- en: Our algorithm \(S\) gets as input the pair \((A,y)\) where \(y=Ax+e\) and we
    need to decide whether \(x_1 = a\). Now consider the instance \((A+(r\|0^m\|\cdots
    \|0^m),y+ar)\), where \(r\) is a random vector in \(\Z_q^m\) and the matrix \((r\|0^m\|\cdots
    \|0^m)\) is simply the matrix with first column equal to \(r\) and all other columns
    equal to \(0\). If \(A\) is random then \(A+(r\|0^m\|\cdots \|0^m)\) is random
    as well. Now note that \(Ax + (r\|0^m\cdots \|0^m)x = Ax + x_1 r\) and hence if
    \(x_1 = a\) then we still have an input of the same form \((A',A'x+e)\).
  prefs: []
  type: TYPE_NORMAL
- en: In contrast, we claim that if if \(x_1 \neq a\) then the distribution \((A',y')\)
    where \(A'=A+(r\|0^m\|\cdots \|0^m)\) and \(y'= Ax + e + ar\) is identical to
    the uniform distribution over a random uniformly chosen matrix \(A'\) and a random
    and independent uniformly chosen vector \(y'\). Indeed, we can write this distribution
    as \((A',y')\) where \(A'\) is chosen uniformly at random, and \(y'= A'x + e +
    (a-x_1)r\) where \(r\) is a random and independent vector. (Can you see why?)
    Since \(a-x_1 \neq 0\), this amounts to adding a random and independent vector
    \(r\) to \(y'\), which means that the distribution \((A',y')\) is uniform and
    independent.
  prefs: []
  type: TYPE_NORMAL
- en: Hence if we send the input \((A',y')\) to our the decision algorithm \(D\),
    then we would get \(1\) with probability \(p+\epsilon\) if \(x_1=a\) and an output
    of \(1\) with probability \(p\) otherwise.
  prefs: []
  type: TYPE_NORMAL
- en: Now the crucial observation is that if our decision algorithm \(D\) requires
    \(m\) equations to succeed with bias \(\epsilon\), we can use \(100mn/\epsilon^2\)
    equations (which is still polynomial) to invoke it \(100n/\epsilon^2\) times.
    This allows us to distinguish with probability \(1-2^{-n}\) between the case that
    \(D\) outputs \(1\) with probability \(p+\epsilon\) and the case that it outputs
    \(1\) with probability \(p\) (this follows from the Chernoff bound; can you see
    why?). Hence by using polynomially more samples than the decision algorithm \(D\),
    we get a search algorithm \(S\) that can actually recover \(x\).
  prefs: []
  type: TYPE_NORMAL
- en: An LWE based encryption scheme
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'We can now show the secure variant of our original encryption scheme:'
  prefs: []
  type: TYPE_NORMAL
- en: '**LWE-based encryption LWE-ENC:**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*Parameters:* Let \(\delta(n)=1/n^4\) and let \(q=poly(n)\) be a prime such
    that LWE holds w.r.t. \(q,\delta\). We let \(m = n^2\log q\).'
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  - PREF_IND
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  - PREF_IND
  type: TYPE_NORMAL
- en: '*Key generation:* Pick \(x\in\Z_q^n\). The private key is \(x\) and the public
    key is \((A,y)\) with \(y=Ax+e\) with \(e\) a \(\delta\)-noise vector and \(A\)
    a random \(m\times n\) matrix.'
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  - PREF_IND
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  - PREF_IND
  type: TYPE_NORMAL
- en: '*Encrypt:* To encrypt \(b\in\{0,1\}\) given the key \((A,y)\), pick \(w\in\{0,1\}^m\)
    and output \(w^\top A, \langle w,y \rangle+b\floor{q/2}\) (all computations are
    done in \(\Z_q\)).'
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  - PREF_IND
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  - PREF_IND
  type: TYPE_NORMAL
- en: '*Decrypt:* To decrypt \((a,\sigma)\), output \(0\) iff \(|\langle a,x \rangle-\sigma|<q/10\).'
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: The scheme LWEENC is also described in [Figure 11.2](#lweencdescfig) with slightly
    different notation. I highly recommend you stop and verify you understand why
    the two descriptions are equivalent.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a65773e3899412ca43db80ee1d0fbbaa.png)'
  prefs: []
  type: TYPE_IMG
- en: '11.2: In the encryption scheme LWEENC, the public key is a matrix \(A''=(A|y)\),
    where \(y=As+e\) and \(s\) is the secret key. To encrypt a bit \(b\) we choose
    a random \(w \leftarrow_R \{0,1\}^m\), and output \(w^\top A'' + (0,\ldots,0,b\floor{\tfrac{q}{2}})\).
    We decrypt \(c \in \Z_q^{n+1}\) to zero with key \(s\) iff \(|\langle c,(s,-1)
    \rangle| \leq q/10\) where the inner product is done modulo \(q\).'
  prefs: []
  type: TYPE_NORMAL
- en: 'Unlike our typical schemes, here it is not immediately clear that this encryption
    is valid, in the sense that the decrypting an encryption of \(b\) returns the
    value \(b\). But this is the case:'
  prefs: []
  type: TYPE_NORMAL
- en: With high probability, the decryption of the encryption of \(b\) equals \(b\).
  prefs: []
  type: TYPE_NORMAL
- en: \(\langle w^\top A,x \rangle = \langle w,Ax \rangle\). Hence, if \(y=Ax+e\)
    then \(\langle w,y \rangle = \langle w^\top A,x \rangle + \langle w,e \rangle\).
    But since every coordinate of \(w\) is either \(0\) or \(1\), \(|\langle w,e \rangle|<\delta
    m q < q/10\) for our choice of parameters.^([7](#fn:7)) So, we get that if \(a=
    w^\top A\) and \(\sigma = \langle w,y \rangle+b\floor{q/2}\) then \(\sigma - \langle
    a,x \rangle = \langle w,e \rangle + b\floor{q/2}\) which will be smaller than
    \(q/10\) iff \(b=0\).
  prefs: []
  type: TYPE_NORMAL
- en: 'We now prove security of the LWE based encryption:'
  prefs: []
  type: TYPE_NORMAL
- en: If the LWE conjecture is true then LWEENC is CPA secure.
  prefs: []
  type: TYPE_NORMAL
- en: 'For a public key encryption scheme with messages that are just bits, CPA security
    means that an encryption of \(0\) is indistinguishable from an encryption of \(1\),
    even given the public key. Thus [Theorem 11.4](#LWEENCthm) will follow from the
    following lemma:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Let \(q,m,\delta\) be set as in LWEENC. Then, assuming the LWE conjecture,
    the following distributions are computationally indistinguishable:'
  prefs: []
  type: TYPE_NORMAL
- en: '\(D\): The distribution over four-tuples of the form \((A,y,w^\top A,\langle
    w,y \rangle)\) where \(A\) is uniform in \(\Z_q^{m\times n}\), \(x\) is uniform
    in \(\Z_q^n\), \(e \in \Z_q^m\) is chosen with \(e_i \in \{-\delta q,\ldots,+\delta
    q\}\), \(y=Ax+e\), and \(w\) is uniform in \(\{0,1\}^m\).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '\(\overline{D}\): The distribution over four-tuples \((A,y'',a,\sigma)\) where
    all entries are uniform: \(A\) is uniform in \(\Z_q^{m\times n}\), \(y''\) is
    uniform in \(\Z_q^m\), \(a\) is uniform in \(\Z_q^n\) and \(\sigma\) is uniform
    in \(\Z_q\).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You should stop here and verify that **(i)** You understand the statement of
    [Lemma 11.5](#LWEENClem) and **(ii)** you understand why this lemma implies [Theorem
    11.4](#LWEENCthm). The idea is that [Lemma 11.5](#LWEENClem) shows that the concatenation
    of the public key and encryption of \(0\) is indistinguishable from something
    that is completely random. You can then use it to show that the concatenation
    of the public key and encryption of \(1\) is indistinguishable from the same thing,
    and then finish using the hybrid argument.
  prefs: []
  type: TYPE_NORMAL
- en: We now prove [Lemma 11.5](#LWEENClem), which will complete the proof of [Theorem
    11.4](#LWEENCthm).
  prefs: []
  type: TYPE_NORMAL
- en: Define \(D\) to be the distribution \((A,y,w^\top A,\langle w,y \rangle)\) as
    in the lemma’s statement (i.e., \(y=Ax+e\) for some \(x\), \(e\) chosen as above).
    Define \(D'\) to be the distribution \((A,y',w^\top A, \langle w,y' \rangle)\)
    where \(y'\) is chosen uniformly in \(\Z_q^m\).
  prefs: []
  type: TYPE_NORMAL
- en: We claim that \(D'\) is computationally indistinguishable from \(D\) under the
    LWE conjecture. Indeed by [Theorem 11.2](#LWEsearchtodecthm) (search to decision
    reduction) this conjecture implies that the distribution \(X\) over pairs \((A,y)\)
    with \(y=Ax+e\) is indistinguishable from the distribution \(X'\) over pairs \((A,y')\)
    where \(y'\) is uniform. But if there was some polynomial-time algorithm \(T\)
    distinguishing \(D\) from \(D'\) then we can design a randomized polynomial-time
    algorithm \(T'\) distinguishing \(X\) from \(X'\) with the same advantage by setting
    \(T'(A,y)=T(A,y,w^\top A,\langle w,y \rangle)\) for random \(w \leftarrow_R \{0,1\}^m\).
  prefs: []
  type: TYPE_NORMAL
- en: 'We will finish the proof by showing that the distribution \(D''\) is *statistically
    indistinguishable* (i.e., has negligible total variation distance) from \(\overline{D}\).
    This follows from the following claim:'
  prefs: []
  type: TYPE_NORMAL
- en: '**CLAIM**: Suppose that \(m > 100 n \log q\). If \(A''\) is a random \(m\times
    n+1\) matrix over \(\Z_q\), then with probability at least \(1-2^{-n}\) over the
    choice of \(A''\), the distribution \(Z_{A''}\) over \(\Z_q^{n+1}\) which is obtained
    by choosing \(w\) at random in \(\{0,1\}^m\) and outputting \(w^\top A''\) has
    at most \(2^{-n}\) statistical distance from the uniform distribution over \(\Z_q^{n+1}\).'
  prefs: []
  type: TYPE_NORMAL
- en: Note that the randomness used for the distribution \(Z_{A'}\) is only obtained
    by the choice of \(w\), and *not* by the choice of \(A'\) that is fixed. (This
    passes a basic “sanity check” since \(w\) has \(m\) random bits, while the uniform
    distribution over \(\Z_q^n\) requires \(n \log q \ll m\) random bits, and hence
    \(Z_{A'}\) at least has a “fighting chance” in being statistically close to it.)
    Another way to state the same claim is that the pair \((A',w^\top A')\) is statistically
    indistinguishable from the uniform distribution \((A',z)\) where \(z\) is a vector
    chosen independently at random from \(\Z_q^{n+1}\).
  prefs: []
  type: TYPE_NORMAL
- en: The claim completes the proof of the lemma, since letting \(A'\) be the matrix
    \((A|y)\) and \(z=(a,\sigma)\), we see that the distribution \(D'\), as the form
    \((A',z)\) where \(A'\) is a uniformly random \(m\times (n+1)\) matrix and \(z\)
    is sampled from \(Z_{A'}\) (i.e., \(z=w^\top A'\) where \(w\) is uniformly chosen
    in \(\{0,1\}^m\)). Hence this means that the statistical distance of \(D'\) from
    \(\overline{D}\) (where all elements are uniform) is \(O(2^{-n})\). (Please make
    sure you understand this reasoning!)
  prefs: []
  type: TYPE_NORMAL
- en: '**Proof of claim:** The proof of this claim relies on the [leftover hash lemma](https://goo.gl/KXpccP).'
  prefs: []
  type: TYPE_NORMAL
- en: 'First, the basic idea of the proof: For every \(m\times (n+1)\) matrix \(A''\)
    over \(\Z_q\), define \(h_{A''}:\Z_q^m \rightarrow \Z_q^{n+1}\) to be the map
    \(h_{A''}(w)=w^\top A''\). This collection can be shown to be a “good” hash function
    collection in some specific technical sense, which in particular implies that
    for every distribution \(D\) with much more than \(n\log q\) bits of min-entropy,
    with all but negligible probability over the choice of \(A''\), \(h_{A''}(D)\)
    is statistically indistinguishable from the uniform distribution. Now when we
    choose \(w\) at random in \(\{0,1\}^m\), it is coming from a distribution with
    \(m\) bits of entropy. If \(m \gg (n+1)\log q\), then because the output of this
    function is so much smaller than \(m\), we expect it to be completely uniform,
    and this is what’s shown by the leftover hash lemma.'
  prefs: []
  type: TYPE_NORMAL
- en: Now we’ll formalize this blueprint. First we need the leftover hash lemma.
  prefs: []
  type: TYPE_NORMAL
- en: Fix \(\epsilon>0\). Let \(\mathcal{H}\) be a universal hash family with functions
    \(h:\mathcal{W}\to\mathcal{V}\). Let \(W\) be a random variable with output in
    \(\mathcal{W}\) with \(H_{\infty}(W)\ge \log|\mathcal{V}|+2\log(1/\epsilon)-2\).
    Then \((H(W),H)\) where \(H\) follows a uniform distribution over \(\mathcal{H}\)
    has statistical difference less than \(\epsilon\) from \((V,H)\) where \(V\) is
    uniform over \(\mathcal{V}\).
  prefs: []
  type: TYPE_NORMAL
- en: To explain what a *universal hash family* is, a family \(\mathcal{H}\) of functions
    \(h:\mathcal{W}\to\mathcal{V}\) is a universal hash family if \(\Pr_{h\gets_R\mathcal{H}}[h(x)=h(x')]\le\frac{1}{|\mathcal{V}|}\)
    for all \(x\neq x'\).
  prefs: []
  type: TYPE_NORMAL
- en: First, let’s see why [Lemma 11.6](#Leftoverhashlem) implies the claim. Consider
    the hash family \(\mathcal{H}=\{h_{A'}\}\), where \(h_{A'}:\Z_q^m \rightarrow
    \Z_q^{n+1}\) is defined by \(h_{A'}(w)=w^\top A'\). For this hash family, the
    probability over \(A'\) of \(w\neq w'\) colliding is \(\Pr_{A'}[w^\top A'=w'^\top
    A']=\Pr_{A'}[(w-w')^\top A'=0]\). Since \(A'\) is random, this is \(1/(q^{n+1})\).
    So \(\mathcal{H}\) is a universal hash family.
  prefs: []
  type: TYPE_NORMAL
- en: The min entropy of \(w\gets_R\{0,1\}^m\) is the same as the entropy (because
    it is uniform) which is \(m\). The output of the hash family is in \(\Z_q^{n+1}\),
    and \(\log|\Z_q^{n+1}|=(n+1)\log q\). Since \(m\ge(n+1)\log q+20n-2\) by assumption,
    [Lemma 11.6](#Leftoverhashlem) implies that \((w^\top A',A')\) is \(2^{-10n}\)
    close in terms of statistical distance to \((z,A')\) where \(z\) is chosen uniformly
    in \(\Z_q^{n+1}\).
  prefs: []
  type: TYPE_NORMAL
- en: Now, we’ll show this implies that for probability \(\ge 1-2^{-n}\) over the
    selection of \(A'\), the statistical distance between \(w^\top A'\) and \(z\)
    is less than \(2^{-n}\). If not, the distance between \((w^\top A',A')\) and \((z,A')\)
    would be at least \(2^{-n}\cdot 2^{-n}>2^{-10n}\).
  prefs: []
  type: TYPE_NORMAL
- en: '**Proof of [Lemma 11.6](#Leftoverhashlem):**^([8](#fn:8))'
  prefs: []
  type: TYPE_NORMAL
- en: Let \(Z\) be the random variable \((H(W),H)\), where the probability is over
    \(H\) and \(W\). Let \(Z'\) be an independent copy of \(Z\).
  prefs: []
  type: TYPE_NORMAL
- en: '**Step 1:** \(\Pr[Z=Z'']\le\frac{1}{|\mathcal{H}|\cdot|\mathcal{V}|}(1+4\epsilon^2)\).
    Indeed,'
  prefs: []
  type: TYPE_NORMAL
- en: \[\begin{aligned} \Pr[Z=Z']&=\Pr[(H(W),H)=(H'(W'),H')]\\&=\Pr[H=H']\cdot\Pr[H(W)=H(W')]\\&=\frac{1}{|\mathcal{H}|}\left(\Pr[W=W']+\Pr[H(W)=H(W')\wedge
    W\neq W']\right)\\&\le\frac{1}{|\mathcal{H}|}\left(\frac{1}{|\mathcal{V}|}\epsilon^2\cdot
    4+\frac{1}{|\mathcal{V}|}\right)\\&=\frac{1}{|\mathcal{H}|\cdot|\mathcal{V}|}(1+4\epsilon^2).\end{aligned}\]
  prefs: []
  type: TYPE_NORMAL
- en: '**Step 2:** The statistical difference between \((H(W),H)\) and \((V,H)\) is
    less than \(\epsilon\). Denote the statistical difference by \(\Delta((H(W),H),(V,H))\),
    then'
  prefs: []
  type: TYPE_NORMAL
- en: \[\begin{aligned} \Delta((H(W),H),(V,H))&=\frac{1}{2}\sum_{h,w}\left|\Pr[Z=(h(w),w)]-\frac{1}{|\mathcal{H}|\cdot|\mathcal{V}|}\right|.\end{aligned}
    \]Define \(x_{h,w}=\Pr[Z=(h(w),h)]-\frac{1}{|\mathcal{H}|\cdot|\mathcal{V}|}\)
    and \(s_{h,w}=\text{sign}(x_{h,w})\). Write \(x\) for the vector of all the \(x_{h,w}\)
    and \(s\) for the vector of all the \(s_{h,w}\). Then\[\begin{aligned}\Delta((H(W),H),(V,H))&=\frac{1}{2}\langle
    x,s\rangle\\&\le\frac{1}{2}\|x\|_2\cdot\|s\|_2&\text{Cauchy-Schwarz}\\ &=\frac{\sqrt{|\mathcal{H}|\cdot|\mathcal{V}|}}{2}\|x\|_2.\end{aligned}\]
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s expand \(\|x\|_2\):'
  prefs: []
  type: TYPE_NORMAL
- en: \[\begin{aligned} \|x\|_2^2&=\sum_{h,w}\left(\Pr[Z=(h(w),h)]-\frac{1}{|\mathcal{H}|\cdot|\mathcal{V}|}\right)^2\\&=\sum_{h,w}\left(\Pr[Z=(h(w),h)]^2-\frac{2\Pr[Z=(h(w),h)]}{|\mathcal{H}|\cdot|\mathcal{V}|}+\frac{1}{(|\mathcal{H}|\cdot|\mathcal{V}|)^2}\right)\\&\le\frac{1+4\epsilon^2}{|\mathcal{H}|\cdot|\mathcal{V}|}-\frac{2}{|\mathcal{H}|\cdot|\mathcal{V}|}+\frac{|\mathcal{H}|\cdot|\mathcal{V}|}{(|\mathcal{H}|\cdot|\mathcal{V}|)^2}\\&=\frac{4\epsilon^2}{|\mathcal{H}|\cdot|\mathcal{V}|}.\end{aligned}\]
  prefs: []
  type: TYPE_NORMAL
- en: When we plug this in to our expression for the statistical distance, we get
  prefs: []
  type: TYPE_NORMAL
- en: \[\begin{aligned}\Delta((H(W),H),(V,H))&\le\frac{\sqrt{|\mathcal{H}|\cdot|\mathcal{V}|}}{2}\|x\|_2\\&\le
    \epsilon.\end{aligned}\]
  prefs: []
  type: TYPE_NORMAL
- en: This completes the proof of [Lemma 11.6](#Leftoverhashlem) and hence the theorem.
  prefs: []
  type: TYPE_NORMAL
- en: The proof of [Theorem 11.4](#LWEENCthm) is quite subtle and requires some re-reading
    and thought. To read more about this, you can look at the survey of Oded Regev,
    [“On the Learning with Error Problem”](http://www.cims.nyu.edu/~regev/papers/lwesurvey.pdf)
    Sections 3 and 4.
  prefs: []
  type: TYPE_NORMAL
- en: But what are lattices?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You can think of a lattice as a discrete version of a subspace. A lattice \(L\)
    is simply a discrete subset of \(\mathbb{R}^n\) such that if \(u,v\in L\) and
    \(a,b\) are integers then \(au+bv\in L\).^([9](#fn:9)) A lattice is given by a
    basis which simply a matrix \(B\) such that every vector \(u\in L\) is obtained
    as \(u=Bx\) for some vector of integers \(x\). It can be shown that we can assume
    without loss of generality that \(B\) is full dimensional and hence it’s an \(n\)
    by \(n\) invertible matrix. Note that given a basis \(B\) we can generate vectors
    in \(L\), as well as test whether a vector \(v\) is in \(L\) by testing if \(B^{-1}v\)
    is an integer vector. There can be many different bases for the same lattice,
    and some of them are easier to work with than others (see [Figure 11.3](#latticebasesfig)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/41bd7192e2d480545f54a0c2b09c5ffc.png)'
  prefs: []
  type: TYPE_IMG
- en: '11.3: A *lattice* is a discrete subspace \(L \subseteq \R^n\) that is closed
    under *integer* combinations. A *basis* for the lattice is a minimal set \(b_1,\ldots,b_m\)
    (typically \(m=n\)) such that every \(u \in L\) is an integer combination of \(b_1,\ldots,b_m\).
    The same lattice can have different bases. In this figure the lattice is a set
    of points in \(\R^2\), and the black vectors \(v_1,v_2\) and the ref vectors \(u_1,u_2\)
    are two alternative bases for it. Generally we consider the basis \(u_1,u_2\)
    “better” since the vectors are shorter and it is less “skewed”.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Some classical computational questions on lattices are:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Shortest vector problem:* Given a basis \(B\) for \(L\), find the nonzero
    vector \(v\) with smallest norm in \(L\).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Closest vector problem:* Given a basis \(B\) for \(L\) and a vector \(u\)
    that is *not* in \(L\), find the closest vector to \(u\) in \(L\).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Bounded distance decoding:* Given a basis \(B\) for \(L\) and a vector \(u\)
    of the form \(u=v+e\) where \(v\) is in \(L\), and \(e\) is a particularly short
    “error” vector (so in particular no other vector in the lattice is within distance
    \(\|e\|\) to \(u\)), recover \(v\). Note that this is a special case of the closest
    vector problem.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In particular, if \(V\) is a linear subspace of \(\Z_q^n\), we can think of
    it also as a lattice \(\hat{V}\) of \(\mathbb{R}^n\) where we simply say that
    that a vector \(\hat{u}\) is in \(\hat{V}\) if all of \(\hat{u}\)’s coordinates
    are integers and if we let \(u_i = \hat{u}_i \pmod{q}\) then \(u\in V\). The learning
    with error task of recovering \(x\) from \(Ax+e\) can then be thought of as an
    instance of the bounded distance decoding problem for \(\hat{V}\).
  prefs: []
  type: TYPE_NORMAL
- en: A natural algorithm to try to solve the *closest vector* and *bounded distance
    decoding* problems is that to take the vector \(u\), express it in the basis \(B\)
    by computing \(w = B^{-1}u\), and then round all the coordinates of \(w\) to obtain
    an integer vector \(\tilde{w}\) and let \(v=B\tilde{w}\) be a vector in the lattice.
    If we have an extremely good basis \(L\) for the lattice then \(v\) may indeed
    be the closest vector in the lattice, but in other more “skewed” bases it can
    be extremely far from it.
  prefs: []
  type: TYPE_NORMAL
- en: Ring based lattices
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'One of the biggest issues with lattice based cryptosystem is the key size.
    In particular, the scheme above uses an \(m\times n\) matrix where each entry
    takes \(\log q\) bits to describe. (It also encrypts a single bit using a whole
    vector, but more efficient “multi-bit” variants are known.) Schemes using *ideal
    lattices* are an attempt to get more practical variants. These have very similar
    structure except that the matrix \(A\) chosen is not completely random but rather
    can be described by a single vector. One common variant is the following: we fix
    some polynomial \(p\) over \(\Z_q\) with degree \(n\) and then treat vectors in
    \(\Z_q^n\) as the coefficients of \(n-1\) degree polynomials and always work modulo
    this polynomial \(p()\). (By this I mean that for every polynomial \(t\) of degree
    at least \(n\) we write \(t\) as \(ps+r\) where \(p\) is the polynomial above,
    \(s\) is some polynomial and \(r\) is the “remainder” polynomial of degree \(<n\);
    then \(t \pmod{p} = r\).) Now for every fixed polynomial \(t\), the operation
    \(A_t\) which is defined as \(s \mapsto ts \pmod{p}\) is a linear operation mapping
    polynomials of degree at most \(n-1\) to polynomials of degree at most \(n-1\),
    or put another way, it is a linear map over \(\Z_q^n\). However, the map \(A_d\)
    can be described using the \(n\) coefficients of \(t\) as opposed to the \(n^2\)
    description of a matrix. It also turns out that by using the Fast Fourier Transform
    we can evaluate this operation in roughly \(n\) steps as opposed to \(n^2\). The
    ideal lattice based cryptosystem use matrices of this form to save on key size
    and computation time. It is still unclear if this structure can be used for attacks;
    recent papers attacking principal ideal lattices have shown that one needs to
    be careful about this.'
  prefs: []
  type: TYPE_NORMAL
- en: One ideal-lattice based system is the [“New Hope” cryptosystem](https://newhopecrypto.org/)
    (see also [paper](https://eprint.iacr.org/2015/1092.pdf)) that has been experimented
    with by Google. People have also made highly optimized general (non ideal) lattice
    based constructions, see in particular the [“Frodo” system](https://frodokem.org/)
    (paper [here](https://eprint.iacr.org/2016/659), can you guess what’s behind the
    name?). Both New Hope and Frodo have been submitted to the [NIST competition](https://csrc.nist.gov/Projects/Post-Quantum-Cryptography)
    to select a “post quantum” public key encryption standard.
  prefs: []
  type: TYPE_NORMAL
- en: While this won’t be of interest for us in this chapter, one can also define
    finite fields whose size is a *prime power* of the form \(q^k\) where \(q\) is
    a prime and \(k\) is an integer; this is sometimes useful and in particular fields
    of size \(2^k\) are sometimes used in practice. In such fields we usually think
    of the elements as *vector* \(v \in (\Z_q)^k\) with addition done component-wise
    but multiplication is not defined component-wise (since otherwise a vector with
    a single coordinate zero would not have an inverse) but in a different way, via
    interpreting these vectors as coefficients of a degree \(k-1\) polynomial.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[↩](#fnref:1 "return to article")'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Inner products can be defined more generally, and in particular over fields
    such as the complex numbers we would define the inner product as \(\sum \overline{u}_i
    v_i\) where for \(a\in \mathbb{C}\), \(\overline{a}\) denotes the *complex conjugate*
    of \(a\). However, we stick to this simple case for this chapter.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[↩](#fnref:2 "return to article")'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Despite the name, [Gaussian elimination](https://goo.gl/3HNb5U) has been known
    to Chinese mathematicians since 150BC or so, and was popularized in the west through
    the 1670 notes of Isaac Newton, more than 100 years before Gauss was born.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[↩](#fnref:3 "return to article")'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Over \(\Z_q\), we can think of \(q-1\) also as the number \(-1\), and so on.
    Thus if \(a\in\Z_q\), we define \(|a|\) to be the minimum of \(a\) and \(q-a\).
    This ensures the absolute value satisfies the natural property of \(|a|=|-a|\).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[↩](#fnref:4 "return to article")'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: One can think of \(e\) as chosen by simply letting every coordinate be chosen
    at random in \(\{ -\delta q, -\delta q + 1 , \ldots, +\delta q \}\). For technical
    reasons, we sometimes consider other distributions and in particular the *discrete
    Gaussian* distribution which is obtained by letting every coordinate of \(e\)
    be an independent Gaussian random variable with standard deviation \(\delta q\),
    conditioned on it being an integer. (A closely related distribution is obtained
    by picking such a Gaussian random variable and then rounding it to the nearest
    integer.)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[↩](#fnref:5 "return to article")'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: People sometimes also consider variants where both \(p(n)\) and \(q(n)\) can
    be as large as exponential.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[↩](#fnref:6 "return to article")'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: In fact, due to the fact that the *signs* of the error vector’s entries are
    different, we expect the errors to have significant cancellations and hence we
    would expect \(|\langle w,e \rangle|\) to only be roughly of magnitude \(\sqrt{m}\delta
    q\), but this is not crucial for our discussions.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[↩](#fnref:7 "return to article")'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: This is based on notes from [Daniel Wichs’s class](http://www.ccs.neu.edu/home/wichs/class/crypto-fall15/)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[↩](#fnref:8 "return to article")'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: By discrete we mean that points in \(L\) are isolated. One formal way to define
    it is that there is some \(\epsilon>0\) such that every distinct \(u,v \in L\)
    are of distance at least \(\epsilon\) from one another.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[↩](#fnref:9 "return to article")'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
