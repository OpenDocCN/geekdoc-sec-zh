  zh: '**低延迟通信:** Aqua, Crowds, LAP, ShadowWalker, Tarzan, Tor'
- en: '**Message at a time, protection against timing / traffic analysis:** Mix-nets,
    e-voting, Dining Cryptographer network (DC net), Dissent, Herbivore, Riposte'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**一次发送一条消息，防止时间/流量分析:** Mix-nets, e-voting, Dining Cryptographer network (DC
    net), Dissent, Herbivore, Riposte'
