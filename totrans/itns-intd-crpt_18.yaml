- en: 'In the last lecture we defined fully homomorphic encryption, and showed the
    “bootstrapping theorem” that transforms a partially homomorphic encryption scheme
    into a fully homomorphic encryption, as long as the original scheme can homomorphically
    evaluate its own decryption circuit. In this lecture we will show an encryption
    scheme (due to Gentry, Sahai and Waters, henceforth GSW) meeting the latter property.
    That is, this lecture is devoted to proving^([1](#fn:1)) the following theorem:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一节课中，我们定义了全同态加密，并展示了将部分同态加密方案转换为全同态加密方案的“自举定理”，只要原始方案可以同态评估其自身的解密电路。在本节课中，我们将展示一个满足后一性质的加密方案（由Gentry、Sahai和Waters提出，以下简称GSW）。也就是说，本节课致力于证明^([1](#fn:1))以下定理：
- en: Assuming the LWE conjecture, there exists a partially homomorphic public key
    encryption \((G,E,D,\ensuremath{\mathit{EVAL}})\) that fits the conditions of
    the bootstrapping theorem ([Theorem 14.8](lec_15_FHE.html#bootstrapthm)). That
    is, for every two ciphertexts \(c\) and \(c'\), the function \(d \mapsto D_d(c)\;
    \ensuremath{\mathit{NAND}}\; D_d(c')\) can be homomorphically evaluated by \(\ensuremath{\mathit{EVAL}}\).
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 假设LWE猜想成立，存在一个部分同态公钥加密方案 \((G,E,D,\ensuremath{\mathit{EVAL}})\)，它符合自举定理的条件（[定理14.8](lec_15_FHE.html#bootstrapthm)）。也就是说，对于任意两个密文
    \(c\) 和 \(c'\)，函数 \(d \mapsto D_d(c)\; \ensuremath{\mathit{NAND}}\; D_d(c')\)
    可以通过 \(\ensuremath{\mathit{EVAL}}\) 同态评估。
- en: Before the detailed description and analysis, let us first outline our strategy.
    The following notion of “noisy homomorphic encryption” will be of essential importance
    (see also [Figure 15.1](#noisefhefig)).
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在详细描述和分析之前，让我们首先概述我们的策略。以下“噪声同态加密”的概念将至关重要（参见[图15.1](#noisefhefig)）。
- en: A *noisy homomorphic encryption scheme* is a four-tuple \((G,E,D,\ensuremath{\mathit{ENAND}})\)
    of algorithms such that \((G,E,D)\) is a CPA secure public key scheme and such
    that for every keypair \((e,d)\), there exists a function \(\eta=\eta_{e,d}\)
    which maps any ciphertext \(c\) to a number \(\eta(c)\in [0, \infty)\) (which
    we call the “noise level” of \(c\)) satisfying the following.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 一种 *噪声同态加密方案* 是一个算法四元组 \((G,E,D,\ensuremath{\mathit{ENAND}})\)，其中 \((G,E,D)\)
    是一个CPA安全的公钥方案，并且对于每个密钥对 \((e,d)\)，存在一个函数 \(\eta=\eta_{e,d}\)，它将任何密文 \(c\) 映射到一个数
    \(\eta(c)\in [0, \infty)\)（我们称之为 \(c\) 的“噪声水平”），满足以下条件。
- en: For every keypair \((e,d)\), if we denote
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 对于每个密钥对 \((e,d)\)，如果我们表示
- en: \[\mathcal{C}_b^\theta=\{c:D_d(c)=b,\eta(c)\leq\theta \}.\]
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: \[\mathcal{C}_b^\theta=\{c:D_d(c)=b,\eta(c)\leq\theta \}.\]
- en: then
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 然后
- en: \(E_e(b)\in \mathcal{C}_b^{\sqrt{q}}\) for any plaintext \(b\). That is, “fresh
    encryptions” have noise at most \(\sqrt{q}\).
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: \(E_e(b)\in \mathcal{C}_b^{\sqrt{q}}\) 对于任何明文 \(b\)。也就是说，“新鲜加密”的噪声不超过 \(\sqrt{q}\)。
- en: If \(c\in\mathcal{C}_b^\eta\) with \(\eta\leq q/4\), then \(D_d(c)=b\). That
    is, as long as the noise is at most \(q/4\) (which is \(\gg \sqrt{q}\)), decryption
    will still succeed.
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果 \(c\in\mathcal{C}_b^\eta\) 且 \(\eta\leq q/4\)，则 \(D_d(c)=b\)。也就是说，只要噪声不超过
    \(q/4\)（这比 \(\gg \sqrt{q}\) 大得多），解密仍然会成功。
- en: For any \(c\in\mathcal{C}_b^\eta\) and \(c'\in\mathcal{C}_{b'}^{\eta'}\), it
    holds that
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于任何 \(c\in\mathcal{C}_b^\eta\) 和 \(c'\in\mathcal{C}_{b'}^{\eta'}\)，都有
- en: \[\ensuremath{\mathit{ENAND}}(c,c')\in\mathcal{C}_{b\overline{\wedge}b'}^{n^3\cdot
    \max\{\eta,\eta'\}}\]as long as \(n^3\cdot \max\{\eta,\eta'\}<q/4\). That is,
    as long as noise is not too large, applying \(\ensuremath{\mathit{ENAND}}\) to
    \(c\) and \(c'\) will yield an encryption of \(\ensuremath{\mathit{NAND}}(D_d(c),D_d(c'))\)
    with noise level that is not “too much higher” than the maximum noise of \(c\)
    and \(c'\).
  id: totrans-14
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: \[\ensuremath{\mathit{ENAND}}(c,c')\in\mathcal{C}_{b\overline{\wedge}b'}^{n^3\cdot
    \max\{\eta,\eta'\}}\]只要 \(n^3\cdot \max\{\eta,\eta'\}<q/4\)。也就是说，只要噪声不是太大，将 \(\ensuremath{\mathit{ENAND}}\)
    应用于 \(c\) 和 \(c'\) 将会产生一个 \(\ensuremath{\mathit{NAND}}(D_d(c),D_d(c'))\) 的加密，其噪声水平不会“过高”于
    \(c\) 和 \(c'\) 的最大噪声水平。
- en: The noisy homomorphic encryption actually states that if \(C\) and \(C'\) encrypt
    \(b\) and \(b'\) up to error \(\eta\) and \(\eta'\), respectively, then \(\ensuremath{\mathit{ENAND}}(c,c')\)
    encrypts \(\ensuremath{\mathit{NAND}}(b,b')\) up to some error which can be controlled
    by \(\eta,\eta'\). The coefficient \(n^3\) is not essential here; we just need
    the order \(poly(n)\). This property allows us to perform the \(\ensuremath{\mathit{ENAND}}\)
    operator repeatly as long as we can guarantee the accumulated error is smaller
    than \(q/4\), which means that the decryption can be done correctly. The next
    theorem tells us with what depth a circuit can be computed homomorphically.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 噪声同态加密实际上表述的是，如果 \(C\) 和 \(C'\) 分别将 \(b\) 和 \(b'\) 加密到误差 \(\eta\) 和 \(\eta'\)，那么
    \(\ensuremath{\mathit{ENAND}}(c,c')\) 将 \(\ensuremath{\mathit{NAND}}(b,b')\) 加密到某个可以通过
    \(\eta,\eta'\) 控制的误差。系数 \(n^3\) 在这里不是必要的；我们只需要 \(poly(n)\) 的阶。这一性质允许我们只要能保证累积误差小于
    \(q/4\)，就可以重复执行 \(\ensuremath{\mathit{ENAND}}\) 操作，这意味着解密可以正确进行。接下来的定理告诉我们电路可以以何种深度进行同态计算。
- en: '![](../Images/9c33461027d404260697f82fdd8a963c.png)'
  id: totrans-16
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9c33461027d404260697f82fdd8a963c.png)'
- en: '15.1: In a noisy homomorphic encryption, every ciphertext \(c\) has a “noise”
    parameter \(\eta(c)\) associated with it. When we encrypt \(0\) or \(1\), we get
    a ciphertext with noise at most \(\sqrt{q}\), while we are guaranteed to successfully
    decrypt. Applying the \(\ensuremath{\mathit{ENAND}}\) operation to two ciphertexts
    \(c\) and \(c''\) yields a ciphertext with noise level at most \(n^3\) times the
    maximum noise of \(c\) and \(c''\). Hence we can compose \(\ensuremath{\mathit{ENAND}}\)
    operations to apply any NAND circuit of depth at most \(\ell\) to fresh encryptions,
    and succeed in obtaining a ciphertext decrypting to the circuit output as long
    as \(n^{3\ell}\sqrt{q} \ll q/4\).'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 15.1：在噪声同态加密中，每个密文 \(c\) 都有一个与之相关的“噪声”参数 \(\eta(c)\)。当我们加密 \(0\) 或 \(1\) 时，我们得到的密文噪声最多为
    \(\sqrt{q}\)，而我们保证可以成功解密。将 \(\ensuremath{\mathit{ENAND}}\) 操作应用于两个密文 \(c\) 和 \(c'\)
    会产生一个噪声级别最多为 \(c\) 和 \(c'\) 最大噪声 \(n^3\) 倍的密文。因此，我们可以组合 \(\ensuremath{\mathit{ENAND}}\)
    操作，将任何深度最多为 \(\ell\) 的 NAND 电路应用于新鲜加密，并且只要 \(n^{3\ell}\sqrt{q} \ll q/4\)，就可以成功获得解密为电路输出的密文。
- en: If there exists a noisy homomorphic encryption scheme with \(q=2^{\sqrt{n}}\),
    then it can be extended to a homomorphic encryption scheme for any circuit with
    depth smaller than \(polylog(n)\).
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 如果存在一个具有 \(q=2^{\sqrt{n}}\) 的噪声同态加密方案，那么它可以扩展到任何深度小于 \(polylog(n)\) 的电路的同态加密方案。
- en: For any function \(f:\{0,1\}^m\rightarrow \{0,1\}\) which can be described by
    a circuit with depth \(\ell\), we can compute \(\ensuremath{\mathit{EVAL}}(f,E_e(x_1),\cdots,E_e(x_m))\)
    with error up to \(\sqrt{q}(n^3)^\ell\). (The initial error for \(E_e(x_i)\) is
    smaller than \(\sqrt{q}\) and the error will be accumulated with rate up to \(n^3\).)
    Thus, to guarantee that \(\ensuremath{\mathit{EVAL}}(f,E_e(x_1),\cdots,E_e(x_m))\)
    can be decrypted to \(f(x_1,\cdots,x_m)\) correctly, we only need \(\sqrt{q}(n^3)^\ell\ll
    q\), i.e., \(n^{3\ell}\ll \sqrt{q}=2^{\sqrt{n}/2}\). This is equalvent to \(3\ell\log(n)\ll
    \sqrt{n}/2\), which can be guaranteed when \(\ell =n^{o(1)}\) or \(\ell=polylog(n)\).
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 对于任何可以用深度为 \(\ell\) 的电路描述的函数 \(f:\{0,1\}^m\rightarrow \{0,1\}\)，我们可以计算 \(\ensuremath{\mathit{EVAL}}(f,E_e(x_1),\cdots,E_e(x_m))\)，误差最多为
    \(\sqrt{q}(n^3)^\ell\)。（\(E_e(x_i)\) 的初始误差小于 \(\sqrt{q}\)，误差将以至多为 \(n^3\) 的速率累积。）因此，为了保证
    \(\ensuremath{\mathit{EVAL}}(f,E_e(x_1),\cdots,E_e(x_m))\) 可以正确解密为 \(f(x_1,\cdots,x_m)\)，我们只需要
    \(\sqrt{q}(n^3)^\ell\ll q\)，即 \(n^{3\ell}\ll \sqrt{q}=2^{\sqrt{n}/2}\)。这等价于 \(3\ell\log(n)\ll
    \sqrt{n}/2\)，当 \(\ell =n^{o(1)}\) 或 \(\ell=polylog(n)\) 时可以保证。
- en: We will assume the LWE conjecture with \(q(n) \approx 2^{\sqrt{n}}\) in the
    remainder of this chapter. With [Theorem 15.3](#Depththm) in hand, our goal is
    to construct a noisy FHE such that the decryption map (specifically the map \(d
    \mapsto D_d(c)\) for any fixed ciphertext \(c\)) can be computed by a circuit
    with depth at most \(polylog(n)\). ([Theorem 14.8](lec_15_FHE.html#bootstrapthm)
    refers to the map \(d \mapsto \neg(D_d(c) \wedge D_d(c'))\), but this latter map
    is obtained by applying one more NAND gate to two parallel executions of \(d \mapsto
    D_d(c)\), and hence if the map \(d \mapsto D_d(c)\) has depth at most \(polylog(n)\)
    then so does the map \(d \mapsto \neg(D_d(c) \wedge D_d(c'))\).) Once we do this
    then we can obtain a fully homomorphic encryption scheme. We will head into some
    details show how to construct things we want in the rest of this chapter. The
    most technical and interesting part would be how to upper bound the noise/error.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章的剩余部分，我们将假设LWE猜想，其中\(q(n) \approx 2^{\sqrt{n}}\)。有了[定理15.3](#Depththm)，我们的目标是构建一个带噪声的FHE，使得解密映射（特别是对于任何固定的密文\(c\)的映射\(d
    \mapsto D_d(c)\)）可以通过深度至多为\(polylog(n)\)的电路来计算。（[定理14.8](lec_15_FHE.html#bootstrapthm)指的是映射\(d
    \mapsto \neg(D_d(c) \wedge D_d(c'))\)，但这个后者的映射是通过将一个额外的NAND门应用于\(d \mapsto D_d(c)\)的两个并行执行来获得的，因此如果映射\(d
    \mapsto D_d(c)\)的深度至多为\(polylog(n)\)，那么映射\(d \mapsto \neg(D_d(c) \wedge D_d(c'))\)也是如此。）一旦我们做到了这一点，我们就可以获得一个完全同态加密方案。我们将进入一些细节，展示如何在接下来的章节中构建我们想要的东西。最技术性和有趣的部分将是如何上限噪声/错误。
- en: 'Prelude: from vectors to matrices'
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 前言：从向量到矩阵
- en: In the linear homomorphic scheme we saw in the last lecture, every ciphertext
    was a vector \(c\in\Z_q^n\) such that \(\langle c,s \rangle\) equals (up to scaling
    by \(\floor{\tfrac{q}{2}}\)) the plaintext bit. We saw that adding two ciphertexts
    modulo \(q\) corresponded to XOR’ing (i.e., adding modulo \(2\)) the corresponding
    two plaintexts. That is, if we define \(c \oplus c'\) as \(c+c' \pmod{q}\) then
    performing the \(\oplus\) operation on the ciphertexts corresponds to adding modulo
    \(2\) the plaintexts.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一节课中我们看到的线性同态方案中，每个密文都是一个向量\(c\in\Z_q^n\)，使得\(\langle c,s \rangle\)等于（在\(\floor{\tfrac{q}{2}}\)的缩放下）明文比特。我们看到了在模\(q\)下添加两个密文对应于XOR（即，模\(2\)的加法）相应的两个明文。也就是说，如果我们定义\(c
    \oplus c'\)为\(c+c' \pmod{q}\)，那么在密文上执行\(\oplus\)操作对应于在模\(2\)下添加明文。
- en: 'However, to get to a fully, or even partially, homomorphic scheme, we need
    to find a way to perform the NAND operation on the two plaintexts. The challenge
    is that it seems that to do that we need to find a way to evaluate *multiplications*:
    find a way to define some operation \(\otimes\) on ciphertexts that corresponds
    to multiplying the plaintexts. Alas, a priori, there doesn’t seem to be a natural
    way to *multiply* two vectors.'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，为了得到一个完全同态或部分同态方案，我们需要找到一种方法在两个明文上执行NAND操作。挑战在于，似乎我们需要找到一种方法来评估**乘法**：找到一种方法在密文中定义一些操作\(\otimes\)，它对应于明文的乘法。唉，从先验来看，似乎没有一种自然的方法来**乘**两个向量。
- en: The GSW approach to handle this is to move from vectors to *matrices*. As usual,
    it is instructive to first consider the cryptographer’s dream world where Gaussian
    elimination doesn’t exist. In this case, the GSW ciphertext encrypting \(b\in\{0,1\}\)
    would be an \(n\times n\) matrix \(C\) over \(\Z_q\) such that \(Cs = bs\) where
    \(s\in\Z_q^n\) is the secret key. That is, the encryption of a bit \(b\) is a
    matrix \(C\) such that the secret key is an *eigenvector* (modulo \(q\)) of \(C\)
    with corresponding eigenvalue \(b\). (We defer discussion of how the encrypting
    party generates such a ciphertext, since this is in any case only a “dream” toy
    example.)
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 处理此类问题的GSW方法是从向量转换为**矩阵**。通常，首先考虑密码学家的理想世界，其中不存在高斯消元法，是有教育意义的。在这种情况下，GSW密文加密\(b\in\{0,1\}\)将是一个定义在\(\Z_q\)上的\(n\times
    n\)矩阵\(C\)，使得\(Cs = bs\)，其中\(s\in\Z_q^n\)是密钥。也就是说，一个比特\(b\)的加密是一个矩阵\(C\)，其密钥是\(C\)的**特征向量**（模\(q\)），对应的特征值为\(b\)。（我们推迟讨论加密方如何生成这样的密文，因为这在任何情况下只是一个“梦想”玩具示例。）
- en: You should make sure you understand the *types* of all the identifiers we refer
    to. In particular, above \(C\) is an \(n\times n\) *matrix* with entries in \(\Z_q\),
    \(s\) is a *vector* in \(\Z_q^n\), and \(b\) is a *scalar* (i.e., just a number)
    in \(\{0,1\}\). See [Figure 15.2](#naivegswfig) for a visual representation of
    the ciphertexts in this “naive” encryption scheme. Keeping track of the dimensions
    of all objects will become only more important in the rest of this lecture.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该确保你理解了我们提到的所有标识符的类型。特别是，上面的 \(C\) 是一个 \(n\times n\) 的 *矩阵*，其元素在 \(\Z_q\)
    中，\(s\) 是一个 \(\Z_q^n\) 中的 *向量*，而 \(b\) 是一个 \(\{0,1\}\) 中的 *标量*（即只是一个数字）。参见 [图
    15.2](#naivegswfig) 以了解这个“天真”加密方案中密文的视觉表示。跟踪所有对象的维度将在本讲座的其余部分变得更加重要。
- en: '![](../Images/d54b664ae9528b8c05e6a8b61b51bab3.png)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/d54b664ae9528b8c05e6a8b61b51bab3.png)'
- en: '15.2: In the “naive” version of the GSW encryption, to encrypt a bit \(b\)
    we output an \(n\times n\) matrix \(C\) such that \(Cs=bs\) where \(s \in \Z_q^n\)
    is the secret key. In this scheme we can transform encryptions \(C,C''\) of \(b,b''\)
    respectively to an encryption \(C''''\) of \(\ensuremath{\mathit{NAND}}(b,b'')\)
    by letting \(C'''' = I-CC''\).'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 15.2：在 GSW 加密的“天真”版本中，为了加密一个比特 \(b\)，我们输出一个 \(n\times n\) 的矩阵 \(C\)，使得 \(Cs=bs\)，其中
    \(s \in \Z_q^n\) 是密钥。在这个方案中，我们可以通过让 \(C'' = I-CC'\) 将 \(b,b'\) 的加密 \(C,C'\) 分别转换成
    \(\ensuremath{\mathit{NAND}}(b,b')\) 的加密 \(C''\)。
- en: Given \(C\) and \(s\) we can recover \(b\) by just checking if \(Cs=s\) or \(Cs=0^n\).
    The scheme allows homomorphic evaluation of both addition (modulo \(q\)) and multiplication,
    since if \(Cs = bs\) and \(C's=b's\) then we can define \(C \oplus C' = C + C'\)
    (where on the righthand side, addition is simply done in \(\Z_q\)) and \(C\otimes
    C' = \ensuremath{\mathit{CC}}'\) (where again this refers to matrix multiplication
    in \(\Z_q\)).
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 给定 \(C\) 和 \(s\)，我们可以通过检查 \(Cs=s\) 或 \(Cs=0^n\) 来恢复 \(b\)。该方案允许对加法（模 \(q\)）和乘法进行同态评估，因为如果
    \(Cs = bs\) 和 \(C's=b's\)，那么我们可以定义 \(C \oplus C' = C + C'\)（在右侧，加法只是在 \(\Z_q\)
    中进行）和 \(C\otimes C' = \ensuremath{\mathit{CC}}'\)（再次，这指的是 \(\Z_q\) 中的矩阵乘法）。
- en: Indeed, one can verify that both addition and multiplication succeed since
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，可以验证加法和乘法都成功了，因为
- en: \[(C+C')s = (b+b')s\]and\[\ensuremath{\mathit{CC}}'s = C(b's) = bb's\]where
    all these equalities are in \(\Z_q\).
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: \[(C+C')s = (b+b')s\] 和 \[\ensuremath{\mathit{CC}}'s = C(b's) = bb's\]，其中所有这些等式都在
    \(\Z_q\) 中。
- en: Addition modulo \(q\) is not the same as XOR, but given these multiplication
    and addition operations, we can implement the NAND operation as well. Specifically,
    for every \(b,b' \in \{0,1\}\), \(b \; \ensuremath{\mathit{NAND}} \; b' = 1-bb'\).
    Hence we can take a ciphertext \(C\) encrypting \(b\) and a ciphertext \(C'\)
    encrypting \(b'\) and transform these two ciphertexts to the ciphertext \(C''=(I-CC')\)
    that encrypts \(b\; \ensuremath{\mathit{NAND}} \; b'\) (where \(I\) is the identity
    matrix). Thus in a world without Gaussian elimination it is not hard to get a
    fully homomorphic encryption.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 模 \(q\) 的加法与异或不同，但给定这些乘法和加法操作，我们也可以实现 NAND 操作。具体来说，对于每一个 \(b,b' \in \{0,1\}\)，\(b
    \; \ensuremath{\mathit{NAND}} \; b' = 1-bb'\)。因此，我们可以取一个加密后的密文 \(C\)，它加密了 \(b\)，以及一个加密后的密文
    \(C'\)，它加密了 \(b'\)，并将这两个密文转换成加密后的密文 \(C''=(I-CC')\)，它加密了 \(b\; \ensuremath{\mathit{NAND}}
    \; b'\)（其中 \(I\) 是单位矩阵）。因此，在没有高斯消元的世界里，得到一个完全同态加密并不困难。
- en: We have not shown how to *generate* a ciphertext without knowledge of \(s\),
    and hence strictly speaking we only showed in this world how to get a *private
    key* fully homomorphic encryption. Our “real world” scheme will be a full fledged
    *public key* FHE. However we note that private key homomorphic encryption is already
    very interesting and in fact sufficient for many of the “cloud computing” applications.
    Moreover, [Rothblum](http://eccc.hpi-web.de/report/2010/146/) gave a generic transformation
    from a *private key* homomorphic encryption to a *public key* homomorphic encryption.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 我们没有展示如何在不知道 \(s\) 的情况下生成密文，因此严格来说，我们在这个世界里只展示了如何得到一个 *私钥* 完全同态加密。我们的“现实世界”方案将是一个完整的
    *公钥* FHE。然而，我们注意到私钥同态加密已经非常有趣，并且实际上对于许多“云计算”应用来说已经足够了。此外，[Rothblum](http://eccc.hpi-web.de/report/2010/146/)
    给出了一个从 *私钥* 同态加密到 *公钥* 同态加密的通用转换。
- en: Real world partially homomorphic encryption
  id: totrans-33
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 现实世界的部分同态加密
- en: We now discuss how we can obtain an encryption in the real world where, as much
    as we’d like to ignore it, there are people who walk among us (not to mention
    some computer programs) that actually know how to invert matrices. As usual, the
    idea is to “fool Gaussian elimination with noise” but we will see that we have
    to be much more careful about “noise management”, otherwise even for the party
    holding the secret key the noise will overwhelm the signal.^([2](#fn:2))
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们讨论如何在现实世界中实现加密，尽管我们很愿意忽略它，但确实有一些人（甚至一些计算机程序）知道如何求逆矩阵。像往常一样，想法是“用噪声愚弄高斯消元法”，但我们会看到，我们必须更加注意“噪声管理”，否则即使是持有秘密密钥的方，噪声也会压倒信号。[2](#fn:2)
- en: 'The main idea is that we can expect the following problem to be hard for a
    random secret \(s\in\Z_q^n\): distinguish between samples of random matrices \(C\)
    and matrices where \(Cs = bs + e\) for some \(b\in\{0,1\}\) and “short” \(e\)
    satisfying \(|e_i| \leq \sqrt{q}\) for all \(i\). This yields a natural candidate
    for an encryption scheme where we encrypt \(b\) by a matrix \(C\) satisfying \(Cs
    = bs + e\) where \(e\) is a “short” vector.^([3](#fn:3))'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 主要思想是，我们可以预期以下问题对于随机秘密 \(s\in\Z_q^n\) 是困难的：区分随机矩阵 \(C\) 的样本和满足 \(Cs = bs + e\)
    的矩阵，其中 \(b\in\{0,1\}\) 且“短”的 \(e\) 满足 \(|e_i| \leq \sqrt{q}\) 对于所有 \(i\)。这为加密方案提供了一个自然的候选者，其中我们通过一个矩阵
    \(C\) 加密 \(b\)，使得 \(Cs = bs + e\)，其中 \(e\) 是一个“短”向量。[3](#fn:3)
- en: We can now try to check what adding and multiplying two matrices does to the
    noise. If \(Cs = bs+e\) and \(C's=b's+e'\) then
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们可以尝试检查两个矩阵相加和相乘对噪声的影响。如果 \(Cs = bs+e\) 和 \(C's=b's+e'\) 那么
- en: \[(C+C')s = (b+b')s+(e+e') \;\;(15.1)\]and\[\ensuremath{\mathit{CC}}'s = C(b's+e')+e
    =bb's+ (b'e+Ce')\;. \;\;(15.2) \]
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: \[(C+C')s = (b+b')s+(e+e') \;\;(15.1)\]和\[\ensuremath{\mathit{CC}}'s = C(b's+e')+e
    =bb's+ (b'e+Ce')\;. \;\;(15.2) \]
- en: I recommend you pause here and check for yourself whether it will be the case
    that \(C+C'\) encrypts \(b+b'\) and \(\ensuremath{\mathit{CC}}'\) encrypts \(bb'\)
    up to small noise or not.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 我建议你在这里暂停一下，自己检查一下是否 \(C+C'\) 会加密 \(b+b'\)，而 \(\ensuremath{\mathit{CC}}'\) 会加密
    \(bb'\)，直到出现小的噪声。
- en: We would have loved to say that we can define as above \(C\oplus C' = C+C' \pmod
    q\) and \(C\otimes C' = \ensuremath{\mathit{CC}}'\pmod q\). For this we would
    need that the vector \((C+C')s\) equals \((b+b')s\) plus a “short” vector and
    the vector \(\ensuremath{\mathit{CC}}'s\) equals \(bb's\) plus a “short” vector.
    The former statement indeed holds. Looking at [Equation 15.2](#eqhommult) we see
    that \((C+C')s\) equals \((b+b')s\) up to the “noise” vector \(e+e'\), and if
    \(e,e'\) are “short” then \(e+e'\) is not too long either. That is, if \(|e_i|<\eta\)
    and \(|e'_i|<\eta'\) for every \(i\) then \(|e_i+e'_i|<\eta + \eta'\). So we can
    at least handle a significant number of additions before the noise gets out of
    hand.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 我们本想像上面那样定义 \(C\oplus C' = C+C' \pmod q\) 和 \(C\otimes C' = \ensuremath{\mathit{CC}}'\pmod
    q\)。为此，我们需要向量 \((C+C')s\) 等于 \((b+b')s\) 加上一个“短”向量，并且向量 \(\ensuremath{\mathit{CC}}'s\)
    等于 \(bb's\) 加上一个“短”向量。前一个陈述确实成立。查看[方程15.2](#eqhommult)，我们看到 \((C+C')s\) 等于 \((b+b')s\)
    加上“噪声”向量 \(e+e'\)，如果 \(e,e'\) 是“短”的，那么 \(e+e'\) 也不会太长。也就是说，如果对于每个 \(i\)，有 \(|e_i|<\eta\)
    和 \(|e'_i|<\eta'\)，那么 \(|e_i+e'_i|<\eta + \eta'\)。因此，我们至少可以在噪声失控之前处理大量的加法操作。
- en: However, if we consider [Equation 15.2](#eqhommult), we see that \(\ensuremath{\mathit{CC}}'\)
    will be equal to \(bb's\) plus the “noise vector” \(b'e + Ce'\). The first component
    \(b'e\) of this noise vector is “short” (after all \(b'\in \{0,1\}\) and \(e\)
    is “short”). However, the second component \(Ce'\) could be a very large vector.
    Indeed, since \(C\) looks like a random matrix in \(\Z_q\), no matter how small
    the entries of \(e'\), many of the entries of \(Ce'\) will be large. Hence multiplying
    \(e'\) by \(C\) takes us “beyond the edge of chaos” and makes the noise too large
    for decryption to be successful.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，如果我们考虑[方程15.2](#eqhommult)，我们会看到 \(\ensuremath{\mathit{CC}}'\) 将等于 \(bb's\)
    加上“噪声向量” \(b'e + Ce'\)。这个噪声向量的第一个分量 \(b'e\) 是“短”的（毕竟 \(b'\in \{0,1\}\) 且 \(e\)
    是“短”的）。然而，第二个分量 \(Ce'\) 可能是一个非常大的向量。确实，由于 \(C\) 在 \(\Z_q\) 中看起来像是一个随机矩阵，无论 \(e'\)
    的项有多小，\(Ce'\) 的许多项都可能很大。因此，将 \(e'\) 乘以 \(C\) 会让我们“越过混沌的边缘”，使得噪声太大，无法成功解密。
- en: Noise management via encoding
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 通过编码进行噪声管理
- en: The problem we had above is that the entries of \(C\) are elements in \(\Z_q\)
    that can be very large, while we would have loved them to be small numbers such
    as \(0\) or \(1\). At this point one could say
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 我们上面遇到的问题是 \(C\) 的项是 \(\Z_q\) 中的元素，可能非常大，而我们本希望它们是像 \(0\) 或 \(1\) 这样的小数。在这个时候，有人可能会说
- en: '*“If only there was some way to encode numbers between \(0\) and \(q-1\) using
    only \(0\)’s and \(1\)’s”*'
  id: totrans-43
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*“如果有一种方法只用 0 和 1 来编码介于 0 和 \(q-1\) 之间的数字该多好”*'
- en: If you think about it hard enough, it turns out that there is something known
    as the “binary basis” that allows us to encode a number \(x\in\Z_q\) as a vector
    \(\hat{x}\in\{0,1\}^{\log q}\).^([4](#fn:4)) What’s even more surprising is that
    this seemingly trivial trick turns out to be immensely useful. We will define
    the *binary encoding* of a vector or matrix \(x\) over \(\Z_q\) by \(\hat{x}\).
    That is, \(\hat{x}\) is obtained by replacing every coordinate \(x_i\) with \(\log
    q\) coordinates \(x_{i,0},\ldots,x_{i,\log q-1}\) such that
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你足够深入地思考，你会发现有一种称为“二进制基”的东西，它允许我们将一个数 \(x\in\Z_q\) 编码为一个向量 \(\hat{x}\in\{0,1\}^{\log
    q}\)^([4](#fn:4))。更令人惊讶的是，这个看似微不足道的技巧实际上非常有用。我们将通过 \(\hat{x}\) 定义 \(\Z_q\) 上向量或矩阵
    \(x\) 的 *二进制编码*。也就是说，\(\hat{x}\) 是通过将每个坐标 \(x_i\) 替换为 \(\log q\) 个坐标 \(x_{i,0},\ldots,x_{i,\log
    q-1}\) 得到的，使得
- en: \[x_i = \sum_{j=0}^{\log q-1}2^j x_{i,j} \;. \;\;(15.3)\]
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: \[x_i = \sum_{j=0}^{\log q-1}2^j x_{i,j} \;. \;\;(15.3)\]
- en: Specifically, if \(s\in \Z_q^n\), then we denote by \(\hat{s}\) the \(n\log
    q\)-dimensional vector with entries in \(\{0,1\}\), such that each \(\log q\)-sized
    block of \(\hat{s}\) encodes a coordinate of \(s\). Similarly, if \(C\) is an
    \(m\times n\) matrix, then we denote by \(\hat{C}\) the \(m\times n\log q\) matrix
    with entries in \(\{0,1\}\) that corresponds to encoding every \(n\)-dimensional
    row of \(C\) by an \(n\log q\)-dimensional row where each \(\log q\)-sized block
    corresponds to a single entry. (We still think of the entries of these vectors
    and matrices as elements of \(\Z_q\) and so all calculations are still done modulo
    \(q\).)
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 具体来说，如果 \(s\in \Z_q^n\)，那么我们用 \(\hat{s}\) 表示一个具有 \(\{0,1\}\) 条目的 \(n\log q\)
    维向量，其中每个 \(\log q\) 大小的块编码 \(s\) 的一个坐标。同样，如果 \(C\) 是一个 \(m\times n\) 矩阵，那么我们用
    \(\hat{C}\) 表示一个具有 \(\{0,1\}\) 条目的 \(m\times n\log q\) 矩阵，它对应于将 \(C\) 的每个 \(n\)
    维行编码为一个 \(n\log q\) 维行，其中每个 \(\log q\) 大小的块对应于单个条目。（我们仍然将这些向量和矩阵的条目视为 \(\Z_q\)
    的元素，因此所有计算都是在模 \(q\) 下进行的。）
- en: While encoding in the binary basis is not a linear operation, the *decoding*
    operation is linear as one can see in [Equation 15.3](#eqbinaryencoding). We let
    \(Q\) be the \(n \times (n\log q)\) “decoding” matrix that maps an encoding vector
    \(\hat{s}\) back to the original vector \(s\). Specifically, every row of \(Q\)
    is composed of \(n\) blocks each of \(\log q\) size, where the \(i\)-th row has
    only the \(i\)-th block nonzero, and equal to the values \((1,2,4,\ldots,2^{\log
    q-1})\). It’s a good exercise to verify that for every vector \(s\in \Z_q^n\)
    and matrix \(C\in \Z_q^{n\times n}\), \(Q\hat{s}=s\) and \(\hat{C}Q^\top =C\).
    (See [Figure 15.3](#encodevecfig) amd [Figure 15.4](#encodematrixfig).)
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然在二进制基中进行编码不是线性操作，但 *解码* 操作是线性的，正如你可以在 [方程 15.3](#eqbinaryencoding) 中看到的那样。我们让
    \(Q\) 是一个 \(n \times (n\log q)\) 的“解码”矩阵，它将编码向量 \(\hat{s}\) 映射回原始向量 \(s\)。具体来说，\(Q\)
    的每一行由 \(\log q\) 个大小为 \(n\) 的块组成，其中第 \(i\) 行只有第 \(i\) 个块非零，并且等于值 \((1,2,4,\ldots,2^{\log
    q-1})\)。验证以下性质是一个很好的练习：对于每个向量 \(s\in \Z_q^n\) 和矩阵 \(C\in \Z_q^{n\times n}\)，\(Q\hat{s}=s\)
    和 \(\hat{C}Q^\top =C\)。（参见 [图 15.3](#encodevecfig) 和 [图 15.4](#encodematrixfig)。）
- en: '![](../Images/691a001175ab60dc0c636ffb644c9b43.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/691a001175ab60dc0c636ffb644c9b43.png)'
- en: '15.3: We can encode a vector \(s\in \Z_q^n\) as a vector \(\hat{s} \in \Z_q^{n\log
    q}\) that has only entries in \(\{0,1\}\) by using the binary encoding, replacing
    every coordinate of \(s\) with a \(\log q\)-sized block in \(\hat{s}\). The decoding
    operation is *linear* and so we can write \(s=Q\hat{s}\) for a specific (simple)
    \(n \times (n\log q)\) matrix \(Q\).'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 15.3：我们可以通过二进制编码将向量 \(s\in \Z_q^n\) 编码为只有 \(\{0,1\}\) 条目的向量 \(\hat{s} \in \Z_q^{n\log
    q}\)，方法是替换 \(s\) 的每个坐标为一个 \(\log q\) 大小的块在 \(\hat{s}\) 中。解码操作是 *线性* 的，因此我们可以写
    \(s=Q\hat{s}\) 对于一个特定的（简单的）\(n \times (n\log q)\) 矩阵 \(Q\)。
- en: '![](../Images/60adf616cbb5ed6af3acbd8016a3b99c.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/60adf616cbb5ed6af3acbd8016a3b99c.png)'
- en: '15.4: We can encode an \(n\times n\) matrix \(C\) over \(\Z_q\) by an \(n\times
    (n \log q)\) matrix \(\hat{C}\) using the binary basis. We have the equation \(C=\hat{C}Q^\top\)
    where \(Q\) is the same matrix we use to decode a vector.'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 15.4：我们可以使用二进制基将 \(\Z_q\) 上的 \(n\times n\) 矩阵 \(C\) 编码为 \(n\times (n \log q)\)
    矩阵 \(\hat{C}\)。我们得到方程 \(C=\hat{C}Q^\top\)，其中 \(Q\) 是我们用来解码向量的相同矩阵。
- en: '**Our final encryption scheme:** We describe below the key generation, encryption
    and decryption algorithms of our final homomorphic encryption scheme (FHEENC).
    It will satisfy the following properties:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '**我们的最终加密方案：** 我们下面将描述我们最终的同态加密方案（FHEENC）的密钥生成、加密和解密算法。它将满足以下性质：'
- en: Ciphertexts are \((n \log q)\times (n\log q)\) matrices \(C\) with all coefficients
    in \(\{0,1\}\).
  id: totrans-53
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 密文是所有系数都在 \(\{0,1\}\) 中的 \((n \log q)\times (n\log q)\) 矩阵 \(C\)。
- en: The secret key is a vector \(s \in \Z_q^n\). We let \(v \in \Z_q^{n \log q}\)
    be the vector \(V = Q^\top s\).
  id: totrans-54
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 秘密密钥是一个向量 \(s \in \Z_q^n\)。我们让 \(v \in \Z_q^{n \log q}\) 是向量 \(V = Q^\top s\)。
- en: An encryption of \(b\in \{0,1\}\) is a matrix \(C\) satisfying the following
    “ciphertext equation”
  id: totrans-55
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: \(b\in \{0,1\}\) 的加密是一个满足以下“密文方程”的矩阵 \(C\)
- en: \[Cv =bv + e \;\;(15.4)\]for a “short” \(e\).
  id: totrans-56
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: \[Cv =bv + e \;\;(15.4)\]对于“短”的 \(e\)。
- en: 'Given the conditions 1,2, and 3, we can now define the addition and multiplication
    operations for two ciphertexts \(C,C''\) as follows:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 给定条件1、2和3，我们现在可以定义两个密文 \(C,C'\) 的加法和乘法操作如下：
- en: \(C \oplus C' = C + C' \pmod{q}\)
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: \(C \oplus C' = C + C' \pmod{q}\)
- en: \(C \otimes C' = \widehat{(\ensuremath{\mathit{CQ}}^\top)}C'\)
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: \(C \otimes C' = \widehat{(\ensuremath{\mathit{CQ}}^\top)}C'\)
- en: Please try to verify that if \(C,C'\) are encryptions of \(b,b'\) then \(C \oplus
    C'\) and \(C \otimes C'\) will be encryptions of \(b+b'\) and \(bb'\) respectively.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 请尝试验证，如果 \(C,C'\) 是 \(b,b'\) 的加密，那么 \(C \oplus C'\) 和 \(C \otimes C'\) 分别将是
    \(b+b'\) 和 \(bb'\) 的加密。
- en: '**Correctness of operations.** Suppose that \(Cv = bv + e\) and \(C''v = b''v
    + e''\). Then'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: '**操作的正确性。** 假设 \(Cv = bv + e\) 和 \(C''v = b''v + e''\)。那么'
- en: \[(C\oplus C')v = (C+C')v = (b+b')v + (e+e') \;\;(15.5)\]
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: \[(C\oplus C')v = (C+C')v = (b+b')v + (e+e') \;\;(15.5)\]
- en: which means that \(C \oplus C'\) satisfies the ciphertext equation [Equation
    15.4](#eqciphertexteqfhe) with respect to the plaintext \(b+b'\), with the short
    vector \(e+e'\).
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着 \(C \oplus C'\) 满足关于明文 \(b+b'\) 的密文方程 [方程15.4](#eqciphertexteqfhe)，带有短向量
    \(e+e'\)。
- en: Let’s now analyze the more challenging case of \(C \otimes C'\).
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来分析更具有挑战性的情况 \(C \otimes C'\)。
- en: \[(C\otimes C')v = \widehat{(\ensuremath{\mathit{CQ}}^\top)}C'v = \widehat{(\ensuremath{\mathit{CQ}}^\top)}(b'v+e')
    \;. \;\;(15.6)\]
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: \[(C\otimes C')v = \widehat{(\ensuremath{\mathit{CQ}}^\top)}C'v = \widehat{(\ensuremath{\mathit{CQ}}^\top)}(b'v+e')
    \;. \;\;(15.6)\]
- en: But since \(v=Q^\top s\) and \(\hat{A}Q^\top = A\) for every matrix \(A\), the
    righthand side of [Equation 15.6](#fhemultfinaleqfirst) equals
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 但由于 \(v=Q^\top s\) 且对于每个矩阵 \(A\)，\(\hat{A}Q^\top = A\)，[方程15.6](#fhemultfinaleqfirst)
    的右侧等于
- en: \[\widehat{(\ensuremath{\mathit{CQ}}^\top)}(b'Q^\top s+e')=b'C Q^\top s+\widehat{(\ensuremath{\mathit{CQ}}^\top)}e'
    = b'Cv + \widehat{(\ensuremath{\mathit{CQ}}^\top)}e' \;\;(15.7)\]
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: \[\widehat{(\ensuremath{\mathit{CQ}}^\top)}(b'Q^\top s+e')=b'C Q^\top s+\widehat{(\ensuremath{\mathit{CQ}}^\top)}e'
    = b'Cv + \widehat{(\ensuremath{\mathit{CQ}}^\top)}e' \;\;(15.7)\]
- en: but since \(\widehat{B}\) is a matrix with small coefficients for every \(B\)
    and \(e'\) is short, the righthand side of [Equation 15.7](#fhemultfinaleqsec)
    equals \(b'Cv\) up to a short vector, and since \(Cv=bv+e\) and \(b'e\) is short,
    we get that \((C\otimes C')v\) equals \(b'bv\) plus a short vector as desired.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 但由于 \(\widehat{B}\) 是每个 \(B\) 都具有小系数的矩阵，且 \(e'\) 是短的，[方程15.7](#fhemultfinaleqsec)
    的右侧等于 \(b'Cv\) 加上一个短向量，并且由于 \(Cv=bv+e\) 且 \(b'e\) 是短的，我们得到 \((C\otimes C')v\)
    等于 \(b'bv\) 加上一个短向量，正如所期望的那样。
- en: We can now define
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在可以定义
- en: \[ \ensuremath{\mathit{ENAND}}(C,C') = I - C \otimes C' \;. \]
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: \[ \ensuremath{\mathit{ENAND}}(C,C') = I - C \otimes C' \;. \]
- en: '**Keeping track of parameters.** For \(C\) that encrypts a plaintext \(b\),
    let \(\eta(C) = \max_{i\in [n]} |Cv -bv|\). Now if we can see that if \(C\) encrypts
    \(b\) with noise \(\eta(C)\) and \(C''\) encrypts \(b''\) with noise \(\eta(C'')\),
    then \(\ensuremath{\mathit{ENAND}}(C,C'')\) will encrypt \(1-bb'' = \ensuremath{\mathit{NAND}}(b,b'')\)
    with noise of magnitude at most \(O(\mu + n\log q \mu'')\), which is smaller than
    \(n^3\cdot \max\{\eta(C),\eta(C'')\}\) for \(q\approx 2^{\sqrt{n}}\).'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '**跟踪参数。** 对于加密明文 \(b\) 的 \(C\)，令 \(\eta(C) = \max_{i\in [n]} |Cv -bv|\)。现在如果我们能看到如果
    \(C\) 使用噪声 \(\eta(C)\) 加密 \(b\)，而 \(C''\) 使用噪声 \(\eta(C'')\) 加密 \(b''\)，那么 \(\ensuremath{\mathit{ENAND}}(C,C'')\)
    将加密 \(1-bb'' = \ensuremath{\mathit{NAND}}(b,b'')\)，其噪声幅度最多为 \(O(\mu + n\log q
    \mu'')\)，这比 \(n^3\cdot \max\{\eta(C),\eta(C'')\}\) 小，对于 \(q\approx 2^{\sqrt{n}}\)。'
- en: Putting it all together
  id: totrans-72
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将所有这些放在一起
- en: We now describe the full scheme. We are going to use a quantitatively stronger
    version of LWE. Namely, the \(q(n)\)-dLWE assumption for \(q(n)=2^{\sqrt{n}}\).
    It is not hard to show that we can relax our assumption to \(q(n)\)-LWE \(q(n)=2^{polylog(n)}\)
    and Brakerski and Vaikuntanathan showed how to relax the assumption to standard
    (i.e. \(q(n)=poly(n)\)) LWE though we will not present this here.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在描述完整的方案。我们将使用一个量级更强的LWE版本。即 \(q(n)\)-dLWE假设，其中 \(q(n)=2^{\sqrt{n}}\)。不难证明我们可以将我们的假设放宽到
    \(q(n)\)-LWE \(q(n)=2^{polylog(n)}\)，Brakerski和Vaikuntanathan展示了如何将假设放宽到标准的（即
    \(q(n)=poly(n)\)）LWE，尽管我们在这里不会展示这一点。
- en: '**FHEENC:**'
  id: totrans-74
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**FHEENC：**'
- en: ''
  id: totrans-75
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Key generation:** As in the scheme of last lecture the secret key is \(s\in\Z_q^n\)
    and the public key is a generator \(G_s\) such that samples from \(G_s(1^n)\)
    are indistinguishable from independent random samples from \(\Z_q^n\) but if \(c\)
    is output by \(G_s\) then \(|\langle c,s \rangle|<\sqrt{q}\), where the inner
    product (as all other computations) is done modulo \(q\) and for every \(x\in\Z_q=\{0,\ldots,q-1\}\)
    we define \(|x|=\min \{ x, q-x \}\). As before, we can assume that \(s_1 = \floor{q/2}\)
    which implies that \((Q^\top s)_1\) is also \(\floor{q/2}\) since (as can be verified
    by direct inspection) the first row of \(Q^\top\) is \((1,0,\ldots,0)\).'
  id: totrans-76
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**密钥生成：** 如上节课的方案，秘密密钥是 \(s\in\Z_q^n\)，公钥是一个生成器 \(G_s\)，使得从 \(G_s(1^n)\) 中抽取的样本与从
    \(\Z_q^n\) 中独立随机抽取的样本不可区分，但如果 \(c\) 是由 \(G_s\) 输出的，则 \(|\langle c,s \rangle|<\sqrt{q}\)，其中内积（以及所有其他计算）是在模
    \(q\) 下进行的，并且对于每个 \(x\in\Z_q=\{0,\ldots,q-1\}\)，我们定义 \(|x|=\min \{ x, q-x \}\)。与之前一样，我们可以假设
    \(s_1 = \floor{q/2}\)，这意味着 \((Q^\top s)_1\) 也等于 \(\floor{q/2}\)，因为（可以通过直接检查验证）\(Q^\top\)
    的第一行是 \((1,0,\ldots,0)\)。'
- en: ''
  id: totrans-77
  prefs:
  - PREF_BQ
  - PREF_IND
  type: TYPE_NORMAL
- en: ''
  id: totrans-78
  prefs:
  - PREF_BQ
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Encryption:** To encrypt \(b\in\{0,1\}\), let \(d_1,\ldots,d_{n\log q} \leftarrow_R
    G_s(1^n)\) output \(C=\widehat{(bQ^\top +D)}\) where \(D\) is the matrix whose
    rows are \(d_1,\ldots,d_{n\log q}\) generated from \(G_s\). (See [Figure 15.5](#fheencfig))'
  id: totrans-79
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**加密：** 对 \(b\in\{0,1\}\) 进行加密，令 \(d_1,\ldots,d_{n\log q} \leftarrow_R G_s(1^n)\)
    输出 \(C=\widehat{(bQ^\top +D)}\)，其中 \(D\) 是由 \(G_s\) 生成的行向量 \(d_1,\ldots,d_{n\log
    q}\) 构成的矩阵。（参见[图15.5](#fheencfig)）'
- en: ''
  id: totrans-80
  prefs:
  - PREF_BQ
  - PREF_IND
  type: TYPE_NORMAL
- en: ''
  id: totrans-81
  prefs:
  - PREF_BQ
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Decryption:** To decrypt the ciphertext \(C\), we output \(0\) if \(|(\ensuremath{\mathit{CQ}}^\top
    s)_1|<0.1q\) and output \(1\) if \(0.6q>|(\ensuremath{\mathit{CQ}}^\top s)_1|>0.4q\),
    see [Figure 15.6](#fhedecfig). (It doesn’t matter what we output on other cases.)'
  id: totrans-82
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**解密：** 要解密密文 \(C\)，如果 \(|(\ensuremath{\mathit{CQ}}^\top s)_1|<0.1q\)，则输出 \(0\)；如果
    \(0.6q>|(\ensuremath{\mathit{CQ}}^\top s)_1|>0.4q\)，则输出 \(1\)，参见[图15.6](#fhedecfig)。（在其他情况下我们输出的内容无关紧要。）'
- en: ''
  id: totrans-83
  prefs:
  - PREF_BQ
  - PREF_IND
  type: TYPE_NORMAL
- en: ''
  id: totrans-84
  prefs:
  - PREF_BQ
  - PREF_IND
  type: TYPE_NORMAL
- en: '**NAND evaluation:** Given ciphertexts \(C,C''\), we define \(C \overline{\wedge}
    C''\) (sometimes also denoted as \(\ensuremath{\mathit{NANDEVAL}}(C,C'')\)) to
    equal \(I- \widehat{(\ensuremath{\mathit{CQ}}^\top)}C''\), where \(I\) is the
    \((n\log q)\times (n\log q)\) identity matrix.'
  id: totrans-85
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**NAND 评估：** 给定密文 \(C,C''\)，我们定义 \(C \overline{\wedge} C''\)（有时也记为 \(\ensuremath{\mathit{NANDEVAL}}(C,C'')\))
    等于 \(I- \widehat{(\ensuremath{\mathit{CQ}}^\top)}C''\)，其中 \(I\) 是 \((n\log q)\times
    (n\log q)\) 的单位矩阵。'
- en: Please take your time to read the definition of the scheme, and go over [Figure
    15.5](#fheencfig) and [Figure 15.6](#fhedecfig) to make sure you understand it.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 请花时间阅读方案的定义，并查看[图15.5](#fheencfig)和[图15.6](#fhedecfig)，以确保您理解它。
- en: '![](../Images/2ef0652777e734ba10de12858b375e93.png)'
  id: totrans-87
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/2ef0652777e734ba10de12858b375e93.png)'
- en: '15.5: In our fully homomorphic encryption, the public key is a trapdoor generator
    \(G_s\). To encrypt a bit \(b\), we output \(C=\widehat{(bQ^\top +D)}\) where
    \(D\) is a \((n\log q) \times n\) matrix whose rows are generated using \(G_s\).'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 15.5：在我们的全同态加密中，公钥是一个门控生成器 \(G_s\)。要加密一个比特 \(b\)，我们输出 \(C=\widehat{(bQ^\top
    +D)}\)，其中 \(D\) 是一个 \((n\log q) \times n\) 矩阵，其行向量使用 \(G_s\) 生成。
- en: '![](../Images/f2ad9603a1fa5c91aa8ac58bdfad6c7b.png)'
  id: totrans-89
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/f2ad9603a1fa5c91aa8ac58bdfad6c7b.png)'
- en: '15.6: We decrypt a ciphertext \(C=\widehat{(bQ^\top +D)}\) by looking at the
    first coordinate of \(\ensuremath{\mathit{CQ}}^\top s\) (or equivalently, \(\ensuremath{\mathit{CQ}}^\top
    Q\hat{s}\)). If \(b=0\) then this equals the first coordinate of \(Ds\), which
    is at most \(\sqrt{q}\) in magintude. If \(b=1\) then we get an extra factor of
    \(Q^\top s\) which we set to be in the interval \((0.499q,0.51q)\). We can think
    of either \(s\) or \(\hat{s}\) as our secret key.'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 15.6：我们通过查看 \(\ensuremath{\mathit{CQ}}^\top s\) 的第一个坐标（或等价地，\(\ensuremath{\mathit{CQ}}^\top
    Q\hat{s}\)）来解密密文 \(C=\widehat{(bQ^\top +D)}\)。如果 \(b=0\)，则这等于 \(Ds\) 的第一个坐标，其大小最多为
    \(\sqrt{q}\)。如果 \(b=1\)，则我们得到一个额外的 \(Q^\top s\) 因子，我们将其设置为在区间 \((0.499q,0.51q)\)
    内。我们可以将 \(s\) 或 \(\hat{s}\) 视为我们秘密密钥。
- en: Analysis of our scheme
  id: totrans-91
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我们方案的解析
- en: 'To show that that this scheme is a valid partially homomorphic scheme we need
    to show the following properties:'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 要证明这个方案是一个有效的部分同态方案，我们需要证明以下性质：
- en: '**Correctness:** The decryption of an encryption of \(b\in\{0,1\}\) equals
    \(b\).'
  id: totrans-93
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**正确性：** 对 \(b\in\{0,1\}\) 加密后的解密结果等于 \(b\)。'
- en: '**CPA security:** An encryption of \(0\) is computationally indistinguishable
    from an encryption of \(1\) to someone that got the public key.'
  id: totrans-94
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**CPA 安全性：** 对于获得公钥的人来说，加密 \(0\) 与加密 \(1\) 在计算上是不可区分的。'
- en: '**Homomorphism:** If \(C\) encrypts \(b\) and \(C''\) encrypts \(b''\) then
    \(C \overline{\wedge} C''\) encrypts \(b\; \ensuremath{\mathit{NAND}}\; b''\)
    (with a higher amount of noise). The growth of the noise will be the reason that
    we will not get immediately a fully homomorphic encryption.'
  id: totrans-95
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**同态性:** 如果 \(C\) 加密 \(b\) 且 \(C''\) 加密 \(b''\)，那么 \(C \overline{\wedge} C''\)
    加密 \(b\; \ensuremath{\mathit{NAND}}\; b''\)（噪声量更大）。噪声的增长将是我们不能立即得到完全同态加密的原因。'
- en: '**Shallow decryption circuit:** To plug this scheme into the bootstrapping
    theorem we will need to show that its decryption algorithm (or more accurately,
    the function in the statement of the bootstrapping theorem) can be evaluated in
    depth \(polylog(n)\) (independently of \(q\)), and that moreover, the noise grows
    slowly enough that our scheme is homomorphic with respect to such circuits.'
  id: totrans-96
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**浅层解密电路:** 为了将此方案插入到引导定理中，我们需要证明其解密算法（或者更准确地说，引导定理陈述中的函数）可以在深度 \(polylog(n)\)（独立于
    \(q\)）下评估，并且噪声增长足够慢，以至于我们的方案与这样的电路同态。'
- en: Once we obtain 1-4 above, we can plug FHEENC into the Bootstrapping Theorem
    ([Theorem 14.8](lec_15_FHE.html#bootstrapthm)) and thus complete the proof of
    existence of a fully homomorphic encryption scheme. We now address those points
    one by one.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我们获得了上述 1-4，我们就可以将 FHEENC 插入到引导定理（[定理 14.8](lec_15_FHE.html#bootstrapthm)）中，从而完成完全同态加密方案存在性的证明。我们现在逐一讨论这些点。
- en: Correctness
  id: totrans-98
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 正确性
- en: 'Correctness of the scheme will follow from the following stronger condition:'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 方案的正确性将遵循以下更强的条件：
- en: For every \(b \in \{0,1\}\), if \(C\) is the encryption of \(b\) then it is
    an \((n\log q)\times (n \log q)\) matrix satisfying
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 对于每个 \(b \in \{0,1\}\)，如果 \(C\) 是 \(b\) 的加密，那么它是一个 \((n\log q)\times (n \log
    q)\) 矩阵，满足
- en: \[\ensuremath{\mathit{CQ}}^\top s = bQ^\top s + e\]where \(\max |e_i| \ll \sqrt{q}\).
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: \[\ensuremath{\mathit{CQ}}^\top s = bQ^\top s + e\]其中 \(\max |e_i| \ll \sqrt{q}\).
- en: 'For starters, let us see that the dimensions make sense: the encryption of
    \(b\) is computed by \(C=\widehat{(bQ^\top +D)}\) where \(D\) is an \((n\log q)\times
    n\) matrix satisfying \(|Ds|_i \leq \sqrt{q}\) for every \(i\).'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们看看这些维度是否合理：\(b\) 的加密是通过 \(C=\widehat{(bQ^\top +D)}\) 来计算的，其中 \(D\) 是一个
    \((n\log q)\times n\) 矩阵，满足对于每个 \(i\)，\(|Ds|_i \leq \sqrt{q}\)。
- en: Since \(Q^\top\) is also an \((n \log q) \times n\) matrix, adding \(bQ^\top\)
    (i.e. either \(Q^\top\) or the all-zeroes matrix, depending on whether or not
    \(b=1\)) to \(D\) makes sense and applying the \(\hat{\cdot}\) operation will
    transform every row to length \(n\log q\) and hence \(C\) is indeed a square \((n\log
    q)\times (n \log q)\) matrix.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 由于 \(Q^\top\) 也是一个 \((n \log q) \times n\) 矩阵，将 \(bQ^\top\)（即 \(Q^\top\) 或全零矩阵，取决于
    \(b\) 是否为 1）加到 \(D\) 上是有意义的，并且应用 \(\hat{\cdot}\) 操作将每一行转换为长度 \(n\log q\)，因此 \(C\)
    确实是一个 \((n\log q)\times (n \log q)\) 的方阵。
- en: Let us now see what this matrix \(C\) does to the vector \(v=Q^\top s\). Using
    the fact that \(\hat{M}Q^\top = M\) for every matrix \(M\), we get that
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看这个矩阵 \(C\) 对向量 \(v=Q^\top s\) 做了什么。利用 \(\hat{M}Q^\top = M\) 对于每个矩阵 \(M\)
    都成立的事实，我们得到，
- en: \[Cv = (bQ^\top + D) s = bv+ Ds\]but by construction \(|(Ds)_i| \leq \sqrt{q}\)
    for every \(i\).
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: \[Cv = (bQ^\top + D) s = bv+ Ds\]但通过构造，\(|(Ds)_i| \leq \sqrt{q}\) 对于每个 \(i\)
    都成立。
- en: '[Lemma 15.5](#fhecorrectlem) implies correctness of decryption since by construction
    we ensured that \((Q^\top s)_1 \in (0.499q,0.5001q)\) and hence we get that if
    \(b=0\) then \(|(Cv)_1|=o(q)\) and if \(b=1\) then \(0.499q-o(q) \leq |(C_v)_1|
    \leq 0.501q + o(q)\).'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: '[引理 15.5](#fhecorrectlem) 表明解密的正确性，因为通过构造我们确保了 \((Q^\top s)_1 \in (0.499q,0.5001q)\)，因此我们得到，如果
    \(b=0\)，则 \(|(Cv)_1|=o(q)\)，如果 \(b=1\)，则 \(0.499q-o(q) \leq |(C_v)_1| \leq 0.501q
    + o(q)\)。'
- en: CPA Security
  id: totrans-107
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: CPA 安全性
- en: To show CPA security we need to show that an encryption of \(0\) is indistinguishable
    from an encryption of \(1\). However, by the security of the trapdoor generator,
    an encryption of \(b\) computed according to our algorithm will be indistinguishable
    from an encryption of \(b\) obtained when the matrix \(D\) is a random \((n\log
    q)\times n\) matrix. Now in this case the encryption is obtained by applying the
    \(\hat{\cdot}\) operation to \(bQ^\top +D\) but if \(D\) is uniformly random then
    for every choice of \(b\), \(bQ^\top + D\) is uniformly random (since a fixed
    matrix plus a random matrix yields a random matrix) and hence the matrix \(bQ^\top
    + D\) (and so also the matrix \(\widehat{bQ^\top+D}\)) contains no information
    about \(b\). This completes the proof of CPA security (can you see why?).
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 为了证明 CPA 安全性，我们需要证明 \(0\) 的加密与 \(1\) 的加密是不可区分的。然而，根据陷门生成器的安全性，根据我们的算法计算出的 \(b\)
    的加密将与当矩阵 \(D\) 是一个随机的 \((n\log q)\times n\) 矩阵时获得的 \(b\) 的加密不可区分。在这种情况下，加密是通过将
    \(\hat{\cdot}\) 操作应用于 \(bQ^\top +D\) 来获得的，但如果 \(D\) 是均匀随机的，那么对于 \(b\) 的每个选择，\(bQ^\top
    + D\) 都是均匀随机的（因为一个固定矩阵加上一个随机矩阵会产生一个随机矩阵），因此矩阵 \(bQ^\top + D\)（以及因此矩阵 \(\widehat{bQ^\top+D}\)）不包含关于
    \(b\) 的任何信息。这完成了 CPA 安全性的证明（你能看到为什么吗？）。
- en: If we want to plug in this scheme in the bootstrapping theorem, then we will
    also assume that it is *circular secure*. It seems a reasonable assumption though
    unfortuantely at the moment we do not know how to derive it from LWE. (If we don’t
    want to make this assumption we can still obtained a *leveled* fully homomorphic
    encryption as discussed in the previous lecture.)
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们想将此方案插入到自举定理中，那么我们还将假设它是 *循环安全的*。虽然这是一个合理的假设，但遗憾的是，目前我们不知道如何从 LWE 中推导出它。（如果我们不想做出这个假设，我们仍然可以像前一次讲座中讨论的那样获得一个
    *分层*完全同态加密。）
- en: Homomorphism
  id: totrans-110
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 同态
- en: 'Let \(v=Q^\top s\), \(b\in\{0,1\}\) and \(C\) be a ciphertext such that \(Cv
    = bv + e\). We define the *noise* of \(C\), denoted as \(\mu(C)\) to be the maximum
    of \(|e_i|\) over all \(i\in[n\log q]\). We make the following lemma, which we’ll
    call the “noisy homomorphism lemma”:'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 设 \(v=Q^\top s\)，\(b\in\{0,1\}\) 且 \(C\) 是一个满足 \(Cv = bv + e\) 的密文。我们定义 \(C\)
    的 *噪声*，记为 \(\mu(C)\)，为所有 \(i\in[n\log q]\) 上 \(|e_i|\) 的最大值。我们提出以下引理，我们将其称为“噪声同态引理”：
- en: Let \(C,C'\) be ciphertexts encrypting \(b,b'\) respectively with \(\mu(C),\mu(C')\leq
    q/4\). Then \(C''=C \overline{\wedge} C'\) encrypts \(b\; \ensuremath{\mathit{NAND}}\;
    b'\) and satisfies
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 设 \(C,C'\) 分别是加密 \(b,b'\) 的密文，且 \(\mu(C),\mu(C')\leq q/4\)。那么 \(C''=C \overline{\wedge}
    C'\) 加密 \(b\; \ensuremath{\mathit{NAND}}\; b'\) 并满足
- en: \[\mu(C'') \leq (2n\log q)\max\{ \mu(C), \mu(C') \} \;\;(15.8)\]
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: \[\mu(C'') \leq (2n\log q)\max\{ \mu(C), \mu(C') \} \;\;(15.8)\]
- en: This follows from the calculations we have done before. As we’ve seen,
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 这是从我们之前所做的计算中得出的。正如我们所看到的，
- en: \[\widehat{CQ^\top}C'v = \widehat{CQ^\top}(b'v+e') = b'\widehat{CQ^\top}Q^\top
    s + \widehat{CQ^\top}e' = b'(Cv)+ \widehat{CQ^\top}e' = bb'v + b'e+ \widehat{CQ^\top}e'\]But
    since \(\widehat{CQ^\top}\) is a \(0/1\) matrix with every row of length \(n\log
    q\), for every \(i\) \((\widehat{CQ^\top}e')_i \leq (n\log q)\max_j |e_j'|\).
    We see that the noise vector in the product has magnitude at most \(\mu(C)+n\log
    q \mu(C')\). Adding the identity for the NAND operation adds at most \(\mu(C)+\mu(C')\)
    to the noise, and so the total noise magnitude is bounded by the righthand side
    of [Equation 15.8](#eqnoisebound).
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: \[\widehat{CQ^\top}C'v = \widehat{CQ^\top}(b'v+e') = b'\widehat{CQ^\top}Q^\top
    s + \widehat{CQ^\top}e' = b'(Cv)+ \widehat{CQ^\top}e' = bb'v + b'e+ \widehat{CQ^\top}e'\]但既然
    \(\widehat{CQ^\top}\) 是一个每行长度为 \(n\log q\) 的 \(0/1\) 矩阵，对于每个 \(i\) \((\widehat{CQ^\top}e')_i
    \leq (n\log q)\max_j |e_j'|\)。我们看到在乘积中的噪声向量的幅度最多为 \(\mu(C)+n\log q \mu(C')\)。添加
    NAND 操作的恒等式最多将 \(\mu(C)+\mu(C')\) 添加到噪声中，因此总噪声幅度被限制在 [方程 15.8](#eqnoisebound)
    的右侧。
- en: Shallow decryption circuit
  id: totrans-116
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 浅解密电路
- en: Recall that to plug in our homomorphic encryption scheme into the bootstrapping
    theorem, we needed to show that for every ciphertext \(C\) (generated by the encryption
    algorithm) the function \(f_C:\{0,1\}^{n \log q} \rightarrow \{0,1\}\) can be
    computed by a circuit of sufficiently shallow, where \(f_C\) is defined as
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 回想一下，为了将我们的同态加密方案插入到自举定理中，我们需要证明对于每个密文 \(C\)（由加密算法生成），函数 \(f_C:\{0,1\}^{n \log
    q} \rightarrow \{0,1\}\) 可以通过一个足够浅的电路来计算，其中 \(f_C\) 定义为
- en: \[f_C(d) = D_d(C)\]where \(d\) is the secret key and \(D_d(C)\) denotes the
    decryption algorithm applied to \(C\).
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: \[f_C(d) = D_d(C)\]，其中 \(d\) 是密钥，\(D_d(C)\) 表示应用于 \(C\) 的解密算法。
- en: In our case a circuit of \(polylog(n) \ll n^5\) will be “sufficiently shallow”.
    Specifically, by repeatedly applying the noisy homomorphism lemma ([Lemma 15.6](#noisehomolem)),
    we can show that can homorphically evaluate every circuit of NAND gates whose
    *depth* \(\ell\) satisfies the condition \((2n\log q)^\ell \ll q\). If \(q = 2^{\sqrt{n}}\)
    then (assuming \(n\) is sufficiently large) as long as \(\ell < n^{0.49}\) this
    will be satisfied.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的情况下，一个 \(polylog(n) \ll n^5\) 的电路将“足够浅”。具体来说，通过反复应用噪声同态引理（[引理 15.6](#noisehomolem)），我们可以证明可以同态评估每个满足条件
    \((2n\log q)^\ell \ll q\) 的 *深度* \(\ell\) 的 NAND 电路。如果 \(q = 2^{\sqrt{n}}\)（假设
    \(n\) 足够大），只要 \(\ell < n^{0.49}\)，这个条件就会得到满足。
- en: We will encode the secret key of the encryption scheme as the binary string
    \(\hat{s}\) which describes our vector \(s \in Z_q^n\) as a bit string of length
    \(n\log q\). Given a ciphertext \(C\), the decryption algorithm takes the dot
    product modulo \(q\) of \(s\) with the first row of \(\ensuremath{\mathit{CQ}}^\top\).
    This can be equivalently described as taking the dot product of \(\hat{s}\) with
    the first row of \(\ensuremath{\mathit{CQ}}^\top Q\). Decryption outputs \(0\)
    (respectively \(1\)) if the resulting number is small (respectively large).
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将加密方案的密钥编码为二进制字符串 \(\hat{s}\)，它描述了我们的向量 \(s \in Z_q^n\) 作为长度为 \(n\log q\)
    的位字符串。给定一个密文 \(C\)，解密算法计算 \(s\) 与 \(\ensuremath{\mathit{CQ}}^\top\) 的第一行的点积模 \(q\)。这可以等价地描述为计算
    \(\hat{s}\) 与 \(\ensuremath{\mathit{CQ}}^\top Q\) 的第一行的点积。如果结果数值小（分别大），解密输出 \(0\)（分别
    \(1\)）。
- en: In particular to show that \(f_C(\cdot)\) can be homomorphically evaluated it
    will suffice to show that for every fixed vector \(c\in \Z_q^{n\log q}\) there
    is a \(polylog(n) \ll n^{0.49}\) depth circuit \(F\) that on input a string \(\hat{s}\in\{0,1\}^{n
    \log q}\) will output \(0\) if \(|\langle c,\hat{s \rangle}| < q/10\) and output
    \(1\) if \(|\langle c,\hat{s \rangle}| > q/5\). (We don’t care what \(F\) does
    otherwise.) The above suffices since given a ciphertext \(C\) we can use \(F\)
    with the vector \(c\) being the top row of \(\ensuremath{\mathit{CQ}}^\top Q\),
    and hence \(\langle c,\hat{s} \rangle\) would correspond to the first entry of
    \(\ensuremath{\mathit{CQ}}^\top s\).
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 尤其是为了证明 \(f_C(\cdot)\) 可以同构地评估，只需证明对于每个固定的向量 \(c\in \Z_q^{n\log q}\)，存在一个 \(polylog(n)
    \ll n^{0.49}\) 深度的电路 \(F\)，在输入字符串 \(\hat{s}\in\{0,1\}^{n \log q}\) 时，如果 \(|\langle
    c,\hat{s \rangle}| < q/10\) 则输出 \(0\)，如果 \(|\langle c,\hat{s \rangle}| > q/5\)
    则输出 \(1\)。 (我们不在乎 \(F\) 其他情况下做什么。) 上面的条件是充分的，因为给定一个密文 \(C\)，我们可以使用 \(F\) 和向量 \(c\)，其中
    \(c\) 是 \(\ensuremath{\mathit{CQ}}^\top Q\) 的顶部行，因此 \(\langle c,\hat{s} \rangle\)
    将对应于 \(\ensuremath{\mathit{CQ}}^\top s\) 的第一个元素。
- en: Please make sure you understand the above argument.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 请确保你理解上述论点。
- en: If \(c=(c_1,\ldots,c_{n\log q})\) is a vector then to compute its inner product
    with a \(0/1\) vector \(\hat{s}\) we simply need to sum up the numbers \(c_i\)
    where \(\hat{s}_i=1\). Summing up \(m\) numbers can be done via the obvious recursion
    in depth that is \(\log m\) times the depth for a single addition of two numbers.
    However, the naive way to add two numbers in \(\Z_q\) (each represented by \(\log
    q\) bits) will have depth \(O(\log q)\) which is too much for us. The issue is
    that while \(m = n\log q\) is polynomial in \(n\), \(q\) itself has *exponential*
    magnitude. In particular \(\log q \approx \sqrt{n}\), and we cannot afford to
    use a circuit of that depth.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 如果 \(c=(c_1,\ldots,c_{n\log q})\) 是一个向量，那么要计算它与 \(0/1\) 向量 \(\hat{s}\) 的内积，我们只需将
    \(c_i\) 中 \(\hat{s}_i=1\) 的数字相加。求和 \(m\) 个数字可以通过明显的递归深度来完成，即单个两个数加法的深度的 \(\log
    m\) 倍。然而，在 \(\Z_q\) 中（每个数表示为 \(\log q\) 位）加两个数的朴素方法将具有深度 \(O(\log q)\)，这对我们来说太多了。问题在于，虽然
    \(m = n\log q\) 是 \(n\) 的多项式，但 \(q\) 本身具有 *指数级* 的量级。特别是 \(\log q \approx \sqrt{n}\)，我们无法承担使用那个深度的电路。
- en: Please stop here and see if you understand why the natural circuit to compute
    the addition of two numbers modulo \(q\) (represented as \(\log q\)-length binary
    strings) will require depth \(O(\log q)\). As a hint, one needs to keep track
    of the “carry”.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: '请在这里停下来，看看你是否理解为什么计算两个数模 \(q\) 的加法（表示为 \(\log q\) 长度的二进制字符串）的自然电路将需要深度 \(O(\log
    q)\)。作为一个提示，需要跟踪“进位”。 '
- en: Fortunately, because we only care about accuracy up to \(q/10\), we can make
    the calculation “shallower”. Specifically, if we add \(m\) numbers in \(\Z_q\)
    (each represented by \(\log q\) bits), we can drop all but the first \(100\log
    m\) most significant digits of our numbers. The reason is that dropping this can
    change each number by at most \((q/m^{100})\), and so if we ignore these digits,
    then it would change the sum of the \(m\) numbers by at most \(m(q/m^{100}) \ll
    q\). Hence we can easily do this work in \(poly(\log m)\) depth, which is \(poly(\log
    n)\) since \(m=poly(n)\).
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是，因为我们只关心精确到 \(q/10\)，我们可以使计算“更浅”。具体来说，如果我们向 \(\Z_q\) 中添加 \(m\) 个数（每个数用 \(\log
    q\) 位表示），我们可以丢弃这些数的除了前 \(100\log m\) 个最高有效位之外的所有位。原因是丢弃这些位最多可以改变每个数 \((q/m^{100})\)，因此如果我们忽略这些位，那么它最多会改变
    \(m\) 个数的和 \(m(q/m^{100}) \ll q\)。因此，我们可以很容易地在 \(poly(\log m)\) 的深度内完成这项工作，由于
    \(m=poly(n)\)，所以这也是 \(poly(\log n)\)。
- en: 'Let us now show this more formally:'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们现在更正式地展示这一点：
- en: 'For every \(c\in\Z_q^m\) there exists some function \(f:\{0,1\}^m\rightarrow\{0,1\}\)
    such that:'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 对于每个 \(c\in\Z_q^m\)，存在某个函数 \(f:\{0,1\}^m\rightarrow\{0,1\}\) 使得：
- en: For every \(\hat{s}\in \{0,1\}^n\) such that \(|\langle \hat{s},c \rangle|<0.1q\),
    \(f(\hat{s})=0\)
  id: totrans-128
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对于每个 \(\hat{s}\in \{0,1\}^n\)，使得 \(|\langle \hat{s},c \rangle|<0.1q\)，\(f(\hat{s})=0\)
- en: For every \(\hat{s}\in \{0,1\}^n\) such that \(0.4q<|\langle \hat{s},c \rangle|<0.6q\),
    \(f(\hat{s})=1\)
  id: totrans-129
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对于每个 \(\hat{s}\in \{0,1\}^n\)，使得 \(0.4q<|\langle \hat{s},c \rangle|<0.6q\)，\(f(\hat{s})=1\)
- en: There is a circuit computing \(f\) of depth at most \(100(\log m)^3\).
  id: totrans-130
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 存在一个深度不超过 \(100(\log m)^3\) 的电路来计算 \(f\)。
- en: '::: {.proof data-ref=“decdepthlem”} For every number \(x\in\Z_q\), define \(\tilde{x}\)
    to be the number that is obtained by writing \(x\) in the binary basis and setting
    all digits except the \(10\log m\) most significant ones to zero. Note that \(\tilde{x}
    \leq x \leq \tilde{x} + q/m^{10}\). The idea is that we will do the calculation
    by changing every number \(c_i\) and the modulos \(q\) into their correponding
    numbers \(\tilde{c}_i\) and \(\tilde{q}\).'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: '::: {.proof data-ref=“decdepthlem”} 对于每个数 \(x\in\Z_q\)，定义 \(\tilde{x}\) 为将
    \(x\) 写成二进制形式并将除了最高 \(10\log m\) 位以外的所有位设置为零得到的数。注意 \(\tilde{x} \leq x \leq \tilde{x}
    + q/m^{10}\)。其思路是我们将通过改变每个数 \(c_i\) 和模数 \(q\) 为它们对应的数 \(\tilde{c}_i\) 和 \(\tilde{q}\)
    来进行计算。'
- en: We define \(f(\hat{s})\) to equal \(1\) if \(|\sum \hat{s}_i \tilde{c}_i \pmod
    {\tilde{q}}| \geq 0.3\tilde{q}\) and to equal \(0\) otherwise (where as usual
    the absolute value of \(x\) modulo \(\tilde{q}\) is the minimum of \(x\) and \(\tilde{q}-x\).)
    All numbers involved have zeroes in all but the \(10\log m\) most significant
    digits and so these less significant digits can be ignored. Hence we can add any
    pair of such numbers modulo \(\tilde{q}\) in depth \(O(\log m)^2\) using the standard
    elementary school algorithm to add two \(\ell\)-digit numbers in \(O(\ell^2)\)
    steps.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 我们定义 \(f(\hat{s})\) 等于 \(1\)，如果 \(|\sum \hat{s}_i \tilde{c}_i \pmod {\tilde{q}}|
    \geq 0.3\tilde{q}\)，否则等于 \(0\)（其中，如通常情况，\(x\) 模 \(\tilde{q}\) 的绝对值是 \(x\) 和 \(\tilde{q}-x\)
    中的最小值。所有涉及的数除了最高 \(10\log m\) 位外都包含零，因此可以忽略这些更低的位。因此，我们可以使用标准的算术学校算法在 \(O(\log
    m)^2\) 的深度内将任何这样的数的成对相加模 \(\tilde{q}\)。
- en: Now we can add the \(m\) numbers by adding pairs, and then adding up the results,
    and this way in a binary tree of depth \(\log m\) to get a total depth of \(O(\log
    m)^3\). So, all that is left to prove is that this function \(f\) satisfies the
    conditions (1) and (2).
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们可以通过添加成对的方式将 \(m\) 个数相加，然后将结果相加，这样在深度为 \(\log m\) 的二叉树中得到总深度为 \(O(\log
    m)^3\)。所以，剩下要证明的是这个函数 \(f\) 满足条件（1）和（2）。
- en: If we look at the *non modular* sum then \(|\sum \hat{s}_i \tilde{c}_i - \sum
    \hat{s}_i c_i | < mq/m^{10} = q/m^9\) so now we want to show that the effect of
    taking modulo \(\tilde{q}\) is not much different from taking modulo \(q\). Indeed,
    note that this sum (before a modular reduction) is an integer between \(0\) and
    \(qm\). If \(x\) is such an integer and we divide \(x\) by \(q\) to write \(x
    = kq+ r\) for \(r<q\), then since \(x<qm\), \(k<m\), and so we can write \(x =
    k\tilde{q} + k(q-\tilde{q})+r\) so the difference between \(k \mod q\) and \(k
    \mod{\tilde{q}}\) will be (in our standard modular metric) at most \(mq/m^{10}=q/m^9\).
    Overall we get that if \(\sum \hat{s}_i c_i \mod{q}\) is in the interval \([0.4q,
    0.6q]\) then \(\sum \hat{s}_i \tilde{c}_i \pmod{\tilde{q}}\) will be in the interval
    \([0.4q-100q/m^9, 0.6q+100q/m^9]\) which is contained in \([0.3\tilde{q},0.7\tilde{q}]\).
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们考虑非模加和，那么 \(|\sum \hat{s}_i \tilde{c}_i - \sum \hat{s}_i c_i | < \frac{mq}{m^{10}}
    = \frac{q}{m^9}\)，因此现在我们想要证明取模 \(\tilde{q}\) 的影响与取模 \(q\) 并没有太大的不同。实际上，注意这个和（在模减之前）是一个介于
    \(0\) 和 \(qm\) 之间的整数。如果 \(x\) 是这样一个整数，并且我们将 \(x\) 除以 \(q\) 来写成 \(x = kq + r\)（其中
    \(r < q\)），那么由于 \(x < qm\)，\(k < m\)，因此我们可以写成 \(x = k\tilde{q} + k(q - \tilde{q})
    + r\)，所以 \(k \mod q\) 和 \(k \mod \tilde{q}\) 之间的差异（在我们的标准模度量中）最多是 \(\frac{mq}{m^{10}}
    = \frac{q}{m^9}\)。总的来说，我们得到如果 \(\sum \hat{s}_i c_i \mod q\) 在区间 \([0.4q, 0.6q]\)
    内，那么 \(\sum \hat{s}_i \tilde{c}_i \pmod{\tilde{q}}\) 将在区间 \([0.4q - \frac{100q}{m^9},
    0.6q + \frac{100q}{m^9}]\) 内，这包含在 \([0.3\tilde{q}, 0.7\tilde{q}]\) 内。
- en: This completes the proof that our scheme can fit into the bootstrapping theorem
    (i.e., of [Theorem 15.1](#LWEFHEthm)), hence completing the description of the
    fully homomorphic encryption scheme.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 这完成了证明我们的方案可以适应自举定理（即 [定理 15.1](#LWEFHEthm)），从而完成了完全同态加密方案的描述。
- en: Now would be a good point to go back and see you understand how all the pieces
    fit together to obtain the complete construction of the fully homomorphic encryption
    scheme.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 现在是回顾并确认你是否理解所有部分如何组合在一起以获得完全同态加密方案完整构造的好时机。
- en: 'Advanced topics:'
  id: totrans-137
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 高级主题：
- en: 'Fully homomorphic encryption for approximate computation over the real numbers:
    [CKKS](https://eprint.iacr.org/2016/421.pdf)'
  id: totrans-138
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在实数上进行的近似计算的全同态加密：[CKKS](https://eprint.iacr.org/2016/421.pdf)
- en: We have seen how a fully homomorphic encryption for a plaintext bit \(b\) can
    be constructed and we are able to evaluate addition and multiplication of ciphertexts
    as well as a NAND gate in the ciphertext space. One can also extend FHEENC scheme
    to encrypt a plaintext message \(\mu \in \Z_q\) and can evaluate multi-bit integer
    additions and multiplications more efficiently. Our next following question would
    be floating/fixed point operations. They are similar to integer operations, but
    we need to be able to evaluate a rounding operation following every computation.
    Unfortunately, it has been considered difficult to evaluate the rounding operation
    ensuring the correctness property. An easier solution is to assume approximate
    computations from the beginning and embrace errors caused by them.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经看到如何构建一个明文比特 \(b\) 的全同态加密，并且我们能够评估密文空间中的加法和乘法以及一个 NAND 门。一个人也可以将 FHEENC
    方案扩展到加密明文消息 \(\mu \in \Z_q\)，并且可以更有效地评估多比特整数的加法和乘法。我们接下来的问题是浮点/定点运算。它们与整数运算类似，但我们需要在每次计算之后能够评估一个舍入操作。不幸的是，评估舍入操作以确保正确性属性被认为是很困难的。一个更简单的解决方案是从一开始就假设近似计算并接受由此产生的错误。
- en: CKKS scheme, one of the recent schemes, addressed this challenge by allowing
    small errors in the decrypted results. Its correctness property is more relaxed
    than what we’ve seen before. Now decryption does not necessarily be precisely
    the original message, and indeed, this resolved the rounding operation problem
    supporting approximate computation over the real numbers. To get more sense on
    its construction, recall that when we decrypt a ciphertext in the FHEENC scheme,
    we have \(\ensuremath{\mathit{CQ}}^\top s = bQ^\top s + e\) where \(\max |e_i|
    \ll \sqrt{q}\). Since \((Q^\top s)_1 \in (0.499q, 0.5001q)\), multiplying by this
    term places a plaintext bit near the most significant bits of the ciphertext where
    the plaintext cannot be polluted by the encryption noise. Therefore, we are able
    to precisely remove the noise \(e\) we added for the security. However, this kind
    of separated placement actually makes an evaluation of the rounding operation
    difficult. On the other hand, the CKKS scheme doesn’t clearly separate the plaintext
    message and noise in its decryption structure. Specifically, we have the form
    of \(c^\top s = m + e\) and the noise lies with the LSB part of the message and
    does pollute the lowest bits of the message. Note that this is acceptable as long
    as it preserves enough precision. Now we can evaluate rounding(i.e., rescaling
    in the paper) homomorphically, by dividing both a ciphertext \(c\) and the parameter
    \(q\) by some factor \(p\). The concept of handling ciphertexts with a different
    encryption parameter \(q'=q/p\) is already known to be possible. You can find
    more details on this modulus switching technique in this [paper](https://eprint.iacr.org/2011/277.pdf)
    if you are interested. Besides, it is also proved that the precision loss of the
    decrypted evaluation result is at most one more bit loss compared to the plaintext
    computation result, which means the scheme’s precision guarantee is nearly optimal.
    This scheme offers an efficient homomorphic encryption setting for many practical
    data science and machine learning applications which does not require precise
    values, but approximate ones. You may check existing open source libraries, such
    as [MS SEAL](https://www.microsoft.com/en-us/research/project/microsoft-seal/)
    and [HEAAN](https://github.com/snucrypto/HEAAN), of this scheme as well as many
    practical applications including [logistic regression](https://eprint.iacr.org/2018/254.pdf)
    in the literature.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: CKKS方案，作为最近提出的方案之一，通过允许解密结果存在小误差来应对这一挑战。其正确性属性比我们之前看到的更为宽松。现在解密结果不必精确地是原始消息，实际上，这解决了支持实数近似计算的舍入操作问题。为了更好地理解其构造，回想一下，当我们使用FHEENC方案解密密文时，我们有
    \(\ensuremath{\mathit{CQ}}^\top s = bQ^\top s + e\) 其中 \(\max |e_i| \ll \sqrt{q}\)。由于
    \((Q^\top s)_1 \in (0.499q, 0.5001q)\)，乘以这个项将明文位放置在密文的最重要位附近，这样明文就不会被加密噪声所污染。因此，我们能够精确地移除我们为了安全添加的噪声
    \(e\)。然而，这种分离的放置实际上使得舍入操作的评估变得困难。另一方面，CKKS方案在其解密结构中并没有明确分离明文消息和噪声。具体来说，我们有 \(c^\top
    s = m + e\) 的形式，噪声位于消息的最低有效位部分，并且确实会污染消息的最低位。请注意，只要它保留足够的精度，这是可以接受的。现在我们可以通过将密文
    \(c\) 和参数 \(q\) 都除以某个因子 \(p\) 来同态地评估舍入（即论文中的缩放）。处理具有不同加密参数 \(q'=q/p\) 的密文的概念已经众所周知是可行的。如果您对此感兴趣，可以在[这篇论文](https://eprint.iacr.org/2011/277.pdf)中找到更多关于这种模数切换技术的细节。此外，还证明了解密评估结果的精度损失最多比明文计算结果多一位，这意味着该方案的精度保证几乎是最佳的。该方案为许多实际的数据科学和机器学习应用提供了一个高效的同态加密设置，这些应用不需要精确值，而只需要近似值。您可以检查现有的开源库，如[MS
    SEAL](https://www.microsoft.com/en-us/research/project/microsoft-seal/)和[HEAAN](https://github.com/snucrypto/HEAAN)，以及该方案的许多实际应用，包括文献中的[逻辑回归](https://eprint.iacr.org/2018/254.pdf)。
- en: Bandwidth efficient fully homomorphic encryption [GH](https://eprint.iacr.org/2019/733.pdf)
  id: totrans-141
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 带宽高效的完全同态加密 [GH](https://eprint.iacr.org/2019/733.pdf)
- en: When we define homomorphic encryption in [Definition 14.3](lec_15_FHE.html#partialhomdef),
    we only consider a class of single-output functions \(\mathcal{F}\). Now we want
    to extend the difinition to multiple-output function and consider how bandwidth-efficient
    the fully homomorphic encryption can be. More specifically, if we want to guarantee
    that the result of decryption is (or contains) \(f(x_1,\ldots,x_\ell)\), what
    will be the minimal possible length of the ciphertext? Let us first define the
    compressible fully homomorphic encryption scheme.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们定义同态加密时 [定义 14.3](lec_15_FHE.html#partialhomdef)，我们只考虑一类单输出函数 \(\mathcal{F}\)。现在我们想将定义扩展到多输出函数，并考虑全同态加密的带宽效率。更具体地说，如果我们想保证解密结果是（或包含）\(f(x_1,\ldots,x_\ell)\)，密文的最小可能长度是多少？让我们首先定义可压缩全同态加密方案。
- en: 'A *compressible fully homomorphic public key encryption scheme* is a CPA secure
    public key encryption scheme \((G,E,D)\) such that there exist polynomial-time
    algorithms \(\ensuremath{\mathit{EVAL}}, \ensuremath{\mathit{COMP}}:{0,1}^* \rightarrow
    {0,1}^*\) such that for every \((e,d)=G(1^n)\), \(\ell=poly(n)\), \(x_1,\ldots,x_\ell
    \in \{0,1\}\), and \(f:\{0,1\}^\ell\rightarrow \{0,1\}^*\) which can be described
    by a circuit, it holds that:'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 一个 *可压缩全同态公钥加密方案* 是一个 CPA 安全的公钥加密方案 \((G,E,D)\)，其中存在多项式时间算法 \(\ensuremath{\mathit{EVAL}},
    \ensuremath{\mathit{COMP}}:{0,1}^* \rightarrow {0,1}^*\)，使得对于每一个 \((e,d)=G(1^n)\)，\(\ell=poly(n)\)，\(x_1,\ldots,x_\ell
    \in \{0,1\}\)，以及 \(f:\{0,1\}^\ell\rightarrow \{0,1\}^*\) 可以由一个电路描述，则满足：
- en: \(c=\ensuremath{\mathit{EVAL}}_e(f,E_e(x_1),\ldots,E_e(x_\ell))\).
  id: totrans-144
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: \(c=\ensuremath{\mathit{EVAL}}_e(f,E_e(x_1),\ldots,E_e(x_\ell))\).
- en: \(c^*=\ensuremath{\mathit{COMP}}(c)\).
  id: totrans-145
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: \(c^*=\ensuremath{\mathit{COMP}}(c)\).
- en: \(f(x_1,\ldots,x_\ell)\) is a prefix of \(D_d(c^*)\).
  id: totrans-146
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: \(f(x_1,\ldots,x_\ell)\) 是 \(D_d(c^*)\) 的前缀。
- en: 'This definition is similar to the standard fully homomorphic encryption except
    an additional compression step. The bandwidth efficiency of a compressible fully
    homomorphic encryption is often described by the rate which is defined as follows:'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 这个定义与标准全同态加密类似，除了增加了一个压缩步骤。可压缩全同态加密的带宽效率通常用速率来描述，其定义如下：
- en: A compressible fully homomorphic public key encryption scheme has *rate* \(\alpha=\alpha(n)\)
    if for every \((e,d)=G(1^n)\), \(\ell=poly(n)\), \(x_1,\ldots,x_\ell \in \{0,1\}\),
    and \(f:\{0,1\}^\ell\rightarrow \{0,1\}^*\) with sufficiently long output, it
    holds that
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 一个可压缩的全同态公钥加密方案具有 *速率* \(\alpha=\alpha(n)\)，如果对于每一个 \((e,d)=G(1^n)\)，\(\ell=poly(n)\)，\(x_1,\ldots,x_\ell
    \in \{0,1\}\)，以及 \(f:\{0,1\}^\ell\rightarrow \{0,1\}^*\) 具有足够长的输出，则满足
- en: \[\alpha |c^*|\leq |f(x_1,\ldots,x_\ell)|.\]
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: \[\alpha |c^*|\leq |f(x_1,\ldots,x_\ell)|.\]
- en: The following theorem by [Gentry and Halevi 2019](https://eprint.iacr.org/2019/733.pdf)
    answers the earlier question, which states that the nearly optimal rate, say a
    rate arbitrarily close to 1, can be achieved.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: '[Gentry 和 Halevi 2019](https://eprint.iacr.org/2019/733.pdf) 的以下定理回答了早期的问题，即几乎最优的速率，即任意接近
    1 的速率，是可以实现的。'
- en: For any \(\epsilon>0\), there exists a compressive fully homomorphic encryption
    scheme with rate being \(1-\epsilon\) under the LWE assumption.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 对于任何 \(\epsilon>0\)，在 LWE 假设下，存在一个速率是 \(1-\epsilon\) 的压缩全同态加密方案。
- en: Using fully homomorphic encryption to achieve private information retrieval.
  id: totrans-152
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用全同态加密来实现私有信息检索。
- en: Private information retrieval (PIR) allows the client to retrive the \(i\)-th
    entry of a database which has totally \(n\) entries without letting the server
    know \(i\). We only consider the single-server case here. Obviously, a trivial
    solution is that the server sends the entire database to the client.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 私有信息检索（PIR）允许客户端检索具有总共 \(n\) 个条目的数据库的第 \(i\) 个条目，而无需让服务器知道 \(i\)。在这里，我们只考虑单服务器的情况。显然，一个简单的解决方案是服务器将整个数据库发送给客户端。
- en: One simple case of PIR is that each entry is a bit, for which the trivial solution
    above has the communication complexity being \(n\). [Kushilevitz and Ostrovsky
    1997](https://web.cs.ucla.edu/~rafail/PUBLIC/34.pdf) reduced the the complexity
    to be smaller than \(O(n^\epsilon)\) for any \(\epsilon>0\). After that, another
    work ([Cachin et al. 1999](https://people.csail.mit.edu/silvio/Selected%20Scientific%20Papers/Private%20Information%20Retrieval/Computationally%20Private%20Information%20Retrieval%20with%20Polylogarithmic%20Communication.pdf))
    further reduced the complexity to \(polylog(n)\). More discussion about PIR and
    related FHE techniques can be found in [Ostrovsky and Skeith 2007](https://eprint.iacr.org/2007/059.pdf),
    [Yi et al. 2013](https://ieeexplore.ieee.org/document/6189348) and references
    therein.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: PIR（私有信息检索）的一个简单情况是每个条目是一个比特，对于这种情况，上述平凡解的通信复杂度为 \(n\)。 [Kushilevitz 和 Ostrovsky
    1997](https://web.cs.ucla.edu/~rafail/PUBLIC/34.pdf) 将复杂度降低到小于 \(O(n^\epsilon)\)，其中
    \(\epsilon>0\)。之后，另一项工作 ([Cachin 等人 1999](https://people.csail.mit.edu/silvio/Selected%20Scientific%20Papers/Private%20Information%20Retrieval/Computationally%20Private%20Information%20Retrieval%20with%20Polylogarithmic%20Communication.pdf))
    进一步将复杂度降低到 \(polylog(n)\)。关于 PIR 和相关全同态加密技术的更多讨论，可以参考 [Ostrovsky 和 Skeith 2007](https://eprint.iacr.org/2007/059.pdf)、[Yi
    等人 2013](https://ieeexplore.ieee.org/document/6189348) 以及其中的参考文献。
- en: 'One interesting observation is that fully homomorphic encryption can be applied
    to the single-server PIR via the following procedures:'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 一个有趣的观察是，全同态加密可以通过以下程序应用于单服务器 PIR：
- en: The client computes \(E_e(i)\) and sends it to the server.
  id: totrans-156
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 客户端计算 \(E_e(i)\) 并将其发送到服务器。
- en: The server evaluates \(c=\ensuremath{\mathit{EVAL}}(f,E_e(i))\), where \(f(i)\)
    returns the \(i\)-th entry of the database, and sends it (or its compressed version
    \(c^*\)) back to the client.
  id: totrans-157
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 服务器评估 \(c=\ensuremath{\mathit{EVAL}}(f,E_e(i))\)，其中 \(f(i)\) 返回数据库的第 \(i\) 个条目，并将其（或其压缩版本
    \(c^*\)）发送回客户端。
- en: The client decrypts \(D_d(c)\) or \(D_d(c^*)\) and obtains the \(i\)-th entry
    of the database.
  id: totrans-158
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 客户端解密 \(D_d(c)\) 或 \(D_d(c^*)\) 并获取数据库的第 \(i\) 个条目。
- en: Bandwidth efficient fully homomorphic encryption [GH](https://eprint.iacr.org/2019/733.pdf)
  id: totrans-159
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 带宽高效的完全同态加密 [GH](https://eprint.iacr.org/2019/733.pdf)
- en: Since there exists compressive fully homomorphic encryption scheme with nearly
    optimal rate, say rate arbitrary close to \(1\) (see [Theorem 15.10](#optrate)),
    we can immediately get rate-\((1-\epsilon)\) PIR for any \(\epsilon\). (Note that
    this result holds only for database whose entries is quite large, since the rate
    is defined for circuits with sufficiently long output.) Prior to the theorem by
    [Gentry and Halevi 2019](https://eprint.iacr.org/2019/733.pdf), [Kiayias et al. 2015](https://petsymposium.org/2015/papers/23_Kiayias.pdf)
    also constructed a PIR scheme with a nearly optimal rate/bandwidth efficiency.
    The application of fully homomorphic encryption to PIR is a fascinating field;
    not only limited to the bandwidth efficiency, you may be also interested in the
    computational cost. We refer to [Gentry and Halevi 2019](https://eprint.iacr.org/2019/733.pdf)
    for more details.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 由于存在具有几乎最优速率的压缩全同态加密方案，例如速率任意接近 \(1\)（参见 [定理 15.10](#optrate)），我们可以立即得到速率-\((1-\epsilon)\)
    的 PIR，对于任何 \(\epsilon\)。 (注意，这个结果仅适用于条目相当大的数据库，因为速率是为具有足够长输出的电路定义的。) 在 [Gentry
    和 Halevi 2019](https://eprint.iacr.org/2019/733.pdf) 的定理之前，[Kiayias 等人 2015](https://petsymposium.org/2015/papers/23_Kiayias.pdf)
    也构建了一个具有几乎最优速率/带宽效率的 PIR 方案。全同态加密在 PIR 中的应用是一个迷人的领域；不仅限于带宽效率，您可能还对计算成本感兴趣。我们参考
    [Gentry 和 Halevi 2019](https://eprint.iacr.org/2019/733.pdf) 以获取更多详细信息。
- en: This theorem as stated was proven by Brakerski and Vaikuntanathan (ITCS 2014)
    building a line of work initiated by Gentry’s original STOC 2009 work. We will
    actually prove a weaker version of this theorem, due to Brakerski and Vaikuntanathan
    (FOCS 2011), which assumes a quantitative strengthening of LWE. However, we will
    not follow the proof of Brakerski and Vaikuntanathan but rather a scheme of Gentry,
    Sahai and Waters (CRYPTO 2013). Also note that, as noted in the previous lecture,
    all of these results require the extra assumption of *circular security* on top
    of LWE to achieve a non-leveled fully homomorphic encryption scheme.
  id: totrans-161
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如此陈述的定理已被 Brakerski 和 Vaikuntanathan (ITCS 2014) 证明，他们建立了一系列由 Gentry 的原始 STOC
    2009 工作启动的工作。实际上，我们将证明这个定理的一个较弱版本，这是由于 Brakerski 和 Vaikuntanathan (FOCS 2011)，它假设
    LWE 的定量加强。然而，我们不会遵循 Brakerski 和 Vaikuntanathan 的证明，而是遵循 Gentry、Sahai 和 Waters
    (CRYPTO 2013) 的方案。此外，请注意，正如前一次讲座中提到的，所有这些结果都需要在 LWE 之上额外假设 *循环安全性* 以实现非分层全同态加密方案。
- en: '[↩](#fnref:1 "return to article")'
  id: totrans-162
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '[↩](#fnref:1 "返回文章")'
- en: For this reason, Craig Gentry called his highly recommended survey on fully
    homomorphic encryption and other advanced constructions [computing on the edge
    of chaos](https://eprint.iacr.org/2014/610).
  id: totrans-163
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 因此，克雷格·金特里将他推荐的关于全同态加密和其他高级构造的综述称为[混沌边缘的计算](https://eprint.iacr.org/2014/610)。
- en: '[↩](#fnref:2 "return to article")'
  id: totrans-164
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '[↩](#fnref:2 "返回文章")'
- en: We deliberately leave some flexibility in the definition of “short”. While initially
    “short” might mean that \(|e_i|<\sqrt{q}\) for every \(i\), decryption will succeed
    as long as \(|e_i|\) is, say, at most \(q/100n\).
  id: totrans-165
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们故意在“短”的定义上留有一定的灵活性。虽然最初“短”可能意味着对于每个 \(i\)，\(|e_i|<\sqrt{q}\)，但只要 \(|e_i|\)
    不超过 \(q/100n\)，解密就会成功。
- en: '[↩](#fnref:3 "return to article")'
  id: totrans-166
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '[↩](#fnref:3 "返回文章")'
- en: If we were being pedantic the length of the vector (and other constant below)
    should be the integer \(\ceil{\log q}\) but I omit the ceiling symbols for simplicity
    of notation.
  id: totrans-167
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果我们过于拘泥于细节，向量的长度（以及其他常数）应该是整数 \(\ceil{\log q}\)，但我为了简化符号省略了上取整符号。
- en: '[↩](#fnref:4 "return to article")'
  id: totrans-168
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '[↩](#fnref:4 "返回文章")'
