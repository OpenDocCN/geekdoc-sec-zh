  type: TYPE_NORMAL
  zh: 埃里克·韦尔梅（thanks.werme@alpha.zk3.dec.com）
- en: If you want to be on this list, please send me a constructive suggestion at
    [dwheeler@dwheeler.com](mailto:dwheeler@dwheeler.com). If you send me a constructive
    suggestion, but do *not* want credit, please let me know that when you send your
    suggestion, comment, or criticism; normally I expect that people want credit,
    and I want to give them that credit. My current process is to add contributor
    names to this list in the document, with more detailed explanation of their comment
    in the ChangeLog for this document (available on-line). Note that although these
    people have sent in ideas, the actual text is my own, so don’t blame them for
    any errors that may remain. Instead, please send me another constructive suggestion.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想加入这个名单，请向我发送建设性的建议至[dwheeler@dwheeler.com](mailto:dwheeler@dwheeler.com)。如果你向我发送建设性的建议，但不想获得信用，请在发送建议、评论或批评时告知我；通常我期望人们希望获得信用，我也希望给予他们这种信用。我的当前流程是在文档中将贡献者姓名添加到这个名单中，并在该文档的ChangeLog中提供他们评论的更详细解释（可在网上找到）。请注意，尽管这些人已经提交了想法，但实际文本是我的，所以请不要因为可能存在的任何错误而责怪他们。相反，请向我发送另一些建设性的建议。
