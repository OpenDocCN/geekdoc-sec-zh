- en: 'Here are a few key events in the development of this book, starting from most
    recent events:'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是这本书发展过程中的一些关键事件，从最近的事件开始：
- en: 2002-10-29 David A. Wheeler
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 2002-10-29 大卫·A·惠勒
- en: Version 3.000 released, adding a new section on determining security requirements
    and a discussion of the Common Criteria, broadening the document. Many smaller
    improvements were incorporated as well.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 版本 3.000 发布，增加了一个关于确定安全需求的新章节，并讨论了通用标准，扩大了文档范围。同时还包括了许多小的改进。
- en: 2001-01-01 David A. Wheeler
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 2001-01-01 大卫·A·惠勒
- en: Version 2.70 released, adding a significant amount of additional material, such
    as a significant expansion of the discussion of cross-site malicious content,
    HTML/URI filtering, and handling temporary files.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 版本 2.70 发布，增加了大量额外的材料，例如对跨站恶意内容的讨论有显著扩展，HTML/URI 过滤以及临时文件的处理。
- en: 2000-05-24 David A. Wheeler
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 2000-05-24 大卫·A·惠勒
- en: Switched to GNU’s GFDL license, added more content.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 转换为 GNU 的 GFDL 许可证，增加了更多内容。
- en: 2000-04-21 David A. Wheeler
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 2000-04-21 大卫·A·惠勒
- en: Version 2.00 released, dated 21 April 2000, which switched the document’s internal
    format from the Linuxdoc DTD to the DocBook DTD. Thanks to Jorge Godoy for helping
    me perform the transition.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 版本 2.00 发布，日期为 2000 年 4 月 21 日，将文档的内部格式从 Linuxdoc DTD 转换为 DocBook DTD。感谢豪尔赫·戈多伊帮助我完成转换。
- en: 2000-04-04 David A. Wheeler
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 2000-04-04 大卫·A·惠勒
- en: Version 1.60 released; changed so that it now covers *both* Linux and Unix.
    Since most of the guidelines covered both, and many/most app developers want their
    apps to run on both, it made sense to cover both.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 版本 1.60 发布；现在它涵盖了*两者* Linux 和 Unix。由于大多数指南都涵盖了两者，而且许多/大多数应用开发者希望他们的应用能在两者上运行，因此同时涵盖两者是有意义的。
- en: 2000-02-09 David A. Wheeler
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 2000-02-09 大卫·A·惠勒
- en: Noted that the document is now part of the Linux Documentation Project (LDP).
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，该文档现在是 Linux 文档项目（LDP）的一部分。
- en: 1999-11-29 David A. Wheeler
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 1999-11-29 大卫·A·惠勒
- en: Initial version (1.0) completed and released to the public.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 初始版本（1.0）完成并公开发布。
- en: Note that a more detailed description of changes is available on-line in the
    “ChangeLog” file.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，更详细的变更描述可在“ChangeLog”文件中在线获取。
