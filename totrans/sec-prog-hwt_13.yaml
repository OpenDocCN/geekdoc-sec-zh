- en: 0\. PREAMBLE
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 0\. 前言
- en: 'The purpose of this License is to make a manual, textbook, or other written
    document "free" in the sense of freedom: to assure everyone the effective freedom
    to copy and redistribute it, with or without modifying it, either commercially
    or noncommercially. Secondarily, this License preserves for the author and publisher
    a way to get credit for their work, while not being considered responsible for
    modifications made by others.'
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 本许可证的目的是使手册、教科书或其他书面文件在自由的意义上“免费”：确保每个人都能有效地复制和重新分发它，无论是否修改，无论是商业用途还是非商业用途。其次，本许可证为作者和出版商保留了一种方式，以获得他们工作的认可，同时不因他人所做的修改而承担责任。
- en: This License is a kind of "copyleft", which means that derivative works of the
    document must themselves be free in the same sense. It complements the GNU General
    Public License, which is a copyleft license designed for free software.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 本许可证是一种“copyleft”，这意味着文档的衍生作品本身必须以相同的意义上是自由的。它补充了GNU通用公共许可证，这是一个为自由软件设计的copyleft许可证。
- en: 'We have designed this License in order to use it for manuals for free software,
    because free software needs free documentation: a free program should come with
    manuals providing the same freedoms that the software does. But this License is
    not limited to software manuals; it can be used for any textual work, regardless
    of subject matter or whether it is published as a printed book. We recommend this
    License principally for works whose purpose is instruction or reference.'
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 我们设计这个许可证是为了将其用于免费软件的手册，因为免费软件需要免费的文档：一个免费程序应该附带提供与软件相同自由度的手册。但是，这个许可证不仅限于软件手册；它可以用于任何文本作品，无论其主题或是否以印刷书籍的形式出版。我们主要推荐这个许可证用于旨在指导或参考的作品。
- en: 1\. APPLICABILITY AND DEFINITIONS
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 适用范围和定义
- en: This License applies to any manual or other work that contains a notice placed
    by the copyright holder saying it can be distributed under the terms of this License.
    The ["Document"](fdl.html#FDL-DOCUMENT) , below, refers to any such manual or
    work. Any member of the public is a licensee, and is addressed as "you".
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 这个许可证适用于任何包含版权持有者放置的通知，说明它可以按照本许可证的条款进行分发的手册或其他作品。"文档"一词，以下，指的是任何这样的手册或作品。公众的任何成员都是许可证持有人，并被称作“你”。
- en: A ["Modified Version"](fdl.html#FDL-MODIFIED) of the Document means any work
    containing the Document or a portion of it, either copied verbatim, or with modifications
    and/or translated into another language.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: '[修改版本](fdl.html#FDL-MODIFIED) 的文档意味着任何包含文档或其一部分的作品，无论是逐字复制，还是经过修改和/或翻译成另一种语言。'
- en: A ["Secondary Section"](fdl.html#FDL-SECONDARY) is a named appendix or a front-matter
    section of the [Document](fdl.html#FDL-DOCUMENT) that deals exclusively with the
    relationship of the publishers or authors of the [Document](fdl.html#FDL-DOCUMENT)
    to the [Document’s](fdl.html#FDL-DOCUMENT) overall subject (or to related matters)
    and contains nothing that could fall directly within that overall subject. (For
    example, if the [Document](fdl.html#FDL-DOCUMENT) is in part a textbook of mathematics,
    a [Secondary Section](fdl.html#FDL-SECONDARY) may not explain any mathematics.)
    The relationship could be a matter of historical connection with the subject or
    with related matters, or of legal, commercial, philosophical, ethical or political
    position regarding them.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: '[次要节段](fdl.html#FDL-SECONDARY) 是一个命名的附录或文档的前言部分，专门处理文档的出版商或作者与文档的整体主题（或相关事项）之间的关系，并且不包含任何可以直接落入该整体主题的内容。（例如，如果文档部分是数学教科书，一个
    [次要节段](fdl.html#FDL-SECONDARY) 就不能解释任何数学。）这种关系可能是与主题或相关事项的历史联系，或者是关于它们的法律、商业、哲学、道德或政治立场。'
- en: The ["Invariant Sections"](fdl.html#FDL-INVARIANT) are certain [Secondary Sections](fdl.html#FDL-SECONDARY)
    whose titles are designated, as being those of [Invariant Sections](fdl.html#FDL-INVARIANT),
    in the notice that says that the [Document](fdl.html#FDL-DOCUMENT) is released
    under this License.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: '["不变节段"](fdl.html#FDL-INVARIANT) 是一些被指定的 [次要节段](fdl.html#FDL-SECONDARY)，其标题在声明该
    [文档](fdl.html#FDL-DOCUMENT) 在此许可证下发布的通知中被指定为 [不变节段](fdl.html#FDL-INVARIANT)。'
- en: The ["Cover Texts"](fdl.html#FDL-COVER-TEXTS) are certain short passages of
    text that are listed, as [Front-Cover Texts](fdl.html#FDL-COVER-TEXTS) or [Back-Cover
    Texts](fdl.html#FDL-COVER-TEXTS), in the notice that says that the [Document](fdl.html#FDL-DOCUMENT)
    is released under this License.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: '["封面文字"](fdl.html#FDL-COVER-TEXTS) 是一些被列出的简短文本段落，这些段落作为 [前封面文字](fdl.html#FDL-COVER-TEXTS)
    或 [后封面文字](fdl.html#FDL-COVER-TEXTS)，在声明该 [文档](fdl.html#FDL-DOCUMENT) 在此许可证下发布的通知中被列出。'
- en: A ["Transparent"](fdl.html#FDL-TRANSPARENT) copy of the [Document](fdl.html#FDL-DOCUMENT)
    means a machine-readable copy, represented in a format whose specification is
    available to the general public, whose contents can be viewed and edited directly
    and straightforwardly with generic text editors or (for images composed of pixels)
    generic paint programs or (for drawings) some widely available drawing editor,
    and that is suitable for input to text formatters or for automatic translation
    to a variety of formats suitable for input to text formatters. A copy made in
    an otherwise [Transparent](fdl.html#FDL-TRANSPARENT) file format whose markup
    has been designed to thwart or discourage subsequent modification by readers is
    not [Transparent](fdl.html#FDL-TRANSPARENT). A copy that is not ["Transparent"](fdl.html#FDL-TRANSPARENT)
    is called "Opaque".
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: '[“透明”](fdl.html#FDL-TRANSPARENT)副本的[文档](fdl.html#FDL-DOCUMENT)意味着一种机器可读的副本，其格式规范对公众可用，其内容可以直接和直接地通过通用文本编辑器或（对于由像素组成的图像）通用绘图程序或（对于绘图）一些广泛可用的绘图编辑器查看和编辑，并且适合输入到文本格式化器或自动翻译到适合输入到文本格式化器的多种格式。在[“透明”](fdl.html#FDL-TRANSPARENT)文件格式中制作的副本，其标记已被设计用来阻止或阻止读者后续修改，则不是[“透明”](fdl.html#FDL-TRANSPARENT)。不[“透明”](fdl.html#FDL-TRANSPARENT)的副本称为“不透明”。'
- en: Examples of suitable formats for [Transparent](fdl.html#FDL-TRANSPARENT) copies
    include plain ASCII without markup, Texinfo input format, LaTeX input format,
    SGML or XML using a publicly available DTD, and standard-conforming simple HTML
    designed for human modification. Opaque formats include PostScript, PDF, proprietary
    formats that can be read and edited only by proprietary word processors, SGML
    or XML for which the DTD and/or processing tools are not generally available,
    and the machine-generated HTML produced by some word processors for output purposes
    only.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: '[“透明”](fdl.html#FDL-TRANSPARENT)副本的合适格式示例包括无标记的纯ASCII、Texinfo输入格式、LaTeX输入格式、使用公开可用的DTD的SGML或XML，以及为人类修改而设计的符合标准的简单HTML。不透明格式包括PostScript、PDF、只能由专有文字处理器读取和编辑的专有格式，DTD和/或处理工具通常不可用的SGML或XML，以及某些文字处理器为输出目的而生产的机器生成的HTML。'
- en: The ["Title Page"](fdl.html#FDL-TITLE-PAGE) means, for a printed book, the title
    page itself, plus such following pages as are needed to hold, legibly, the material
    this License requires to appear in the title page. For works in formats which
    do not have any title page as such, ["Title Page"](fdl.html#FDL-TITLE-PAGE) means
    the text near the most prominent appearance of the work’s title, preceding the
    beginning of the body of the text.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: '[“标题页”](fdl.html#FDL-TITLE-PAGE)的意思是，对于印刷书籍，指的是标题页本身，以及为了清晰展示本许可证要求出现在标题页上的材料所需的后续页面。对于没有此类标题页的格式的工作，“标题页”指的是靠近作品标题最显著出现位置的文字，位于文本正文开始之前。'
- en: 2\. VERBATIM COPYING
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 完整复制
- en: You may copy and distribute the [Document](fdl.html#FDL-DOCUMENT) in any medium,
    either commercially or noncommercially, provided that this License, the copyright
    notices, and the license notice saying this License applies to the [Document](fdl.html#FDL-DOCUMENT)
    are reproduced in all copies, and that you add no other conditions whatsoever
    to those of this License. You may not use technical measures to obstruct or control
    the reading or further copying of the copies you make or distribute. However,
    you may accept compensation in exchange for copies. If you distribute a large
    enough number of copies you must also follow the conditions in [section 3](fdl.html#FDL-SECTION3).
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以在任何媒介上复制和分发[文档](fdl.html#FDL-DOCUMENT)，无论是商业用途还是非商业用途，前提是本许可证、版权声明和许可证声明（说明本许可证适用于[文档](fdl.html#FDL-DOCUMENT)）在所有副本中都被复制，并且您不对本许可证的条件添加任何其他条件。您不得使用技术手段来阻止或控制您制作的或分发的副本的阅读或进一步复制。然而，您可以接受以副本为交换的报酬。如果您分发足够多的副本，您还必须遵守[第3节](fdl.html#FDL-SECTION3)中的条件。
- en: You may also lend copies, under the same conditions stated above, and you may
    publicly display copies.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 您还可以在上述相同条件下出借副本，并且您可以公开展示副本。
- en: 3\. COPYING IN QUANTITY
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 大量复制
- en: 'If you publish printed copies of the [Document](fdl.html#FDL-DOCUMENT) numbering
    more than 100, and the [Document’s](fdl.html#FDL-DOCUMENT) license notice requires
    [Cover Texts](fdl.html#FDL-COVER-TEXTS), you must enclose the copies in covers
    that carry, clearly and legibly, all these [Cover Texts](fdl.html#FDL-COVER-TEXTS):
    Front-Cover Texts on the front cover, and Back-Cover Texts on the back cover.
    Both covers must also clearly and legibly identify you as the publisher of these
    copies. The front cover must present the full title with all words of the title
    equally prominent and visible. You may add other material on the covers in addition.
    Copying with changes limited to the covers, as long as they preserve the title
    of the [Document](fdl.html#FDL-DOCUMENT) and satisfy these conditions, can be
    treated as verbatim copying in other respects.'
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您出版的印刷版[文档](fdl.html#FDL-DOCUMENT)数量超过100份，并且[文档的](fdl.html#FDL-DOCUMENT)许可通知要求[封面文字](fdl.html#FDL-COVER-TEXTS)，您必须将这些副本装入封面，封面上的文字必须清晰易读，包括所有这些[封面文字](fdl.html#FDL-COVER-TEXTS)：封面文字在封面上，背面文字在封底上。两个封面都必须清晰易读地标识您为这些副本的出版者。封面必须展示完整的标题，标题中的所有单词都应同等突出和可见。您还可以在封面添加其他材料。只要它们保留了[文档](fdl.html#FDL-DOCUMENT)的标题并满足这些条件，对封面进行更改的复制可以被视为在其他方面逐字复制。
- en: If the required texts for either cover are too voluminous to fit legibly, you
    should put the first ones listed (as many as fit reasonably) on the actual cover,
    and continue the rest onto adjacent pages.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 如果所需的封面文字太多，无法清晰打印，您应将列出的第一个（尽可能多的）放在实际封面上，并将剩余的继续打印在相邻的页面上。
- en: If you publish or distribute [Opaque](fdl.html#FDL-TRANSPARENT) copies of the
    [Document](fdl.html#FDL-DOCUMENT) numbering more than 100, you must either include
    a machine-readable [Transparent](fdl.html#FDL-TRANSPARENT) copy along with each
    [Opaque](fdl.html#FDL-TRANSPARENT) copy, or state in or with each [Opaque](fdl.html#FDL-TRANSPARENT)
    copy a publicly-accessible computer-network location containing a complete [Transparent](fdl.html#FDL-TRANSPARENT)
    copy of the [Document](fdl.html#FDL-DOCUMENT), free of added material, which the
    general network-using public has access to download anonymously at no charge using
    public-standard network protocols. If you use the latter option, you must take
    reasonably prudent steps, when you begin distribution of [Opaque](fdl.html#FDL-TRANSPARENT)
    copies in quantity, to ensure that this [Transparent](fdl.html#FDL-TRANSPARENT)
    copy will remain thus accessible at the stated location until at least one year
    after the last time you distribute an [Opaque](fdl.html#FDL-TRANSPARENT) copy
    (directly or through your agents or retailers) of that edition to the public.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您出版或分发超过100份的[不透明](fdl.html#FDL-TRANSPARENT)版[文档](fdl.html#FDL-DOCUMENT)，您必须要么在每个[不透明](fdl.html#FDL-TRANSPARENT)副本中包含一个机器可读的[透明](fdl.html#FDL-TRANSPARENT)副本，要么在每个[不透明](fdl.html#FDL-TRANSPARENT)副本中声明或提供公开可访问的计算机网络位置，该位置包含[文档](fdl.html#FDL-DOCUMENT)的完整[透明](fdl.html#FDL-TRANSPARENT)副本，不添加任何额外材料，公众可以通过公共标准网络协议匿名下载，无需付费。如果您选择后者，当您开始大量分发[不透明](fdl.html#FDL-TRANSPARENT)副本时，您必须采取合理的谨慎措施，以确保该[透明](fdl.html#FDL-TRANSPARENT)副本在指定位置保持可访问状态，直到至少自您最后一次向公众分发该版本的[不透明](fdl.html#FDL-TRANSPARENT)副本（直接或通过您的代理人或零售商）之后一年。
- en: It is requested, but not required, that you contact the authors of the [Document](fdl.html#FDL-DOCUMENT)
    well before redistributing any large number of copies, to give them a chance to
    provide you with an updated version of the [Document](fdl.html#FDL-DOCUMENT).
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 建议但在非强制性的情况下，您在重新分发大量副本之前，与[文档](fdl.html#FDL-DOCUMENT)的作者联系，以便给他们一个提供[文档](fdl.html#FDL-DOCUMENT)更新版本的机会。
- en: 4\. MODIFICATIONS
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 修改
- en: 'You may copy and distribute a [Modified Version](fdl.html#FDL-MODIFIED) of
    the [Document](fdl.html#FDL-DOCUMENT) under the conditions of sections [2](fdl.html#FDL-SECTION2)
    and [3](fdl.html#FDL-SECTION3) above, provided that you release the [Modified
    Version](fdl.html#FDL-MODIFIED) under precisely this License, with the [Modified
    Version](fdl.html#FDL-MODIFIED) filling the role of the [Document](fdl.html#FDL-DOCUMENT),
    thus licensing distribution and modification of the [Modified Version](fdl.html#FDL-MODIFIED)
    to whoever possesses a copy of it. In addition, you must do these things in the
    [Modified Version](fdl.html#FDL-MODIFIED):'
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以在上述第[2](fdl.html#FDL-SECTION2)节和[3](fdl.html#FDL-SECTION3)节规定的条件下复制和分发[修改版本](fdl.html#FDL-MODIFIED)的[文档](fdl.html#FDL-DOCUMENT)，前提是您在[修改版本](fdl.html#FDL-MODIFIED)中精确地使用本许可证，使[修改版本](fdl.html#FDL-MODIFIED)取代[文档](fdl.html#FDL-DOCUMENT)的角色，从而许可对拥有其副本的任何人分发和修改[修改版本](fdl.html#FDL-MODIFIED)。此外，您必须在[修改版本](fdl.html#FDL-MODIFIED)中执行以下操作：
- en: Use in the [Title Page](fdl.html#FDL-TITLE-PAGE) (and on the covers, if any)
    a title distinct from that of the [Document](fdl.html#FDL-DOCUMENT), and from
    those of previous versions (which should, if there were any, be listed in the
    History section of the [Document](fdl.html#FDL-DOCUMENT)). You may use the same
    title as a previous version if the original publisher of that version gives permission.
  id: totrans-223
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在[标题页](fdl.html#FDL-TITLE-PAGE)（以及封面，如果有）上使用与[文档](fdl.html#FDL-DOCUMENT)标题不同的标题，以及与先前版本（如果有的话，应在[文档](fdl.html#FDL-DOCUMENT)的历史部分列出）的标题。如果该版本没有标题页，您可以使用与先前版本相同的标题，前提是原始出版商已给予许可。
- en: List on the [Title Page](fdl.html#FDL-TITLE-PAGE), as authors, one or more persons
    or entities responsible for authorship of the modifications in the [Modified Version](fdl.html#FDL-MODIFIED),
    together with at least five of the principal authors of the [Document](fdl.html#FDL-DOCUMENT)
    (all of its principal authors, if it has less than five).
  id: totrans-224
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在[标题页](fdl.html#FDL-TITLE-PAGE)上列出一位或多位负责[修改版本](fdl.html#FDL-MODIFIED)修改的作者或实体，以及至少五位[文档](fdl.html#FDL-DOCUMENT)的主要作者（如果少于五位，则为所有主要作者）。
- en: State on the [Title Page](fdl.html#FDL-TITLE-PAGE) the name of the publisher
    of the [Modified Version](fdl.html#FDL-MODIFIED), as the publisher.
  id: totrans-225
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在[标题页](fdl.html#FDL-TITLE-PAGE)上声明[修改版本](fdl.html#FDL-MODIFIED)的出版商名称，作为出版商。
- en: Preserve all the copyright notices of the [Document](fdl.html#FDL-DOCUMENT).
  id: totrans-226
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 保留[文档](fdl.html#FDL-DOCUMENT)中所有的版权声明。
- en: Add an appropriate copyright notice for your modifications adjacent to the other
    copyright notices.
  id: totrans-227
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在其他版权声明旁边添加适当的版权声明，以说明您的修改。
- en: Include, immediately after the copyright notices, a license notice giving the
    public permission to use the [Modified Version](fdl.html#FDL-MODIFIED) under the
    terms of this License, in the form shown in the Addendum below.
  id: totrans-228
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在版权声明之后立即包含一个许可声明，授予公众根据本许可证的条款使用[修改版本](fdl.html#FDL-MODIFIED)的许可，其形式如下所示。
- en: Preserve in that license notice the full lists of [Invariant Sections](fdl.html#FDL-INVARIANT)
    and required [Cover Texts](fdl.html#FDL-COVER-TEXTS) given in the [Document’s](fdl.html#FDL-DOCUMENT)
    license notice.
  id: totrans-229
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在许可声明中保留[文档](fdl.html#FDL-DOCUMENT)许可声明中给出的[不变章节](fdl.html#FDL-INVARIANT)和必需的[封面文本](fdl.html#FDL-COVER-TEXTS)的完整列表。
- en: Include an unaltered copy of this License.
  id: totrans-230
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 包含本许可证的未修改副本。
- en: Preserve the section entitled "History", and its title, and add to it an item
    stating at least the title, year, new authors, and publisher of the [Modified
    Version](fdl.html#FDL-MODIFIED) as given on the [Title Page](fdl.html#FDL-TITLE-PAGE).
    If there is no section entitled "History" in the [Document](fdl.html#FDL-DOCUMENT),
    create one stating the title, year, authors, and publisher of the [Document](fdl.html#FDL-DOCUMENT)
    as given on its [Title Page](fdl.html#FDL-TITLE-PAGE), then add an item describing
    the [Modified Version](fdl.html#FDL-MODIFIED) as stated in the previous sentence.
  id: totrans-231
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 保留名为“历史”的章节及其标题，并在其中添加至少一项内容，说明[修改版本](fdl.html#FDL-MODIFIED)的标题、年份、新作者和出版商，如[标题页](fdl.html#FDL-TITLE-PAGE)上所示。如果[文档](fdl.html#FDL-DOCUMENT)中没有名为“历史”的章节，则创建一个包含[文档](fdl.html#FDL-DOCUMENT)的标题、年份、作者和出版商的章节，然后添加一项描述[修改版本](fdl.html#FDL-MODIFIED)的内容，如前句所述。
- en: Preserve the network location, if any, given in the [Document](fdl.html#FDL-DOCUMENT)
    for public access to a [Transparent](fdl.html#FDL-TRANSPARENT) copy of the [Document](fdl.html#FDL-DOCUMENT),
    and likewise the network locations given in the [Document](fdl.html#FDL-DOCUMENT)
    for previous versions it was based on. These may be placed in the "History" section.
    You may omit a network location for a work that was published at least four years
    before the [Document](fdl.html#FDL-DOCUMENT) itself, or if the original publisher
    of the version it refers to gives permission.
  id: totrans-232
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 保留[文档](fdl.html#FDL-DOCUMENT)中给出的网络位置，以便公众访问[文档](fdl.html#FDL-DOCUMENT)的[透明](fdl.html#FDL-TRANSPARENT)副本，以及基于该文档的先前版本的给定网络位置。这些可以放在“历史”部分。对于在[文档](fdl.html#FDL-DOCUMENT)本身至少四年前出版的作品，你可以省略网络位置，或者如果该版本的原始出版商允许，也可以省略。
- en: In any section entitled "Acknowledgements" or "Dedications", preserve the section’s
    title, and preserve in the section all the substance and tone of each of the contributor
    acknowledgements and/or dedications given therein.
  id: totrans-233
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在任何标题为“致谢”或“献词”的部分，保留该部分的标题，并在该部分中保留所有贡献者致谢和/或献词的内容和语气。
- en: Preserve all the [Invariant Sections](fdl.html#FDL-INVARIANT) of the [Document](fdl.html#FDL-DOCUMENT),
    unaltered in their text and in their titles. Section numbers or the equivalent
    are not considered part of the section titles.
  id: totrans-234
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 保留[文档](fdl.html#FDL-DOCUMENT)的所有[不变部分](fdl.html#FDL-INVARIANT)，在文本和标题上保持不变。章节编号或等效内容不被视为章节标题的一部分。
- en: Delete any section entitled "Endorsements". Such a section may not be included
    in the [Modified Version](fdl.html#FDL-MODIFIED).
  id: totrans-235
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 删除任何标题为“推荐”的部分。这样的部分不得包含在[修改版本](fdl.html#FDL-MODIFIED)中。
- en: Do not retitle any existing section as "Endorsements" or to conflict in title
    with any [Invariant Section](fdl.html#FDL-INVARIANT).
  id: totrans-236
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 不要将任何现有部分重命名为“推荐”或与任何[不变部分](fdl.html#FDL-INVARIANT)的标题冲突。
- en: If the [Modified Version](fdl.html#FDL-MODIFIED) includes new front-matter sections
    or appendices that qualify as [Secondary Sections](fdl.html#FDL-SECONDARY) and
    contain no material copied from the Document, you may at your option designate
    some or all of these sections as invariant. To do this, add their titles to the
    list of [Invariant Sections](fdl.html#FDL-INVARIANT) in the [Modified Version’s](fdl.html#FDL-MODIFIED)
    license notice. These titles must be distinct from any other section titles.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 如果[修改版本](fdl.html#FDL-MODIFIED)包含新的前言部分或附录，这些部分符合[次要部分](fdl.html#FDL-SECONDARY)的定义且不包含从文档中复制的内容，你可以选择性地将这些部分中的某些或全部指定为不变部分。为此，将它们的标题添加到[修改版本](fdl.html#FDL-MODIFIED)许可通知中的[不变部分](fdl.html#FDL-INVARIANT)列表中。这些标题必须与其他部分标题不同。
- en: You may add a section entitled "Endorsements", provided it contains nothing
    but endorsements of your [Modified Version](fdl.html#FDL-MODIFIED) by various
    parties--for example, statements of peer review or that the text has been approved
    by an organization as the authoritative definition of a standard.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以添加一个标题为“推荐”的部分，前提是它只包含各方对你[修改版本](fdl.html#FDL-MODIFIED)的推荐——例如，同行评审的声明或文本已被某个组织作为标准的权威定义所批准。
- en: You may add a passage of up to five words as a [Front-Cover Text](fdl.html#FDL-COVER-TEXTS),
    and a passage of up to 25 words as a [Back-Cover Text](fdl.html#FDL-COVER-TEXTS),
    to the end of the list of [Cover Texts](fdl.html#FDL-COVER-TEXTS) in the [Modified
    Version](fdl.html#FDL-MODIFIED). Only one passage of [Front-Cover Text](fdl.html#FDL-COVER-TEXTS)
    and one of [Back-Cover Text](fdl.html#FDL-COVER-TEXTS) may be added by (or through
    arrangements made by) any one entity. If the [Document](fdl.html#FDL-DOCUMENT)
    already includes a cover text for the same cover, previously added by you or by
    arrangement made by the same entity you are acting on behalf of, you may not add
    another; but you may replace the old one, on explicit permission from the previous
    publisher that added the old one.
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在[修改版本](fdl.html#FDL-MODIFIED)中[封面文本](fdl.html#FDL-COVER-TEXTS)的末尾添加最多五个字的段落，以及最多25字的[背面文本](fdl.html#FDL-COVER-TEXTS)段落。任何实体（或通过该实体安排）只能添加一个[封面文本](fdl.html#FDL-COVER-TEXTS)段落和一个[背面文本](fdl.html#FDL-COVER-TEXTS)段落。如果[文档](fdl.html#FDL-DOCUMENT)已经包含了你或同一实体之前添加的相同封面的封面文本，你不得添加另一个；但你可以根据之前添加该旧文本的出版商的明确许可来替换它。
- en: The author(s) and publisher(s) of the [Document](fdl.html#FDL-DOCUMENT) do not
    by this License give permission to use their names for publicity for or to assert
    or imply endorsement of any [Modified Version](fdl.html#FDL-MODIFIED) .
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: '[文档](fdl.html#FDL-DOCUMENT)的作者和出版者不通过此许可证授予使用他们的名字进行宣传、断言或暗示对任何[修改版本](fdl.html#FDL-MODIFIED)的认可或支持的许可。'
- en: 5\. COMBINING DOCUMENTS
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 文档的结合
- en: You may combine the [Document](fdl.html#FDL-DOCUMENT) with other documents released
    under this License, under the terms defined in [section 4](fdl.html#FDL-SECTION4)
    above for modified versions, provided that you include in the combination all
    of the [Invariant Sections](fdl.html#FDL-INVARIANT) of all of the original documents,
    unmodified, and list them all as [Invariant Sections](fdl.html#FDL-INVARIANT)
    of your combined work in its license notice.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以将[文档](fdl.html#FDL-DOCUMENT)与其他在此许可证下发布的文档结合使用，前提是在上文中定义的[第4节](fdl.html#FDL-SECTION4)的条款下，对于修改版本，您在组合中包含所有原始文档的所有[不变节](fdl.html#FDL-INVARIANT)，未经修改，并在您组合作品的许可证通知中将它们全部列为[不变节](fdl.html#FDL-INVARIANT)。
- en: The combined work need only contain one copy of this License, and multiple identical
    [Invariant Sections](fdl.html#FDL-INVARIANT) may be replaced with a single copy.
    If there are multiple [Invariant Sections](fdl.html#FDL-INVARIANT) with the same
    name but different contents, make the title of each such section unique by adding
    at the end of it, in parentheses, the name of the original author or publisher
    of that section if known, or else a unique number. Make the same adjustment to
    the section titles in the list of [Invariant Sections](fdl.html#FDL-INVARIANT)
    in the license notice of the combined work.
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 组合作品只需包含一份此许可证的副本，并且可以使用单个副本替换多个相同的[不变节](fdl.html#FDL-INVARIANT)。如果有多个具有相同名称但内容不同的[不变节](fdl.html#FDL-INVARIANT)，可以通过在末尾添加括号中的原始作者或出版者的名称（如果已知）或一个唯一的数字来使每个此类节的标题独特。对组合作品许可证通知中的[不变节](fdl.html#FDL-INVARIANT)列表中的节标题进行相同的调整。
- en: In the combination, you must combine any sections entitled "History" in the
    various original documents, forming one section entitled "History"; likewise combine
    any sections entitled "Acknowledgements", and any sections entitled "Dedications".
    You must delete all sections entitled "Endorsements."
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 在组合中，您必须将各个原始文档中标题为“历史”的任何节合并成一个标题为“历史”的节；同样，合并任何标题为“致谢”的节，以及任何标题为“献词”的节。您必须删除所有标题为“推荐”的节。
- en: 6\. COLLECTIONS OF DOCUMENTS
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 文档集合
- en: You may make a collection consisting of the [Document](fdl.html#FDL-DOCUMENT)
    and other documents released under this License, and replace the individual copies
    of this License in the various documents with a single copy that is included in
    the collection, provided that you follow the rules of this License for verbatim
    copying of each of the documents in all other respects.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以创建一个由[文档](fdl.html#FDL-DOCUMENT)和在此许可证下发布的其他文档组成的集合，并将各个文档中的此许可证的单独副本替换为包含在集合中的单个副本，前提是您遵循此许可证关于逐字复制每个文档的规则，在其他方面。
- en: You may extract a single document from such a collection, and distribute it
    individually under this License, provided you insert a copy of this License into
    the extracted document, and follow this License in all other respects regarding
    verbatim copying of that document.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以从这样的集合中提取单个文档，并在此许可证下单独分发，前提是在提取的文档中插入此许可证的副本，并在所有其他方面遵循此许可证关于逐字复制该文档的规定。
- en: 7\. AGGREGATION WITH INDEPENDENT WORKS
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 与独立作品的聚合
- en: A compilation of the [Document](fdl.html#FDL-DOCUMENT) or its derivatives with
    other separate and independent documents or works, in or on a volume of a storage
    or distribution medium, does not as a whole count as a [Modified Version](fdl.html#FDL-MODIFIED)
    of the [Document](fdl.html#FDL-DOCUMENT), provided no compilation copyright is
    claimed for the compilation. Such a compilation is called an "aggregate", and
    this License does not apply to the other self-contained works thus compiled with
    the [Document](fdl.html#FDL-DOCUMENT) , on account of their being thus compiled,
    if they are not themselves derivative works of the [Document](fdl.html#FDL-DOCUMENT).
    If the [Cover Text](fdl.html#FDL-COVER-TEXTS) requirement of [section 3](fdl.html#FDL-SECTION3)
    is applicable to these copies of the [Document](fdl.html#FDL-DOCUMENT), then if
    the [Document](fdl.html#FDL-DOCUMENT) is less than one quarter of the entire aggregate,
    the [Document’s](fdl.html#FDL-DOCUMENT) [Cover Texts](fdl.html#FDL-COVER-TEXTS)
    may be placed on covers that surround only the [Document](fdl.html#FDL-DOCUMENT)
    within the aggregate. Otherwise they must appear on covers around the whole aggregate.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 将[文档](fdl.html#FDL-DOCUMENT)或其衍生作品与其他独立且分开的文档或作品汇编在一起，或者在存储或分发介质的卷中，如果汇编不声称汇编的版权，则整体上不视为[修改版本](fdl.html#FDL-MODIFIED)的[文档](fdl.html#FDL-DOCUMENT)。这样的汇编称为“集合”，本许可证不适用于与[文档](fdl.html#FDL-DOCUMENT)一起汇编的这些其他自包含作品，如果它们本身不是[文档](fdl.html#FDL-DOCUMENT)的衍生作品。如果[封面文本](fdl.html#FDL-COVER-TEXTS)的要求适用于这些[文档](fdl.html#FDL-DOCUMENT)的副本，那么如果[文档](fdl.html#FDL-DOCUMENT)占整个集合不到四分之一，[文档的封面文本](fdl.html#FDL-COVER-TEXTS)可以放置在仅围绕集合中[文档](fdl.html#FDL-DOCUMENT)的封面。否则，它们必须出现在围绕整个集合的封面上。
- en: 8\. TRANSLATION
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 翻译
- en: Translation is considered a kind of modification, so you may distribute translations
    of the [Document](fdl.html#FDL-DOCUMENT) under the terms of [section 4](fdl.html#FDL-SECTION4).
    Replacing [Invariant Sections](fdl.html#FDL-INVARIANT) with translations requires
    special permission from their copyright holders, but you may include translations
    of some or all [Invariant Sections](fdl.html#FDL-INVARIANT) in addition to the
    original versions of these [Invariant Sections](fdl.html#FDL-INVARIANT). You may
    include a translation of this License provided that you also include the original
    English version of this License. In case of a disagreement between the translation
    and the original English version of this License, the original English version
    will prevail.
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 翻译被视为一种修改，因此您可以在[第4节](fdl.html#FDL-SECTION4)的条款下分发[文档](fdl.html#FDL-DOCUMENT)的翻译。用翻译替换[不变节](fdl.html#FDL-INVARIANT)需要从其版权持有者获得特别许可，但您可以在这些[不变节](fdl.html#FDL-INVARIANT)的原始版本之外包括某些或所有[不变节](fdl.html#FDL-INVARIANT)的翻译。您可以包括本许可证的翻译，前提是您还包含本许可证的原始英文版本。如果翻译与本许可证的原始英文版本存在分歧，则原始英文版本将优先。
- en: 9\. TERMINATION
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 9. 终止
- en: You may not copy, modify, sublicense, or distribute the [Document](fdl.html#FDL-DOCUMENT)
    except as expressly provided for under this License. Any other attempt to copy,
    modify, sublicense or distribute the [Document](fdl.html#FDL-DOCUMENT) is void,
    and will automatically terminate your rights under this License. However, parties
    who have received copies, or rights, from you under this License will not have
    their licenses terminated so long as such parties remain in full compliance.
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 您不得复制、修改、再许可或分发[文档](fdl.html#FDL-DOCUMENT)，除非本许可证明确允许。任何其他复制、修改、再许可或分发[文档](fdl.html#FDL-DOCUMENT)的尝试都是无效的，并且将自动终止您根据本许可证享有的权利。然而，只要这些从您那里获得副本或权利的各方继续完全遵守本许可证，他们的许可证将不会终止。
