  id: totrans-159
  prefs: []
  type: TYPE_TB
  zh: '|  *箴言 27:17 (NIV)*  |'
- en: My thanks to the following people who kept me honest by sending me emails noting
    errors, suggesting areas to cover, asking questions, and so on. Where email addresses
    are included, they’ve been shrouded by prepending my “thanks.” so bulk emailers
    won’t easily get these addresses; inclusion of people in this list is *not* an
    authorization to send unsolicited bulk email to them.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢以下这些人通过发送邮件指出错误、建议涵盖的领域、提问等方式让我保持诚实。如果包含电子邮件地址，它们已经被我在前面加上“thanks.”来隐藏，这样垃圾邮件发送者就不容易获取这些地址；此名单中的人的包含*不是*授权向他们发送未经请求的垃圾邮件。
