  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 本文档版权所有 (C) 1999-2000 大卫·A·惠勒。根据GNU自由文档许可协议（FDL）第1.1版或由自由软件基金会发布的任何后续版本，允许复制、分发和/或修改本文档；不变的部分包括“关于作者”，无封面文字，无封底文字。许可证副本包含在下述[附录D](fdl.html)中。
- en: 'These terms do permit mirroring by other web sites, but be *sure* to do the
    following:'
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 这些条款允许其他网站进行镜像，但务必确保以下事项：
- en: make sure your mirrors automatically get upgrades from the master site,
  id: totrans-182
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确保你的镜像站点自动从主站点升级，
- en: clearly show the location of the master site ([http://www.dwheeler.com/secure-programs](http://www.dwheeler.com/secure-programs)),
    with a hypertext link to the master site, and
  id: totrans-183
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 明确显示主站点的位置（[http://www.dwheeler.com/secure-programs](http://www.dwheeler.com/secure-programs)），并提供到主站点的超链接，并且
- en: give me (David A. Wheeler) credit as the author.
  id: totrans-184
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 请将我（大卫·A·惠勒）作为作者给予信用。
- en: The first two points primarily protect me from repeatedly hearing about obsolete
    bugs. I do not want to hear about bugs I fixed a year ago, just because you are
    not properly mirroring the document. By linking to the master site, users can
    check and see if your mirror is up-to-date. I’m sensitive to the problems of sites
    which have very strong security requirements and therefore cannot risk normal
    connections to the Internet; if that describes your situation, at least try to
    meet the other points and try to occasionally sneakernet updates into your environment.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 前两点主要保护我不必反复听到关于过时错误的报告。我不想听到关于我一年前修复的错误，仅仅因为你没有正确镜像文档。通过链接到主站点，用户可以检查并查看你的镜像是否是最新的。我对那些有非常强烈安全要求且因此不能冒险进行常规互联网连接的网站的问题很敏感；如果这描述了你的情况，至少尝试满足其他要点，并尝试偶尔将sneakernet更新偷偷地引入你的环境中。
- en: By this license, you may modify the document, but you can’t claim that what
    you didn’t write is yours (i.e., plagiarism) nor can you pretend that a modified
    version is identical to the original work. Modifying the work does not transfer
    copyright of the entire work to you; this is not a “public domain” work in terms
    of copyright law. See the license in [Appendix D](fdl.html) for details. If you
    have questions about what the license allows, please contact me. In most cases,
    it’s better if you send your changes to the master integrator (currently David
    A. Wheeler), so that your changes will be integrated with everyone else’s changes
    into the master copy.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 根据本许可证，您可以修改文档，但您不能声称您未编写的内容属于您（即抄袭）也不能假装修改后的版本与原始作品相同。修改作品并不将整个作品的版权转让给您；在版权法意义上，这不是一个“公共领域”作品。有关详细信息，请参阅[附录D](fdl.html)中的许可证。如果您对许可证允许的内容有疑问，请与我联系。在大多数情况下，最好是将您的更改发送给主集成者（目前是David
    A. Wheeler），这样您的更改就会与其他人的更改一起集成到主副本中。
- en: 'I am not a lawyer, nevertheless, it’s my position as an author and software
    developer that any code fragments not explicitly marked otherwise are so small
    that their use fits under the “fair use” doctrine in copyright law. In other words,
    unless marked otherwise, you can use the code fragments without any restriction
    at all. Copyright law does not permit copyrighting absurdly small components of
    a work (e.g., “I own all rights to B-flat and B-flat minor chords”), and the fragments
    not marked otherwise are of the same kind of minuscule size when compared to real
    programs. I’ve done my best to give credit for specific pieces of code written
    by others. Some of you may still be concerned about the legal status of this code,
    and I want make sure that it’s clear that you can use this code in your software.
    Therefore, code fragments included directly in this document not otherwise marked
    have also been released by me under the terms of the “MIT license”, to ensure
    you that there’s no serious legal encumbrance:'
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 我不是律师，然而，作为作者和软件开发者，我认为任何未明确标记的代码片段都太小，其使用符合版权法中的“合理使用”原则。换句话说，除非另有标记，否则您可以使用代码片段而没有任何限制。版权法不允许对作品中的异常小的组成部分进行版权保护（例如，“我拥有B-Flat和B-Flat小七和弦的所有权利”），而未标记的片段与实际程序相比具有相同的小型尺寸。我已经尽我所能为他人编写的特定代码片段提供认可。有些人可能仍然担心这段代码的法律地位，我想确保您清楚，您可以在您的软件中使用这段代码。因此，本文件中直接包含且未另作标记的代码片段也已由我根据“MIT许可证”的条款发布，以确保您没有严重的法律障碍：
