- en: '|   |  **The words of the wise are like goads, their collected sayings like
    firmly embedded nails--given by one Shepherd. Be warned, my son, of anything in
    addition to them. Of making many books there is no end, and much study wearies
    the body.**  |'
  id: totrans-2
  prefs: []
  type: TYPE_TB
  zh: '|   | **智慧人的话如同刺，他们收集的箴言如同牢牢嵌入的钉子——出自一位牧者之手。我的儿子啊，你要警戒，不要超过这些。书籍没有尽头，过多的研究会使人疲惫。**
    |'
- en: '|   | *Ecclesiastes 12:11-12 (NIV)* |'
  id: totrans-3
  prefs: []
  type: TYPE_TB
  zh: '|   | *传道书 12:11-12 (NIV)* |'
- en: '*Note that there is a heavy emphasis on technical articles available on the
    web, since this is where most of this kind of technical information is available.*'
