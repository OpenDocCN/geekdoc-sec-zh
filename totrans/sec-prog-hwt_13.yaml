- en: '|   |  **A copy of the text of the edict was to be issued as law in every province
    and made known to the people of every nationality so they would be ready for that
    day.**  |'
  id: totrans-178
  prefs: []
  type: TYPE_TB
  zh: '|   |  **该敕令的文本应作为法律在每个省份发布，并让所有国籍的人民都知道，以便他们为那一天做好准备。**  |'
