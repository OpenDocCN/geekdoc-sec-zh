  prefs: []
  type: TYPE_NORMAL
  zh: '[自由软件基金会](http://www.gnu.org/fsf/fsf.html)可能会不时发布新的、修订版的GNU自由文档许可证。这些新版本的精神将与当前版本相似，但在细节上可能有所不同，以解决新的问题或关注点。请参阅[http://www.gnu.org/copyleft/](http://www.gnu.org/copyleft)。'
- en: Each version of the License is given a distinguishing version number. If the
    [Document](fdl.html#FDL-DOCUMENT) specifies that a particular numbered version
    of this License "or any later version" applies to it, you have the option of following
    the terms and conditions either of that specified version or of any later version
    that has been published (not as a draft) by the Free Software Foundation. If the
    [Document](fdl.html#FDL-DOCUMENT) does not specify a version number of this License,
    you may choose any version ever published (not as a draft) by the Free Software
    Foundation.
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 每个版本的许可证都有一个区分性的版本号。如果[文档](fdl.html#FDL-DOCUMENT)指定了此许可证的特定编号版本“或任何后续版本”适用于它，你有权选择遵循该指定版本或任何由自由软件基金会已发布（非草案）的后续版本的条件和条款。如果[文档](fdl.html#FDL-DOCUMENT)没有指定此许可证的版本号，你可以选择自由软件基金会已发布的任何版本（非草案）。
- en: Addendum
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 补遗
- en: 'To use this License in a document you have written, include a copy of the License
    in the document and put the following copyright and license notices just after
    the title page:'
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 要在您所写的文档中使用此许可证，请在文档中包含许可证的副本，并在标题页之后放置以下版权和许可证通知：
- en: Copyright YEAR YOUR NAME.
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 版权 YEAR YOUR NAME.
- en: Permission is granted to copy, distribute and/or modify this document under
    the terms of the GNU Free Documentation License, Version 1.1 or any later version
    published by the Free Software Foundation; with the [Invariant Sections](fdl.html#FDL-INVARIANT)
    being LIST THEIR TITLES, with the [Front-Cover Texts](fdl.html#FDL-COVER-TEXTS)
    being LIST, and with the [Back-Cover Texts](fdl.html#FDL-COVER-TEXTS) being LIST.
    A copy of the license is included in the section entitled “GNU Free Documentation
    License”.
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 在GNU自由文档许可证，版本1.1或由自由软件基金会发布的任何后续版本下，允许复制、分发和/或修改此文档；[不变节](fdl.html#FDL-INVARIANT)为列出它们的标题，[封面文本](fdl.html#FDL-COVER-TEXTS)为列出，[封底文本](fdl.html#FDL-COVER-TEXTS)为列出。许可证的副本包含在标题为“GNU自由文档许可证”的章节中。
- en: If you have no [Invariant Sections](fdl.html#FDL-INVARIANT), write "with no
    Invariant Sections" instead of saying which ones are invariant. If you have no
    [Front-Cover Texts](fdl.html#FDL-COVER-TEXTS), write "no Front-Cover Texts" instead
    of "Front-Cover Texts being LIST"; likewise for [Back-Cover Texts](fdl.html#FDL-COVER-TEXTS).
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有[不变节](fdl.html#FDL-INVARIANT)，请写“没有不变节”而不是列出哪些是不变的。如果你没有[封面文本](fdl.html#FDL-COVER-TEXTS)，请写“没有封面文本”而不是“封面文本为列表”；同样适用于[封底文本](fdl.html#FDL-COVER-TEXTS)。
- en: If your document contains nontrivial examples of program code, we recommend
    releasing these examples in parallel under your choice of free software license,
    such as the [GNU General Public License](http://www.gnu.org/copyleft/gpl.html),
    to permit their use in free software.
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的文档包含非平凡的程序代码示例，我们建议你选择一个免费软件许可证，如[GNU通用公共许可证](http://www.gnu.org/copyleft/gpl.html)，并行发布这些示例，以允许在免费软件中使用。
- en: Appendix E. Endorsements
  id: totrans-263
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 附录E. 推荐
- en: 原文：[https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/endorsements.html](https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/endorsements.html)
  id: totrans-264
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/endorsements.html](https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/endorsements.html)
- en: This version of the document is endorsed by the original author, David A. Wheeler,
    as a document that should improve the security of programs, when applied correctly.
    Note that no book, including this one, can guarantee that a developer who follows
    its guidelines will produce perfectly secure software. Modifications (including
    translations) must remove this appendix per the license agreement included above.
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 此版本文档由原作者David A. Wheeler推荐，作为应正确应用以提高程序安全性的文档。请注意，没有一本书，包括这本书，可以保证遵循其指南的开发者将产生完全安全的软件。修改（包括翻译）必须根据上述许可证协议删除此附录。
- en: Appendix F. About the Author
  id: totrans-266
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 附录F. 关于作者
- en: 原文：[https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/about-author.html](https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/about-author.html)
  id: totrans-267
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/about-author.html](https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/about-author.html)
- en: '![](../Images/26568d0bd25835d3fb9774a1de747351.png)'
  id: totrans-268
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/26568d0bd25835d3fb9774a1de747351.png)'
- en: Dr. David A. Wheeler is an expert in computer security and has long specialized
    in development techniques for large and high-risk software systems. He has been
    involved in software development since the mid-1970s, and with computer security
    since the early 1980s. His areas of knowledge include computer security (including
    developing secure software) and open source software.
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 戴维·A·惠勒博士是计算机安全领域的专家，长期专注于大型和高风险软件系统的发展技术。他从1970年代中期开始参与软件开发，从1980年代初开始涉足计算机安全领域。他的知识领域包括计算机安全（包括开发安全软件）和开源软件。
- en: 'Dr. Wheeler is co-author and lead editor of the IEEE book *Software Inspection:
    An Industry Best Practice* and author of the book *Ada95: The Lovelace Tutorial*.
    He is also the author of many smaller papers and articles, including the Linux
    *Program Library HOWTO*.'
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 惠勒博士是IEEE书籍《软件审查：行业最佳实践》的合著者和主要编辑，以及《Ada95：洛夫莱斯教程》一书的作者。他还是许多较小论文和文章的作者，包括Linux的《程序库HOWTO》。
- en: Dr. Wheeler hopes that, by making this document available, other developers
    will make their software more secure. You can reach him by email at dwheeler@dwheeler.com
    (no spam please), and you can also see his web site at [http://www.dwheeler.com](http://www.dwheeler.com).
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 惠勒博士希望，通过使这份文档可用，其他开发者能够使他们的软件更加安全。您可以通过电子邮件 dwheeler@dwheeler.com（请勿发送垃圾邮件）联系他，您还可以访问他的网站
    [http://www.dwheeler.com](http://www.dwheeler.com)。
