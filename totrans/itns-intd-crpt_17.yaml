    Homomorphic Encryption+in%3Atitle).
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 评论通过[GitHub仓库](https://github.com/boazbk/crypto/issues)使用[utteranc.es](https://utteranc.es)应用程序发布。需要GitHub登录才能评论。如果您不想授权应用程序代表您发布，您也可以直接在[此页面的GitHub问题](https://github.com/boazbk/crypto/issues?q=Fully%20Homomorphic%20Encryption%3Bin%3Atitle)上评论。
