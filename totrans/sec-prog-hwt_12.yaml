- en: Chapter 12\. Conclusion
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第12章。结论
- en: 原文：[https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/conclusion.html](https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/conclusion.html)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/conclusion.html](https://dwheeler.com/secure-programs/Secure-Programs-HOWTO/conclusion.html)
- en: '|   |  **The end of a matter is better than its beginning, and patience is
    better than pride.**  |'
  id: totrans-2
  prefs: []
  type: TYPE_TB
  zh: '|   |  **事情的结局胜过它的开始，耐心胜过骄傲。**  |'
- en: '|   | *Ecclesiastes 7:8 (NIV)* |'
  id: totrans-3
  prefs: []
  type: TYPE_TB
  zh: '|   | *传道书7:8 (NIV)* |'
- en: Designing and implementing a truly secure program is actually a difficult task.
    The difficulty is that a truly secure program must respond appropriately to all
    possible inputs and environments controlled by a potentially hostile user. Developers
    of secure programs must deeply understand their platform, seek and use guidelines
    (such as these), and then use assurance processes (such as inspections and other
    peer review techniques) to reduce their programs’ vulnerabilities.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 设计和实现一个真正安全的程序实际上是一项困难的任务。困难在于一个真正安全的程序必须对可能由潜在敌对用户控制的全部可能的输入和环境做出适当的响应。安全程序的开发者必须深入理解他们的平台，寻求并使用指南（如这些），然后使用保证过程（如检查和其他同行评审技术）来减少其程序的安全漏洞。
- en: 'In conclusion, here are some of the key guidelines in this book:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，本书中的一些关键指南如下：
- en: Validate all your inputs, including command line inputs, environment variables,
    CGI inputs, and so on. Don’t just reject “bad” input; define what is an “acceptable”
    input and reject anything that doesn’t match.
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 验证所有输入，包括命令行输入、环境变量、CGI输入等。不要仅仅拒绝“坏”输入；定义什么是“可接受”的输入，并拒绝所有不符合的输入。
- en: Avoid buffer overflow. Make sure that long inputs (and long intermediate data
    values) can’t be used to take over your program. This is the primary programmatic
    error at this time.
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 避免缓冲区溢出。确保长输入（以及长的中间数据值）不能被用来控制你的程序。这是当前的主要编程错误。
- en: Structure program internals. Secure the interface, minimize privileges, make
    the initial configuration and defaults safe, and fail safe. Avoid race conditions
    (e.g., by safely opening any files in a shared directory like /tmp). Trust only
    trustworthy channels (e.g., most servers must not trust their clients for security
    checks or other sensitive data such as an item’s price in a purchase).
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 结构化程序内部。保护接口，最小化权限，确保初始配置和默认值安全，并设计为安全模式。避免竞争条件（例如，通过安全地打开共享目录如/tmp中的任何文件）。只信任可信赖的渠道（例如，大多数服务器不得信任其客户端进行安全检查或其他敏感数据，如购买中的商品价格）。
- en: Carefully call out to other resources. Limit their values to valid values (in
    particular be concerned about metacharacters), and check all system call return
    values.
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 仔细调用其他资源。限制它们的值到有效值（特别是关注元字符），并检查所有系统调用返回值。
- en: Reply information judiciously. In particular, minimize feedback, and handle
    full or unresponsive output to an untrusted user.
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 谨慎回复信息。特别是，最小化反馈，并处理对不受信任用户的完整或无响应的输出。
