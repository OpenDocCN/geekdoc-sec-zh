- en: Ethical, moral, and policy dimensions to cryptography
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 密码学的伦理、道德和政策维度
- en: 原文：[https://intensecrypto.org/public/lec_24_policy.html](https://intensecrypto.org/public/lec_24_policy.html)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://intensecrypto.org/public/lec_24_policy.html](https://intensecrypto.org/public/lec_24_policy.html)
- en: '*See any bugs/typos/confusing explanations? [Open a GitHub issue](https://github.com/boazbk/crypto/issues/new).
    You can also [comment below](#commentform)*'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '*发现任何错误/打字错误/令人困惑的解释？[在GitHub上打开一个issue](https://github.com/boazbk/crypto/issues/new)。您也可以[在下面评论](#commentform)*'
- en: '**★ See also the [**PDF version of this chapter**](https://files.boazbarak.org/crypto/lec_24_policy.pdf)
    (better formatting/references) ★'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '**★ 另请参阅本章的[PDF版本**](https://files.boazbarak.org/crypto/lec_24_policy.pdf)（更好的格式/参考文献）★'
- en: 'This will not be a lecture but rather a discussion on some of the questions
    that arise from cryptography. I would like you to read some of the sources below
    (and maybe others) and reflect on the following questions:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 这将不会是一次讲座，而是一次关于密码学引发的一些问题的讨论。我希望你阅读以下一些资料（也许还有其他资料）并思考以下问题：
- en: The discussion is often framed as weighing privacy against security, but I encourage
    you to look critically at both issues. It is often instructive to try to compare
    the current situation with both the historical past as well as some ideal desired
    world. It is also worthwhile to consider cryptography in the broader contexts.
    Some people on both the pro regulation and anti regulation camps exeggarate the
    role of cryptography.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 讨论通常被框架为权衡隐私与安全，但我鼓励你批判性地看待这两个问题。尝试将当前情况与历史过去以及一些理想化的期望世界进行比较，通常是有教育意义的。在更广泛的环境中考虑密码学也是值得的。在支持监管和反对监管的阵营中，有些人过分解读了密码学的作用。
- en: On one hand, cryptography is likely not to bring about the “crypto anarchy”
    regime hoped for in the crypto anarchist manifesto. For example, more than the
    growth of bitcoin, we are seeing a turn away from cash into credit cards and other
    forms of much more traceable and *less* anonymous forms of payments (interestingly,
    these forms of payments are often enabled by cryptography). On the other hand,
    despite the fears raised by government agencies of “going dark” there are powerful
    commercial incentives to collect vast amounts of data and store them at search-warrant
    friendly servers. Clearly technology is shifting the landscape of relationships
    among individuals, as well as between individuals and large organizations and
    governments. Cryptography is an important component in these technologies but
    not the only one, and more than that, the ways technologies end up *used* often
    has more to do with social and commercial factors than with the technologies themselves.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 一方面，密码学可能不会带来加密无政府主义者宣言中所希望的“加密无政府主义”制度。例如，除了比特币的增长之外，我们看到了人们从现金转向信用卡和其他更易追踪且*不那么*匿名的支付方式（有趣的是，这些支付方式通常是由密码学所启用）。另一方面，尽管政府机构提出了“黑暗”的担忧，但收集大量数据并在搜查令友好的服务器上存储数据的强大商业激励仍然存在。显然，技术正在改变个人之间的关系，以及个人与大型组织和国家之间的关系。密码学是这些技术的一个重要组成部分，但不是唯一的，更重要的是，技术最终*被使用*的方式往往更多地与社会和商业因素有关，而不是技术本身。
- en: All that said, significant changes often pose non trivial dangers, and it is
    important to have an informed and reasoned discussion of the ways cryptography
    can help or harm the general and private good.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些话，重大的变化往往带来非同寻常的危险，因此，重要的是要有一个知情且合理的讨论，讨论密码学如何帮助或损害公共利益和私人利益。
- en: 'Some questions that are worth considering are:'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 一些值得考虑的问题是：
- en: Is communicating privately a basic [human right](http://www.un.org/en/universal-declaration-human-rights/)?
    Should it extend to communicating at a distance? Should this be absolute privacy
    that cannot be violated even with a legal warrant? If there was a secure way to
    implement wiretapping only with a legal warrant, would it be morally just?
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 私下交流是否是一项基本的[人权](http://www.un.org/en/universal-declaration-human-rights/)？它是否应该扩展到远程交流？这应该是绝对的隐私，即使有法律搜查令也不能侵犯吗？如果只有通过法律搜查令才能实施窃听，这在道德上是否公正？
- en: Is privacy a basic good in its own right? Or a necessary condition for the freedom
    of expression, and peaceful assembly and association?
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 隐私本身是否是一项基本的好事？或者它是言论自由、和平集会和结社自由的必要条件？
- en: Are we less or more secure today than in the past? In what ways did the balance
    between government and individuals shift in the last few decades? Do governments
    have more or less data and tools for monitoring individuals at their disposal?
    Do individuals and non-governmental groups have more or less ability to inflict
    harm (and hence need to be protected against)?
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们今天的保障比过去更多还是更少？在过去的几十年里，政府与个人之间的平衡是如何变化的？政府是否拥有更多或更少的监控个人的数据和工具？个人和非政府组织是否有更多或更少的造成伤害（因此需要受到保护）的能力？
- en: Do we have more or less privacy today than in the past? Do cryptography regulation
    play a big part in that?
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们今天的隐私比过去更多还是更少？加密法规在这方面扮演了重要角色吗？
- en: What would be the balance between security and privacy in an ideal world?
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在理想世界中，安全和隐私之间的平衡会是什么样子？
- en: Is the focus on encryption misguided in that the main issue affecting privacy
    and security is the so called *meta data*? Can cryptographic techniques protect
    such meta data? Even if they could, is there a commercial interest in doing so?
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 专注于加密是否是错误的，因为影响隐私和安全的真正问题是所谓的*元数据*？加密技术可以保护这样的元数据吗？即使可以，是否有商业利益去做这件事？
- en: One argument against the regulation of cryptography is that, given the mathematics
    of cryptography is not secret, the “bad guys” will always be able to access it.
    Is this a valid argument? Note that similar arguments are made in the context
    of gun control. Also, perhaps the “true dissidents” will also be able to access
    cryptography as well and so regulation will effect the masses or “run of the mill”
    private good and not-so-good citizens?
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 反对密码学监管的一个论点是，鉴于密码学的数学不是秘密的，“坏人”总是会找到它。这是一个有效的论点吗？请注意，在枪支控制背景下也有类似的论点。也许“真正的异见者”也能接触到密码学，因此监管将影响大众或“普通”的公民和不太好的公民？
- en: What would be the practical impact of regulations forbidding the use of end-to-end
    crypto without access by governments?
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 禁止使用端到端加密且政府无法访问的法规的实际影响会是什么？
- en: Rogaway argues that cryptography is inherently political, and research should
    acknowledge this and be directed at achieving beneficial political goals. Has
    cryptography research failed the public? What more could be done?
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Rogaway认为密码学本质上是政治性的，研究应该承认这一点，并致力于实现有益的政治目标。密码学研究是否失败了公众？还能做些什么？
- en: Are some cryptographic (or crypto related) tools inherently morally problematic?
    Rogaway suggests that this may be true for fully homomorphic encryption and differential
    privacy- do you agree?
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一些密码学（或与密码学相关的）工具是否在本质上存在道德问题？Rogaway建议这可能适用于完全同态加密和差分隐私 - 你同意吗？
- en: What are the most significant scenarios where cryptography can impact positively
    or negatively? Large scale terror attacks? “Ordinary” crimes (that still claim
    the lives of many more people than terror attacks)? Attacks against cyber infrastructure
    or personal data? Political dissidents in opressive regimes? Mass government or
    corporate surveilance?
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 什么是最重要的场景，在这些场景中，密码学可以产生积极或消极的影响？大规模恐怖袭击？“普通”犯罪（这些犯罪仍然夺走了比恐怖袭击更多的人的生命）？针对网络基础设施或个人数据的攻击？在压迫政权中的政治异见者？大规模政府或企业监控？
- en: How are these issues different in the U.S. as opposed to other countries? Is
    the debate too U.S. centric?
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与其他国家相比，这些问题在美国有何不同？辩论是否过于以美国为中心？
- en: 'Reading prior to lecture:'
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 讲座前的阅读：
- en: '[Moral Character of Cryptographic Work](http://web.cs.ucdavis.edu/~rogaway/papers/moral.html)
    - please read at least parts 1-3 (pages 1-30 in the footnoted version) - it’s
    long and should not be taken uncritically, but is a very good and thought provoking
    read.'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[密码学工作的道德品质](http://web.cs.ucdavis.edu/~rogaway/papers/moral.html) - 请至少阅读第1-3部分（脚注版本中的第1-30页）
    - 这篇文章很长，不应不加批判地接受，但它是一篇非常好且发人深省的阅读材料。'
- en: '[“Going Dark” Berkman report](http://cyber.law.harvard.edu/pubrelease/dont-panic/)
    - this is a report written by a committee, and as such not as exciting (though
    arguably more sober) than Rogaway’s paper. Please read at least the introduction
    and you might also find the personal statements in Appendix A interesting.'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[“黑暗时代”伯克曼报告](http://cyber.law.harvard.edu/pubrelease/dont-panic/) - 这是由一个委员会撰写的报告，因此（尽管可以争论地说更为冷静）不如Rogaway的论文那么吸引人。请至少阅读引言，你也许还会对附录A中的个人陈述感兴趣。'
- en: '[Digital Equilibrium project](https://www.digitalequilibriumproject.com/home.html)
    - optional reading - this is a group of very senior current and former officials,
    in particular in government, and as such would tend to fall on the more “establishment”
    or “pro regulation” side. Their “foundational paper” has even more of a “written
    by committee” feel but is still worthwhile reading.'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[数字平衡项目](https://www.digitalequilibriumproject.com/home.html) - 阅读建议 - 这是一个由非常资深现任和前任官员组成的团体，特别是在政府方面，因此他们可能会倾向于更“传统”或“支持监管”的立场。他们的“基础论文”甚至有更多的“委员会撰写”的感觉，但仍值得一读。'
- en: '[Crypto anarchist manifesto](http://www.activism.net/cypherpunk/crypto-anarchy.html)
    - optional reading - very much not “written by committee” can be an interesting
    read even if it sounds more like science fiction than describing actual current
    or near future reality.'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[加密无政府主义宣言](http://www.activism.net/cypherpunk/crypto-anarchy.html) - 阅读建议
    - 尽管听起来更像科幻小说而不是描述实际当前或近未来的现实，但仍然值得一读。'
- en: Case studies.
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 案例研究。
- en: 'Since such a discussion might be sometimes hard to hold in the abstract, let
    us consider some actual cases:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 由于这样的讨论有时在抽象层面上可能很难进行，让我们考虑一些实际案例：
- en: The Snowden revelations
  id: totrans-28
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 斯诺登揭露
- en: The impetus for the current iteration of the security vs privacy debate were
    the [Snowden revelations](http://www.theguardian.com/us-news/the-nsa-files) on
    the massive scale of surveillance by the NSA on citizens in the U.S. and around
    the globe. Concurrently, in plain sight, companies such as Apple, Google, Facebook,
    and others are also collecting massive amounts of information on their users.
    Some of the backlash to the Snowden revelations was increased pressure on companies
    to support stronger “end-to-end” encryption such as some data does not reside
    on companies’ servers, that have become suspect. We’re now seeing some “backlash
    to the backlash” with law enforcement and government officials around the globe
    trying to ban such encryption technlogoy or mandate government backdoors.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 当前关于安全和隐私的辩论的推动力是关于NSA对美国及全球公民进行大规模监控的[斯诺登揭露](http://www.theguardian.com/us-news/the-nsa-files)。同时，在众目睽睽之下，苹果、谷歌、Facebook等公司也在收集大量用户信息。对斯诺登揭露的反击之一是增加对公司支持更强“端到端”加密的压力，例如某些数据不存储在公司服务器上，这些服务器已经变得可疑。我们现在看到一些“反击的反击”，全球执法机构和政府官员试图禁止这种加密技术或强制政府后门。
- en: FBI vs Apple case
  id: totrans-30
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 美国联邦调查局与苹果公司案例
- en: We’ve mentioned [this case](http://www.npr.org/sections/thetwo-way/2016/02/17/467096705/apple-the-fbi-and-iphone-encryption-a-look-at-whats-at-stake)
    in the past. (I also [blogged](https://windowsontheory.org/2016/03/04/the-iphones-of-terrorists/)
    about it.) The short summary is that an iPhone belonging to one of the San Bernardino
    terrorists was found by the FBI. The iPhone’s memory was encrypted by a key \(k\)
    that is obtained as \(H(uid\|passcode)\) where \(passcode\) is the six digit passcode
    of the user and \(uid\) is a secret \(128\) bit key that is hardwired into the
    processor. The processor will only allow ten attempts at guessing the passcode
    before erasing all memory. The FBI wanted Apple’s help in creating a digitally
    signed software update that essentially run a brute force search over the \(10^6\)
    passcodes and output the key \(k\). The software update could be restricted to
    run only on that particular iPhone. Eventually, the FBI managed to extract the
    information out of the iPhone without Apple’s help. The method they used is unknown,
    but it may be possible to physically extract the \(uid\) from the processor. It
    might also be possible to prevent erasure of the memory by disconnecting it from
    the processor, or rewriting it after erasure. Would such cases change your position
    on this question?
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 我们之前提到过[这个案例](http://www.npr.org/sections/thetwo-way/2016/02/17/467096705/apple-the-fbi-and-iphone-encryption-a-look-at-whats-at-stake)。（我还在[博客](https://windowsontheory.org/2016/03/04/the-iphones-of-terrorists/)上写过关于它。）简要来说，是FBI找到了属于圣贝纳迪诺恐怖分子之一的iPhone。该iPhone的内存被一个密钥
    \(k\) 加密，该密钥由 \(H(uid\|passcode)\) 获取，其中 \(passcode\) 是用户的六位数字密码，\(uid\) 是一个秘密的
    \(128\) 位密钥，该密钥被硬编码到处理器中。处理器只允许尝试猜测密码十次，然后擦除所有内存。FBI希望苹果帮助他们创建一个数字签名的软件更新，该更新本质上是在
    \(10^6\) 个密码上执行暴力搜索并输出密钥 \(k\)。该软件更新可以被限制只在该特定iPhone上运行。最终，FBI在没有苹果帮助的情况下成功从iPhone中提取了信息。他们使用的方法未知，但可能从处理器中物理提取
    \(uid\)。也可能通过从处理器断开连接或擦除后重写来防止内存被擦除。这样的案例是否会改变你对这个问题的立场？
- en: 'Some questions that one could ask:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 一些可以提出的问题：
- en: Given that the FBI had a legal warrant for the information on the iPhone, was
    it wrong of Apple to refuse to provide the help required?
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 考虑到FBI对iPhone上的信息拥有合法搜查令，苹果拒绝提供所需帮助是否错误？
- en: Was it wrong for Apple to have designed their iPhone so that they are unable
    to easily extract information out of it? Should they be required to make sure
    that such devices can be searched as a result of a legal warrant?
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 苹果设计iPhone使其无法轻易提取信息，这是否错误？他们是否应该确保这些设备在合法搜查令下可以被搜查？
- en: If the only way for the FBI to get the information was to get Apple’s master
    signature key (that allows to completely break into any iPhone, and even turn
    it into a recording/surveillance device), would it have been OK for them to do
    it? Should Apple design their device in a way that even their master signature
    key cannot break them? Is that even possible, given that software updates are
    crucial for proper functioning of such devices? (It was recently [claimed](http://www.theverge.com/2016/4/14/11434926/blackberry-encryption-master-key-broken-canada-rcmp-surveillance)
    that Canadian police has had access to the master decryption key of Blackberry
    since 2010.)
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果FBI获取信息的唯一途径是获取苹果的主签名密钥（这允许完全破解任何iPhone，甚至将其变成录音/监控设备），他们这样做是否合适？苹果是否应该设计他们的设备，使其主签名密钥也无法破解？考虑到软件更新对这类设备正常功能至关重要，这是否可能？（最近有报道称[加拿大警方自2010年以来一直可以访问Blackberry的主解密密钥](http://www.theverge.com/2016/4/14/11434926/blackberry-encryption-master-key-broken-canada-rcmp-surveillance)。）
- en: In the San Bernardino case, the utility of breaking into the phone was questioned,
    given that both perpetrators were killed and there was no evidence of them receiving
    any assistance. But there are cases where things are more complicated. [Brittney
    Mills](http://www.npr.org/sections/alltechconsidered/2016/03/30/472302719/mom-asks-who-will-unlock-her-murdered-daughters-iphone)
    was 29 years old and 8 months pregnant when she was shot and killed in April 2015
    in Baton Rouge, Louisiana. Her baby was delivered via emergency C section but
    also died a week later. There was no sign of forced entry and so it is quite likely
    she knew her assailant. Her family believes that the clues to her murderer’s identity
    could be found in her iPhone, but since it is locked they have no way of extracting
    this information. One can imagine other cases as well. Recently a mother found
    her kidnapped daughter using the [Find my iPhone](http://www.nbcnews.com/news/us-news/find-my-iphone-icloud-lead-cops-kidnapped-teen-n521486)
    procedure. It is not hard to concieve of a case where unlocking a phone is the
    key to saving someone’s life. Would such cases change your view of the above questions?
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 在圣贝纳迪诺案件中，鉴于两名罪犯都被击毙，没有证据表明他们收到任何帮助，因此质疑破解手机的作用。但有些情况更为复杂。[布里特尼·米尔斯](http://www.npr.org/sections/alltechconsidered/2016/03/30/472302719/mom-asks-who-will-unlock-her-murdered-daughters-iphone)在2015年4月在路易斯安那州巴吞鲁日被枪杀时29岁零8个月怀孕。她的孩子通过紧急剖腹产出生，但一周后也去世了。没有强行闯入的迹象，因此她很可能认识她的袭击者。她的家人认为，她谋杀者的身份线索可能在她iPhone中，但由于手机被锁定，他们无法提取这些信息。可以想象其他类似的情况。最近一位母亲通过[查找我的iPhone](http://www.nbcnews.com/news/us-news/find-my-iphone-icloud-lead-cops-kidnapped-teen-n521486)程序找到了她被绑架的女儿。可以想象，解锁手机可能是拯救某人生命的关键。这些情况是否会改变你对上述问题的看法？
- en: Juniper backdoor case and the OPM break-in
  id: totrans-37
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Juniper后门案例和OPM入侵
- en: We’ve also mentioned the case of the [Juniper backdoor case](http://www.wired.com/2015/12/juniper-networks-hidden-backdoors-show-the-risk-of-government-backdoors/).
    This was a break in to the firewalls of Juniper networks by an unknown party that
    was crucially enabled by backdoor allegedly inserted by the NSA into the Dual
    EC pseudorandom generator. (see also [here](https://rpw.sh/blog/2015/12/21/the-backdoored-backdoor/)
    and [here](http://blog.cryptographyengineering.com/2015/12/on-juniper-backdoor.html)
    for more).
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还提到了[Juniper后门案例](http://www.wired.com/2015/12/juniper-networks-hidden-backdoors-show-the-risk-of-government-backdoors/)。这是一个未知方对Juniper网络防火墙的入侵，关键是通过NSA声称插入到Dual
    EC伪随机生成器的后门实现的。（参见[这里](https://rpw.sh/blog/2015/12/21/the-backdoored-backdoor/)和[这里](http://blog.cryptographyengineering.com/2015/12/on-juniper-backdoor.html)了解更多。）
- en: Because of the nature of this break in, whomever is responsible for it could
    have decrypted much of the traffic without leaving any traces, and so we don’t
    know the damage caused, but such hacks can have much more significant consequences
    than forcing people to change their credit card numbers. When the [federal office
    of personell management was hacked](https://www.lawfareblog.com/why-opm-hack-far-worse-you-imagine)
    sensitive information about millions of people who have gone through the security
    clearance was extracted. This includes fingerprints, extensive personal information
    from interviews and polygraph sessions, and much more. Such information can help
    then gain access to more information, whether it’s using the fingerprint to unlock
    a phone or using the extensive knowledge of social connections, habits and interests
    to launch very targeted attacks to extract information from particular individuals.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 由于这次破解的性质，无论谁负责它，都可能在不留下任何痕迹的情况下解密大部分流量，因此我们不知道造成的损害，但此类黑客攻击可能比强迫人们更改信用卡号码具有更严重的后果。当[联邦人事管理局遭到黑客攻击](https://www.lawfareblog.com/why-opm-hack-far-worse-you-imagine)时，数百万已经通过安全审查的人的敏感信息被提取。这包括指纹、从面试和测谎会话中获取的广泛个人信息，以及更多。此类信息可以帮助他们获取更多信息，无论是使用指纹解锁手机，还是利用广泛的社交关系、习惯和兴趣来对特定个人发起非常针对性的攻击以提取信息。
- en: Here one could ask if stronger cryptography, and in particular cryptographic
    tools that would have enabled an individual to control access to his or her own
    data, would have helped prevent such attacks.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 人们可能会问，如果使用更强的加密技术，特别是那些能够使个人控制其数据访问的加密工具，是否能够帮助预防此类攻击。
